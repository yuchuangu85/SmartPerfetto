name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of SmartPerfetto is affected?
      options:
        - AI Analysis (Agent)
        - Skills (YAML)
        - Frontend (UI Panel)
        - Trace Processor
        - Backend (API/Server)
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Load trace file '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: trace-info
    attributes:
      label: Trace Information
      description: If applicable, describe the trace (device, Android version, scene type)
      placeholder: |
        Device: Pixel 8 Pro
        Android: 15
        Scene: Scrolling / Startup / ANR

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs from `backend/logs/sessions/` or attach screenshots
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details
      placeholder: |
        OS: macOS 15.x / Ubuntu 24.04
        Node.js: 22.x
        Browser: Chrome 130
    validations:
      required: true
