name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点自动同步
  workflow_dispatch: # 支持手动点击同步

jobs:
  sync:
    runs-on: ubuntu-latest
    # 如果当前仓库本身就是原始上游，则不执行同步（防止自己同步自己）
    if: github.repository != 'Gracker/SmartPerfetto'
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # 注意：默认的 GITHUB_TOKEN 同步后不会触发其他 workflow（如 Docker 构建）
          # 如果希望同步后自动触发 docker-publish，这里需要配置为 Personal Access Token (PAT)
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          # REQUIRED 'target_repo_token' exactly like this!
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: Gracker/SmartPerfetto
          upstream_sync_branch: main

      - name: New commits found
        if: steps.sync.outputs.has_new_commits == 'true'
        run: echo "New commits were found to sync."
    
      - name: No new commits
        if: steps.sync.outputs.has_new_commits == 'false'
        run: echo "There were no new commits."
