name: backend-agent-regression-gate

on:
  pull_request:
    paths:
      - "backend/**"
      - "test-traces/**"
      - ".github/workflows/backend-agent-regression-gate.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "test-traces/**"
      - ".github/workflows/backend-agent-regression-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Install trace_processor_shell
        run: |
          curl -fsSL https://get.perfetto.dev/trace_processor -o /tmp/trace_processor_installer.py
          python3 /tmp/trace_processor_installer.py --version

          TP_BIN="$HOME/.local/share/perfetto/prebuilts/trace_processor_shell"
          if [ ! -x "$TP_BIN" ]; then
            echo "trace_processor_shell not found at $TP_BIN" >&2
            exit 1
          fi

          echo "TRACE_PROCESSOR_PATH=$TP_BIN" >> "$GITHUB_ENV"

      - name: Validate skills
        run: npm run validate:skills

      - name: Run core tests
        run: npm run test:core

      - name: Run skill eval (real traces)
        run: npm run test:skill-eval:real-traces

      - name: Run scene trace regression
        run: npm run test:scene-trace-regression
