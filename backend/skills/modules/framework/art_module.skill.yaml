# Framework ART Module Expert
#
# Provides Android Runtime analysis capabilities for cross-domain experts.
# Answers questions about GC, JIT, and memory allocation.

name: art_module
version: "1.0"
type: composite
category: framework

meta:
  display_name: "ART 运行时分析"
  description: "分析 GC、JIT 编译和内存分配"
  tags: ["framework", "art", "gc", "jit", "memory"]

# Module metadata
module:
  layer: framework
  component: ART
  subsystems:
    - gc
    - jit
    - allocation
  relatedModules:
    - app_third_party
    - kernel_scheduler
    - hardware_memory

# Dialogue interface
dialogue:
  capabilities:
    - id: gc_analysis
      questionTemplate: "What GC activity happened for package {package}?"
      requiredParams: [package]
      optionalParams: [start_ts, end_ts]
      description: "Analyze garbage collection events"

    - id: gc_during_frame
      questionTemplate: "Was there GC during frame rendering for {package}?"
      requiredParams: [package]
      description: "Check for GC during critical rendering"

    - id: jit_analysis
      questionTemplate: "What JIT compilation happened for package {package}?"
      requiredParams: [package]
      description: "Analyze JIT compilation activity"

    - id: allocation_analysis
      questionTemplate: "What are the allocation patterns for package {package}?"
      requiredParams: [package]
      description: "Analyze memory allocation patterns"

  findingsSchema:
    - id: gc_during_animation
      severity: critical
      titleTemplate: "GC during animation: {gc_count} GCs totaling {gc_ms}ms"
      descriptionTemplate: "Garbage collection happened during animation, causing jank"
      evidenceFields: [gc_count, gc_ms, gc_type]

    - id: high_gc_frequency
      severity: warning
      titleTemplate: "High GC frequency: {gc_per_sec} GCs/second"
      descriptionTemplate: "Excessive GC activity indicates high allocation rate"
      evidenceFields: [gc_per_sec, total_gc_count, avg_gc_ms]

    - id: long_gc_pause
      severity: warning
      titleTemplate: "Long GC pause: {max_gc_ms}ms"
      descriptionTemplate: "GC pause exceeded 10ms threshold"
      evidenceFields: [max_gc_ms, gc_type]

    - id: jit_compilation_blocking
      severity: warning
      titleTemplate: "JIT compilation blocking: {jit_ms}ms"
      descriptionTemplate: "JIT compilation blocked main thread"
      evidenceFields: [jit_ms, method_count]

  suggestionsSchema:
    - id: check_allocation_rate
      condition: "gc_per_sec > 2"
      targetModule: memory_module
      questionTemplate: "What is causing high allocation rate for {package}?"
      paramsMapping:
        package: package
      priority: 1

    - id: check_heap_size
      condition: "heap_near_limit == true"
      targetModule: memory_module
      questionTemplate: "Is heap size limit affecting {package}?"
      paramsMapping:
        package: package
      priority: 2

prerequisites: {}

inputs:
  - name: package
    type: string
    required: true
    description: "Target package name"
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Get GC overview
  - id: gc_overview
    type: atomic
    name: "GC 概览"
    sql: |
      SELECT
        slice.name AS gc_type,
        COUNT(*) AS gc_count,
        CAST(SUM(slice.dur) / 1e6 AS INTEGER) AS total_gc_ms,
        CAST(AVG(slice.dur) / 1e6 AS REAL) AS avg_gc_ms,
        CAST(MAX(slice.dur) / 1e6 AS REAL) AS max_gc_ms
      FROM slice
      JOIN thread_track ON slice.track_id = thread_track.id
      JOIN thread ON thread_track.utid = thread.utid
      WHERE slice.name LIKE '%GC%'
        OR slice.name LIKE '%garbage%'
        OR slice.name LIKE '%collection%'
      GROUP BY slice.name
      ORDER BY total_gc_ms DESC
    display:
      level: key
      layer: overview
      title: "GC 概览"
    save_as: gc_overview
    synthesize:
      role: overview
      fields:
        - key: gc_type
          label: GC 类型
        - key: gc_count
          label: 次数
        - key: total_gc_ms
          label: 总耗时
          format: "{{value}}ms"

  # Step 2: Get individual GC events
  - id: gc_events
    type: atomic
    name: "GC 事件列表"
    sql: |
      SELECT
        slice.ts,
        slice.name AS gc_type,
        CAST(slice.dur / 1e6 AS REAL) AS dur_ms,
        thread.name AS thread_name
      FROM slice
      JOIN thread_track ON slice.track_id = thread_track.id
      JOIN thread ON thread_track.utid = thread.utid
      WHERE slice.name LIKE '%GC%'
        OR slice.name LIKE '%garbage%'
      ORDER BY slice.dur DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "GC 事件列表"
    save_as: gc_events

  # Step 3: Check for GC during main thread work
  - id: gc_during_main_thread
    type: atomic
    name: "主线程 GC"
    sql: |
      SELECT
        slice.ts,
        slice.name AS gc_type,
        CAST(slice.dur / 1e6 AS REAL) AS dur_ms
      FROM slice
      JOIN thread_track ON slice.track_id = thread_track.id
      JOIN thread ON thread_track.utid = thread.utid
      JOIN process ON thread.upid = process.upid
      WHERE (slice.name LIKE '%GC%' OR slice.name LIKE '%garbage%')
        AND thread.name = 'main'
        AND process.name LIKE '%${package}%'
      ORDER BY slice.dur DESC
      LIMIT 20
    display:
      level: detail
      layer: list
      title: "主线程 GC"
    save_as: main_thread_gc

  # Step 4: JIT compilation events
  - id: jit_events
    type: atomic
    name: "JIT 编译事件"
    sql: |
      SELECT
        slice.name AS jit_event,
        COUNT(*) AS event_count,
        CAST(SUM(slice.dur) / 1e6 AS INTEGER) AS total_ms,
        CAST(AVG(slice.dur) / 1e6 AS REAL) AS avg_ms
      FROM slice
      WHERE slice.name LIKE '%JIT%'
        OR slice.name LIKE '%compile%'
      GROUP BY slice.name
      ORDER BY total_ms DESC
    display:
      level: detail
      layer: overview
      title: "JIT 编译事件"
    save_as: jit_events

  # Step 5: Diagnose ART issues
  - id: art_diagnosis
    type: diagnostic
    name: "ART 诊断"
    inputs: [gc_overview, gc_events, main_thread_gc, jit_events]
    rules:
      - condition: "main_thread_gc.data.length > 0"
        diagnosis: "主线程发生 ${main_thread_gc.data.length} 次 GC，可能导致卡顿"
        confidence: high
        suggestions:
          - "减少临时对象分配"
          - "使用对象池复用对象"
        evidence_fields:
          - main_thread_gc.data.length
          - main_thread_gc.data[0]?.dur_ms

      - condition: "gc_overview.data[0]?.total_gc_ms > 100"
        diagnosis: "GC 总耗时过长 (${gc_overview.data[0]?.total_gc_ms}ms)，内存压力大"
        confidence: high
        suggestions:
          - "检查是否有内存泄漏"
          - "优化数据结构减少内存使用"
        evidence_fields:
          - gc_overview.data[0].total_gc_ms
          - gc_overview.data[0].gc_count

      - condition: "gc_events.data[0]?.dur_ms > 10"
        diagnosis: "存在长 GC 暂停 (${gc_events.data[0]?.dur_ms}ms)"
        confidence: medium
        suggestions:
          - "增加堆大小"
          - "避免在关键路径分配大对象"
        evidence_fields:
          - gc_events.data[0].dur_ms
          - gc_events.data[0].gc_type

      - condition: "jit_events.data[0]?.total_ms > 50"
        diagnosis: "JIT 编译耗时较长 (${jit_events.data[0]?.total_ms}ms)"
        confidence: low
        suggestions:
          - "考虑 AOT 编译优化"
          - "检查是否有热点方法未被编译"
        evidence_fields:
          - jit_events.data[0].total_ms
    display:
      level: key
      layer: overview
      title: "ART 诊断结果"
