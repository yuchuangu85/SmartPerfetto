# Framework AMS Module Expert
#
# Provides Activity Manager Service analysis capabilities for cross-domain experts.
# Answers questions about app lifecycle, process management, and startup timing.

name: ams_module
version: "1.0"
type: composite
category: framework

meta:
  display_name: "AMS 分析"
  description: "分析应用生命周期、进程管理和启动时序"
  tags: ["framework", "ams", "lifecycle", "startup", "anr"]

# Module metadata
module:
  layer: framework
  component: AMS
  subsystems:
    - activity_lifecycle
    - process_management
    - broadcast
    - service
  relatedModules:
    - kernel_scheduler
    - framework_wms
    - app_third_party

# Dialogue interface
dialogue:
  capabilities:
    - id: startup_timing
      questionTemplate: "What is the startup timing breakdown for package {package}?"
      requiredParams: [package]
      optionalParams: [launch_type]
      description: "Analyze cold/warm/hot startup timing"

    - id: activity_lifecycle
      questionTemplate: "What activity transitions happened for package {package}?"
      requiredParams: [package]
      optionalParams: [start_ts, end_ts]
      description: "Analyze activity lifecycle events"

    - id: process_start
      questionTemplate: "Why was process {package} slow to start?"
      requiredParams: [package]
      description: "Analyze process creation delays"

    - id: anr_analysis
      questionTemplate: "Why did package {package} ANR?"
      requiredParams: [package]
      description: "Analyze ANR root cause"

  findingsSchema:
    - id: slow_startup
      severity: critical
      titleTemplate: "Slow startup: {launch_type} took {total_ms}ms"
      descriptionTemplate: "App startup exceeded threshold ({total_ms}ms > {threshold_ms}ms)"
      evidenceFields: [launch_type, total_ms, ttid_ms, ttfd_ms, threshold_ms]

    - id: broadcast_delay
      severity: warning
      titleTemplate: "Broadcast receiver delayed startup by {delay_ms}ms"
      descriptionTemplate: "Broadcast {broadcast_action} blocked startup"
      evidenceFields: [broadcast_action, delay_ms]

    - id: content_provider_slow
      severity: warning
      titleTemplate: "ContentProvider initialization slow: {provider_ms}ms"
      descriptionTemplate: "ContentProvider {provider_name} took {provider_ms}ms to initialize"
      evidenceFields: [provider_name, provider_ms]

    - id: anr_detected
      severity: critical
      titleTemplate: "ANR detected: {anr_type}"
      descriptionTemplate: "Application Not Responding due to {anr_cause}"
      evidenceFields: [anr_type, anr_cause, blocked_ms]

  suggestionsSchema:
    - id: check_gc_during_startup
      condition: "gc_during_startup > 0"
      targetModule: art_module
      questionTemplate: "Was GC causing startup delay for {package}?"
      paramsMapping:
        package: package
      priority: 1

    - id: check_binder_during_startup
      condition: "binder_during_startup_ms > 50"
      targetModule: binder_module
      questionTemplate: "What Binder calls delayed startup for {package}?"
      paramsMapping:
        package: package
      priority: 1

    - id: check_io_during_startup
      condition: "io_wait_ms > 100"
      targetModule: filesystem_module
      questionTemplate: "What IO operations delayed startup?"
      paramsMapping:
        package: package
      priority: 2

prerequisites:
  modules:
    - android.startup.startups
    - android.startup.time_to_display
    - android.broadcasts

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: launch_type
    type: string
    required: false
    description: "Launch type: cold, warm, hot"

steps:
  # Step 1: Get startup timing breakdown
  - id: startup_timing
    type: atomic
    name: "启动时序分析"
    sql: |
      SELECT
        s.package AS package_name,
        s.startup_type AS launch_type,
        CAST(s.dur / 1e6 AS INTEGER) AS total_ms,
        CAST(ttd.time_to_initial_display / 1e6 AS INTEGER) AS ttid_ms,
        CAST(ttd.time_to_full_display / 1e6 AS INTEGER) AS ttfd_ms,
        s.ts AS start_ts
      FROM android_startups s
      LEFT JOIN android_startup_time_to_display ttd USING (startup_id)
      WHERE s.package LIKE '%${package}%'
      ORDER BY s.ts DESC
      LIMIT 10
    display:
      level: key
      layer: overview
      title: "启动时序"
    save_as: startup_data
    synthesize:
      role: overview
      fields:
        - key: launch_type
          label: 启动类型
        - key: total_ms
          label: 总耗时
          format: "{{value}}ms"
        - key: ttid_ms
          label: 首帧显示
          format: "{{value}}ms"

  # Step 2: Get startup phase breakdown
  - id: startup_phases
    type: atomic
    name: "启动阶段分解"
    sql: |
      SELECT
        name AS slice_name,
        CAST(dur / 1e6 AS REAL) AS dur_ms,
        ts
      FROM slice
      WHERE name LIKE '%bindApplication%'
        OR name LIKE '%activityStart%'
        OR name LIKE '%activityResume%'
        OR name LIKE '%Choreographer%doFrame%'
      ORDER BY ts
      LIMIT 50
    display:
      level: detail
      layer: list
      title: "启动阶段"
    save_as: phases

  # Step 3: Check for broadcasts during startup
  - id: broadcast_analysis
    type: atomic
    name: "广播分析"
    sql: |
      SELECT
        intent_action AS broadcast_action,
        CAST(dur / 1e6 AS REAL) AS dur_ms,
        ts
      FROM _android_broadcasts_minsdk_u
      WHERE ts >= (SELECT ts FROM android_startups WHERE package LIKE '%${package}%' ORDER BY ts DESC LIMIT 1)
        AND ts <= (SELECT ts + dur FROM android_startups WHERE package LIKE '%${package}%' ORDER BY ts DESC LIMIT 1)
      ORDER BY dur DESC
      LIMIT 10
    display:
      level: detail
      layer: list
      title: "启动期间广播"
    save_as: broadcasts

  # Step 4: Diagnose startup issues
  - id: startup_diagnosis
    type: diagnostic
    name: "启动诊断"
    inputs: [startup_data, phases, broadcasts]
    rules:
      - condition: "startup_data.data[0]?.total_ms > 1000 && startup_data.data[0]?.launch_type === 'cold'"
        diagnosis: "冷启动耗时过长 (${startup_data.data[0]?.total_ms}ms)，超过 1 秒阈值"
        confidence: high
        suggestions:
          - "检查 Application.onCreate() 耗时"
          - "延迟非必要初始化"
        evidence_fields:
          - startup_data.data[0].total_ms
          - startup_data.data[0].launch_type

      - condition: "startup_data.data[0]?.total_ms > 500 && startup_data.data[0]?.launch_type === 'warm'"
        diagnosis: "温启动耗时过长 (${startup_data.data[0]?.total_ms}ms)，超过 500ms 阈值"
        confidence: medium
        suggestions:
          - "检查 Activity.onCreate() 耗时"
          - "优化布局复杂度"
        evidence_fields:
          - startup_data.data[0].total_ms

      - condition: "broadcasts.data[0]?.dur_ms > 50"
        diagnosis: "广播接收器延迟启动 (${broadcasts.data[0]?.broadcast_action} 耗时 ${broadcasts.data[0]?.dur_ms}ms)"
        confidence: medium
        suggestions:
          - "将广播处理移至后台"
          - "考虑使用 JobScheduler"
        evidence_fields:
          - broadcasts.data[0].broadcast_action
          - broadcasts.data[0].dur_ms
    display:
      level: key
      layer: overview
      title: "启动诊断结果"
