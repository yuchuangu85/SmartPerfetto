# =============================================================================
# Framework Choreographer Module Expert
# =============================================================================
# Provides Choreographer and VSYNC analysis capabilities for cross-domain experts.
# Answers questions about frame timing, VSYNC signals, and render pipeline coordination.
#
# Key Analysis Areas:
# - VSYNC signal timing and phase
# - doFrame callback timing breakdown
# - Input/Animation/Traversal callbacks
# - Frame production pipeline
# - Triple buffering state
# =============================================================================

name: choreographer_module
version: "1.0"
type: composite
category: framework

meta:
  display_name: "Choreographer 分析"
  description: "分析 VSYNC 时序、doFrame 回调和渲染流水线"
  tags: ["framework", "choreographer", "vsync", "frame", "render", "pipeline"]

# Module metadata
module:
  layer: framework
  component: Choreographer
  subsystems:
    - vsync
    - doframe
    - input_callback
    - animation_callback
    - traversal_callback
  relatedModules:
    - framework_surfaceflinger
    - app_third_party
    - hardware_gpu

# Dialogue interface
dialogue:
  capabilities:
    - id: frame_timing_analysis
      questionTemplate: "What is the frame timing for package {package}?"
      requiredParams: [package]
      description: "Analyze doFrame timing and breakdown"

    - id: vsync_analysis
      questionTemplate: "What is the VSYNC timing pattern?"
      requiredParams: []
      description: "Analyze VSYNC signal timing"

    - id: callback_breakdown
      questionTemplate: "What is the doFrame callback breakdown for {package}?"
      requiredParams: [package]
      description: "Analyze Input/Animation/Traversal timing"

    - id: frame_drop_analysis
      questionTemplate: "Why were frames dropped for {package}?"
      requiredParams: [package]
      description: "Analyze frame drop causes"

  findingsSchema:
    - id: long_doframe
      severity: critical
      titleTemplate: "Long doFrame: {dur_ms}ms (exceeds frame budget)"
      descriptionTemplate: "doFrame exceeded frame budget by {exceed_ms}ms"
      evidenceFields: [dur_ms, exceed_ms, main_contributor]

    - id: input_callback_slow
      severity: warning
      titleTemplate: "Slow input callback: {dur_ms}ms"
      descriptionTemplate: "Input callback processing took {dur_ms}ms"
      evidenceFields: [dur_ms, frame_ts]

    - id: animation_callback_slow
      severity: warning
      titleTemplate: "Slow animation callback: {dur_ms}ms"
      descriptionTemplate: "Animation callback took {dur_ms}ms"
      evidenceFields: [dur_ms, frame_ts]

    - id: traversal_callback_slow
      severity: warning
      titleTemplate: "Slow traversal (measure/layout/draw): {dur_ms}ms"
      descriptionTemplate: "View traversal took {dur_ms}ms"
      evidenceFields: [dur_ms, measure_ms, layout_ms, draw_ms]

    - id: vsync_jitter
      severity: warning
      titleTemplate: "VSYNC jitter detected: {jitter_ms}ms"
      descriptionTemplate: "VSYNC timing inconsistent, affecting frame pacing"
      evidenceFields: [jitter_ms, avg_period_ms, expected_period_ms]

  suggestionsSchema:
    - id: check_main_thread_blocking
      condition: "dur_ms > 32"
      targetModule: scheduler_module
      questionTemplate: "What was blocking main thread during frame {frame_ts}?"
      paramsMapping:
        ts: frame_ts
        package: package
      priority: 1

    - id: check_gpu_rendering
      condition: "traversal_dur_ms > 16"
      targetModule: gpu_module
      questionTemplate: "What was GPU doing during frame rendering?"
      paramsMapping: {}
      priority: 2

    - id: check_surfaceflinger
      condition: "frame_dropped == true"
      targetModule: surfaceflinger_module
      questionTemplate: "Did SurfaceFlinger contribute to frame drop?"
      paramsMapping: {}
      priority: 1

prerequisites:
  required_tables:
    - slice
    - thread
    - process

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: vsync_period_ns
    type: number
    required: false
    description: "VSync period in nanoseconds (default: 16666667 for 60Hz)"

steps:
  # Step 1: doFrame overview
  - id: doframe_overview
    type: atomic
    name: "doFrame 概览"
    sql: |
      SELECT
        COUNT(*) AS total_frames,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_dur_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_dur_ms,
        CAST(MIN(s.dur) / 1e6 AS REAL) AS min_dur_ms,
        SUM(CASE WHEN s.dur > ${vsync_period_ns|16666667} THEN 1 ELSE 0 END) AS jank_frames,
        SUM(CASE WHEN s.dur > 33330000 THEN 1 ELSE 0 END) AS severe_jank_frames,
        ROUND(SUM(CASE WHEN s.dur > 16670000 THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 2) AS jank_rate_pct
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid  -- Main thread
        AND (s.name GLOB '*Choreographer#doFrame*'
             OR s.name GLOB '*doFrame*'
             OR s.name GLOB '*Choreographer*')
    display:
      level: key
      layer: overview
      title: "帧渲染概览"
    save_as: doframe_overview
    synthesize:
      role: overview
      fields:
        - key: total_frames
          label: 总帧数
        - key: avg_dur_ms
          label: 平均帧时间
          format: "{{value}}ms"
        - key: jank_frames
          label: 卡顿帧
        - key: jank_rate_pct
          label: 卡顿率
          format: "{{value}}%"

  # Step 2: doFrame timeline with breakdown
  - id: doframe_timeline
    type: atomic
    name: "帧时间线"
    sql: |
      SELECT
        s.ts,
        s.name AS frame_event,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms,
        CASE
          WHEN s.dur < 16670000 THEN 'smooth'
          WHEN s.dur < 33330000 THEN 'jank'
          WHEN s.dur < 50000000 THEN 'severe_jank'
          ELSE 'frozen'
        END AS frame_quality,
        s.depth
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid
        AND (s.name GLOB '*Choreographer#doFrame*'
             OR s.name GLOB '*doFrame*')
      ORDER BY s.ts
      LIMIT 200
    display:
      level: detail
      layer: list
      title: "帧时间线"
    save_as: doframe_timeline

  # Step 3: Callback breakdown (Input/Animation/Traversal)
  - id: callback_breakdown
    type: atomic
    name: "回调耗时分解"
    sql: |
      SELECT
        CASE
          WHEN s.name GLOB '*input*' OR s.name GLOB '*Input*' THEN 'input'
          WHEN s.name GLOB '*animation*' OR s.name GLOB '*Animation*' THEN 'animation'
          WHEN s.name GLOB '*traversal*' OR s.name GLOB '*Traversal*' OR s.name GLOB '*measure*' OR s.name GLOB '*layout*' OR s.name GLOB '*draw*' THEN 'traversal'
          ELSE 'other'
        END AS callback_type,
        COUNT(*) AS count,
        CAST(SUM(s.dur) / 1e6 AS INTEGER) AS total_ms,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid
        AND s.depth > 0
        AND (s.name GLOB '*input*'
             OR s.name GLOB '*Input*'
             OR s.name GLOB '*animation*'
             OR s.name GLOB '*Animation*'
             OR s.name GLOB '*traversal*'
             OR s.name GLOB '*Traversal*'
             OR s.name GLOB '*measure*'
             OR s.name GLOB '*layout*'
             OR s.name GLOB '*draw*')
      GROUP BY callback_type
      ORDER BY total_ms DESC
    display:
      level: detail
      layer: overview
      title: "回调耗时分布"
    save_as: callback_breakdown
    synthesize: true

  # Step 4: VSYNC timing analysis
  - id: vsync_timing
    type: skill
    name: "VSYNC 时序"
    skill: vsync_period_detection
    display:
      level: detail
      layer: overview
      title: "VSYNC 统计"
    save_as: vsync_timing

  # Step 5: Long frames (> 16.67ms)
  - id: long_frames
    type: atomic
    name: "长帧分析"
    sql: |
      SELECT
        s.ts,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms,
        CAST((s.dur / 1e6 - ${vsync_period_ns|16666667} / 1e6) AS REAL) AS exceed_ms,
        CASE
          WHEN s.dur < ${vsync_period_ns|16666667} * 2 THEN 'jank_1_frame'
          WHEN s.dur < ${vsync_period_ns|16666667} * 3 THEN 'jank_2_frames'
          WHEN s.dur < ${vsync_period_ns|16666667} * 5 THEN 'jank_3_4_frames'
          ELSE 'jank_5plus_frames'
        END AS jank_severity
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid
        AND (s.name GLOB '*Choreographer#doFrame*' OR s.name GLOB '*doFrame*')
        AND s.dur > ${vsync_period_ns|16666667}  -- exceeds frame deadline
      ORDER BY s.dur DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "长帧列表"
    save_as: long_frames

  # Step 6: Measure/Layout/Draw breakdown
  - id: view_traversal
    type: atomic
    name: "View 遍历分析"
    sql: |
      SELECT
        CASE
          WHEN s.name GLOB '*measure*' OR s.name GLOB '*Measure*' THEN 'measure'
          WHEN s.name GLOB '*layout*' OR s.name GLOB '*Layout*' THEN 'layout'
          WHEN s.name GLOB '*draw*' OR s.name GLOB '*Draw*' THEN 'draw'
          ELSE 'other'
        END AS traversal_phase,
        COUNT(*) AS count,
        CAST(SUM(s.dur) / 1e6 AS INTEGER) AS total_ms,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid
        AND (s.name GLOB '*measure*'
             OR s.name GLOB '*Measure*'
             OR s.name GLOB '*layout*'
             OR s.name GLOB '*Layout*'
             OR s.name GLOB '*draw*'
             OR s.name GLOB '*Draw*')
        AND s.dur > 100000
      GROUP BY traversal_phase
      ORDER BY total_ms DESC
    display:
      level: detail
      layer: overview
      title: "View 遍历耗时"
    save_as: view_traversal

  # Step 7: Frame pipeline analysis
  - id: frame_pipeline
    type: atomic
    name: "帧流水线"
    sql: |
      SELECT
        s.name AS pipeline_stage,
        COUNT(*) AS count,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND (s.name GLOB '*dequeueBuffer*'
             OR s.name GLOB '*queueBuffer*'
             OR s.name GLOB '*acquireBuffer*'
             OR s.name GLOB '*eglSwapBuffers*'
             OR s.name GLOB '*syncFrameState*'
             OR s.name GLOB '*DrawFrame*')
      GROUP BY s.name
      ORDER BY avg_ms DESC
      LIMIT 10
    display:
      level: detail
      layer: list
      title: "帧流水线阶段"
    save_as: frame_pipeline

  # Step 8: Diagnose Choreographer issues
  - id: choreographer_diagnosis
    type: diagnostic
    name: "Choreographer 诊断"
    inputs: [doframe_overview, callback_breakdown, long_frames, view_traversal]
    rules:
      - condition: "doframe_overview.data[0]?.jank_rate_pct > 10"
        diagnosis: "卡顿率 ${doframe_overview.data[0]?.jank_rate_pct}%，超过 10% 阈值"
        confidence: critical
        suggestions:
          - "分析卡顿帧的具体原因"
          - "优化主线程耗时操作"
          - "检查是否有同步 Binder 调用"
        evidence_fields:
          - doframe_overview.data[0]?.jank_rate_pct
          - doframe_overview.data[0]?.jank_frames
          - doframe_overview.data[0]?.total_frames

      - condition: "doframe_overview.data[0]?.max_dur_ms > 100"
        diagnosis: "最长帧时间 ${doframe_overview.data[0]?.max_dur_ms}ms，严重影响体验"
        confidence: critical
        suggestions:
          - "分析该帧的详细调用栈"
          - "检查是否有 ANR 风险"
        evidence_fields:
          - doframe_overview.data[0]?.max_dur_ms

      - condition: "callback_breakdown.data.find(c => c.callback_type === 'traversal')?.avg_ms > 10"
        diagnosis: "View 遍历平均耗时 ${callback_breakdown.data.find(c => c.callback_type === 'traversal')?.avg_ms}ms"
        confidence: high
        suggestions:
          - "减少 View 层级"
          - "使用 ConstraintLayout 替代嵌套布局"
          - "避免在 onDraw 中分配对象"
        evidence_fields:
          - callback_breakdown.data.find(c => c.callback_type === 'traversal')?.avg_ms

      - condition: "view_traversal.data.find(v => v.traversal_phase === 'measure')?.max_ms > 8"
        diagnosis: "Measure 阶段最大耗时 ${view_traversal.data.find(v => v.traversal_phase === 'measure')?.max_ms}ms"
        confidence: medium
        suggestions:
          - "检查 View 树复杂度"
          - "避免在 onMeasure 中进行耗时计算"
        evidence_fields:
          - view_traversal.data.find(v => v.traversal_phase === 'measure')?.max_ms

      - condition: "long_frames.data.filter(f => f.jank_severity === 'jank_5plus_frames').length > 0"
        diagnosis: "检测到 ${long_frames.data.filter(f => f.jank_severity === 'jank_5plus_frames').length} 个严重卡顿帧 (丢失 5+ 帧)"
        confidence: critical
        suggestions:
          - "这些帧可能导致明显卡顿感知"
          - "需要重点分析这些时间点"
        evidence_fields:
          - long_frames.data.filter(f => f.jank_severity === 'jank_5plus_frames').length
    display:
      level: key
      layer: overview
      title: "Choreographer 诊断结果"
