# Kernel Scheduler Module Expert
#
# Provides CPU scheduling analysis capabilities for cross-domain experts.
# Answers questions about thread scheduling delays, CPU utilization, and core affinity.

name: scheduler_module
version: "1.0"
type: composite
category: kernel

meta:
  display_name: "内核调度分析"
  description: "分析线程调度延迟、CPU 利用率和大小核分配"
  tags: ["kernel", "scheduler", "cpu", "runnable"]

# Module metadata - identifies this as a module expert
module:
  layer: kernel
  component: Scheduler
  subsystems:
    - runqueue
    - cfs
    - core_affinity
  relatedModules:
    - hardware_cpu
    - framework_ams

# Dialogue interface - how cross-domain experts interact with this module
dialogue:
  # Questions this module can answer
  capabilities:
    - id: thread_scheduling_delay
      questionTemplate: "Why was thread {tid} delayed between {start_ts} and {end_ts}?"
      requiredParams: [tid, start_ts, end_ts]
      description: "Analyze why a specific thread had scheduling delays"

    - id: cpu_utilization
      questionTemplate: "What is the CPU utilization for package {package}?"
      requiredParams: [package]
      optionalParams: [start_ts, end_ts]
      description: "Analyze CPU usage patterns"

    - id: runnable_analysis
      questionTemplate: "What threads are in runnable state competing with {tid}?"
      requiredParams: [tid]
      description: "Analyze runnable queue contention"

  # Structured findings this module produces
  findingsSchema:
    - id: high_runnable_time
      severity: warning
      titleTemplate: "Thread scheduling delay: {delay_ms}ms in runnable state"
      descriptionTemplate: "Thread {tid} waited {delay_ms}ms in runnable state due to CPU contention"
      evidenceFields: [tid, delay_ms, core_type, waker_thread]

    - id: cpu_throttling
      severity: critical
      titleTemplate: "CPU frequency throttled: avg {avg_freq_mhz}MHz"
      descriptionTemplate: "CPU running at {avg_freq_mhz}MHz, below expected frequency"
      evidenceFields: [avg_freq_mhz, max_freq_mhz, throttle_reason]

    - id: small_core_bound
      severity: warning
      titleTemplate: "Critical thread bound to small cores"
      descriptionTemplate: "Thread {tid} running on small cores ({small_core_pct}%)"
      evidenceFields: [tid, small_core_pct, big_core_pct]

  # Suggestions for follow-up analysis
  suggestionsSchema:
    - id: check_binder_waker
      condition: "waker_process != package"
      targetModule: binder_module
      questionTemplate: "What Binder calls did {waker_process} make to {package}?"
      paramsMapping:
        caller: waker_process
        callee: package
      priority: 1

    - id: check_cpu_frequency
      condition: "avg_freq_mhz < max_freq_mhz * 0.7"
      targetModule: hardware_cpu_module
      questionTemplate: "Why is CPU frequency low for core {core_id}?"
      paramsMapping:
        core_id: core_id
      priority: 2

prerequisites:
  modules:
    - sched
    - linux.cpu.frequency

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: tid
    type: number
    required: false
    description: "Target thread ID"
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Get thread runnable time distribution
  - id: runnable_analysis
    type: atomic
    name: "Runnable 状态分析"
    sql: |
      SELECT
        utid,
        thread.name AS thread_name,
        CAST(SUM(dur) / 1e6 AS INTEGER) AS runnable_ms,
        COUNT(*) AS runnable_count,
        CAST(AVG(dur) / 1e6 AS REAL) AS avg_runnable_ms,
        CAST(MAX(dur) / 1e6 AS REAL) AS max_runnable_ms
      FROM thread_state
      JOIN thread USING (utid)
      WHERE state = 'R'
        AND thread.name NOT LIKE '%Binder%'
        AND dur > 1000000  -- > 1ms
      GROUP BY utid
      ORDER BY runnable_ms DESC
      LIMIT 20
    display:
      level: detail
      layer: overview
      title: "线程 Runnable 分析"
    save_as: runnable_data
    synthesize: true

  # Step 2: Analyze CPU frequency during analysis period
  - id: cpu_frequency
    type: atomic
    name: "CPU 频率分析"
    sql: |
      WITH
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            ELSE 'little'
          END as core_type
        FROM cpu
      )
      SELECT
        cct.cpu,
        COALESCE(ci.core_type, 'little') AS core_type,
        CAST(AVG(c.value) / 1000 AS INTEGER) AS avg_freq_mhz,
        CAST(MAX(c.value) / 1000 AS INTEGER) AS max_freq_mhz,
        CAST(MIN(c.value) / 1000 AS INTEGER) AS min_freq_mhz
      FROM counter c
      JOIN cpu_counter_track cct ON c.track_id = cct.id
      LEFT JOIN cpu_info ci ON cct.cpu = ci.cpu
      WHERE cct.name = 'cpufreq'
      GROUP BY cct.cpu
      ORDER BY cct.cpu
    display:
      level: detail
      layer: overview
      title: "CPU 频率统计"
    save_as: freq_data
    synthesize: true

  # Step 3: Big/small core distribution for main threads
  - id: core_distribution
    type: atomic
    name: "大小核分布"
    sql: |
      WITH
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            ELSE 'little'
          END as core_type
        FROM cpu
      )
      SELECT
        thread.name AS thread_name,
        CAST(SUM(CASE WHEN ci.core_type = 'big' THEN dur ELSE 0 END) * 100.0 / SUM(dur) AS INTEGER) AS big_core_pct,
        CAST(SUM(CASE WHEN ci.core_type != 'big' THEN dur ELSE 0 END) * 100.0 / SUM(dur) AS INTEGER) AS small_core_pct,
        CAST(SUM(dur) / 1e6 AS INTEGER) AS total_ms
      FROM sched_slice
      JOIN thread USING (utid)
      LEFT JOIN cpu_info ci ON sched_slice.cpu = ci.cpu
      WHERE thread.name IN ('RenderThread', 'main', 'UI Thread')
        OR thread.name LIKE '%${package}%'
      GROUP BY utid
      HAVING total_ms > 10
      ORDER BY total_ms DESC
    display:
      level: detail
      layer: list
      title: "关键线程大小核分布"
    save_as: core_data
    synthesize: true

  # Step 4: Diagnose scheduling issues
  - id: scheduling_diagnosis
    type: diagnostic
    name: "调度诊断"
    inputs: [runnable_data, freq_data, core_data]
    rules:
      - condition: "runnable_data.data[0]?.runnable_ms > 50"
        diagnosis: "线程 ${runnable_data.data[0]?.thread_name} Runnable 等待时间过长 (${runnable_data.data[0]?.runnable_ms}ms)，存在 CPU 竞争"
        confidence: high
        suggestions:
          - "检查是否有后台线程占用 CPU"
          - "考虑提升关键线程优先级"
        evidence_fields:
          - runnable_data.data[0].thread_name
          - runnable_data.data[0].runnable_ms

      - condition: "freq_data.data.find(f => f.core_type === 'big')?.avg_freq_mhz < 1500"
        diagnosis: "大核 CPU 频率较低 (${freq_data.data.find(f => f.core_type === 'big')?.avg_freq_mhz}MHz)，可能存在热节流或功耗限制"
        confidence: medium
        suggestions:
          - "检查设备温度"
          - "检查电池状态和功耗策略"
        evidence_fields:
          - freq_data.data[0].avg_freq_mhz
          - freq_data.data[0].max_freq_mhz

      - condition: "core_data.data[0]?.small_core_pct > 50"
        diagnosis: "主线程大部分时间运行在小核 (${core_data.data[0]?.small_core_pct}%)，性能受限"
        confidence: medium
        suggestions:
          - "检查 CPU 亲和性设置"
          - "考虑使用 SCHED_FIFO 提升优先级"
        evidence_fields:
          - core_data.data[0].thread_name
          - core_data.data[0].small_core_pct
    display:
      level: key
      layer: overview
      title: "调度诊断结果"
