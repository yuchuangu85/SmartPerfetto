# =============================================================================
# Camera Pipeline
# =============================================================================
# Camera2/HAL3 multi-stream camera rendering.
# Preview, capture, and video recording.
# =============================================================================

name: pipeline_camera_pipeline
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: CAMERA_PIPELINE
  display_name: "相机管线"
  description: "Camera2/HAL3 多流相机渲染"
  icon: "camera"
  family: specialized
  doc_path: "rendering_pipelines/camera_pipeline.md"

detection:
  scoring_signals:
    - signal: has_camera_thread
      thread_pattern: "*Camera*"
      weight: 30
    - signal: has_cam_abbrev_thread
      thread_pattern: "*Cam*"
      weight: 10
    - signal: has_camera_slice
      slice_pattern: "*Camera*"
      weight: 30
    - signal: has_capture_session
      slice_pattern: "*CaptureSession*"
      weight: 30

teaching:
  title: "相机渲染管线"
  summary: |
    Camera2 API 和 HAL3 相机架构，支持多流同时处理（预览、拍照、录像）。
    涉及相机硬件、ISP、编码器等多个组件的协同工作。
    需要关注帧率稳定性和延迟。

  mermaid: |
    sequenceDiagram
      participant App as App
      participant Cam as CameraService
      participant HAL as Camera HAL
      participant ISP as ISP/GPU
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over App,SF: 📍 Camera2/HAL3 渲染链路
      App->>Cam: createCaptureSession
      App->>Cam: setRepeatingRequest

      activate HAL
      HAL->>ISP: 配置图像处理流水线
      loop 每帧
        HAL->>HAL: 捕获 Bayer 数据
        HAL->>ISP: 3A + ISP 处理
        ISP->>BQ: 输出到 Surface
      end
      deactivate HAL

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over App,SF: 📷 支持预览/录制/拍照多路输出
  thread_roles:
    - thread: Camera
      role: "相机服务"
      description: "Camera2 API 和相机服务"
    - thread: CaptureSession
      role: "采集会话"
      description: "相机采集会话管理"

  key_slices:
    - name: "Camera"
      thread: any
      description: "相机操作"
    - name: "CaptureSession"
      thread: any
      description: "采集会话"
    - name: "createCaptureSession"
      thread: any
      description: "创建采集会话（常见于启动/切换摄像头/重配流）"
    - name: "setRepeatingRequest"
      thread: any
      description: "预览/录制的重复请求（影响吞吐与延迟）"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (预览开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "相机 UI/业务逻辑 (生产)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的主线程（避免 pin 到系统/其他 app 的 main）"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "预览 UI 渲染 (传输)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 RenderThread（若预览走纯 SurfaceView 可能为空）"

    - pattern: "CaptureSession"
      match_by: name
      priority: 4
      reason: "采集会话 (生产)"

    - pattern: "Camera"
      match_by: name
      priority: 5
      reason: "Camera 服务 (传输)"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "预览合成/显示"
      main_thread_only: true

analysis:
  common_issues:
    - id: preview_jank
      name: "预览卡顿"
      description: "相机预览帧率不稳定"
      detection_skill: sf_frame_consumption

  recommended_skills:
    - sf_frame_consumption
    - cpu_analysis
