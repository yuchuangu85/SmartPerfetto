# =============================================================================
# SurfaceView BLAST Pipeline
# =============================================================================
# Independent SurfaceView rendering with BLAST synchronization.
# Common for custom OpenGL rendering, media playback.
# =============================================================================

name: pipeline_surfaceview_blast
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: SURFACEVIEW_BLAST
  display_name: "SurfaceView (BLAST)"
  description: "独立 SurfaceView + BLAST 同步，用于自定义 GL 渲染、媒体播放"
  icon: "surface"
  family: surface
  doc_path: "rendering_pipelines/surfaceview.md"

detection:
  scoring_signals:
    - signal: has_surfaceview
      slice_pattern: "*SurfaceView*"
      min_count: 10
      weight: 55
    - signal: has_blast
      slice_pattern: "*BLASTBufferQueue*"
      weight: 20
    - signal: has_gl_thread
      thread_pattern: "*GLThread*"
      weight: 12
    - signal: has_glsurface_thread
      thread_pattern: "*GLSurface*"
      weight: 8

  exclude_if:
    - thread: "1.ui"
    - thread: CrRendererMain

teaching:
  title: "SurfaceView (BLAST) 渲染管线"
  summary: |
    使用独立的 Surface 进行渲染，常见于 OpenGL 游戏、视频播放器。
    SurfaceView 有自己的 Layer，不受 View 系统约束，可以在独立线程渲染。
    BLAST 模式提供原子性 Buffer 提交。

  mermaid: |
    sequenceDiagram
      participant App as App Thread
      participant GL as GLThread
      participant BQ as BufferQueue
      participant TX as BufferTX
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over App,SF: 📍 SurfaceView (BLAST) 独立渲染
      App->>GL: 请求绘制
      activate GL
      GL->>BQ: dequeueBuffer
      GL->>GL: OpenGL/Vulkan 渲染
      GL->>GL: GPU 绘制命令
      GL->>BQ: queueBuffer + Transaction
      deactivate GL

      BQ-->>TX: BLAST Transaction
      VS->>SF: 🔔 VSync-sf
      activate SF
      TX->>SF: setTransactionState
      SF->>SF: latchBuffer
      SF->>SF: HWC 合成 (独立 Layer)
      deactivate SF

      Note over App,SF: ✨ 独立于 App UI，不阻塞 RenderThread
  thread_roles:
    - thread: GLThread
      role: "独立渲染线程"
      description: "OpenGL/Vulkan 渲染，直接提交到 SurfaceView"
    - thread: SurfaceFlinger
      role: "独立层合成"
      description: "SurfaceView 作为独立 Layer 合成"

  key_slices:
    - name: "eglSwapBuffers"
      thread: GLThread
      description: "交换 Buffer"
    - name: "dequeueBuffer"
      thread: any
      description: "获取可写 Buffer（可能阻塞在 BufferQueue）"
    - name: "queueBuffer"
      thread: any
      description: "提交 Buffer（BLAST 模式下常与 Transaction 绑定）"
    - name: "SurfaceView"
      thread: any
      description: "SurfaceView 操作"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "GLThread"
      match_by: name
      priority: 2
      reason: "独立渲染线程"
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 GLThread（避免 pin 到系统/其他应用的 GLThread）"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 3.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 3.8
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 4
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  recommended_skills:
    - gpu_analysis
    - sf_frame_consumption
