# =============================================================================
# WebView TextureView Custom Pipeline
# =============================================================================
# Custom WebView kernel (X5/UC) using TextureView.
# Third-party WebView implementations in China.
# =============================================================================

name: pipeline_webview_textureview_custom
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: WEBVIEW_TEXTUREVIEW_CUSTOM
  display_name: "WebView TextureView (定制内核)"
  description: "X5/UC 等定制 WebView 内核，使用 TextureView"
  icon: "web"
  family: webview
  doc_path: "rendering_pipelines/webview_textureview_custom.md"

detection:
  scoring_signals:
    - signal: has_tbs
      slice_pattern: "*TBS*"
      weight: 30
    - signal: has_x5
      slice_pattern: "*X5*"
      weight: 30
    - signal: has_uccore
      slice_pattern: "*UCCore*"
      weight: 20

teaching:
  title: "WebView TextureView (定制内核) 渲染管线"
  summary: |
    使用腾讯 X5、UC 等第三方定制 WebView 内核，通常使用 TextureView
    进行渲染。这些内核可能有自己的渲染优化策略，但整体架构与标准 WebView 类似。

  mermaid: |
    sequenceDiagram
      participant Main as App (main)
      participant RT as RenderThread
      participant X5 as X5/UC Core
      participant TV as TextureView
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over Main,SF: 📍 自定义 WebView 内核 (X5/UC)
      Main->>X5: 加载网页
      activate X5
      X5->>TV: 渲染到 TextureView
      X5->>TV: updateTexImage
      deactivate X5

      Main->>RT: syncFrameState
      activate RT
      RT->>RT: DrawFrame
      RT->>RT: 绑定 TextureView 纹理
      RT->>BQ: queueBuffer
      deactivate RT

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over Main,SF: 🇨🇳 国内常见的第三方 WebView 方案
  thread_roles:
    - thread: main
      role: "UI 集成"
      description: "承载定制 WebView 的 Activity"
    - thread: RenderThread
      role: "纹理合成"
      description: "将定制内核内容作为纹理合成"
    - thread: WebViewCore
      role: "定制内核渲染"
      description: "X5/UC 等内核渲染线程（trace 中可能表现为 WebViewCore/CrRendererMain/其他专用线程）"

  key_slices:
    - name: "SurfaceTexture"
      thread: any
      description: "TextureView/SurfaceTexture 生产-消费链路"
    - name: "updateTexImage"
      thread: RenderThread
      description: "消费侧更新纹理（通常发生在合成阶段）"
    - name: "syncFrameState"
      thread: RenderThread
      description: "宿主 UI 与 RenderThread 同步，驱动纹理合成"
    - name: "DrawFrame"
      thread: RenderThread
      description: "宿主 RenderThread 合成 WebView 纹理并提交"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (WebView 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "UI 集成 (生产)"
      expand: true  # 展开显示 Running 状态和 callstack

    - pattern: "CrRendererMain|WebViewCore|UCCore|X5"
      match_by: name
      priority: 3
      reason: "定制内核渲染 (生产/传输)"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 4
      reason: "纹理合成 (传输)"
      expand: true  # 展开显示 Running 状态和 callstack

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  recommended_skills:
    - render_thread_slices
    - cpu_analysis
