# =============================================================================
# Android View Software Pipeline
# =============================================================================
# CPU-based Skia rendering without hardware acceleration.
# No RenderThread - all drawing done on main thread.
# =============================================================================

name: pipeline_android_view_software
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_SOFTWARE
  display_name: "Android View 软件渲染"
  description: "CPU Skia 软件渲染，无 RenderThread，用于低端设备或特殊场景"
  icon: "cpu"
  family: hwui
  doc_path: "rendering_pipelines/android_view_software.md"

detection:
  required_signals:
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_lock_canvas
      slice_pattern: "*lockCanvas*"
      weight: 55
    - signal: has_unlock_canvas_post
      slice_pattern: "*unlockCanvasAndPost*"
      weight: 55

  exclude_if:
    - thread: RenderThread
    - slice_pattern: "DrawFrame*"

teaching:
  title: "Android View 软件渲染管线"
  summary: |
    使用 CPU Skia 进行软件渲染，所有绘制都在主线程完成。
    通常用于低端设备、特殊 View (如 SurfaceHolder.lockCanvas)，或硬件加速被禁用时。
    性能较低，但兼容性最好。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant Canvas as Canvas (CPU)
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 Software Rendering (无 RenderThread)
      VA->>Main: 🔔 VSync-app 信号触发
      activate Main
      Main->>Main: Choreographer#doFrame
      Main->>Canvas: lockCanvas
      Main->>Canvas: Skia CPU 绘制 (drawXXX)
      Main->>Canvas: unlockCanvasAndPost
      Main->>BQ: queueBuffer
      deactivate Main

      VS->>SF: 🔔 VSync-sf 触发
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over VA,SF: ⚠️ 无硬件加速，适用于简单 UI 或兼容模式
  thread_roles:
    - thread: main
      role: "UI 构建 + 渲染"
      description: "Measure/Layout/Draw 全在主线程，使用 CPU Skia 渲染"

  key_slices:
    - name: "lockCanvas"
      thread: main
      description: "获取 CPU 画布"
    - name: "unlockCanvasAndPost"
      thread: main
      description: "提交绘制结果"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "CPU 软件渲染 (Skia)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的主线程（软件渲染通常由 lockCanvas/unlockCanvasAndPost 驱动）"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 3
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 4
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: cpu_bottleneck
      name: "CPU 渲染瓶颈"
      description: "软件渲染占用大量 CPU 时间"
      detection_skill: cpu_analysis

  recommended_skills:
    - cpu_analysis
    - scheduling_analysis
