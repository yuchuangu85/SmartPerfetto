# =============================================================================
# Android PIP/Freeform Pipeline
# =============================================================================
# Picture-in-Picture and Freeform window features.
# Special window management with system compositor integration.
# =============================================================================

name: pipeline_android_pip_freeform
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_PIP_FREEFORM
  display_name: "Android PIP/Freeform"
  description: "画中画和自由窗口模式，特殊窗口管理与合成"
  icon: "pip"
  family: surface
  doc_path: "rendering_pipelines/android_pip_freeform.md"

detection:
  scoring_signals:
    # Prefer system-level markers (WindowManager / SurfaceFlinger) over app-side APIs to reduce false positives.
    - signal: has_enter_pip_api
      slice_pattern: "*enterPictureInPictureMode*"
      weight: 50
    - signal: has_pip_marker
      slice_pattern: "*PictureInPicture*"
      weight: 50
    - signal: has_wms_resize_task
      slice_pattern: "*WMS.resizeTask*"
      weight: 50

teaching:
  title: "Android PIP/Freeform 渲染管线"
  summary: |
    画中画 (PIP) 和自由窗口 (Freeform) 模式的渲染管线。这些窗口有特殊的
    缩放、移动和 Z-order 管理需求，需要与系统合成器紧密配合。

    版本要点（以 AOSP/厂商实现为准）:
    - Android 8.0+：PIP 能力逐步完善（具体行为依设备/ROM）
    - Android 12+：Freeform/多窗口 Resize 链路更依赖 BLAST Sync，减少“黑边/拉伸”类竞态
    - 新版本持续在 Shell/WM 转场、SyncId、FrameTimeline 等可观测性上演进，建议用 trace 验证

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant RT as RenderThread
      participant WMS as WindowManager
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 PIP/Freeform 窗口模式
      VA->>Main: 🔔 VSync-app
      activate Main
      Main->>Main: Choreographer#doFrame
      Main->>Main: 处理特殊窗口尺寸/位置
      Main->>RT: syncFrameState
      deactivate Main

      activate RT
      RT->>RT: DrawFrame (缩放后尺寸)
      RT->>BQ: queueBuffer
      deactivate RT

      WMS-->>SF: 窗口几何变换信息
      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: 应用 PIP/Freeform 变换
      SF->>SF: latchBuffer
      SF->>SF: HWC 合成 (带变换)
      deactivate SF

      Note over VA,SF: 🎬 支持画中画和自由窗口特性
  thread_roles:
    - thread: main
      role: "PIP 控制逻辑"
      description: "处理 PIP 进入/退出、手势控制"
    - thread: RenderThread
      role: "窗口渲染"
      description: "渲染 PIP 窗口内容"
    - thread: SurfaceFlinger
      role: "窗口变换/合成"
      description: "应用几何变换与 Z-order，合成并显示 PIP/Freeform Layer"

  key_slices:
    - name: "Choreographer#doFrame"
      thread: main
      description: "帧回调入口，触发窗口位置/尺寸变化与 UI 构建"
    - name: "syncFrameState"
      thread: RenderThread
      description: "UI 线程与 RenderThread 同步 DisplayList/RenderNode"
    - name: "DrawFrame"
      thread: RenderThread
      description: "渲染窗口内容（常伴随缩放/裁剪）"
    - name: "applyTransaction"
      thread: any
      description: "提交窗口几何/Buffer 相关 Transaction（PIP/Freeform 频繁发生）"
    - name: "WMS.resizeTask"
      thread: any
      description: "Freeform resize 相关标记（不同版本/厂商可能不同）"
    - name: "Transaction.apply"
      thread: any
      description: "Transaction 应用（可结合 SyncId 观察是否为同步提交）"
    - name: "SurfaceFlinger.waitForSync"
      thread: any
      description: "等待同步提交（过长时常表示 App/生产侧响应慢）"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "PIP 控制逻辑 (生产)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的主线程（避免 pin 到系统/其他 app 的 main）"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "窗口渲染 (传输)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 RenderThread（若为纯 SurfaceView/游戏则可能为空）"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "PIP 层合成/显示"
      main_thread_only: true

analysis:
  common_issues:
    - id: pip_animation_jank
      name: "PIP 动画卡顿"
      description: "PIP 进入/退出动画期间帧率下降"
      detection_skill: jank_frame_detail

    - id: pip_resize_slow
      name: "窗口缩放延迟"
      description: "PIP 窗口尺寸变化时渲染延迟"
      detection_skill: render_thread_slices

    - id: freeform_bounds_update
      name: "Freeform 边界更新慢"
      description: "拖动 Freeform 窗口时响应延迟"
      detection_skill: app_frame_production

  recommended_skills:
    - sf_frame_consumption
    - jank_frame_detail
    - render_thread_slices
    - app_frame_production
