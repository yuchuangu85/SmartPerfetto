# =============================================================================
# WebView GL Functor Pipeline
# =============================================================================
# Traditional WebView rendering with App RenderThread sync wait.
# WebView content rendered inline with app UI.
# =============================================================================

name: pipeline_webview_gl_functor
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: WEBVIEW_GL_FUNCTOR
  display_name: "WebView GL Functor"
  description: "传统 WebView 渲染，App RenderThread 同步等待"
  icon: "web"
  family: webview
  doc_path: "rendering_pipelines/webview_gl_functor.md"

detection:
  # Required: Must have both RenderThread (App) and CrRendererMain (Chromium)
  # Without these, cannot be WebView GL Functor mode
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: CrRendererMain
      min_count: 1

  scoring_signals:
    - signal: has_draw_gl
      slice_pattern: "*DrawGL*"
      weight: 35
    - signal: has_draw_functor
      slice_pattern: "*DrawFunctor*"
      weight: 35
    - signal: has_cr_renderer
      thread_pattern: "CrRendererMain*"
      weight: 15
    - signal: has_render_thread
      thread_pattern: "RenderThread*"
      weight: 10

  exclude_if:
    - thread: VizCompositor

teaching:
  title: "WebView GL Functor 渲染管线"
  summary: |
    传统 WebView 渲染模式，WebView 内容通过 GL Functor 机制嵌入到
    App 的 RenderThread 中渲染。App 需要等待 WebView 完成绘制，
    可能导致主线程和 RenderThread 阻塞。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant RT as RenderThread
      participant CR as CrRendererMain
      participant Blink as Blink Engine
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 WebView GL Functor 模式
      VA->>Main: 🔔 VSync-app
      activate Main
      Main->>RT: syncFrameState
      deactivate Main

      activate RT
      RT->>RT: DrawFrame 开始
      RT->>CR: 调用 WebView DrawGL
      deactivate RT

      activate CR
      CR->>Blink: 渲染网页内容
      CR->>CR: GPU 绘制
      CR-->>RT: 返回
      deactivate CR

      activate RT
      RT->>RT: 继续 DrawFrame
      RT->>BQ: queueBuffer
      deactivate RT

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over VA,SF: ⚠️ WebView 阻塞 RenderThread，可能影响流畅度
  thread_roles:
    - thread: main
      role: "WebView 宿主 UI"
      description: "承载 WebView 的 Activity/Fragment"
    - thread: RenderThread
      role: "App 渲染"
      description: "渲染 App UI，等待 WebView Functor"
      trace_tags: "DrawFrame, DrawFunctor"
    - thread: CrRendererMain
      role: "Chromium 主渲染"
      description: "WebView/Chromium 内容渲染"
      trace_tags: "Blink, V8"

  key_slices:
    - name: "DrawGL"
      thread: RenderThread
      description: "GL Functor 调用"
    - name: "DrawFunctor"
      thread: RenderThread
      description: "Functor 绘制"
    - name: "Blink"
      thread: CrRendererMain
      description: "Blink 渲染引擎"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (WebView 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "WebView 宿主 UI (生产)"
      expand: true  # 展开显示 Running 状态和 callstack

    - pattern: "CrRendererMain"
      match_by: name
      priority: 3
      reason: "Chromium 主渲染 (生产/传输)"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 4
      reason: "App RenderThread (传输/合成)"
      expand: true  # 展开显示 Running 状态和 callstack

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: functor_wait
      name: "Functor 等待"
      description: "RenderThread 等待 WebView 完成"
      detection_skill: render_thread_slices

    - id: js_long_task
      name: "JS 长任务"
      description: "JavaScript 执行阻塞渲染"
      detection_skill: cpu_analysis

  recommended_skills:
    - render_thread_slices
    - cpu_analysis
    - binder_analysis
