# =============================================================================
# Flutter SurfaceView Skia Pipeline
# =============================================================================
# Flutter with Skia rendering engine using SurfaceView.
# Legacy rendering mode with JIT shader compilation.
# =============================================================================

name: pipeline_flutter_surfaceview_skia
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: FLUTTER_SURFACEVIEW_SKIA
  display_name: "Flutter SurfaceView (Skia)"
  description: "Flutter + Skia 引擎，JIT Shader 编译"
  icon: "flutter"
  family: flutter
  doc_path: "rendering_pipelines/flutter_surfaceview.md"

detection:
  required_signals:
    - thread: "1.ui"
      min_count: 1

  scoring_signals:
    - signal: has_skgpu
      slice_pattern: "*SkGpu*"
      weight: 40
    - signal: has_skiagpu
      slice_pattern: "*SkiaGpu*"
      weight: 35
    - signal: has_flutter_raster
      thread_pattern: "1.raster"
      weight: 15

  exclude_if:
    - slice_pattern: "*EntityPass*"

teaching:
  title: "Flutter SurfaceView (Skia) 渲染管线"
  summary: |
    Flutter 使用 Skia 渲染引擎，通过 SurfaceView 独立渲染。
    Skia 使用 JIT 编译 Shader，首次使用新效果时可能有编译卡顿。
    在部分应用/版本中仍可能使用该模式，需重点关注 Shader 编译与光栅化耗时。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant UI as 1.ui (Dart)
      participant IO as 1.io
      participant Raster as 1.raster (Skia)
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 Flutter Frame Production (Skia)
      VA->>UI: 🔔 VSync → Engine::BeginFrame
      activate UI
      UI->>UI: Dart VM 执行 (build → layout → paint)
      UI->>UI: 生成 Layer Tree
      UI->>Raster: 提交 Layer Tree
      deactivate UI

      activate Raster
      Raster->>Raster: SkGpu::DrawLayers
      Raster->>Raster: GPU 光栅化 (OpenGL/Vulkan)
      Raster->>BQ: queueBuffer
      deactivate Raster

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over IO: 1.io 线程负责图片解码
      Note over VA,SF: ⚠️ Skia JIT 编译可能导致首帧卡顿
  thread_roles:
    - thread: "1.ui"
      role: "Dart UI 线程"
      description: "执行 Dart 代码，生成 Layer Tree"
    - thread: "1.raster"
      role: "Skia 光栅化"
      description: "使用 Skia 光栅化"
    - thread: "1.io"
      role: "Flutter IO"
      description: "资源加载"

  key_slices:
    - name: "SkGpu"
      thread: "1.raster"
      description: "Skia GPU 渲染"
    - name: "Rasterizer"
      thread: "1.raster"
      description: "光栅化操作"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (Flutter 开始生产帧)"

    - pattern: "^1\\.ui$"
      match_by: name
      priority: 2
      reason: "Dart UI 线程 (生产)"

    - pattern: "^1\\.raster$"
      match_by: name
      priority: 3
      reason: "Skia 光栅化 (传输)"

    - pattern: "io\\.flutter"
      match_by: name
      priority: 4
      reason: "Flutter IO"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: shader_compilation
      name: "Shader 编译卡顿"
      description: "JIT Shader 编译导致首次使用卡顿"
      detection_skill: jank_frame_detail

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - gpu_analysis
