# =============================================================================
# Flutter SurfaceView Skia Pipeline
# =============================================================================
# Flutter with Skia rendering engine using SurfaceView.
# Legacy rendering mode with JIT shader compilation.
# =============================================================================

name: pipeline_flutter_surfaceview_skia
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: FLUTTER_SURFACEVIEW_SKIA
  display_name: "Flutter SurfaceView (Skia)"
  description: "Flutter + Skia 引擎，JIT Shader 编译"
  icon: "flutter"
  family: flutter
  doc_path: "rendering_pipelines/flutter_surfaceview.md"

detection:
  required_signals:
    - thread: "1.ui"
      min_count: 1

  scoring_signals:
    - signal: has_skia
      slice_pattern: "*SkGpu*|*SkiaGpu*"
      weight: 75
    - signal: has_flutter_raster
      thread: "1.raster"
      weight: 15

  exclude_if:
    - slice: "*EntityPass*"

teaching:
  title: "Flutter SurfaceView (Skia) 渲染管线"
  summary: |
    Flutter 使用 Skia 渲染引擎，通过 SurfaceView 独立渲染。
    Skia 使用 JIT 编译 Shader，首次使用新效果时可能有编译卡顿。
    这是 Flutter 3.16 之前的默认渲染模式。

  mermaid: |
    sequenceDiagram
      participant VSync as VSync
      participant UI as 1.ui (Dart)
      participant Raster as 1.raster
      participant SF as SurfaceFlinger

      VSync->>UI: Engine.ScheduleFrame
      UI->>UI: Build -> Layout -> Paint
      UI->>Raster: Submit LayerTree
      Raster->>Raster: Skia Rasterize (GL/Vulkan)
      Raster->>SF: Buffer Ready
      SF->>SF: Composite

  thread_roles:
    - thread: "1.ui"
      role: "Dart UI 线程"
      description: "执行 Dart 代码，生成 Layer Tree"
    - thread: "1.raster"
      role: "Skia 光栅化"
      description: "使用 Skia 光栅化"
    - thread: "1.io"
      role: "Flutter IO"
      description: "资源加载"

  key_slices:
    - name: "SkGpu"
      thread: "1.raster"
      description: "Skia GPU 渲染"
    - name: "Rasterizer"
      thread: "1.raster"
      description: "光栅化操作"

auto_pin:
  instructions:
    - pattern: "^SurfaceFlinger$"
      match_by: name
      priority: 1
      reason: "最终合成"

    - pattern: "^1\\.raster$"
      match_by: name
      priority: 2
      reason: "Skia 光栅化"

    - pattern: "^1\\.ui$"
      match_by: name
      priority: 3
      reason: "Dart UI 线程"

    - pattern: "io\\.flutter"
      match_by: name
      priority: 4
      reason: "Flutter IO"

analysis:
  common_issues:
    - id: shader_compilation
      name: "Shader 编译卡顿"
      description: "JIT Shader 编译导致首次使用卡顿"
      detection_skill: jank_frame_detail

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - gpu_analysis
