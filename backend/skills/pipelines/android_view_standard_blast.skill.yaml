# =============================================================================
# Android View Standard (BLAST) Pipeline
# =============================================================================
# Android 12+ default rendering pipeline using HWUI + BLAST synchronization.
# BLAST replaces the legacy Binder-based BufferQueue submission with atomic
# Transaction-based buffer commits, reducing latency by one frame.
# =============================================================================

name: pipeline_android_view_standard_blast
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_STANDARD_BLAST
  display_name: "标准 Android View (BLAST)"
  description: "Android 12+ HWUI + BLAST 同步机制，现代 Android 默认渲染管线"
  icon: "android"
  family: hwui
  doc_path: "rendering_pipelines/android_view_standard.md"

# ==========================================================================
# Detection Rules
# ==========================================================================
detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_blast_buffer_queue
      slice_pattern: "*BLASTBufferQueue*"
      weight: 40
    - signal: has_apply_transaction
      slice_pattern: "*applyTransaction*"
      weight: 30
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 25
    - signal: has_choreographer
      slice_pattern: "*Choreographer#doFrame*"
      weight: 20
    - signal: has_sync_frame
      slice_pattern: "*syncFrameState*"
      weight: 15

  exclude_if:
    - thread: "1.ui"           # Flutter
    - thread: "1.raster"       # Flutter
    - thread: CrRendererMain   # WebView
    - thread: UnityMain        # Game Engine
    - thread: UnityGfx         # Game Engine

# ==========================================================================
# Teaching Content
# ==========================================================================
teaching:
  title: "Android View 标准渲染管线 (BLAST)"
  summary: |
    Android 12+ 默认的渲染管线，使用 BLAST (Buffer Layer State Transition) 同步机制。
    与旧版相比，BLAST 将 Buffer 提交变成 Transaction 的一部分，实现原子性更新，
    解决了画面撕裂和尺寸不同步问题，同时减少一帧延迟。

  mermaid: |
    sequenceDiagram
      participant App as App (main)
      participant RT as RenderThread
      participant BBQ as BLAST Adapter
      participant SF as SurfaceFlinger

      App->>App: Input -> Anim -> Layout -> Draw
      App->>RT: SyncFrameState (Block)
      RT->>BBQ: dequeueBuffer
      RT->>RT: Flush GPU Commands
      RT->>BBQ: queueBuffer
      BBQ->>SF: Transaction(Buffer)
      SF->>SF: latchBuffer & Composite

  thread_roles:
    - thread: main
      role: "UI 构建"
      description: "处理 Input/Animation/Measure/Layout/Draw，生成 DisplayList"
      trace_tags: "Choreographer#doFrame, measure, layout, draw"
    - thread: RenderThread
      role: "GPU 渲染"
      description: "执行 GL/Vulkan 绘制命令，管理 GPU 资源，提交 BLAST Transaction"
      trace_tags: "DrawFrame, syncFrameState, queueBuffer, applyTransaction"
    - thread: SurfaceFlinger
      role: "合成显示"
      description: "接收 Transaction，Latch Buffer，HWC 合成多个 Layer"
      trace_tags: "setTransactionState, handleMessageRefresh, latchBuffer"

  key_slices:
    - name: "Choreographer#doFrame"
      thread: main
      description: "帧回调入口，开始 UI 构建"
    - name: "DrawFrame"
      thread: RenderThread
      description: "开始 GPU 渲染流程"
    - name: "syncFrameState"
      thread: RenderThread
      description: "UI 线程与 RenderThread 同步 DisplayList"
    - name: "BLASTBufferQueue"
      thread: RenderThread
      description: "BLAST 适配器处理 Buffer"
    - name: "applyTransaction"
      thread: RenderThread
      description: "提交 Transaction 到 SurfaceFlinger"

# ==========================================================================
# Auto Pin Configuration
# ==========================================================================
auto_pin:
  instructions:
    - pattern: "SurfaceFlinger"
      match_by: name
      priority: 1
      reason: "最终合成 (HWC)"

    - pattern: "RenderThread"
      match_by: name
      priority: 2
      reason: "GPU 渲染执行"
      smart_filter:
        enabled: true
        description: "仅 Pin 有活跃渲染的进程的 RenderThread"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM actual_frame_timeline_slice a
          JOIN process p ON a.upid = p.upid
          WHERE a.surface_frame_token IS NOT NULL
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
          GROUP BY a.upid
          HAVING frame_count > 0
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "\\bmain\\b"
      match_by: name
      priority: 3
      reason: "UI 构建 (Measure/Layout/Draw)"

    - pattern: "^VSYNC-(app|sf|appSf)$"
      match_by: name
      priority: 4
      reason: "垂直同步信号"

    - pattern: "Choreographer"
      match_by: name
      priority: 5
      reason: "帧调度"

# ==========================================================================
# Analysis Configuration
# ==========================================================================
analysis:
  common_issues:
    - id: rt_stall
      name: "RenderThread 阻塞"
      description: "RenderThread 等待 GPU Fence 或 Buffer 时间过长"
      detection_skill: render_thread_slices

    - id: main_jank
      name: "主线程卡顿"
      description: "主线程 Measure/Layout/Draw 耗时过长"
      detection_skill: app_frame_production

    - id: sync_frame_slow
      name: "SyncFrameState 慢"
      description: "UI 线程与 RenderThread 同步耗时过长"
      detection_skill: render_thread_slices

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - render_thread_slices
    - app_frame_production
    - cpu_analysis
    - binder_analysis
