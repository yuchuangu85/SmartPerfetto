# =============================================================================
# Android View Standard (BLAST) Pipeline
# =============================================================================
# Android 12+（部分 Android 11 设备/ROM 已可见）常见的渲染管线：HWUI + BLASTBufferQueue。
# BLASTBufferQueue 将 Buffer 提交与 Transaction 绑定，提升原子性与同步性；
# 对延迟/抖动的改善依赖设备实现与负载情况，建议以 trace 结果为准。
# =============================================================================

name: pipeline_android_view_standard_blast
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_STANDARD_BLAST
  display_name: "标准 Android View (BLAST)"
  description: "Android 12+ 常见（部分 Android 11+ 可见）：HWUI + BLASTBufferQueue，Transaction 原子提交"
  icon: "android"
  family: hwui
  doc_path: "rendering_pipelines/android_view_standard.md"

# ==========================================================================
# Detection Rules
# ==========================================================================
detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_blast_buffer_queue
      slice_pattern: "*BLASTBufferQueue*"
      weight: 40
    - signal: has_apply_transaction
      slice_pattern: "*applyTransaction*"
      weight: 30
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 25
    - signal: has_choreographer
      slice_pattern: "*Choreographer#doFrame*"
      weight: 20
    - signal: has_sync_frame
      slice_pattern: "*syncFrameState*"
      weight: 15

  exclude_if:
    - thread: "1.ui"           # Flutter
    - thread: "1.raster"       # Flutter
    - thread: CrRendererMain   # WebView
    - thread: UnityMain        # Game Engine
    - thread: UnityGfx         # Game Engine

# ==========================================================================
# Teaching Content
# ==========================================================================
teaching:
  title: "Android View 标准渲染管线 (BLAST)"
  summary: |
    Android 12+ 设备上常见的渲染管线：View 系统由 RenderThread 通过 BLASTBufferQueue
    将 Buffer 提交绑定到 Transaction，提升原子性更新与同步性，减少撕裂/尺寸不同步等问题。
    相比传统 BufferQueue 提交流程，它通常能减少由“提交不同步/额外缓冲/等待”导致的卡顿与延迟，
    但具体收益会随设备实现与负载变化，建议以 trace 为准。

    版本要点（以 AOSP/厂商实现为准）:
    - Android 11+：引入 BLASTBufferQueue（不同设备/ROM 覆盖率不同）
    - Android 12+：BLASTBufferQueue/Transaction 提交流程更普遍（原子性更新）
    - 与 FrameTimeline 等帧诊断能力结合后，可更容易定位“生产慢/合成慢/显示慢”
    - 新版本持续在 Transaction 批处理、合成调度与帧诊断上演进，建议用 trace 验证实际链路

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant RT as RenderThread
      participant BQ as BufferQueue<br/>(QueuedBuffer)
      participant VS as VSync-sf
      participant TX as BufferTX
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 Frame N Production Phase
      VA->>Main: 🔔 VSync-app 信号触发
      activate Main
      Main->>Main: Choreographer#doFrame
      Main->>Main: Input → Animation → Measure → Layout → Draw
      Main->>RT: syncFrameState (阻塞等待)
      deactivate Main

      activate RT
      RT->>BQ: dequeueBuffer
      RT->>RT: DrawFrame (执行 GPU 命令)
      RT->>RT: Flush GPU Commands
      RT->>BQ: queueBuffer + applyTransaction
      deactivate RT

      Note over BQ,SF: 📍 Frame N Consumption Phase
      BQ-->>TX: Buffer Ready (BLAST Transaction)
      VS->>SF: 🔔 VSync-sf 信号触发
      activate SF
      TX->>SF: setTransactionState
      SF->>SF: handleMessageRefresh
      SF->>SF: latchBuffer (获取 Buffer)
      SF->>SF: HWC Composite (合成)
      SF->>SF: Present to Display
      deactivate SF

      Note over VA,SF: ⏱️ 关键耗时点：Main/RT阻塞、GPU渲染、SF合成

  thread_roles:
    - thread: main
      role: "UI 构建"
      description: "处理 Input/Animation/Measure/Layout/Draw，生成 DisplayList"
      trace_tags: "Choreographer#doFrame, measure, layout, draw"
    - thread: RenderThread
      role: "GPU 渲染"
      description: "执行 GL/Vulkan 绘制命令，管理 GPU 资源，提交 BLAST Transaction"
      trace_tags: "DrawFrame, syncFrameState, queueBuffer, applyTransaction"
    - thread: SurfaceFlinger
      role: "合成显示"
      description: "接收 Transaction，Latch Buffer，HWC 合成多个 Layer"
      trace_tags: "setTransactionState, handleMessageRefresh, latchBuffer"

  key_slices:
    - name: "Choreographer#doFrame"
      thread: main
      description: "帧回调入口，开始 UI 构建"
    - name: "DrawFrame"
      thread: RenderThread
      description: "开始 GPU 渲染流程"
    - name: "syncFrameState"
      thread: RenderThread
      description: "UI 线程与 RenderThread 同步 DisplayList"
    - name: "BLASTBufferQueue"
      thread: RenderThread
      description: "BLAST 适配器处理 Buffer"
    - name: "applyTransaction"
      thread: RenderThread
      description: "提交 Transaction 到 SurfaceFlinger"

# ==========================================================================
# Auto Pin Configuration
# ==========================================================================
auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的主线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 有活跃渲染的进程的 RenderThread"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^QueuedBuffer"
      match_by: name
      priority: 4
      reason: "BufferQueue/BLAST (传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程相关的 BufferQueue"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB '*BufferQueue*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

# ==========================================================================
# Analysis Configuration
# ==========================================================================
analysis:
  common_issues:
    - id: rt_stall
      name: "RenderThread 阻塞"
      description: "RenderThread 等待 GPU Fence 或 Buffer 时间过长"
      detection_skill: render_thread_slices

    - id: main_jank
      name: "主线程卡顿"
      description: "主线程 Measure/Layout/Draw 耗时过长"
      detection_skill: app_frame_production

    - id: sync_frame_slow
      name: "SyncFrameState 慢"
      description: "UI 线程与 RenderThread 同步耗时过长"
      detection_skill: render_thread_slices

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - render_thread_slices
    - app_frame_production
    - cpu_analysis
    - binder_analysis
