# =============================================================================
# Android View Multi-Window Pipeline
# =============================================================================
# Same-process multi-window rendering (Dialog, PopupWindow).
# RenderThread serialization may cause jank.
# =============================================================================

name: pipeline_android_view_multi_window
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_MULTI_WINDOW
  display_name: "Android View 多窗口"
  description: "同进程多窗口渲染 (Dialog/PopupWindow)，RenderThread 串行化"
  icon: "window"
  family: hwui
  doc_path: "rendering_pipelines/android_view_multi_window.md"

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_dialog
      slice_pattern: "*Dialog*"
      weight: 20
    - signal: has_popup_window
      slice_pattern: "*PopupWindow*"
      weight: 20
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 20

teaching:
  title: "Android View 多窗口渲染管线"
  summary: |
    同进程内存在多个窗口 (Dialog, PopupWindow, Toast)。由于共用一个 RenderThread，
    多个窗口的渲染会串行化，可能导致帧率下降。需要关注窗口渲染顺序和时间分配。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant RT as RenderThread
      participant BQ1 as BufferQueue (Main)
      participant BQ2 as BufferQueue (Dialog)
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 Multi-Window (Dialog/PopupWindow)
      VA->>Main: 🔔 VSync-app
      activate Main
      Main->>Main: 主窗口 Layout + Draw
      Main->>RT: syncFrameState (主窗口)
      Main->>Main: Dialog Layout + Draw
      Main->>RT: syncFrameState (Dialog)
      deactivate Main

      activate RT
      Note over RT: ⏱️ 串行处理多窗口
      RT->>BQ1: queueBuffer (主窗口)
      RT->>BQ2: queueBuffer (Dialog)
      deactivate RT

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer (多 Surface)
      SF->>SF: HWC 合成
      deactivate SF

      Note over VA,SF: ⚠️ RenderThread 串行化可能导致卡顿
  thread_roles:
    - thread: main
      role: "多窗口 UI 管理"
      description: "管理多个窗口的 View 树"
    - thread: RenderThread
      role: "渲染线程 (串行)"
      description: "串行渲染多个窗口，可能成为瓶颈"

  key_slices:
    - name: "Dialog"
      thread: any
      description: "对话框相关操作"
    - name: "PopupWindow"
      thread: any
      description: "弹出窗口操作"
    - name: "Choreographer#doFrame"
      thread: main
      description: "同一帧内可能连续驱动多个窗口的 layout/draw"
    - name: "syncFrameState"
      thread: RenderThread
      description: "多个窗口共享 RenderThread，同步与提交容易串行化"
    - name: "DrawFrame"
      thread: RenderThread
      description: "GPU 渲染阶段（多窗口会放大工作量）"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 有活跃渲染的进程的 RenderThread"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: rt_serialization
      name: "RenderThread 串行化"
      description: "多窗口导致 RenderThread 工作量翻倍"
      detection_skill: render_thread_slices

  recommended_skills:
    - render_thread_slices
    - jank_frame_detail
