# =============================================================================
# Android View Mixed Pipeline
# =============================================================================
# Hybrid rendering with View + SurfaceView.
# Common for video players, games embedded in native UI.
# =============================================================================

name: pipeline_android_view_mixed
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: ANDROID_VIEW_MIXED
  display_name: "Android View 混合渲染"
  description: "View + SurfaceView 混合渲染，常见于视频播放器、内嵌游戏"
  icon: "layers"
  family: hwui
  doc_path: "rendering_pipelines/android_view_mixed.md"

detection:
  required_signals:
    - thread: RenderThread
      min_count: 1
    - thread: main
      min_count: 1

  scoring_signals:
    - signal: has_surfaceview
      slice_pattern: "*SurfaceView*"
      weight: 50
    - signal: has_draw_frame
      slice_pattern: "DrawFrame*"
      weight: 20
    - signal: has_mediacodec_thread
      thread_pattern: "*MediaCodec*"
      weight: 12
    - signal: has_decoder_thread
      thread_pattern: "*Decoder*"
      weight: 8

  exclude_if:
    - thread: "1.ui"
    - thread: CrRendererMain

teaching:
  title: "Android View 混合渲染管线"
  summary: |
    同时使用 View 系统和 SurfaceView 进行渲染。View 部分通过 RenderThread，
    SurfaceView 有独立的渲染线程 (GLThread/MediaCodec)。常见于视频播放器、
    内嵌游戏等需要混合原生 UI 和自定义渲染的场景。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant Main as App (main)
      participant RT as RenderThread
      participant GL as GLThread (SurfaceView)
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 View + SurfaceView 混合渲染
      VA->>Main: 🔔 VSync-app
      activate Main
      Main->>RT: syncFrameState (View 部分)
      deactivate Main

      par View 渲染链路
        activate RT
        RT->>RT: DrawFrame (HWUI)
        RT->>BQ: queueBuffer (Layer 1)
        deactivate RT
      and SurfaceView 渲染链路
        activate GL
        GL->>GL: OpenGL/Vulkan 渲染
        GL->>BQ: eglSwapBuffers (Layer 2)
        deactivate GL
      end

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer (多 Layer)
      SF->>SF: HWC 合成
      deactivate SF

      Note over VA,SF: ⚠️ 两条独立链路，需注意同步问题
  thread_roles:
    - thread: main
      role: "UI 协调"
      description: "协调 View 和 SurfaceView，处理布局"
    - thread: RenderThread
      role: "View 层渲染"
      description: "渲染原生 View UI"
    - thread: GLThread
      role: "SurfaceView 渲染"
      description: "独立渲染 SurfaceView 内容"
    - thread: MediaCodec
      role: "视频解码"
      description: "解码视频帧到 SurfaceView"

  key_slices:
    - name: "SurfaceView"
      thread: any
      description: "SurfaceView 相关操作"
    - name: "Choreographer#doFrame"
      thread: main
      description: "帧回调入口，协调 View 与 SurfaceView 的布局/动画"
    - name: "syncFrameState"
      thread: RenderThread
      description: "主线程与 RenderThread 同步 DisplayList/RenderNode"
    - name: "DrawFrame"
      thread: RenderThread
      description: "View 层渲染"
    - name: "eglSwapBuffers"
      thread: GLThread
      description: "SurfaceView 渲染线程提交帧"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (App 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "App 主线程 (生产帧)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 main 线程"
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as slice_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'main'
          GROUP BY p.upid
          HAVING slice_count > 10
          ORDER BY slice_count DESC
          LIMIT 10

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "App 渲染线程 (RenderThread)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        detection_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
            AND p.name NOT LIKE 'com.android.systemui%'
            AND p.name NOT LIKE 'system_server%'
            AND p.name NOT LIKE '/system/%'
          GROUP BY p.upid
          HAVING frame_count > 5
          ORDER BY frame_count DESC
          LIMIT 10
        fallback_sql: |
          SELECT DISTINCT p.name as process_name, COUNT(*) as frame_count
          FROM slice s
          JOIN thread_track tt ON s.track_id = tt.id
          JOIN thread t ON tt.utid = t.utid
          JOIN process p ON t.upid = p.upid
          WHERE t.name = 'RenderThread'
            AND s.name GLOB 'DrawFrame*'
            AND p.name IS NOT NULL
          GROUP BY p.upid
          HAVING frame_count > 5

    - pattern: "GLThread"
      match_by: name
      priority: 3.5
      reason: "SurfaceView 渲染"
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 SurfaceView 渲染线程"

    - pattern: "MediaCodec"
      match_by: name
      priority: 4
      reason: "视频解码"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: layer_sync
      name: "Layer 同步问题"
      description: "View 和 SurfaceView 帧率不同步"
      detection_skill: sf_frame_consumption

  recommended_skills:
    - scrolling_analysis
    - sf_frame_consumption
    - gpu_analysis
