# =============================================================================
# Video Overlay HWC Pipeline
# =============================================================================
# HWC video layer overlay for hardware-accelerated video.
# Direct video decode to display with minimal CPU involvement.
# =============================================================================

name: pipeline_video_overlay_hwc
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: VIDEO_OVERLAY_HWC
  display_name: "视频 Overlay (HWC)"
  description: "HWC 视频层硬件加速叠加"
  icon: "video"
  family: specialized
  doc_path: "rendering_pipelines/video_overlay_hwc.md"

detection:
  scoring_signals:
    - signal: has_hwc
      slice_pattern: "*HWC*|*HardwareComposer*"
      weight: 35
    - signal: has_video
      slice_pattern: "*Video*|*MediaCodec*"
      weight: 35

teaching:
  title: "视频 Overlay (HWC) 渲染管线"
  summary: |
    使用 HWC (Hardware Composer) 的视频 Overlay 层进行视频渲染。
    视频帧直接从解码器输出到独立的 HWC 层，绕过 GPU 合成，
    实现最低延迟和最佳功耗。

  mermaid: |
    sequenceDiagram
      participant MC as MediaCodec
      participant HWC as HWC
      participant Display as Display

      MC->>HWC: Video Buffer (Direct)
      HWC->>HWC: Configure Video Layer
      HWC->>Display: Overlay Scanout

  thread_roles:
    - thread: MediaCodec
      role: "视频解码"
      description: "硬件视频解码器"
    - thread: SurfaceFlinger
      role: "HWC 控制"
      description: "配置 HWC 视频层"

  key_slices:
    - name: "MediaCodec"
      thread: any
      description: "视频解码"
    - name: "HWC"
      thread: SurfaceFlinger
      description: "硬件合成器配置"

auto_pin:
  instructions:
    - pattern: "^SurfaceFlinger$"
      match_by: name
      priority: 1
      reason: "HWC 合成"

    - pattern: "MediaCodec"
      match_by: name
      priority: 2
      reason: "视频解码"

    - pattern: "HWC|HardwareComposer"
      match_by: name
      priority: 3
      reason: "硬件合成器"

analysis:
  common_issues:
    - id: decode_stall
      name: "解码延迟"
      description: "视频解码器处理延迟"
      detection_skill: cpu_analysis

  recommended_skills:
    - sf_frame_consumption
    - cpu_analysis
