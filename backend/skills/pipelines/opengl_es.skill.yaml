# =============================================================================
# OpenGL ES Pipeline
# =============================================================================
# Direct OpenGL ES / EGL rendering.
# Common for games, custom rendering engines.
# =============================================================================

name: pipeline_opengl_es
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: OPENGL_ES
  display_name: "OpenGL ES"
  description: "直接 OpenGL ES / EGL 渲染，用于游戏和自定义渲染引擎"
  icon: "gpu"
  family: graphics
  doc_path: "rendering_pipelines/opengl_es.md"

detection:
  scoring_signals:
    - signal: has_egl_swap
      slice_pattern: "*eglSwapBuffers*"
      weight: 50
    - signal: has_gl_draw
      slice_pattern: "*glDraw*"
      weight: 20
    - signal: has_gl_thread
      thread_pattern: "*GLThread*"
      weight: 15

  exclude_if:
    - slice_pattern: "*vkQueuePresentKHR*"
    - slice_pattern: "*ANGLE*"
    - thread: "1.ui"

teaching:
  title: "OpenGL ES 渲染管线"
  summary: |
    直接使用 OpenGL ES 和 EGL API 进行渲染。适用于自定义游戏引擎、
    3D 应用等需要精细控制 GPU 的场景。通过 eglSwapBuffers 提交帧。

  mermaid: |
    sequenceDiagram
      participant App as App Thread
      participant GL as GLThread
      participant EGL as EGL Context
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over App,SF: 📍 OpenGL ES 渲染链路
      GL->>EGL: eglMakeCurrent
      activate GL
      GL->>GL: glClear / glDraw*
      GL->>GL: GPU 命令提交
      GL->>EGL: eglSwapBuffers
      EGL->>BQ: queueBuffer
      deactivate GL

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC 合成
      deactivate SF

      Note over App,SF: 🎮 传统 OpenGL ES 游戏/渲染引擎常用
  thread_roles:
    - thread: GLThread
      role: "GL 渲染线程"
      description: "执行 OpenGL 绘制命令"
    - thread: SurfaceFlinger
      role: "合成显示"
      description: "latch Buffer 并提交到 HWC"

  key_slices:
    - name: "eglSwapBuffers"
      thread: GLThread
      description: "交换 Buffer，提交帧"
    - name: "glDraw*"
      thread: GLThread
      description: "OpenGL 绘制调用"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (开始生产帧)"

    - pattern: "GLThread"
      match_by: name
      priority: 2
      reason: "GL 渲染线程 (生产/传输)"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 3
      reason: "RenderThread (如存在，用于 View 系统合成)"
      expand: true  # 展开显示 Running 状态和 callstack

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "最终合成/显示"
      main_thread_only: true

analysis:
  common_issues:
    - id: gl_driver_stall
      name: "GL 驱动阻塞"
      description: "glFinish 或 eglSwapBuffers 等待过长"
      detection_skill: gpu_analysis

  recommended_skills:
    - gpu_analysis
    - gpu_metrics
