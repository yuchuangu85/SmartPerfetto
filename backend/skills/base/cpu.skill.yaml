# =============================================================================
# CPU 分析 Skill (CPU Analysis)
# =============================================================================
# 版本: 1.0.0
# 作者: SmartPerfetto Team
# 最后更新: 2024-12
#
# 本 Skill 用于分析应用 CPU 使用情况，包括：
# - CPU 利用率
# - 线程调度分析
# - CPU 频率变化
# - 核心亲和性分析
# =============================================================================

name: cpu_analysis
version: "1.0.0"
type: performance
category: cpu
priority: high

# -----------------------------------------------------------------------------
# 元信息
# -----------------------------------------------------------------------------
meta:
  display_name: "CPU 分析"
  description: "分析应用 CPU 使用率、线程调度和核心分布"
  icon: "cpu"
  tags:
    - cpu
    - thread
    - scheduling
    - frequency
    - utilization

# -----------------------------------------------------------------------------
# 触发条件
# -----------------------------------------------------------------------------
triggers:
  keywords:
    zh:
      - CPU
      - CPU利用率
      - CPU占用
      - 线程调度
      - CPU频率
      - 核心
      - 大核
      - 小核
    en:
      - cpu
      - cpu usage
      - cpu utilization
      - thread scheduling
      - frequency
      - core
      - big core
      - little core

  patterns:
    - ".*CPU.*"
    - ".*cpu.*"
    - ".*核心.*"
    - ".*调度.*"

# -----------------------------------------------------------------------------
# 前置检查
# -----------------------------------------------------------------------------
prerequisites:
  required_tables:
    - sched_slice
    - thread
    - process

  optional_tables:
    - cpu_counter_track
    - cpu_freq
    - thread_state

# -----------------------------------------------------------------------------
# 分析步骤
# -----------------------------------------------------------------------------
steps:
  # Step 1: 获取进程信息
  - id: get_process
    name: "获取目标进程"
    sql: |
      SELECT
        upid,
        pid,
        name as process_name
      FROM process
      WHERE name GLOB '${package}*'
      LIMIT 1
    required: true
    save_as: target_process
    on_empty: "未找到目标进程"

  # Step 2: 线程 CPU 使用统计
  - id: thread_cpu_usage
    name: "线程 CPU 使用"
    description: "统计各线程的 CPU 使用时间"
    sql: |
      SELECT
        t.tid,
        t.name as thread_name,
        SUM(ss.dur) / 1e6 as cpu_time_ms,
        COUNT(*) as sched_count,
        AVG(ss.dur) / 1e6 as avg_slice_ms
      FROM sched_slice ss
      JOIN thread t ON ss.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
      GROUP BY t.utid
      ORDER BY cpu_time_ms DESC
    save_as: thread_cpu_usage

  # Step 3: CPU 核心分布
  - id: cpu_core_distribution
    name: "核心分布"
    description: "分析线程在各 CPU 核心上的分布"
    sql: |
      SELECT
        ss.cpu,
        t.name as thread_name,
        COUNT(*) as slice_count,
        SUM(ss.dur) / 1e6 as total_time_ms,
        CASE
          WHEN ss.cpu IN (0, 1, 2, 3) THEN 'little'
          WHEN ss.cpu IN (4, 5, 6) THEN 'big'
          WHEN ss.cpu = 7 THEN 'prime'
          ELSE 'unknown'
        END as core_type
      FROM sched_slice ss
      JOIN thread t ON ss.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
      GROUP BY ss.cpu, t.name
      ORDER BY total_time_ms DESC
    save_as: cpu_core_distribution

  # Step 4: 主线程调度分析
  - id: main_thread_scheduling
    name: "主线程调度"
    description: "分析主线程的调度情况"
    sql: |
      SELECT
        ss.ts / 1e6 as ts_ms,
        ss.dur / 1e6 as dur_ms,
        ss.cpu,
        ss.priority
      FROM sched_slice ss
      JOIN thread t ON ss.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
      ORDER BY ss.ts ASC
    save_as: main_thread_scheduling

  # Step 5: 线程状态分析
  - id: thread_states
    name: "线程状态"
    description: "分析线程在各状态的时间分布"
    sql: |
      SELECT
        t.name as thread_name,
        ts.state,
        SUM(ts.dur) / 1e6 as total_dur_ms,
        COUNT(*) as count,
        AVG(ts.dur) / 1e6 as avg_dur_ms
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
      GROUP BY t.name, ts.state
      ORDER BY total_dur_ms DESC
    optional: true
    save_as: thread_states

  # Step 6: Runnable 状态等待
  - id: runnable_latency
    name: "Runnable 延迟"
    description: "分析线程等待被调度的时间"
    sql: |
      SELECT
        t.name as thread_name,
        ts.dur / 1e6 as wait_ms,
        ts.ts / 1e6 as ts_ms
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND ts.state = 'R'
        AND ts.dur > 1000000  -- > 1ms
      ORDER BY ts.dur DESC
      LIMIT 50
    optional: true
    save_as: runnable_latency

  # Step 7: CPU 频率变化
  - id: cpu_frequency
    name: "CPU 频率"
    description: "分析 CPU 频率变化"
    sql: |
      SELECT
        c.ts / 1e6 as ts_ms,
        ct.cpu,
        c.value as freq_khz,
        c.value / 1000 as freq_mhz
      FROM counter c
      JOIN cpu_counter_track ct ON c.track_id = ct.id
      WHERE ct.name = 'cpufreq'
      ORDER BY c.ts ASC
    optional: true
    save_as: cpu_frequency

  # Step 8: 核心类型统计
  - id: core_type_stats
    name: "核心类型统计"
    sql: |
      SELECT
        CASE
          WHEN ss.cpu IN (0, 1, 2, 3) THEN 'little'
          WHEN ss.cpu IN (4, 5, 6) THEN 'big'
          WHEN ss.cpu = 7 THEN 'prime'
          ELSE 'unknown'
        END as core_type,
        SUM(ss.dur) / 1e6 as total_time_ms,
        COUNT(*) as slice_count,
        COUNT(DISTINCT ss.cpu) as core_count
      FROM sched_slice ss
      JOIN thread t ON ss.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
      GROUP BY core_type
      ORDER BY total_time_ms DESC
    save_as: core_type_stats

# -----------------------------------------------------------------------------
# 判断标准
# -----------------------------------------------------------------------------
thresholds:
  big_core_ratio:
    unit: percent
    description: "大核使用比例"
    levels:
      excellent: { min: 70 }
      good: { min: 50, max: 70 }
      warning: { min: 20, max: 50 }
      critical: { max: 20 }
    suggestions:
      warning: "大核利用率偏低，可能影响性能"
      critical: "应用主要运行在小核上，性能受限"

  runnable_latency:
    unit: ms
    description: "Runnable 等待延迟"
    levels:
      excellent: { max: 5 }
      good: { min: 5, max: 16 }
      warning: { min: 16, max: 50 }
      critical: { min: 50 }
    suggestions:
      warning: "线程调度延迟较高"
      critical: "调度延迟严重，可能导致卡顿"

# -----------------------------------------------------------------------------
# 输出格式
# -----------------------------------------------------------------------------
output:
  title: "CPU 分析报告"

  sections:
    - id: overview
      title: "核心使用概览"
      type: pie_chart
      from: core_type_stats
      fields:
        - { key: core_type, label: "核心类型" }
        - { key: total_time_ms, label: "CPU 时间", unit: "ms" }

    - id: thread_usage
      title: "线程 CPU 使用"
      type: table
      from: thread_cpu_usage
      limit: 20
      fields:
        - { key: thread_name, label: "线程" }
        - { key: cpu_time_ms, label: "CPU 时间", unit: "ms" }
        - { key: sched_count, label: "调度次数" }
        - { key: avg_slice_ms, label: "平均时间片", unit: "ms" }

    - id: core_distribution
      title: "核心分布"
      type: grouped_table
      from: cpu_core_distribution
      group_by: core_type
      fields:
        - { key: cpu, label: "核心" }
        - { key: thread_name, label: "线程" }
        - { key: total_time_ms, label: "时间", unit: "ms" }

    - id: thread_state
      title: "线程状态分布"
      type: table
      from: thread_states
      fields:
        - { key: thread_name, label: "线程" }
        - { key: state, label: "状态" }
        - { key: total_dur_ms, label: "总时长", unit: "ms" }

# -----------------------------------------------------------------------------
# 诊断规则
# -----------------------------------------------------------------------------
diagnostics:
  - id: low_big_core_usage
    condition: "core_type_stats.big.total_time_ms < core_type_stats.little.total_time_ms * 0.5"
    severity: warning
    message: "大核使用率低，应用主要运行在小核上"
    suggestions:
      - "检查线程优先级设置"
      - "考虑使用 PowerHint 提升调度"
      - "确认 Performance Tuner 配置"

  - id: high_runnable_latency
    condition: "runnable_latency.any.wait_ms > 16"
    severity: warning
    message: "线程调度延迟达到 ${wait_ms}ms"
    suggestions:
      - "检查系统负载是否过高"
      - "考虑减少线程数量"
      - "检查是否有高优先级任务抢占"

  - id: main_thread_starved
    condition: "thread_states.main.R.avg_dur_ms > 10"
    severity: critical
    message: "主线程平均等待调度时间 ${avg_dur_ms}ms"
    suggestions:
      - "主线程被其他任务阻塞"
      - "检查后台线程是否过多"

# -----------------------------------------------------------------------------
# 参考资料
# -----------------------------------------------------------------------------
references:
  - title: "Android CPU Profiling"
    url: "https://developer.android.com/studio/profile/cpu-profiler"
  - title: "Perfetto Scheduling Analysis"
    url: "https://perfetto.dev/docs/analysis/scheduling"
