# =============================================================================
# 点击响应分析 Skill (Click/Input Response Analysis)
# =============================================================================
# 版本: 1.0.0
# 作者: SmartPerfetto Team
# 最后更新: 2024-12
#
# 本 Skill 用于分析点击响应性能，包括：
# - 输入事件处理延迟
# - 点击到响应的完整链路
# - 主线程响应速度
# - UI 更新延迟
# =============================================================================

name: click_response_analysis
version: "1.0.0"
type: performance
category: input
priority: high
sop_doc: click_response.sop.md

meta:
  display_name: "点击响应分析"
  description: "分析输入事件处理延迟、点击响应速度"
  icon: "hand-pointer"
  tags:
    - click
    - tap
    - input
    - response
    - latency
    - touch

triggers:
  keywords:
    zh:
      - 点击
      - 点击响应
      - 触摸
      - 输入延迟
      - 点击慢
      - 响应慢
      - 点击卡顿
      - 触摸延迟
    en:
      - click
      - tap
      - touch
      - input latency
      - response time
      - click delay
      - input response

  patterns:
    - ".*点击.*慢.*"
    - ".*点击.*卡.*"
    - ".*响应.*延迟.*"
    - ".*input.*latency.*"
    - ".*touch.*delay.*"

prerequisites:
  required_tables:
    - slice
    - thread
    - process

  optional_tables:
    - android_input_events
    - frame_timeline_event

# -----------------------------------------------------------------------------
# 分析步骤
# -----------------------------------------------------------------------------
steps:
  # Step 1: 检查输入事件表是否存在
  - id: check_input_events
    name: "检查输入事件支持"
    sql: |
      SELECT COUNT(*) as cnt
      FROM sqlite_master
      WHERE type='table' AND name='android_input_events'
    save_as: input_events_support

  # Step 2: 输入事件分析 (如果支持)
  - id: input_events_analysis
    name: "输入事件分析"
    description: "从 android_input_events 表分析输入延迟"
    sql: |
      SELECT
        event_type,
        ts / 1e6 as ts_ms,
        dur / 1e6 as latency_ms,
        process_name,
        window_name
      FROM android_input_events
      WHERE process_name GLOB '${package}*'
      ORDER BY ts ASC
    optional: true
    save_as: input_events

  # Step 3: 主线程输入处理 (dispatchTouchEvent 等)
  - id: touch_dispatch
    name: "触摸事件分发"
    sql: |
      SELECT
        s.name as event_name,
        s.ts / 1e6 as ts_ms,
        s.dur / 1e6 as dur_ms,
        s.depth
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND (s.name GLOB '*dispatchTouchEvent*'
             OR s.name GLOB '*onTouchEvent*'
             OR s.name GLOB '*onClick*'
             OR s.name GLOB '*onTouch*'
             OR s.name GLOB '*MotionEvent*'
             OR s.name GLOB '*InputEvent*')
      ORDER BY s.ts ASC
    save_as: touch_events

  # Step 4: 点击事件到 UI 响应链路
  - id: click_to_response_chain
    name: "点击响应链路"
    description: "分析从点击到 UI 更新的完整链路"
    sql: |
      SELECT
        s.name as operation,
        s.ts / 1e6 as ts_ms,
        s.dur / 1e6 as dur_ms,
        s.depth,
        t.name as thread_name,
        CASE
          WHEN s.name GLOB '*dispatch*' THEN '1_dispatch'
          WHEN s.name GLOB '*onClick*' OR s.name GLOB '*onTouch*' THEN '2_handler'
          WHEN s.name GLOB '*invalidate*' OR s.name GLOB '*requestLayout*' THEN '3_invalidate'
          WHEN s.name GLOB '*measure*' OR s.name GLOB '*layout*' THEN '4_layout'
          WHEN s.name GLOB '*draw*' OR s.name GLOB '*Choreographer*' THEN '5_draw'
          ELSE '9_other'
        END as phase
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND (s.name GLOB '*dispatch*'
             OR s.name GLOB '*onClick*'
             OR s.name GLOB '*onTouch*'
             OR s.name GLOB '*invalidate*'
             OR s.name GLOB '*requestLayout*'
             OR s.name GLOB '*measure*'
             OR s.name GLOB '*layout*'
             OR s.name GLOB '*draw*'
             OR s.name GLOB '*Choreographer*')
      ORDER BY s.ts ASC

  # Step 5: 点击事件处理耗时统计
  - id: click_handler_stats
    name: "点击处理统计"
    sql: |
      SELECT
        s.name as handler,
        COUNT(*) as count,
        AVG(s.dur) / 1e6 as avg_dur_ms,
        MAX(s.dur) / 1e6 as max_dur_ms,
        MIN(s.dur) / 1e6 as min_dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND (s.name GLOB '*onClick*'
             OR s.name GLOB '*OnClickListener*'
             OR s.name GLOB '*performClick*')
      GROUP BY s.name
      ORDER BY avg_dur_ms DESC

  # Step 6: 点击期间的耗时操作
  - id: slow_operations_during_click
    name: "点击期间耗时操作"
    sql: |
      SELECT
        s.name as operation,
        s.dur / 1e6 as dur_ms,
        s.ts / 1e6 as ts_ms,
        CASE
          WHEN s.name GLOB '*inflate*' THEN 'layout'
          WHEN s.name GLOB '*database*' OR s.name GLOB '*SQL*' OR s.name GLOB '*query*' THEN 'database'
          WHEN s.name GLOB '*network*' OR s.name GLOB '*http*' OR s.name GLOB '*Request*' THEN 'network'
          WHEN s.name GLOB '*file*' OR s.name GLOB '*IO*' OR s.name GLOB '*read*' OR s.name GLOB '*write*' THEN 'file_io'
          WHEN s.name GLOB '*Binder*' OR s.name GLOB '*IPC*' THEN 'binder'
          WHEN s.name GLOB '*GC*' OR s.name GLOB '*gc*' THEN 'gc'
          WHEN s.name GLOB '*JSON*' OR s.name GLOB '*parse*' THEN 'parsing'
          WHEN s.name GLOB '*Glide*' OR s.name GLOB '*Picasso*' OR s.name GLOB '*image*' THEN 'image'
          ELSE 'other'
        END as operation_type
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND s.dur > 5000000  -- > 5ms
      ORDER BY s.dur DESC
      LIMIT 30

  # Step 7: Input 到 Render 的完整延迟
  - id: input_to_render_latency
    name: "输入到渲染延迟"
    description: "计算从输入事件到帧渲染完成的延迟"
    sql: |
      WITH input_events AS (
        SELECT ts, dur, name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid  -- Main thread: tid == pid
          AND s.name GLOB '*dispatchTouchEvent*'
      ),
      next_frames AS (
        SELECT ts, dur, name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid  -- Main thread: tid == pid
          AND s.name GLOB '*Choreographer#doFrame*'
      )
      SELECT
        ie.ts / 1e6 as input_ts_ms,
        (SELECT MIN(nf.ts) FROM next_frames nf WHERE nf.ts > ie.ts) / 1e6 as next_frame_ts_ms,
        ((SELECT MIN(nf.ts) FROM next_frames nf WHERE nf.ts > ie.ts) - ie.ts) / 1e6 as latency_ms
      FROM input_events ie
      WHERE latency_ms IS NOT NULL
        AND latency_ms < 1000  -- 过滤异常值
      ORDER BY ie.ts ASC
    optional: true

  # Step 8: 主线程状态在输入处理期间
  - id: main_thread_state_during_input
    name: "输入处理期间主线程状态"
    sql: |
      SELECT
        ts.state,
        SUM(ts.dur) / 1e6 as total_dur_ms,
        COUNT(*) as count,
        AVG(ts.dur) / 1e6 as avg_dur_ms
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
      GROUP BY ts.state
      ORDER BY total_dur_ms DESC
    optional: true

  # Step 9: Handler 消息处理
  - id: handler_messages
    name: "Handler 消息分析"
    sql: |
      SELECT
        s.name as message,
        s.dur / 1e6 as dur_ms,
        s.ts / 1e6 as ts_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND (s.name GLOB '*Handler*'
             OR s.name GLOB '*Message*'
             OR s.name GLOB '*Looper*')
        AND s.dur > 5000000  -- > 5ms
      ORDER BY s.dur DESC
      LIMIT 20
    optional: true

# -----------------------------------------------------------------------------
# 判断标准
# -----------------------------------------------------------------------------
thresholds:
  # 点击响应时间 (点击到首帧)
  click_to_frame:
    unit: ms
    description: "从点击到首帧显示的时间"
    levels:
      excellent: { max: 50 }      # < 50ms 即时响应
      good: { min: 50, max: 100 } # 50-100ms 快速响应
      warning: { min: 100, max: 200 }
      critical: { min: 200 }      # > 200ms 明显延迟

  # onClick 处理时间
  onclick_duration:
    unit: ms
    description: "onClick 回调执行时间"
    levels:
      excellent: { max: 5 }
      good: { min: 5, max: 16 }
      warning: { min: 16, max: 50 }
      critical: { min: 50 }
    suggestions:
      warning: "onClick 处理超过 16ms，可能导致丢帧"
      critical: "onClick 处理过慢，需要将耗时操作移到后台"

  # 输入分发延迟
  dispatch_latency:
    unit: ms
    description: "dispatchTouchEvent 耗时"
    levels:
      excellent: { max: 2 }
      good: { min: 2, max: 5 }
      warning: { min: 5, max: 10 }
      critical: { min: 10 }

# -----------------------------------------------------------------------------
# 输出格式
# -----------------------------------------------------------------------------
output:
  title: "点击响应分析报告"

  sections:
    - id: input_overview
      title: "输入事件概览"
      type: summary
      from: touch_dispatch
      fields:
        - { key: total_events, label: "触摸事件数" }
        - { key: avg_dur_ms, label: "平均处理时间", unit: "ms" }
        - { key: max_dur_ms, label: "最大处理时间", unit: "ms" }

    - id: click_handlers
      title: "点击处理函数"
      type: table
      from: click_handler_stats
      fields:
        - { key: handler, label: "处理函数" }
        - { key: count, label: "调用次数" }
        - { key: avg_dur_ms, label: "平均耗时", unit: "ms" }
        - { key: max_dur_ms, label: "最大耗时", unit: "ms" }

    - id: slow_ops
      title: "点击期间耗时操作"
      type: grouped_table
      from: slow_operations_during_click
      group_by: operation_type
      fields:
        - { key: operation_type, label: "类型" }
        - { key: operation, label: "操作" }
        - { key: dur_ms, label: "耗时", unit: "ms" }

    - id: response_chain
      title: "响应链路"
      type: timeline
      from: click_to_response_chain
      fields:
        - { key: phase, label: "阶段" }
        - { key: operation, label: "操作" }
        - { key: dur_ms, label: "耗时", unit: "ms" }

    - id: input_latency
      title: "输入到渲染延迟"
      type: table
      from: input_to_render_latency
      show_when: "input_to_render_latency.count > 0"
      fields:
        - { key: latency_ms, label: "延迟", unit: "ms" }

# -----------------------------------------------------------------------------
# 诊断规则
# -----------------------------------------------------------------------------
diagnostics:
  - id: slow_onclick
    condition: "click_handler_stats.any.avg_dur_ms > 50"
    severity: warning
    message: "onClick 处理平均耗时 ${avg_dur_ms}ms，影响响应速度"
    suggestions:
      - "将耗时操作移到协程/后台线程"
      - "使用 debounce 防止重复点击"
      - "优化业务逻辑复杂度"

  - id: io_during_click
    condition: "slow_operations_during_click.database.count > 0 OR slow_operations_during_click.file_io.count > 0"
    severity: critical
    message: "点击期间检测到 IO 操作，严重影响响应速度"
    suggestions:
      - "绝对不要在主线程进行 IO 操作"
      - "使用 Room 的异步查询"
      - "使用 Kotlin 协程处理 IO"

  - id: network_during_click
    condition: "slow_operations_during_click.network.count > 0"
    severity: critical
    message: "点击期间检测到网络请求"
    suggestions:
      - "使用异步网络请求"
      - "点击后立即显示加载状态"

  - id: high_input_latency
    condition: "input_to_render_latency.avg.latency_ms > 100"
    severity: warning
    message: "输入到渲染平均延迟 ${latency_ms}ms"
    suggestions:
      - "检查主线程是否有阻塞操作"
      - "优化 View 层级"
      - "减少 invalidate 调用频率"

  - id: slow_dispatch
    condition: "touch_dispatch.any.dur_ms > 10"
    severity: info
    message: "事件分发耗时 ${dur_ms}ms"
    suggestions:
      - "检查 View 层级是否过深"
      - "优化 onInterceptTouchEvent 逻辑"

# -----------------------------------------------------------------------------
# 参考资料
# -----------------------------------------------------------------------------
references:
  - title: "Android Input Events"
    url: "https://developer.android.com/training/gestures"
  - title: "Input Latency Optimization"
    url: "https://developer.android.com/topic/performance/vitals/responsiveness"
  - title: "Touch Event Handling"
    url: "https://developer.android.com/training/gestures/viewgroup"
