# =============================================================================
# Binder 分析 Skill (Binder IPC Analysis)
# =============================================================================
# 版本: 1.0.0
# 作者: SmartPerfetto Team
# 最后更新: 2024-12
#
# 本 Skill 用于分析 Binder IPC 调用，包括：
# - Binder 事务延迟
# - 跨进程调用分析
# - 服务调用统计
# - 阻塞调用检测
# =============================================================================

name: binder_analysis
version: "1.0.0"
type: performance
category: ipc
priority: high

# -----------------------------------------------------------------------------
# 元信息
# -----------------------------------------------------------------------------
meta:
  display_name: "Binder 分析"
  description: "分析 Binder IPC 调用延迟和跨进程通信性能"
  icon: "exchange"
  tags:
    - binder
    - ipc
    - aidl
    - service
    - transaction

# -----------------------------------------------------------------------------
# 触发条件
# -----------------------------------------------------------------------------
triggers:
  keywords:
    zh:
      - Binder
      - IPC
      - 跨进程
      - 服务调用
      - AIDL
      - 进程通信
    en:
      - binder
      - ipc
      - cross process
      - service call
      - aidl
      - transaction

  patterns:
    - ".*[Bb]inder.*"
    - ".*IPC.*"
    - ".*跨进程.*"

# -----------------------------------------------------------------------------
# 前置检查
# -----------------------------------------------------------------------------
prerequisites:
  required_tables:
    - slice
    - thread
    - process

  optional_tables:
    - android_binder_txns

  modules:
    - android.binder

# -----------------------------------------------------------------------------
# 分析步骤
# -----------------------------------------------------------------------------
steps:
  # Step 1: 检查 Binder 表是否存在
  - id: check_binder_table
    name: "检查 Binder 数据"
    sql: |
      SELECT COUNT(*) as cnt
      FROM sqlite_master
      WHERE type='table' AND name='android_binder_txns'
    save_as: binder_table_check

  # Step 2: Binder 事务概览
  - id: binder_overview
    name: "Binder 事务概览"
    description: "统计 Binder 事务的总体情况"
    sql: |
      SELECT
        COUNT(*) as total_txns,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_txns,
        SUM(CASE WHEN is_sync = 0 THEN 1 ELSE 0 END) as async_txns,
        AVG(client_dur) / 1e6 as avg_dur_ms,
        MAX(client_dur) / 1e6 as max_dur_ms
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
         OR server_process GLOB '${package}*'
    optional: true
    save_as: binder_overview

  # Step 3: 目标应用发起的 Binder 调用
  - id: outgoing_calls
    name: "发出的 Binder 调用"
    description: "应用作为客户端发起的调用"
    sql: |
      SELECT
        server_process,
        aidl_name,
        COUNT(*) as call_count,
        SUM(client_dur) / 1e6 as total_dur_ms,
        AVG(client_dur) / 1e6 as avg_dur_ms,
        MAX(client_dur) / 1e6 as max_dur_ms,
        is_sync
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
      GROUP BY server_process, aidl_name, is_sync
      ORDER BY total_dur_ms DESC
    optional: true
    save_as: outgoing_calls

  # Step 4: 接收的 Binder 调用
  - id: incoming_calls
    name: "接收的 Binder 调用"
    description: "应用作为服务端接收的调用"
    sql: |
      SELECT
        client_process,
        aidl_name,
        COUNT(*) as call_count,
        SUM(server_dur) / 1e6 as total_dur_ms,
        AVG(server_dur) / 1e6 as avg_dur_ms,
        MAX(server_dur) / 1e6 as max_dur_ms
      FROM android_binder_txns
      WHERE server_process GLOB '${package}*'
      GROUP BY client_process, aidl_name
      ORDER BY total_dur_ms DESC
    optional: true
    save_as: incoming_calls

  # Step 5: 慢 Binder 调用
  - id: slow_binder_calls
    name: "慢 Binder 调用"
    description: "耗时超过 10ms 的 Binder 调用"
    sql: |
      SELECT
        client_ts / 1e6 as ts_ms,
        client_dur / 1e6 as dur_ms,
        client_process,
        server_process,
        aidl_name,
        is_sync,
        client_tid,
        server_tid
      FROM android_binder_txns
      WHERE (client_process GLOB '${package}*'
             OR server_process GLOB '${package}*')
        AND client_dur > 10000000  -- > 10ms
      ORDER BY client_dur DESC
      LIMIT 50
    optional: true
    save_as: slow_binder_calls

  # Step 6: Binder 线程使用
  - id: binder_threads
    name: "Binder 线程"
    description: "分析 Binder 线程池使用情况"
    sql: |
      SELECT
        t.name as thread_name,
        COUNT(*) as txn_count,
        SUM(s.dur) / 1e6 as total_dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.name GLOB '*Binder*'
      GROUP BY t.name
      ORDER BY total_dur_ms DESC
    save_as: binder_threads

  # Step 7: 主线程 Binder 调用
  - id: main_thread_binder
    name: "主线程 Binder 调用"
    description: "检测主线程上的同步 Binder 调用"
    sql: |
      SELECT
        client_ts / 1e6 as ts_ms,
        client_dur / 1e6 as dur_ms,
        server_process,
        aidl_name
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
        AND is_sync = 1
        AND client_thread_name = 'main'
      ORDER BY client_dur DESC
    optional: true
    save_as: main_thread_binder

  # Step 8: 服务调用热点
  - id: service_hotspots
    name: "服务调用热点"
    description: "调用最频繁的服务"
    sql: |
      SELECT
        server_process,
        COUNT(*) as call_count,
        SUM(client_dur) / 1e6 as total_dur_ms,
        AVG(client_dur) / 1e6 as avg_dur_ms
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
      GROUP BY server_process
      ORDER BY call_count DESC
      LIMIT 20
    optional: true
    save_as: service_hotspots

# -----------------------------------------------------------------------------
# 判断标准
# -----------------------------------------------------------------------------
thresholds:
  binder_latency:
    unit: ms
    description: "Binder 调用延迟"
    levels:
      excellent: { max: 5 }
      good: { min: 5, max: 16 }
      warning: { min: 16, max: 50 }
      critical: { min: 50 }
    suggestions:
      warning: "Binder 调用延迟较高"
      critical: "Binder 调用严重阻塞"

  main_thread_binder_count:
    unit: count
    description: "主线程 Binder 调用次数"
    levels:
      excellent: { max: 10 }
      good: { min: 10, max: 50 }
      warning: { min: 50, max: 100 }
      critical: { min: 100 }

# -----------------------------------------------------------------------------
# 输出格式
# -----------------------------------------------------------------------------
output:
  title: "Binder IPC 分析报告"

  sections:
    - id: overview
      title: "Binder 概览"
      type: summary
      from: binder_overview
      fields:
        - { key: total_txns, label: "总事务数" }
        - { key: sync_txns, label: "同步调用" }
        - { key: async_txns, label: "异步调用" }
        - { key: avg_dur_ms, label: "平均延迟", unit: "ms" }

    - id: outgoing
      title: "发出的调用"
      type: table
      from: outgoing_calls
      limit: 20
      fields:
        - { key: server_process, label: "目标服务" }
        - { key: aidl_name, label: "接口" }
        - { key: call_count, label: "次数" }
        - { key: avg_dur_ms, label: "平均延迟", unit: "ms" }

    - id: slow_calls
      title: "慢调用列表"
      type: table
      from: slow_binder_calls
      fields:
        - { key: ts_ms, label: "时间", unit: "ms" }
        - { key: dur_ms, label: "耗时", unit: "ms" }
        - { key: server_process, label: "目标" }
        - { key: aidl_name, label: "接口" }

    - id: main_thread
      title: "主线程 Binder"
      type: table
      from: main_thread_binder
      fields:
        - { key: dur_ms, label: "耗时", unit: "ms" }
        - { key: server_process, label: "目标" }
        - { key: aidl_name, label: "接口" }

# -----------------------------------------------------------------------------
# 诊断规则
# -----------------------------------------------------------------------------
diagnostics:
  - id: slow_binder
    condition: "slow_binder_calls.any.dur_ms > 50"
    severity: warning
    message: "检测到慢 Binder 调用: ${aidl_name} (${dur_ms}ms)"
    suggestions:
      - "检查目标服务是否响应缓慢"
      - "考虑使用异步调用"
      - "优化服务端处理逻辑"

  - id: main_thread_sync_binder
    condition: "main_thread_binder.count > 20"
    severity: warning
    message: "主线程发起 ${count} 次同步 Binder 调用"
    suggestions:
      - "将 Binder 调用移到后台线程"
      - "使用异步 Binder 接口"
      - "批量合并多次调用"

  - id: binder_contention
    condition: "binder_threads.any.total_dur_ms > 1000"
    severity: info
    message: "Binder 线程 ${thread_name} 累计耗时 ${total_dur_ms}ms"
    suggestions:
      - "检查 Binder 线程池大小"
      - "考虑增加线程数"

# -----------------------------------------------------------------------------
# 参考资料
# -----------------------------------------------------------------------------
references:
  - title: "Android Binder"
    url: "https://developer.android.com/reference/android/os/Binder"
  - title: "Perfetto Binder Analysis"
    url: "https://perfetto.dev/docs/analysis/android-binder"
