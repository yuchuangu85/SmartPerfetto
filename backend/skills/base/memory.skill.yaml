# =============================================================================
# 内存分析 Skill (Memory Analysis)
# =============================================================================
# 版本: 1.0.0
# 作者: SmartPerfetto Team
# 最后更新: 2024-12
#
# 本 Skill 用于分析应用内存使用情况，包括：
# - 堆内存使用
# - 内存分配与释放
# - GC 事件分析
# - 内存泄漏检测
# =============================================================================

name: memory_analysis
version: "1.0.0"
type: performance
category: memory
priority: high

# -----------------------------------------------------------------------------
# 元信息
# -----------------------------------------------------------------------------
meta:
  display_name: "内存分析"
  description: "分析应用内存使用、GC 行为和潜在内存问题"
  icon: "memory"
  tags:
    - memory
    - heap
    - gc
    - oom
    - leak

# -----------------------------------------------------------------------------
# 触发条件
# -----------------------------------------------------------------------------
triggers:
  keywords:
    zh:
      - 内存
      - 堆内存
      - 内存泄漏
      - OOM
      - GC
      - 内存占用
      - 内存溢出
    en:
      - memory
      - heap
      - oom
      - gc
      - memory leak
      - allocation
      - rss

  patterns:
    - ".*内存.*"
    - ".*memory.*"
    - ".*heap.*"
    - ".*GC.*"

# -----------------------------------------------------------------------------
# 前置检查
# -----------------------------------------------------------------------------
prerequisites:
  required_tables:
    - slice
    - thread
    - process

  optional_tables:
    - heap_profile_allocation
    - heap_profile_summary
    - memory_counter
    - android_oom_events

# -----------------------------------------------------------------------------
# 分析步骤
# -----------------------------------------------------------------------------
steps:
  # Step 1: 获取进程信息
  - id: get_process
    name: "获取目标进程"
    sql: |
      SELECT
        upid,
        pid,
        name as process_name
      FROM process
      WHERE name GLOB '${package}*'
      LIMIT 1
    required: true
    save_as: target_process
    on_empty: "未找到目标进程"

  # Step 2: 内存计数器分析
  - id: memory_counters
    name: "内存计数器"
    description: "分析 RSS、堆大小等内存指标"
    sql: |
      SELECT
        c.ts / 1e6 as ts_ms,
        t.name as counter_name,
        c.value,
        c.value / 1024 / 1024 as value_mb
      FROM counter c
      JOIN counter_track t ON c.track_id = t.id
      JOIN process_counter_track pct ON t.id = pct.id
      JOIN process p ON pct.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (t.name LIKE '%rss%'
             OR t.name LIKE '%heap%'
             OR t.name LIKE '%mem%')
      ORDER BY c.ts ASC
    optional: true
    save_as: memory_counters

  # Step 3: GC 事件分析
  - id: gc_events
    name: "GC 事件"
    description: "分析垃圾回收事件"
    sql: |
      SELECT
        s.name as gc_type,
        s.ts / 1e6 as ts_ms,
        s.dur / 1e6 as dur_ms,
        s.depth
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*GC*'
             OR s.name GLOB '*gc*'
             OR s.name GLOB '*Heap*trim*'
             OR s.name GLOB '*ConcurrentCopying*'
             OR s.name GLOB '*MarkSweep*')
      ORDER BY s.ts ASC
    save_as: gc_events

  # Step 4: GC 统计
  - id: gc_stats
    name: "GC 统计"
    sql: |
      SELECT
        CASE
          WHEN name GLOB '*ConcurrentCopying*' THEN 'ConcurrentCopying'
          WHEN name GLOB '*MarkSweep*' THEN 'MarkSweep'
          WHEN name GLOB '*Explicit*' THEN 'Explicit'
          WHEN name GLOB '*Alloc*' THEN 'Alloc'
          ELSE 'Other'
        END as gc_type,
        COUNT(*) as count,
        SUM(dur) / 1e6 as total_dur_ms,
        AVG(dur) / 1e6 as avg_dur_ms,
        MAX(dur) / 1e6 as max_dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND s.name GLOB '*GC*'
      GROUP BY gc_type
      ORDER BY total_dur_ms DESC
    save_as: gc_stats

  # Step 5: 内存分配热点
  - id: allocation_hotspots
    name: "内存分配热点"
    description: "分析内存分配最频繁的位置"
    sql: |
      SELECT
        s.name as allocation_site,
        COUNT(*) as alloc_count,
        SUM(s.dur) / 1e6 as total_dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*alloc*'
             OR s.name GLOB '*Alloc*'
             OR s.name GLOB '*new*')
      GROUP BY s.name
      ORDER BY alloc_count DESC
      LIMIT 20
    optional: true
    save_as: allocation_hotspots

  # Step 6: 大对象分配
  - id: large_allocations
    name: "大对象分配"
    description: "检测大对象分配事件"
    sql: |
      SELECT
        s.name as event,
        s.ts / 1e6 as ts_ms,
        s.dur / 1e6 as dur_ms,
        t.name as thread_name
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*LargeObject*'
             OR s.name GLOB '*large*alloc*')
      ORDER BY s.ts ASC
    optional: true
    save_as: large_allocations

  # Step 7: 主线程内存操作
  - id: main_thread_memory
    name: "主线程内存操作"
    description: "检测主线程上的内存操作（可能导致卡顿）"
    sql: |
      SELECT
        s.name as operation,
        s.ts / 1e6 as ts_ms,
        s.dur / 1e6 as dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND (s.name GLOB '*GC*'
             OR s.name GLOB '*alloc*'
             OR s.name GLOB '*trim*')
        AND s.dur > 1000000  -- > 1ms
      ORDER BY s.dur DESC
      LIMIT 20
    save_as: main_thread_memory

# -----------------------------------------------------------------------------
# 判断标准
# -----------------------------------------------------------------------------
thresholds:
  gc_total_time:
    unit: ms
    description: "GC 总耗时"
    levels:
      excellent: { max: 100 }
      good: { min: 100, max: 500 }
      warning: { min: 500, max: 2000 }
      critical: { min: 2000 }
    suggestions:
      warning: "GC 耗时较多，建议检查内存分配模式"
      critical: "GC 耗时过多，可能存在内存问题"

  gc_count:
    unit: count
    description: "GC 次数"
    levels:
      excellent: { max: 10 }
      good: { min: 10, max: 50 }
      warning: { min: 50, max: 200 }
      critical: { min: 200 }

  main_thread_gc:
    unit: count
    description: "主线程 GC 次数"
    levels:
      excellent: { max: 0 }
      good: { min: 0, max: 5 }
      warning: { min: 5, max: 20 }
      critical: { min: 20 }

# -----------------------------------------------------------------------------
# 输出格式
# -----------------------------------------------------------------------------
output:
  title: "内存分析报告"

  sections:
    - id: overview
      title: "内存概览"
      type: summary
      from: gc_stats
      fields:
        - { key: gc_count, label: "GC 次数" }
        - { key: total_dur_ms, label: "GC 总耗时", unit: "ms" }

    - id: gc_breakdown
      title: "GC 类型分布"
      type: table
      from: gc_stats
      fields:
        - { key: gc_type, label: "GC 类型" }
        - { key: count, label: "次数" }
        - { key: avg_dur_ms, label: "平均耗时", unit: "ms" }
        - { key: max_dur_ms, label: "最大耗时", unit: "ms" }

    - id: gc_timeline
      title: "GC 时间线"
      type: timeline
      from: gc_events
      limit: 50
      fields:
        - { key: ts_ms, label: "时间", unit: "ms" }
        - { key: gc_type, label: "类型" }
        - { key: dur_ms, label: "耗时", unit: "ms" }

    - id: main_thread_ops
      title: "主线程内存操作"
      type: table
      from: main_thread_memory
      fields:
        - { key: operation, label: "操作" }
        - { key: dur_ms, label: "耗时", unit: "ms" }

# -----------------------------------------------------------------------------
# 诊断规则
# -----------------------------------------------------------------------------
diagnostics:
  - id: high_gc_frequency
    condition: "gc_stats.sum.count > 100"
    severity: warning
    message: "GC 频率过高 (${count} 次)，可能存在内存抖动"
    suggestions:
      - "检查是否有频繁的对象创建和销毁"
      - "使用对象池重用对象"
      - "避免在循环中创建对象"

  - id: long_gc_pause
    condition: "gc_stats.any.max_dur_ms > 50"
    severity: warning
    message: "单次 GC 暂停时间过长 (${max_dur_ms}ms)"
    suggestions:
      - "检查大对象分配"
      - "考虑调整堆大小"

  - id: main_thread_gc
    condition: "main_thread_memory.count > 5"
    severity: critical
    message: "主线程发生 ${count} 次内存操作，可能导致卡顿"
    suggestions:
      - "将内存密集型操作移到后台线程"
      - "避免在 UI 线程分配大量内存"

# -----------------------------------------------------------------------------
# 参考资料
# -----------------------------------------------------------------------------
references:
  - title: "Android Memory Management"
    url: "https://developer.android.com/topic/performance/memory"
  - title: "Perfetto Memory Analysis"
    url: "https://perfetto.dev/docs/analysis/memory"
