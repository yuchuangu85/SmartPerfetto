# =============================================================================
# 启动分析 Skill (Startup Analysis)
# =============================================================================
# 版本: 1.0.0
# 作者: SmartPerfetto Team
# 最后更新: 2024-12
#
# 本 Skill 用于分析 Android 应用启动性能，包括：
# - 启动总耗时
# - 关键阶段分解
# - CPU 资源使用
# - 主线程阻塞分析
# =============================================================================

name: startup_analysis
version: "1.0.0"
type: performance
category: app_lifecycle
priority: high
sop_doc: startup.sop.md

# -----------------------------------------------------------------------------
# 元信息
# -----------------------------------------------------------------------------
meta:
  display_name: "应用启动分析"
  description: "分析应用冷启动、温启动、热启动的性能"
  icon: "rocket"
  tags:
    - startup
    - launch
    - cold_start
    - warm_start
    - hot_start

# -----------------------------------------------------------------------------
# 触发条件
# -----------------------------------------------------------------------------
triggers:
  keywords:
    zh:
      - 启动
      - 冷启动
      - 热启动
      - 温启动
      - 启动时间
      - 启动速度
      - 启动优化
      - 应用启动
    en:
      - startup
      - launch
      - cold start
      - warm start
      - hot start
      - app launch
      - launch time

  patterns:
    - ".*启动.*时间.*"
    - ".*启动.*慢.*"
    - ".*启动.*优化.*"
    - ".*launch.*"
    - ".*start.*time.*"

# -----------------------------------------------------------------------------
# 前置检查
# -----------------------------------------------------------------------------
prerequisites:
  # 必须有的表
  required_tables:
    - android_startups
    - slice
    - thread
    - process

  # 可选的表（增强分析）
  optional_tables:
    - android_binder_txns
    - sched_slice
    - thread_state
    - cpu_counter_track

  # 需要加载的模块
  modules:
    - android.startup.startups
    - android.binder

# -----------------------------------------------------------------------------
# 分析步骤
# -----------------------------------------------------------------------------
steps:
  # Step 1: 获取所有启动事件
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，避免 JavaScript 大整数精度丢失
  - id: get_startups
    name: "获取启动事件"
    description: "从 android_startups 表获取所有匹配的启动事件"
    sql: |
      SELECT
        startup_id,
        dur / 1e6 as dur_ms,
        package,
        startup_type,
        printf('%d', ts) as ts_str,
        printf('%d', dur) as dur_str
      FROM android_startups
      WHERE package GLOB '${package}*'
      ORDER BY ts ASC
    required: true
    save_as: startups
    on_empty: "未找到该应用的启动事件。请确认包名正确且 Trace 包含启动数据。"

  # Step 2: 获取主线程 ID
  # 注意: Android 主线程的 tid == pid，名称通常是包名的最后部分（如 .androidappdemo）
  - id: get_main_thread
    name: "获取主线程"
    for_each: startups
    sql: |
      SELECT t.utid, t.tid, p.upid, p.pid
      FROM thread t
      JOIN process p ON t.upid = p.upid
      WHERE t.tid = p.pid
        AND p.name GLOB '${item.package}*'
      LIMIT 1
    save_as: main_thread

  # Step 3: 关键启动阶段分析
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，供前端构建 Perfetto UI 跳转链接
  - id: startup_phases
    name: "关键启动阶段"
    description: "分析 bindApplication, onCreate, onResume 等关键阶段"
    for_each: startups
    sql: |
      SELECT
        s.name as phase_name,
        s.dur / 1e6 as dur_ms,
        (s.ts - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_start_ms,
        ((s.ts + s.dur) - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_end_ms,
        s.depth,
        printf('%d', s.ts) as ts_str,
        printf('%d', s.dur) as dur_str
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${item.package}*'
        AND t.tid = p.pid  -- Main thread: tid == pid
        AND s.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND s.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
        AND (
          s.name GLOB '*bindApplication*'
          OR s.name GLOB '*activityStart*'
          OR s.name GLOB '*performCreate*'
          OR s.name GLOB '*onCreate*'
          OR s.name GLOB '*performResume*'
          OR s.name GLOB '*onResume*'
          OR s.name GLOB '*Choreographer#doFrame*'
          OR s.name GLOB '*reportFullyDrawn*'
          OR s.name GLOB '*contentProviderCreate*'
          OR s.name GLOB '*Application.onCreate*'
        )
      ORDER BY s.ts ASC

  # Step 4: Top Slices 分析
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，供前端构建 Perfetto UI 跳转链接
  - id: top_slices
    name: "耗时最长的操作"
    for_each: startups
    sql: |
      SELECT
        s.name as slice_name,
        s.dur / 1e6 as dur_ms,
        (s.ts - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_ts_ms,
        t.name as thread_name,
        s.depth,
        printf('%d', s.ts) as ts_str,
        printf('%d', s.dur) as dur_str
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE s.dur > 0
        AND p.name GLOB '${item.package}*'
        AND s.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND s.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
      ORDER BY s.dur DESC
      LIMIT 50

  # Step 5: 主线程状态分布
  # NOTE: 使用子查询获取 ts/dur，避免 JavaScript 大整数精度丢失问题
  - id: thread_state_distribution
    name: "主线程状态分布"
    description: "分析主线程在 Running/Runnable/Sleeping 等状态的时间分布"
    for_each: startups
    requires: [get_main_thread]
    sql: |
      SELECT
        ts.state,
        CASE ts.state
          WHEN 'Running' THEN 'Running (执行中)'
          WHEN 'R' THEN 'Runnable (可运行)'
          WHEN 'R+' THEN 'Runnable (抢占)'
          WHEN 'S' THEN 'Sleeping (睡眠)'
          WHEN 'D' THEN 'Disk Sleep (磁盘等待)'
          WHEN 'I' THEN 'Idle (空闲)'
          ELSE ts.state
        END as state_desc,
        SUM(ts.dur) / 1e6 as total_dur_ms,
        COUNT(*) as count,
        (SUM(ts.dur) * 100.0) / (SELECT dur FROM android_startups WHERE startup_id = ${item.startup_id}) as percent
      FROM thread_state ts
      WHERE ts.utid = ${main_thread.utid}
        AND ts.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND ts.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
      GROUP BY ts.state
      ORDER BY total_dur_ms DESC

  # Step 6: CPU 大小核分布
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  - id: cpu_core_distribution
    name: "CPU 大小核分布"
    description: "分析主线程在大核/小核上的运行时间分布"
    for_each: startups
    requires: [get_main_thread]
    sql: |
      SELECT
        sched.cpu,
        CASE
          WHEN sched.cpu IN (0, 1, 2, 3) THEN 'little'
          WHEN sched.cpu IN (4, 5, 6, 7) THEN 'big'
          ELSE 'unknown'
        END as core_type,
        SUM(sched.dur) / 1e6 as total_dur_ms,
        COUNT(*) as slice_count,
        AVG(sched.dur) / 1e6 as avg_dur_ms
      FROM sched_slice sched
      WHERE sched.utid = ${main_thread.utid}
        AND sched.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND sched.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
        AND sched.dur > 0
      GROUP BY sched.cpu
      ORDER BY total_dur_ms DESC

  # Step 7: CPU 频率
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  - id: cpu_frequency
    name: "CPU 频率信息"
    for_each: startups
    sql: |
      SELECT
        cpu,
        CAST(AVG(value) AS INTEGER) / 1000 as avg_freq_mhz,
        CAST(MAX(value) AS INTEGER) / 1000 as max_freq_mhz,
        CAST(MIN(value) AS INTEGER) / 1000 as min_freq_mhz
      FROM counter c
      JOIN cpu_counter_track cct ON c.track_id = cct.id
      WHERE cct.name = 'cpufreq'
        AND c.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND c.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
      GROUP BY cpu
      ORDER BY cpu

  # Step 8: 主线程阻塞分析
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，供前端构建 Perfetto UI 跳转链接
  - id: thread_blocking
    name: "主线程阻塞分析"
    description: "分析主线程被阻塞的原因（Binder, Lock, IO等）"
    for_each: startups
    requires: [get_main_thread]
    sql: |
      SELECT
        ts.state,
        ts.blocked_function,
        ts.dur / 1e6 as dur_ms,
        (ts.ts - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_ts_ms,
        CASE
          WHEN ts.blocked_function GLOB '*binder*' THEN 'binder'
          WHEN ts.blocked_function GLOB '*futex*' OR ts.blocked_function GLOB '*mutex*' THEN 'lock_contention'
          WHEN ts.blocked_function GLOB '*epoll*' OR ts.blocked_function GLOB '*poll*' THEN 'io_wait'
          WHEN ts.blocked_function GLOB '*sleep*' THEN 'sleep'
          WHEN ts.blocked_function GLOB '*SurfaceFlinger*' OR ts.blocked_function GLOB '*dequeue*' THEN 'surfaceflinger'
          WHEN ts.blocked_function GLOB '*GC*' OR ts.blocked_function GLOB '*art::gc*' THEN 'gc'
          ELSE 'other'
        END as block_type,
        printf('%d', ts.ts) as ts_str,
        printf('%d', ts.dur) as dur_str
      FROM thread_state ts
      WHERE ts.utid = ${main_thread.utid}
        AND ts.state IN ('S', 'D', 'I')
        AND ts.dur > 1000000  -- > 1ms
        AND ts.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND ts.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
      ORDER BY ts.dur DESC
      LIMIT 50

  # Step 9: Binder 调用分析
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，供前端构建 Perfetto UI 跳转链接
  - id: binder_transactions
    name: "Binder 调用分析"
    for_each: startups
    optional: true  # 表可能不存在
    sql: |
      SELECT
        client_process,
        server_process,
        client_dur / 1e6 as client_dur_ms,
        server_dur / 1e6 as server_dur_ms,
        (client_ts - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_ts_ms,
        printf('%d', client_ts) as ts_str,
        printf('%d', client_dur) as dur_str
      FROM android_binder_txns
      WHERE (client_process GLOB '${item.package}*' OR server_process GLOB '${item.package}*')
        AND client_ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND client_ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
        AND client_dur > 1000000  -- > 1ms
      ORDER BY client_dur DESC
      LIMIT 30

  # Step 10: GC 事件
  # NOTE: 使用子查询获取 ts，避免 JavaScript 大整数精度丢失问题
  # NOTE: 使用 printf('%d', ts) 返回时间戳字符串，供前端构建 Perfetto UI 跳转链接
  - id: gc_events
    name: "GC 事件分析"
    for_each: startups
    sql: |
      SELECT
        s.name as gc_type,
        s.dur / 1e6 as dur_ms,
        (s.ts - (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})) / 1e6 as relative_ts_ms,
        printf('%d', s.ts) as ts_str,
        printf('%d', s.dur) as dur_str
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${item.package}*'
        AND (s.name GLOB '*GC*' OR s.name GLOB '*garbage*' OR s.name GLOB '*art::gc*')
        AND s.ts >= (SELECT ts FROM android_startups WHERE startup_id = ${item.startup_id})
        AND s.ts <= (SELECT ts + dur FROM android_startups WHERE startup_id = ${item.startup_id})
      ORDER BY s.dur DESC

# -----------------------------------------------------------------------------
# 判断标准 (Thresholds)
# -----------------------------------------------------------------------------
thresholds:
  # 冷启动时间
  cold_start_time:
    unit: ms
    levels:
      excellent: { max: 500, label: "优秀", color: "green" }
      good: { min: 500, max: 1000, label: "良好", color: "blue" }
      warning: { min: 1000, max: 2000, label: "需优化", color: "yellow" }
      critical: { min: 2000, label: "严重", color: "red" }
    suggestions:
      warning: "建议检查 Application.onCreate 和 ContentProvider 初始化"
      critical: "启动时间过长，需要重点优化主线程阻塞和初始化逻辑"

  # 温启动时间
  warm_start_time:
    unit: ms
    levels:
      excellent: { max: 200 }
      good: { min: 200, max: 500 }
      warning: { min: 500, max: 1000 }
      critical: { min: 1000 }

  # 热启动时间
  hot_start_time:
    unit: ms
    levels:
      excellent: { max: 100 }
      good: { min: 100, max: 200 }
      warning: { min: 200, max: 500 }
      critical: { min: 500 }

  # 大核占比
  big_core_ratio:
    unit: percent
    description: "主线程在大核上运行的时间占比"
    levels:
      excellent: { min: 70 }
      good: { min: 50, max: 70 }
      warning: { min: 30, max: 50 }
      critical: { max: 30 }
    suggestions:
      warning: "大核占比偏低，可能是系统调度问题或功耗策略限制"
      critical: "主线程主要在小核运行，会显著影响启动速度"

  # CPU 利用率
  cpu_utilization:
    unit: percent
    description: "主线程 CPU 利用率"
    levels:
      excellent: { min: 80 }
      good: { min: 60, max: 80 }
      warning: { min: 40, max: 60 }
      critical: { max: 40 }
    suggestions:
      warning: "CPU 利用率偏低，主线程可能存在等待或阻塞"
      critical: "主线程大量时间在等待，需要检查阻塞原因"

  # GC 占比
  gc_ratio:
    unit: percent
    description: "GC 时间占启动总时间的比例"
    levels:
      excellent: { max: 2 }
      good: { min: 2, max: 5 }
      warning: { min: 5, max: 10 }
      critical: { min: 10 }
    suggestions:
      warning: "GC 开销偏高，建议检查启动期间的对象分配"
      critical: "GC 严重影响启动，需要优化内存使用"

# -----------------------------------------------------------------------------
# 输出格式
# -----------------------------------------------------------------------------
output:
  title: "应用启动分析报告"

  sections:
    - id: overview
      title: "启动概览"
      type: summary
      fields:
        - { key: package, label: "应用包名" }
        - { key: startup_type, label: "启动类型" }
        - { key: dur_ms, label: "启动耗时", unit: "ms", evaluate: true }

    - id: phases
      title: "关键启动阶段"
      type: timeline
      from: startup_phases
      fields:
        - { key: phase_name, label: "阶段" }
        - { key: dur_ms, label: "耗时", unit: "ms" }
        - { key: relative_start_ms, label: "开始时间", unit: "ms" }

    - id: top_slices
      title: "耗时最长的操作 (Top 10)"
      type: table
      from: top_slices
      limit: 10
      fields:
        - { key: slice_name, label: "操作" }
        - { key: dur_ms, label: "耗时", unit: "ms" }
        - { key: thread_name, label: "线程" }

    - id: thread_state
      title: "主线程状态分布"
      type: pie_chart
      from: thread_state_distribution
      fields:
        - { key: state_desc, label: "状态" }
        - { key: total_dur_ms, label: "时间", unit: "ms" }
        - { key: percent, label: "占比", unit: "%" }

    - id: cpu_cores
      title: "CPU 大小核分布"
      type: bar_chart
      from: cpu_core_distribution
      evaluate: big_core_ratio
      fields:
        - { key: core_type, label: "核心类型" }
        - { key: total_dur_ms, label: "运行时间", unit: "ms" }

    - id: blocking
      title: "主线程阻塞分析"
      type: grouped_table
      from: thread_blocking
      group_by: block_type
      fields:
        - { key: block_type, label: "阻塞类型" }
        - { key: blocked_function, label: "阻塞函数" }
        - { key: dur_ms, label: "阻塞时间", unit: "ms" }

    - id: binder
      title: "Binder 调用 (耗时最长)"
      type: table
      from: binder_transactions
      limit: 5
      fields:
        - { key: client_process, label: "客户端" }
        - { key: server_process, label: "服务端" }
        - { key: client_dur_ms, label: "耗时", unit: "ms" }

    - id: gc
      title: "GC 事件"
      type: table
      from: gc_events
      evaluate: gc_ratio
      fields:
        - { key: gc_type, label: "GC 类型" }
        - { key: dur_ms, label: "耗时", unit: "ms" }

# -----------------------------------------------------------------------------
# 诊断规则
# -----------------------------------------------------------------------------
diagnostics:
  - id: slow_bind_application
    condition: "startup_phases.bindApplication.dur_ms > 100"
    severity: warning
    message: "bindApplication 耗时 ${dur_ms}ms，超过 100ms 阈值"
    suggestions:
      - "检查 Application.onCreate() 中的初始化逻辑"
      - "考虑使用 App Startup 库延迟初始化"
      - "将耗时操作移到后台线程"

  - id: too_many_binder_calls
    condition: "binder_transactions.count > 20"
    severity: warning
    message: "启动期间有 ${count} 次 Binder 调用"
    suggestions:
      - "减少启动期间的跨进程调用"
      - "合并多次 Binder 调用"
      - "考虑缓存 Binder 调用结果"

  - id: heavy_gc
    condition: "gc_events.total_dur_ms > startup.dur_ms * 0.1"
    severity: critical
    message: "GC 耗时占启动总时间的 ${percent}%"
    suggestions:
      - "减少启动期间的对象分配"
      - "避免创建大量临时对象"
      - "使用对象池复用对象"

  - id: low_cpu_utilization
    condition: "thread_state_distribution.Running.percent < 40"
    severity: warning
    message: "主线程 CPU 利用率仅 ${percent}%，大量时间在等待"
    suggestions:
      - "检查主线程是否在等待 IO 或锁"
      - "将阻塞操作移到后台线程"
      - "检查是否有不必要的 sleep"

# -----------------------------------------------------------------------------
# 相关资源
# -----------------------------------------------------------------------------
references:
  - title: "Android App Startup"
    url: "https://developer.android.com/topic/performance/vitals/launch-time"
  - title: "Perfetto Startup Metrics"
    url: "https://perfetto.dev/docs/analysis/metrics#android-startup"
  - title: "App Startup Library"
    url: "https://developer.android.com/topic/libraries/app-startup"
