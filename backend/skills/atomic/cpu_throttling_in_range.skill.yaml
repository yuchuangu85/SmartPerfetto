# =============================================================================
# CPU 热控限频分析 (Composite Skill)
# =============================================================================
# 分析指定时间范围内是否发生 CPU 热控限频
# 检测因温度过高导致的 CPU 降频
#
# v2.0: 复用 cpu_topology_view 提供的 _cpu_topology 视图
#   - 移除内联拓扑 CTE，改用 JOIN _cpu_topology
#   - 支持 prime/big/medium/little 四级分类
#   - 修复 FIRST_VALUE/LAST_VALUE + GROUP BY 未定义行为
#   - 改用子查询获取区间首尾频率

name: cpu_throttling_in_range
version: "2.0"
type: composite
category: thermal

meta:
  display_name: "CPU 限频检测"
  description: "检测 CPU 热控限频情况（动态拓扑检测）"
  icon: "thermostat"
  tags: [cpu, thermal, throttling, composite]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"

steps:
  # Step 1: 初始化 CPU 拓扑视图（供后续步骤 JOIN）
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  # Step 2: 限频检测（复用 _cpu_topology 视图）
  - id: throttle_detection
    type: atomic
    name: "热控限频检测"
    display:
      level: detail
      layer: deep
      title: "热控限频"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: start_freq_mhz
          label: "起始频率"
          type: number
        - name: end_freq_mhz
          label: "结束频率"
          type: number
        - name: min_freq_mhz
          label: "最低频率"
          type: number
        - name: max_freq_mhz
          label: "最高频率"
          type: number
        - name: freq_drop_pct
          label: "降幅"
          type: percentage
          format: percentage
        - name: throttle_detected
          label: "检测到限频"
          type: boolean
    sql: |
      WITH
      -- 频率采样（带拓扑分类）
      freq_samples AS (
        SELECT
          ct.core_type,
          t.cpu,
          c.ts,
          c.value / 1000.0 as freq_mhz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        JOIN _cpu_topology ct ON t.cpu = ct.cpu_id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts} AND c.ts < ${end_ts}
      ),
      -- 每个 CPU 的频率统计（用子查询获取首尾频率，避免 window + GROUP BY 问题）
      per_cpu_stats AS (
        SELECT
          core_type,
          cpu,
          MIN(freq_mhz) as min_freq,
          MAX(freq_mhz) as max_freq,
          (SELECT fs2.freq_mhz FROM freq_samples fs2
           WHERE fs2.cpu = fs.cpu ORDER BY fs2.ts ASC LIMIT 1) as start_freq,
          (SELECT fs2.freq_mhz FROM freq_samples fs2
           WHERE fs2.cpu = fs.cpu ORDER BY fs2.ts DESC LIMIT 1) as end_freq
        FROM freq_samples fs
        GROUP BY core_type, cpu
      )
      -- 按核心类型聚合
      SELECT
        CASE
          WHEN core_type IN ('prime', 'big') THEN '大核'
          ELSE '小核'
        END as core_type,
        ROUND(AVG(start_freq), 0) as start_freq_mhz,
        ROUND(AVG(end_freq), 0) as end_freq_mhz,
        ROUND(MIN(min_freq), 0) as min_freq_mhz,
        ROUND(MAX(max_freq), 0) as max_freq_mhz,
        ROUND(100.0 * (MAX(max_freq) - MIN(min_freq)) / NULLIF(MAX(max_freq), 0), 1) as freq_drop_pct,
        CASE WHEN MIN(min_freq) < MAX(max_freq) * 0.7 THEN 1 ELSE 0 END as throttle_detected
      FROM per_cpu_stats
      GROUP BY
        CASE
          WHEN core_type IN ('prime', 'big') THEN '大核'
          ELSE '小核'
        END
      ORDER BY core_type DESC
    save_as: throttle_data

output:
  format: structured
