# =============================================================================
# 调度延迟分析 (Atomic Skill)
# =============================================================================
# 分析指定时间范围内线程从 Runnable 到 Running 的等待时间分布
# 用于检测 CPU 资源争抢导致的调度延迟

name: sched_latency_in_range
version: "1.0"
type: atomic
category: kernel

meta:
  display_name: "调度延迟分析"
  description: "分析线程调度等待时间分布，检测 CPU 争抢"
  icon: "schedule"
  tags: [sched, latency, kernel, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB 匹配）"

display:
  level: detail
  layer: deep
  title: "调度延迟"
  columns:
    - name: thread_name
      label: "线程"
      type: string
    - name: runnable_count
      label: "等待次数"
      type: number
    - name: total_runnable_ms
      label: "总等待"
      type: duration
      format: duration_ms
    - name: max_latency_ms
      label: "最大延迟"
      type: duration
      format: duration_ms
    - name: avg_latency_ms
      label: "平均延迟"
      type: duration
      format: duration_ms
    - name: long_wait_count
      label: ">2ms次数"
      type: number

sql: |
  WITH target_threads AS (
    SELECT t.utid, t.name as thread_name, p.pid
    FROM thread t
    JOIN process p ON t.upid = p.upid
    WHERE (p.name GLOB '${package}*' OR '${package}' = '')
      AND (t.tid = p.pid OR t.name = 'RenderThread' OR t.name LIKE '%UI%')
  ),
  runnable_states AS (
    SELECT tt.thread_name, ts.dur
    FROM thread_state ts
    JOIN target_threads tt ON ts.utid = tt.utid
    WHERE ts.ts >= ${start_ts} AND ts.ts < ${end_ts}
      AND ts.state = 'R'  -- Runnable but not running
      AND ts.dur > 10000  -- > 10us to be meaningful
  )
  SELECT
    thread_name,
    COUNT(*) as runnable_count,
    ROUND(SUM(dur) / 1e6, 2) as total_runnable_ms,
    ROUND(MAX(dur) / 1e6, 2) as max_latency_ms,
    ROUND(AVG(dur) / 1e6, 2) as avg_latency_ms,
    SUM(CASE WHEN dur > 2000000 THEN 1 ELSE 0 END) as long_wait_count
  FROM runnable_states
  GROUP BY thread_name
  HAVING total_runnable_ms > 0.1
  ORDER BY total_runnable_ms DESC

output:
  format: structured
