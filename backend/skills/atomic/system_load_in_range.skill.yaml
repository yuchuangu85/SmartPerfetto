# =============================================================================
# 系统负载分析 (Atomic Skill)
# =============================================================================
# 分析指定时间范围内的系统整体负载
# 用于评估系统级别的资源竞争

name: system_load_in_range
version: "1.0"
type: atomic
category: system

meta:
  display_name: "系统负载分析"
  description: "分析系统整体 CPU 利用率和进程活跃度"
  icon: "analytics"
  tags: [system, load, cpu, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"

display:
  level: detail
  layer: deep
  title: "系统负载"
  columns:
    - name: metric
      label: "指标"
      type: string
    - name: value
      label: "值"
      type: string

sql: |
  WITH time_range AS (
    SELECT ${end_ts} - ${start_ts} as duration_ns
  ),
  cpu_stats AS (
    SELECT
      SUM(CASE WHEN state = 'Running' THEN dur ELSE 0 END) as running_ns,
      SUM(dur) as total_ns,
      COUNT(DISTINCT cpu) as cpu_count
    FROM thread_state ts
    JOIN thread t ON ts.utid = t.utid
    WHERE ts.ts >= ${start_ts} AND ts.ts < ${end_ts}
  ),
  process_stats AS (
    SELECT COUNT(DISTINCT p.upid) as active_processes
    FROM thread_state ts
    JOIN thread t ON ts.utid = t.utid
    JOIN process p ON t.upid = p.upid
    WHERE ts.ts >= ${start_ts} AND ts.ts < ${end_ts}
      AND ts.state = 'Running'
  ),
  runnable_stats AS (
    SELECT
      SUM(dur) as total_runnable_ns,
      COUNT(*) as runnable_count
    FROM thread_state
    WHERE ts >= ${start_ts} AND ts < ${end_ts}
      AND state = 'R'
      AND dur > 1000000  -- > 1ms
  )
  SELECT 'CPU 利用率' as metric,
    ROUND(100.0 * running_ns / NULLIF(total_ns, 0), 1) || '%' as value
  FROM cpu_stats
  UNION ALL
  SELECT 'CPU 核心数' as metric,
    CAST(cpu_count AS TEXT) as value
  FROM cpu_stats
  UNION ALL
  SELECT '活跃进程数' as metric,
    CAST(active_processes AS TEXT) as value
  FROM process_stats
  UNION ALL
  SELECT '长等待事件数' as metric,
    CAST(runnable_count AS TEXT) || ' (>' || ROUND(total_runnable_ns / 1e6, 1) || 'ms total)' as value
  FROM runnable_stats
  UNION ALL
  SELECT '分析时长' as metric,
    ROUND((SELECT duration_ns FROM time_range) / 1e6, 2) || 'ms' as value

output:
  format: structured
