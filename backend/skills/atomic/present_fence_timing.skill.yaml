name: present_fence_timing
version: "1.0"
type: atomic
category: rendering

meta:
  display_name: "Present Fence 时序分析"
  description: "分析 Present Fence 的时序，检测实际显示延迟"
  icon: "fence"
  tags: [present, fence, timing, display]

prerequisites:
  required_tables:
    - slice

inputs:
  - name: package
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false

steps:
  - id: present_fence_stats
    type: atomic
    name: "Present Fence 统计"
    display:
      level: summary
      format: table
      columns:
        - name: total_fences
          label: "总 Fence 数"
          type: number
        - name: avg_wait_ms
          label: "平均等待"
          type: duration
          format: duration_ms
        - name: max_wait_ms
          label: "最大等待"
          type: duration
          format: duration_ms
        - name: slow_fences_vsync
          label: "超帧预算"
          type: number
        - name: slow_rate_pct
          label: "超时率"
          type: percentage
        - name: vsync_period_ms
          label: "VSync 周期"
          type: duration
          format: duration_ms
        - name: gpu_status
          label: "GPU 状态"
          type: string
    sql: |
      WITH
      time_bounds AS (
        SELECT
          COALESCE(${start_ts}, MIN(ts)) as start_ts,
          COALESCE(${end_ts}, MAX(ts + dur)) as end_ts
        FROM actual_frame_timeline_slice
      ),
      -- 动态检测 VSync 周期（限定在分析区间内）
      vsync_config AS (
        SELECT COALESCE(
          (SELECT CAST(AVG(dur) AS INTEGER)
           FROM expected_frame_timeline_slice
           WHERE dur > 5000000 AND dur < 20000000
             AND ts >= (SELECT start_ts FROM time_bounds)
             AND ts <= (SELECT end_ts FROM time_bounds)
           LIMIT 1000),
          8333333  -- 默认 120Hz (保守阈值)
        ) as vsync_period_ns
      ),
      fence_data AS (
        SELECT
          s.ts,
          s.dur,
          s.name,
          p.name as process_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (s.name GLOB '*PresentFence*' 
               OR s.name GLOB '*present*fence*'
               OR s.name GLOB '*GPU completion*'
               OR s.name GLOB '*waiting for GPU*'
               OR s.name GLOB '*Waiting for GPU*'
               OR s.name GLOB '*eglSwapBuffers*')
          AND s.ts >= (SELECT start_ts FROM time_bounds)
          AND s.ts <= (SELECT end_ts FROM time_bounds)
      ),
      fence_stats AS (
        SELECT
          COUNT(*) as total_fences,
          AVG(dur) as avg_wait_ns,
          MAX(dur) as max_wait_ns,
          MIN(dur) as min_wait_ns,
          (SELECT vsync_period_ns FROM vsync_config) as vsync_period_ns,
          COUNT(CASE WHEN dur > 1000000 THEN 1 END) as slow_fences_1ms,
          COUNT(CASE WHEN dur > 5000000 THEN 1 END) as slow_fences_5ms,
          -- 使用动态 VSync 周期
          COUNT(CASE WHEN dur > (SELECT vsync_period_ns FROM vsync_config) THEN 1 END) as slow_fences_vsync
        FROM fence_data
      )
      SELECT
        total_fences,
        ROUND(avg_wait_ns / 1e6, 2) as avg_wait_ms,
        ROUND(max_wait_ns / 1e6, 2) as max_wait_ms,
        ROUND(min_wait_ns / 1e6, 2) as min_wait_ms,
        slow_fences_1ms,
        slow_fences_5ms,
        slow_fences_vsync,
        ROUND(100.0 * slow_fences_vsync / NULLIF(total_fences, 0), 2) as slow_rate_pct,
        ROUND(vsync_period_ns / 1e6, 2) as vsync_period_ms,
        CASE
          -- 使用动态阈值：平均等待超过 VSync 周期的 50%
          WHEN avg_wait_ns > vsync_period_ns * 0.5 THEN 'GPU_BOUND'
          WHEN slow_fences_vsync > total_fences * 0.1 THEN 'GPU_OCCASIONAL_SLOW'
          ELSE 'NORMAL'
        END as gpu_status
      FROM fence_stats
    save_as: fence_stats
    optional: true

