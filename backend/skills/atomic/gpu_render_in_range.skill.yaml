# =============================================================================
# GPU 渲染分析 (Atomic Skill)
# =============================================================================
# 分析指定时间范围内 GPU 侧的工作负载
# 检测 GPU 渲染、Fence 等待等是否是性能瓶颈

name: gpu_render_in_range
version: "1.0"
type: atomic
category: gpu

meta:
  display_name: "GPU 渲染分析"
  description: "分析 GPU 渲染耗时和 Fence 等待"
  icon: "memory"
  tags: [gpu, render, fence, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns，可选)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns，可选)"
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB 匹配）"

display:
  level: detail
  layer: deep
  title: "GPU 渲染"
  columns:
    - name: operation
      label: "操作类型"
      type: string
    - name: count
      label: "次数"
      type: number
    - name: total_ms
      label: "总耗时"
      type: duration
      format: duration_ms
    - name: max_ms
      label: "最大耗时"
      type: duration
      format: duration_ms
    - name: avg_ms
      label: "平均耗时"
      type: duration
      format: duration_ms

sql: |
  WITH gpu_slices AS (
    SELECT
      s.name,
      s.dur,
      CASE
        WHEN s.name GLOB '*DrawFrame*' OR s.name GLOB '*doFrame*' THEN 'Draw Frame'
        WHEN s.name GLOB '*fence*signal*' OR s.name GLOB '*Fence*signal*' THEN 'Fence Signal'
        WHEN s.name GLOB '*fence*wait*' OR s.name GLOB '*waitForFence*' THEN 'Fence Wait'
        WHEN s.name GLOB '*eglSwap*' THEN 'EGL SwapBuffers'
        WHEN s.name GLOB '*flush*' OR s.name GLOB '*Flush*' THEN 'GPU Flush'
        WHEN s.name GLOB '*queueBuffer*' THEN 'Queue Buffer'
        WHEN s.name GLOB '*dequeueBuffer*' THEN 'Dequeue Buffer'
        WHEN s.name GLOB '*GPU*' THEN 'GPU Other'
        WHEN s.name GLOB '*RenderThread*' THEN 'RenderThread'
        ELSE NULL
      END as operation
    FROM slice s
    JOIN thread_track tt ON s.track_id = tt.id
    JOIN thread t ON tt.utid = t.utid
    JOIN process p ON t.upid = p.upid
    WHERE (${start_ts} IS NULL OR s.ts >= ${start_ts}) AND (${end_ts} IS NULL OR s.ts < ${end_ts})
      AND (p.name GLOB '${package}*' OR '${package}' = '' OR p.name = 'surfaceflinger')
      AND s.dur > 10000  -- > 10us
  )
  SELECT
    operation,
    COUNT(*) as count,
    ROUND(SUM(dur) / 1e6, 2) as total_ms,
    ROUND(MAX(dur) / 1e6, 2) as max_ms,
    ROUND(AVG(dur) / 1e6, 2) as avg_ms
  FROM gpu_slices
  WHERE operation IS NOT NULL
  GROUP BY operation
  HAVING total_ms > 0.1
  ORDER BY total_ms DESC

output:
  format: structured
