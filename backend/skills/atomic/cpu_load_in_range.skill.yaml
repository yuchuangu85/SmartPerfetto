name: cpu_load_in_range
version: "1.0"
type: atomic
category: hardware

meta:
  display_name: "CPU 负载区间分析"
  description: "分析指定时间范围内各 CPU 核心的负载情况"
  icon: "bar_chart"
  tags: [cpu, load, usage, atomic]

prerequisites:
  required_tables:
    - sched_slice

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true

steps:
  - id: cpu_utilization
    type: atomic
    name: "CPU 利用率"
    display:
      level: detail
      title: "CPU 利用率"
    sql: |
      WITH 
      -- 动态检测 CPU 集群
      cpu_max_freq AS (
        SELECT cpu, MAX(value) as max_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
        GROUP BY cpu
      ),
      global_max AS (
        SELECT MAX(max_freq) as val FROM cpu_max_freq
      ),
      cpu_clusters AS (
        SELECT cpu,
          CASE
            WHEN max_freq >= (SELECT val FROM global_max) * 0.95 THEN 'prime'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.75 THEN 'big'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.50 THEN 'mid'
            ELSE 'little'
          END as cluster_type
        FROM cpu_max_freq
      ),
      cpu_time AS (
        SELECT
          ss.cpu,
          COALESCE(cl.cluster_type, 'little') as core_type,
          ss.utid,
          -- clamp dur 到范围内，处理跨边界的 sched_slice
          SUM(MIN(ss.ts + ss.dur, ${end_ts}) - MAX(ss.ts, ${start_ts})) as total_dur
        FROM sched_slice ss
        LEFT JOIN cpu_clusters cl ON ss.cpu = cl.cpu
        WHERE (ss.ts + ss.dur) > ${start_ts}
          AND ss.ts < ${end_ts}
        GROUP BY ss.cpu, ss.utid
      ),
      cpu_total AS (
        SELECT
          cpu,
          core_type,
          SUM(total_dur) as cpu_total_dur
        FROM cpu_time
        GROUP BY cpu
      )
      SELECT
        ct.core_type,
        COUNT(DISTINCT ct.cpu) as cpu_count,
        -- utid != 0 implies non-idle work in sched_slice (0 is usually swapper)
        ROUND(100.0 * SUM(CASE WHEN ctime.utid != 0 THEN ctime.total_dur ELSE 0 END) / NULLIF(SUM(ct.cpu_total_dur), 0), 1) as utilization_pct,
        ROUND(SUM(ct.cpu_total_dur) / 1e6, 2) as total_time_ms
      FROM cpu_total ct
      LEFT JOIN cpu_time ctime ON ct.cpu = ctime.cpu
      GROUP BY ct.core_type
      ORDER BY 
        CASE ct.core_type 
          WHEN 'prime' THEN 1 
          WHEN 'big' THEN 2 
          WHEN 'mid' THEN 3 
          ELSE 4 
        END
    save_as: utilization

  - id: runqueue_depth
    type: atomic
    name: "运行队列深度"
    display:
      level: detail
      title: "运行队列"
    sql: |
      WITH cpu_clusters AS (
        SELECT cpu,
          CASE
            WHEN MAX(value) >= (SELECT MAX(value) * 0.75 FROM counter c2 JOIN cpu_counter_track t2 ON c2.track_id = t2.id WHERE t2.name = 'cpufreq') THEN 'big'
            ELSE 'little'
          END as cluster_type
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
        GROUP BY cpu
      )
      SELECT
        c.cpu,
        COALESCE(cl.cluster_type, 'little') as core_type,
        ROUND(AVG(c.value), 2) as avg_runqueue,
        MAX(c.value) as max_runqueue
      FROM counter c
      JOIN cpu_counter_track t ON c.track_id = t.id
      LEFT JOIN cpu_clusters cl ON t.cpu = cl.cpu
      WHERE t.name = 'runqueue_length'
        AND c.ts >= ${start_ts}
        AND c.ts < ${end_ts}
      GROUP BY c.cpu
      ORDER BY c.cpu
    save_as: runqueue
    optional: true

  - id: thread_migrations
    type: atomic
    name: "线程迁移"
    display:
      level: summary
      title: "线程迁移"
    sql: |
      WITH
      -- 动态检测 CPU 集群（与 cpu_utilization step 一致）
      cpu_max_freq AS (
        SELECT cpu, MAX(value) as max_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
        GROUP BY cpu
      ),
      global_max AS (
        SELECT MAX(max_freq) as val FROM cpu_max_freq
      ),
      cpu_clusters AS (
        SELECT cpu,
          CASE
            WHEN max_freq >= (SELECT val FROM global_max) * 0.95 THEN 'prime'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.75 THEN 'big'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.50 THEN 'mid'
            ELSE 'little'
          END as cluster_type
        FROM cpu_max_freq
      ),
      migrations AS (
        SELECT
          utid,
          cpu,
          LAG(cpu) OVER (PARTITION BY utid ORDER BY ts) as prev_cpu
        FROM sched_slice
        WHERE (ts + dur) > ${start_ts}
          AND ts < ${end_ts}
      )
      SELECT
        COUNT(*) as migration_count,
        SUM(CASE
          WHEN (prev_cpu IN (SELECT cpu FROM cpu_clusters WHERE cluster_type = 'little')
                AND cpu IN (SELECT cpu FROM cpu_clusters WHERE cluster_type != 'little'))
               OR (prev_cpu IN (SELECT cpu FROM cpu_clusters WHERE cluster_type != 'little')
                   AND cpu IN (SELECT cpu FROM cpu_clusters WHERE cluster_type = 'little'))
          THEN 1 ELSE 0
        END) as cross_cluster_migrations
      FROM migrations
      WHERE prev_cpu IS NOT NULL AND cpu != prev_cpu
    save_as: migrations

output:
  format: structured
