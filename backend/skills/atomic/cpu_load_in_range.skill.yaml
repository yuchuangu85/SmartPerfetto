# =============================================================================
# CPU 负载区间分析（Composite Skill）
# =============================================================================
# 分析指定时间范围内各 CPU 核心的负载情况
# v2.0: 复用 _cpu_topology 视图替代内联 CTE，统一核心分类

name: cpu_load_in_range
version: "2.0"
type: composite
category: hardware

meta:
  display_name: "CPU 负载区间分析"
  description: "分析指定时间范围内各 CPU 核心的负载情况"
  icon: "bar_chart"
  tags: [cpu, load, usage, composite]

prerequisites:
  required_tables:
    - sched_slice

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true

steps:
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  - id: cpu_utilization
    type: atomic
    name: "CPU 利用率"
    display:
      level: detail
      title: "CPU 利用率"
    sql: |
      WITH
      cpu_time AS (
        SELECT
          ss.cpu,
          COALESCE(ct.core_type, 'little') as core_type,
          ss.utid,
          -- clamp dur 到范围内，处理跨边界的 sched_slice
          SUM(MIN(ss.ts + ss.dur, ${end_ts}) - MAX(ss.ts, ${start_ts})) as total_dur
        FROM sched_slice ss
        LEFT JOIN _cpu_topology ct ON ss.cpu = ct.cpu_id
        WHERE (ss.ts + ss.dur) > ${start_ts}
          AND ss.ts < ${end_ts}
        GROUP BY ss.cpu, ss.utid
      ),
      cpu_total AS (
        SELECT
          cpu,
          core_type,
          SUM(total_dur) as cpu_total_dur
        FROM cpu_time
        GROUP BY cpu
      )
      SELECT
        ct.core_type,
        COUNT(DISTINCT ct.cpu) as cpu_count,
        -- utid != 0 implies non-idle work in sched_slice (0 is usually swapper)
        ROUND(100.0 * SUM(CASE WHEN ctime.utid != 0 THEN ctime.total_dur ELSE 0 END) / NULLIF(SUM(ct.cpu_total_dur), 0), 1) as utilization_pct,
        ROUND(SUM(ct.cpu_total_dur) / 1e6, 2) as total_time_ms
      FROM cpu_total ct
      LEFT JOIN cpu_time ctime ON ct.cpu = ctime.cpu
      GROUP BY ct.core_type
      ORDER BY
        CASE ct.core_type
          WHEN 'prime' THEN 1
          WHEN 'big' THEN 2
          WHEN 'medium' THEN 3
          ELSE 4
        END
    save_as: utilization

  - id: runqueue_depth
    type: atomic
    name: "运行队列深度"
    display:
      level: detail
      title: "运行队列"
    sql: |
      SELECT
        t.cpu,
        COALESCE(ct.core_type, 'little') as core_type,
        ROUND(AVG(c.value), 2) as avg_runqueue,
        MAX(c.value) as max_runqueue
      FROM counter c
      JOIN cpu_counter_track t ON c.track_id = t.id
      LEFT JOIN _cpu_topology ct ON t.cpu = ct.cpu_id
      WHERE t.name = 'runqueue_length'
        AND c.ts >= ${start_ts}
        AND c.ts < ${end_ts}
      GROUP BY t.cpu
      ORDER BY t.cpu
    save_as: runqueue
    optional: true

  - id: thread_migrations
    type: atomic
    name: "线程迁移"
    display:
      level: summary
      title: "线程迁移"
    sql: |
      WITH
      migrations AS (
        SELECT
          utid,
          cpu,
          LAG(cpu) OVER (PARTITION BY utid ORDER BY ts) as prev_cpu
        FROM sched_slice
        WHERE (ts + dur) > ${start_ts}
          AND ts < ${end_ts}
      )
      SELECT
        COUNT(*) as migration_count,
        SUM(CASE
          WHEN (prev_cpu IN (SELECT cpu_id FROM _cpu_topology WHERE core_type IN ('medium', 'little'))
                AND cpu IN (SELECT cpu_id FROM _cpu_topology WHERE core_type IN ('prime', 'big')))
               OR (prev_cpu IN (SELECT cpu_id FROM _cpu_topology WHERE core_type IN ('prime', 'big'))
                   AND cpu IN (SELECT cpu_id FROM _cpu_topology WHERE core_type IN ('medium', 'little')))
          THEN 1 ELSE 0
        END) as cross_cluster_migrations
      FROM migrations
      WHERE prev_cpu IS NOT NULL AND cpu != prev_cpu
    save_as: migrations

output:
  format: structured
