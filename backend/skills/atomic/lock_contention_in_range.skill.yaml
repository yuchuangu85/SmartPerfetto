name: lock_contention_in_range
version: "1.0"
type: atomic
category: performance

meta:
  display_name: "锁竞争分析 (区间)"
  description: "分析指定时间范围内的锁竞争情况"
  icon: "lock"
  tags: [lock, contention, performance, atomic]

prerequisites:
  required_tables:
    - thread_state
    - android_monitor_contention
  modules:
    - android.monitor_contention

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true
  - name: package
    type: string
    required: false

steps:
  # Step 1: Java Monitor 锁竞争
  - id: monitor_contentions
    type: atomic
    name: "Java Monitor 锁竞争"
    display:
      level: detail
      title: "Java Monitor 锁竞争"
      columns:
        - name: blocking_method
          label: "持锁方法"
          type: string
        - name: blocking_thread_name
          label: "持锁线程"
          type: string
        - name: blocked_method
          label: "阻塞方法"
          type: string
        - name: blocked_thread_name
          label: "阻塞线程"
          type: string
        - name: main_blocked
          label: "主线程阻塞"
          type: boolean
        - name: wait_ms
          label: "等待时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: waiter_count
          label: "等待数"
          type: number
        - name: lock_type
          label: "锁类型"
          type: string
    sql: |
      SELECT
        short_blocking_method as blocking_method,
        blocking_thread_name,
        short_blocked_method as blocked_method,
        blocked_thread_name,
        is_blocked_thread_main as main_blocked,
        ROUND(dur / 1e6, 2) as wait_ms,
        waiter_count,
        'java_monitor' as lock_type
      FROM android_monitor_contention
      WHERE ts >= ${start_ts}
        AND ts < ${end_ts}
        AND (process_name GLOB '${package}*' OR '${package}' = '')
        AND dur >= 1000000
      ORDER BY dur DESC
    save_as: monitor_contentions
    optional: true

  # Step 2: Futex 等待 (pthread_mutex, ReentrantLock 底层实现)
  - id: futex_waits
    type: atomic
    name: "Futex 等待"
    display:
      level: detail
      title: "Futex/Mutex 等待"
      columns:
        - name: thread_name
          label: "线程"
          type: string
        - name: blocked_function
          label: "阻塞函数"
          type: string
        - name: wait_ms
          label: "等待时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: process_name
          label: "进程"
          type: string
        - name: lock_type
          label: "锁类型"
          type: string
        - name: is_main_thread
          label: "主线程"
          type: boolean
    sql: |
      SELECT
        t.name as thread_name,
        ts.blocked_function,
        ROUND(ts.dur / 1e6, 2) as wait_ms,
        p.name as process_name,
        CASE
          WHEN ts.blocked_function GLOB '*futex*' THEN 'futex'
          WHEN ts.blocked_function GLOB '*mutex*' THEN 'pthread_mutex'
          WHEN ts.blocked_function GLOB '*rwlock*' THEN 'rwlock'
          WHEN ts.blocked_function GLOB '*sem*' THEN 'semaphore'
          WHEN ts.blocked_function GLOB '*cond*' THEN 'condition_var'
          ELSE 'other'
        END as lock_type,
        t.tid = p.pid as is_main_thread
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE ts.ts >= ${start_ts}
        AND ts.ts < ${end_ts}
        AND (p.name GLOB '${package}*' OR '${package}' = '')
        AND ts.state IN ('S', 'D')
        AND ts.dur >= 1000000
        AND (ts.blocked_function GLOB '*futex*'
             OR ts.blocked_function GLOB '*mutex*'
             OR ts.blocked_function GLOB '*rwlock*'
             OR ts.blocked_function GLOB '*sem_*'
             OR ts.blocked_function GLOB '*cond_*')
      ORDER BY ts.dur DESC
    save_as: futex_waits
    optional: true

  # Step 3: 锁竞争汇总
  - id: lock_summary
    type: atomic
    name: "锁竞争汇总"
    optional: true
    display:
      level: summary
      title: "锁竞争汇总"
      columns:
        - name: java_monitor_count
          label: "Java锁次数"
          type: number
          format: compact
        - name: futex_mutex_count
          label: "Futex次数"
          type: number
          format: compact
        - name: total_contentions
          label: "总竞争次数"
          type: number
          format: compact
        - name: java_monitor_wait_ms
          label: "Java锁等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: futex_mutex_wait_ms
          label: "Futex等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_wait_ms
          label: "总等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_monitor_wait_ms
          label: "最大Java锁等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: main_thread_blocked_count
          label: "主线程阻塞"
          type: number
          format: compact
    sql: |
      WITH
      monitor_stats AS (
        SELECT
          COUNT(*) as monitor_count,
          COALESCE(SUM(dur), 0) as monitor_total_ns,
          COALESCE(MAX(dur), 0) as monitor_max_ns,
          SUM(CASE WHEN is_blocked_thread_main THEN 1 ELSE 0 END) as monitor_main_blocked
        FROM android_monitor_contention
        WHERE ts >= ${start_ts}
          AND ts < ${end_ts}
          AND (process_name GLOB '${package}*' OR '${package}' = '')
      ),
      futex_stats AS (
        SELECT
          COUNT(*) as futex_count,
          COALESCE(SUM(ts.dur), 0) as futex_total_ns,
          COALESCE(MAX(ts.dur), 0) as futex_max_ns,
          SUM(CASE WHEN t.tid = p.pid THEN 1 ELSE 0 END) as futex_main_blocked
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE ts.ts >= ${start_ts}
          AND ts.ts < ${end_ts}
          AND (p.name GLOB '${package}*' OR '${package}' = '')
          AND ts.state IN ('S', 'D')
          AND ts.dur >= 1000000
          AND (ts.blocked_function GLOB '*futex*'
               OR ts.blocked_function GLOB '*mutex*')
      )
      SELECT
        (SELECT monitor_count FROM monitor_stats) as java_monitor_count,
        (SELECT futex_count FROM futex_stats) as futex_mutex_count,
        (SELECT monitor_count FROM monitor_stats) + (SELECT futex_count FROM futex_stats) as total_contentions,
        ROUND((SELECT monitor_total_ns FROM monitor_stats) / 1e6, 2) as java_monitor_wait_ms,
        ROUND((SELECT futex_total_ns FROM futex_stats) / 1e6, 2) as futex_mutex_wait_ms,
        ROUND(((SELECT monitor_total_ns FROM monitor_stats) + (SELECT futex_total_ns FROM futex_stats)) / 1e6, 2) as total_wait_ms,
        ROUND(((SELECT monitor_max_ns FROM monitor_stats) + 0) / 1e6, 2) as max_monitor_wait_ms,
        ROUND(((SELECT futex_max_ns FROM futex_stats) + 0) / 1e6, 2) as max_futex_wait_ms,
        (SELECT monitor_main_blocked FROM monitor_stats) + (SELECT futex_main_blocked FROM futex_stats) as main_thread_blocked_count
    save_as: summary

output:
  format: structured
  fields:
    - name: monitor_contentions
      description: "Java Monitor 锁竞争事件"
    - name: futex_waits
      description: "Futex/pthread_mutex 等待事件"
    - name: summary
      description: "锁竞争汇总统计"
