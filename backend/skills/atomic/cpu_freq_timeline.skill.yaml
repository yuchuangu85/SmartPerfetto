name: cpu_freq_timeline
version: "1.0"
type: atomic
category: hardware

meta:
  display_name: "CPU 频率变化时间线"
  description: "分析指定时间范围内各 CPU 核心的频率变化"
  icon: "speed"
  tags: [cpu, frequency, timeline, atomic]

prerequisites:
  required_tables:
    - cpu_counter_track
    - counter

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "开始时间戳 (纳秒)"
  - name: end_ts
    type: timestamp
    required: true
    description: "结束时间戳 (纳秒)"

steps:
  - id: cpu_freq_changes
    type: atomic
    name: "CPU 频率变化"
    display: false  # Raw data hidden - use cpu_freq_summary for aggregated view
    sql: |
      WITH 
      -- 动态检测 CPU 集群（基于最大频率）
      cpu_max_freq AS (
        SELECT cpu, MAX(value) as max_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
        GROUP BY cpu
      ),
      global_max AS (
        SELECT MAX(max_freq) as val FROM cpu_max_freq
      ),
      cpu_clusters AS (
        SELECT cpu,
          CASE
            WHEN max_freq >= (SELECT val FROM global_max) * 0.75 THEN 'big'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.50 THEN 'mid'
            ELSE 'little'
          END as cluster_type
        FROM cpu_max_freq
      ),
      freq_events AS (
        SELECT
          c.ts,
          t.cpu,
          c.value as freq_khz,
          COALESCE(cl.cluster_type, 'unknown') as core_type,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        LEFT JOIN cpu_clusters cl ON t.cpu = cl.cpu
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        printf('%d', ts) as ts,
        ROUND((ts - ${start_ts}) / 1e6, 2) as relative_ms,
        cpu,
        core_type,
        ROUND(freq_khz / 1000, 0) as freq_mhz,
        ROUND(COALESCE(prev_freq_khz, freq_khz) / 1000, 0) as prev_freq_mhz,
        CASE 
          WHEN freq_khz > COALESCE(prev_freq_khz, freq_khz) THEN 'up'
          WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 'down'
          ELSE 'stable'
        END as change_direction
      FROM freq_events
      WHERE freq_khz != COALESCE(prev_freq_khz, 0)
      ORDER BY ts, cpu
    save_as: freq_changes

  - id: cpu_freq_summary
    type: atomic
    name: "CPU 频率汇总"
    display:
      level: summary
      title: "频率汇总"
    sql: |
      WITH 
      -- 动态检测 CPU 集群
      cpu_max_freq AS (
        SELECT cpu, MAX(value) as max_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
        GROUP BY cpu
      ),
      global_max AS (
        SELECT MAX(max_freq) as val FROM cpu_max_freq
      ),
      cpu_clusters AS (
        SELECT cpu,
          CASE
            WHEN max_freq >= (SELECT val FROM global_max) * 0.75 THEN 'big'
            WHEN max_freq >= (SELECT val FROM global_max) * 0.50 THEN 'mid'
            ELSE 'little'
          END as cluster_type
        FROM cpu_max_freq
      ),
      freq_data AS (
        SELECT
          t.cpu,
          COALESCE(cl.cluster_type, 'unknown') as core_type,
          c.value as freq_khz,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        LEFT JOIN cpu_clusters cl ON t.cpu = cl.cpu
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        core_type,
        COUNT(DISTINCT cpu) as cpu_count,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz,
        SUM(CASE WHEN freq_khz != COALESCE(prev_freq_khz, freq_khz) THEN 1 ELSE 0 END) as freq_changes,
        SUM(CASE WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 1 ELSE 0 END) as downclocks
      FROM freq_data
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: freq_summary

output:
  format: structured
