# =============================================================================
# CPU 频率时间线（Composite Skill）
# =============================================================================
# 分析指定时间范围内各 CPU 核心的频率变化
# v2.0: 复用 _cpu_topology 视图替代内联 CTE，统一核心分类

name: cpu_freq_timeline
version: "2.0"
type: composite
category: hardware

meta:
  display_name: "CPU 频率变化时间线"
  description: "分析指定时间范围内各 CPU 核心的频率变化"
  icon: "speed"
  tags: [cpu, frequency, timeline, composite]

prerequisites:
  required_tables:
    - cpu_counter_track
    - counter

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "开始时间戳 (纳秒)"
  - name: end_ts
    type: timestamp
    required: true
    description: "结束时间戳 (纳秒)"

steps:
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  - id: cpu_freq_changes
    type: atomic
    name: "CPU 频率变化"
    display: false  # Raw data hidden - use cpu_freq_summary for aggregated view
    sql: |
      WITH
      freq_events AS (
        SELECT
          c.ts,
          t.cpu,
          c.value as freq_khz,
          COALESCE(ct.core_type, 'little') as core_type,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        LEFT JOIN _cpu_topology ct ON t.cpu = ct.cpu_id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        printf('%d', ts) as ts,
        ROUND((ts - ${start_ts}) / 1e6, 2) as relative_ms,
        cpu,
        core_type,
        ROUND(freq_khz / 1000, 0) as freq_mhz,
        ROUND(COALESCE(prev_freq_khz, freq_khz) / 1000, 0) as prev_freq_mhz,
        CASE
          WHEN freq_khz > COALESCE(prev_freq_khz, freq_khz) THEN 'up'
          WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 'down'
          ELSE 'stable'
        END as change_direction
      FROM freq_events
      WHERE freq_khz != COALESCE(prev_freq_khz, 0)
      ORDER BY ts, cpu
    save_as: freq_changes

  - id: cpu_freq_summary
    type: atomic
    name: "CPU 频率汇总"
    display:
      level: summary
      title: "频率汇总"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: cpu_count
          label: "核心数"
          type: number
        - name: avg_freq_mhz
          label: "平均频率"
          type: number
        - name: max_freq_mhz
          label: "最大频率"
          type: number
        - name: min_freq_mhz
          label: "最小频率"
          type: number
        - name: freq_changes
          label: "频率变化次数"
          type: number
          format: compact
        - name: downclocks
          label: "降频次数"
          type: number
          format: compact
    sql: |
      WITH
      freq_data AS (
        SELECT
          t.cpu,
          COALESCE(ct.core_type, 'little') as core_type,
          c.value as freq_khz,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        LEFT JOIN _cpu_topology ct ON t.cpu = ct.cpu_id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        core_type,
        COUNT(DISTINCT cpu) as cpu_count,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz,
        SUM(CASE WHEN freq_khz != COALESCE(prev_freq_khz, freq_khz) THEN 1 ELSE 0 END) as freq_changes,
        SUM(CASE WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 1 ELSE 0 END) as downclocks
      FROM freq_data
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: freq_summary

output:
  format: structured
