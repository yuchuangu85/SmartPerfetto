# =============================================================================
# 线程调度分析（原子 Skill）
# =============================================================================
# 分析指定时间范围内的线程调度情况

name: scheduling_analysis
version: "1.0"
type: atomic
category: kernel

meta:
  display_name: "调度延迟分析"
  description: "分析线程调度延迟 (Runnability)"
  icon: "schedule"
  tags: [scheduling, kernel, latency, atomic]

prerequisites:
  required_tables:
    - sched_slice

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns，可选)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns，可选)"
  - name: package
    type: string
    required: false

display:
  level: detail
  format: table
  columns:
    - name: thread_name
      label: "线程"
      type: string
    - name: process_name
      label: "进程"
      type: string
    - name: is_main_thread
      label: "主线程"
      type: boolean
    - name: running_ms
      label: "运行时间"
      type: duration
      format: duration_ms
    - name: runnable_ms
      label: "等待调度"
      type: duration
      format: duration_ms
    - name: sleeping_ms
      label: "休眠时间"
      type: duration
      format: duration_ms
    - name: max_runnable_ms
      label: "最大等待"
      type: duration
      format: duration_ms
    - name: long_runnable_count
      label: "长等待次数"
      type: number

sql: |
  WITH target_threads AS (
    SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
    FROM thread t
    JOIN process p ON t.upid = p.upid
    WHERE p.name GLOB '${package}*' OR '${package}' = ''
  ),
  thread_states AS (
    SELECT
      ts.utid,
      ts.state,
      ts.dur,
      ts.ts
    FROM thread_state ts
    WHERE (${start_ts} IS NULL OR ts.ts >= ${start_ts})
      AND (${end_ts} IS NULL OR ts.ts < ${end_ts})
      AND ts.utid IN (SELECT utid FROM target_threads)
  )
  SELECT
    tt.thread_name,
    tt.process_name,
    tt.tid = tt.pid as is_main_thread,
    SUM(CASE WHEN tst.state = 'Running' THEN tst.dur ELSE 0 END) / 1e6 as running_ms,
    SUM(CASE WHEN tst.state = 'R' THEN tst.dur ELSE 0 END) / 1e6 as runnable_ms,
    SUM(CASE WHEN tst.state IN ('S', 'D') THEN tst.dur ELSE 0 END) / 1e6 as sleeping_ms,
    MAX(CASE WHEN tst.state = 'R' THEN tst.dur ELSE 0 END) / 1e6 as max_runnable_ms,
    COUNT(CASE WHEN tst.state = 'R' AND tst.dur > 5000000 THEN 1 END) as long_runnable_count
  FROM target_threads tt
  LEFT JOIN thread_states tst ON tt.utid = tst.utid
  GROUP BY tt.utid
  HAVING running_ms > 0 OR runnable_ms > 0
  ORDER BY runnable_ms DESC

