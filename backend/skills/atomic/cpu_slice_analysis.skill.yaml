# =============================================================================
# CPU 时间分析（Composite Skill）
# =============================================================================
# 分析指定时间范围内的 CPU 使用情况
# v2.0: 复用 _cpu_topology 视图替代内联 CTE，统一核心分类

name: cpu_slice_analysis
version: "2.0"
type: composite
category: hardware

meta:
  display_name: "CPU Slice 分析"
  description: "分析 CPU 时间片分布（动态拓扑检测）"
  icon: "pie_chart"
  tags: [cpu, slice, distribution, composite]

prerequisites:
  required_tables:
    - sched_slice

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "开始时间戳(ns，可选)"
  - name: end_ts
    type: timestamp
    required: false
    description: "结束时间戳(ns，可选)"
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"

steps:
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  - id: cpu_time_by_core
    type: atomic
    name: "CPU 时间片分布"
    display:
      level: detail
      format: table
      columns:
        - name: thread_name
          label: "线程"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: total_cpu_ms
          label: "CPU时间"
          type: duration
          format: duration_ms
        - name: big_core_ms
          label: "大核时间"
          type: duration
          format: duration_ms
        - name: little_core_ms
          label: "小核时间"
          type: duration
          format: duration_ms
        - name: slice_count
          label: "切片数"
          type: number
          format: compact
        - name: avg_slice_ms
          label: "平均切片"
          type: duration
          format: duration_ms
    sql: |
      WITH
      target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*' OR '${package}' = ''
      ),
      cpu_slices AS (
        SELECT
          ss.utid,
          ss.dur,
          ss.cpu,
          COALESCE(ct.core_type, 'little') as core_type
        FROM sched_slice ss
        LEFT JOIN _cpu_topology ct ON ss.cpu = ct.cpu_id
        WHERE (${start_ts} IS NULL OR ss.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ss.ts < ${end_ts})
          AND ss.utid IN (SELECT utid FROM target_threads)
      )
      SELECT
        tt.thread_name,
        tt.process_name,
        SUM(cs.dur) / 1e6 as total_cpu_ms,
        SUM(CASE WHEN cs.core_type IN ('prime', 'big') THEN cs.dur ELSE 0 END) / 1e6 as big_core_ms,
        SUM(CASE WHEN cs.core_type IN ('medium', 'little') THEN cs.dur ELSE 0 END) / 1e6 as little_core_ms,
        COUNT(*) as slice_count,
        AVG(cs.dur) / 1e6 as avg_slice_ms
      FROM target_threads tt
      LEFT JOIN cpu_slices cs ON tt.utid = cs.utid
      GROUP BY tt.utid
      HAVING total_cpu_ms > 0
      ORDER BY total_cpu_ms DESC

output:
  format: structured
