# VSync Period Detection Skill
#
# This atomic skill detects the VSync period from trace data using multiple
# sources and statistical analysis. It's designed to be reusable across
# multiple composite skills to avoid code duplication.
#
# Resolution Priority:
# 1. VSYNC-sf counter intervals (most accurate)
# 2. expected_frame_timeline_slice durations
# 3. Snap to nearest standard refresh rate (60/90/120/144/165/240 Hz)
#
# Output: vsync_period_ns, detected_refresh_rate_hz, detection_method, confidence

name: vsync_period_detection
type: atomic
version: "1.0.0"
description: |
  Detect VSync period from trace data using statistical analysis.
  Handles 60Hz, 90Hz, 120Hz, 144Hz, 165Hz, and 240Hz displays.
  Returns detected period, refresh rate, and confidence score.

category: frame
tags:
  - vsync
  - refresh_rate
  - frame_timing
  - detection

inputs:
  - name: start_ts
    type: number
    required: false
    description: Start timestamp (ns) - optional filter
  - name: end_ts
    type: number
    required: false
    description: End timestamp (ns) - optional filter

steps:
  - id: detect_vsync_period
    description: Detect VSync period using multiple data sources
    sql: |
      -- VSync Period Detection with Multiple Sources and Statistical Robustness
      --
      -- Strategy:
      -- 1. Try VSYNC-sf counter (most reliable)
      -- 2. Fall back to expected_frame_timeline_slice
      -- 3. Use interquartile range to filter outliers
      -- 4. Snap to nearest standard refresh rate

      WITH params AS (
        SELECT
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT MAX(ts) FROM counter)) AS end_ts
      ),

      -- Standard refresh rates with their periods (in nanoseconds)
      standard_rates AS (
        SELECT 60 AS hz, 16666667 AS period_ns UNION ALL
        SELECT 90, 11111111 UNION ALL
        SELECT 120, 8333333 UNION ALL
        SELECT 144, 6944444 UNION ALL
        SELECT 165, 6060606 UNION ALL
        SELECT 240, 4166667
      ),

      -- Source 1: VSYNC-sf counter intervals
      vsync_sf_raw AS (
        SELECT
          c.ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) AS interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        CROSS JOIN params p
        WHERE t.name = 'VSYNC-sf'
          AND c.ts >= p.start_ts
          AND c.ts <= p.end_ts
      ),

      -- Filter to valid intervals and compute percentiles
      vsync_sf_intervals AS (
        SELECT
          interval_ns,
          PERCENT_RANK() OVER (ORDER BY interval_ns) AS pct
        FROM vsync_sf_raw
        WHERE interval_ns IS NOT NULL
          AND interval_ns > 4000000  -- > 4ms (min for 240Hz)
          AND interval_ns < 20000000 -- < 20ms (max reasonable)
      ),

      -- Use interquartile range (P25-P75) for robustness
      vsync_sf_stats AS (
        SELECT
          AVG(interval_ns) AS mean_period_ns,
          COUNT(*) AS sample_count
        FROM vsync_sf_intervals
        WHERE pct BETWEEN 0.25 AND 0.75
      ),

      -- Source 2: expected_frame_timeline_slice durations (fallback)
      frame_timeline_raw AS (
        SELECT
          dur AS interval_ns,
          PERCENT_RANK() OVER (ORDER BY dur) AS pct
        FROM slice s
        CROSS JOIN params p
        WHERE s.name = 'expected_frame_timeline_slice'
          AND s.ts >= p.start_ts
          AND s.ts <= p.end_ts
          AND s.dur > 4000000
          AND s.dur < 20000000
      ),

      frame_timeline_stats AS (
        SELECT
          AVG(interval_ns) AS mean_period_ns,
          COUNT(*) AS sample_count
        FROM frame_timeline_raw
        WHERE pct BETWEEN 0.25 AND 0.75
      ),

      -- Choose best source
      detected_period AS (
        SELECT
          CASE
            WHEN (SELECT sample_count FROM vsync_sf_stats) >= 10
              THEN (SELECT mean_period_ns FROM vsync_sf_stats)
            WHEN (SELECT sample_count FROM frame_timeline_stats) >= 10
              THEN (SELECT mean_period_ns FROM frame_timeline_stats)
            ELSE 16666667  -- Default 60Hz
          END AS raw_period_ns,
          CASE
            WHEN (SELECT sample_count FROM vsync_sf_stats) >= 10 THEN 'vsync_sf'
            WHEN (SELECT sample_count FROM frame_timeline_stats) >= 10 THEN 'frame_timeline'
            ELSE 'default'
          END AS detection_method,
          CASE
            WHEN (SELECT sample_count FROM vsync_sf_stats) >= 100 THEN 0.95
            WHEN (SELECT sample_count FROM vsync_sf_stats) >= 10 THEN 0.85
            WHEN (SELECT sample_count FROM frame_timeline_stats) >= 100 THEN 0.80
            WHEN (SELECT sample_count FROM frame_timeline_stats) >= 10 THEN 0.70
            ELSE 0.50
          END AS confidence,
          COALESCE(
            (SELECT sample_count FROM vsync_sf_stats),
            (SELECT sample_count FROM frame_timeline_stats),
            0
          ) AS sample_count
      ),

      -- Snap to nearest standard refresh rate
      snapped AS (
        SELECT
          d.raw_period_ns,
          d.detection_method,
          d.confidence,
          d.sample_count,
          sr.hz AS refresh_rate_hz,
          sr.period_ns AS vsync_period_ns,
          ABS(d.raw_period_ns - sr.period_ns) AS distance
        FROM detected_period d
        CROSS JOIN standard_rates sr
        ORDER BY distance
        LIMIT 1
      )

      SELECT
        vsync_period_ns,
        refresh_rate_hz AS detected_refresh_rate_hz,
        raw_period_ns AS measured_period_ns,
        detection_method,
        confidence,
        sample_count,
        ROUND(1000000000.0 / vsync_period_ns, 1) AS theoretical_fps
      FROM snapped

    display:
      level: overview
      title: "VSync Period Detection"
      columns:
        - name: vsync_period_ns
          type: number
          description: Detected VSync period in nanoseconds
        - name: detected_refresh_rate_hz
          type: number
          description: Detected display refresh rate in Hz
        - name: measured_period_ns
          type: number
          description: Raw measured period before snapping
        - name: detection_method
          type: string
          description: Method used for detection (vsync_sf, frame_timeline, default)
        - name: confidence
          type: number
          description: Confidence score (0-1)
        - name: sample_count
          type: number
          description: Number of samples used for detection
        - name: theoretical_fps
          type: number
          description: Theoretical max FPS based on refresh rate
