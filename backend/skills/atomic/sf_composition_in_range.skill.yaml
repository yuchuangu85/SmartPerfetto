# =============================================================================
# SurfaceFlinger 合成分析 (Atomic Skill)
# =============================================================================
# 分析指定时间范围内 SurfaceFlinger 的合成耗时
# 检测系统合成层是否是性能瓶颈

name: sf_composition_in_range
version: "1.0"
type: atomic
category: framework

meta:
  display_name: "SF 合成分析"
  description: "分析 SurfaceFlinger 合成延迟"
  icon: "layers"
  tags: [surfaceflinger, composition, framework, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"

display:
  level: detail
  layer: deep
  title: "SurfaceFlinger 合成"
  columns:
    - name: composition_type
      label: "合成阶段"
      type: string
    - name: count
      label: "次数"
      type: number
    - name: total_ms
      label: "总耗时"
      type: duration
      format: duration_ms
    - name: avg_ms
      label: "平均耗时"
      type: duration
      format: duration_ms
    - name: max_ms
      label: "最大耗时"
      type: duration
      format: duration_ms

sql: |
  WITH sf_slices AS (
    SELECT
      s.name,
      s.dur,
      CASE
        WHEN s.name GLOB '*onMessageInvalidate*' THEN 'Invalidate'
        WHEN s.name GLOB '*onMessageRefresh*' THEN 'Refresh'
        WHEN s.name GLOB '*composite*' OR s.name GLOB '*Composite*' THEN 'Composite'
        WHEN s.name GLOB '*latchBuffer*' OR s.name GLOB '*Latch*' THEN 'Latch Buffer'
        WHEN s.name GLOB '*updateTexImage*' THEN 'Update Texture'
        WHEN s.name GLOB '*postComposition*' THEN 'Post Composition'
        WHEN s.name GLOB '*present*' OR s.name GLOB '*Present*' THEN 'Present'
        WHEN s.name GLOB '*commit*' OR s.name GLOB '*Commit*' THEN 'Commit'
        ELSE NULL
      END as composition_type
    FROM slice s
    JOIN thread_track tt ON s.track_id = tt.id
    JOIN thread t ON tt.utid = t.utid
    JOIN process p ON t.upid = p.upid
    WHERE p.name = 'surfaceflinger'
      AND s.ts >= ${start_ts} AND s.ts < ${end_ts}
      AND s.dur > 10000  -- > 10us
  )
  SELECT
    composition_type,
    COUNT(*) as count,
    ROUND(SUM(dur) / 1e6, 2) as total_ms,
    ROUND(AVG(dur) / 1e6, 2) as avg_ms,
    ROUND(MAX(dur) / 1e6, 2) as max_ms
  FROM sf_slices
  WHERE composition_type IS NOT NULL
  GROUP BY composition_type
  HAVING total_ms > 0.05
  ORDER BY composition_type

output:
  format: structured
