# =============================================================================
# 渲染流水线时延分析 (Atomic Skill)
# =============================================================================
# 分析从 App 画图到屏幕显示的全链路耗时
# 分解主线程和 RenderThread 各阶段占比

name: render_pipeline_latency
version: "1.0"
type: atomic
category: rendering

meta:
  display_name: "渲染流水线时延"
  description: "分解帧渲染全链路各阶段耗时"
  icon: "timeline"
  tags: [render, pipeline, latency, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "帧开始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "帧结束时间戳(ns)"
  - name: main_start_ts
    type: timestamp
    required: false
    description: "主线程开始时间戳(ns)"
  - name: main_end_ts
    type: timestamp
    required: false
    description: "主线程结束时间戳(ns)"
  - name: render_start_ts
    type: timestamp
    required: false
    description: "RenderThread 开始时间戳(ns)"
  - name: render_end_ts
    type: timestamp
    required: false
    description: "RenderThread 结束时间戳(ns)"

display:
  level: key
  layer: deep
  title: "渲染流水线"
  columns:
    - name: stage
      label: "阶段"
      type: string
    - name: dur_ms
      label: "耗时"
      type: duration
      format: duration_ms
    - name: pct
      label: "占比"
      type: percentage
      format: percentage

sql: |
  WITH timing AS (
    SELECT
      ${end_ts} - ${start_ts} as total_dur,
      COALESCE(${main_end_ts}, ${end_ts}) - COALESCE(${main_start_ts}, ${start_ts}) as main_dur,
      COALESCE(${render_end_ts}, ${end_ts}) - COALESCE(${render_start_ts}, ${start_ts}) as render_dur,
      COALESCE(${main_start_ts}, ${start_ts}) - ${start_ts} as pre_main_dur,
      CASE
        WHEN ${render_start_ts} IS NOT NULL AND ${main_end_ts} IS NOT NULL
        THEN ${render_start_ts} - ${main_end_ts}
        ELSE 0
      END as handoff_dur
    WHERE ${end_ts} > ${start_ts}
  )
  SELECT '1. 帧总耗时' as stage,
    ROUND(total_dur / 1e6, 2) as dur_ms,
    100.0 as pct
  FROM timing
  UNION ALL
  SELECT '2. 主线程 (UI 构建)' as stage,
    ROUND(main_dur / 1e6, 2) as dur_ms,
    ROUND(100.0 * main_dur / NULLIF(total_dur, 0), 1) as pct
  FROM timing
  UNION ALL
  SELECT '3. RenderThread (GPU 指令)' as stage,
    ROUND(render_dur / 1e6, 2) as dur_ms,
    ROUND(100.0 * render_dur / NULLIF(total_dur, 0), 1) as pct
  FROM timing
  UNION ALL
  SELECT '4. 主线程→RT 交接' as stage,
    ROUND(handoff_dur / 1e6, 2) as dur_ms,
    ROUND(100.0 * handoff_dur / NULLIF(total_dur, 0), 1) as pct
  FROM timing
  WHERE handoff_dur > 0

output:
  format: structured
