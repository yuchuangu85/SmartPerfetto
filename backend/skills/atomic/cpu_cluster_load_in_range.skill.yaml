# =============================================================================
# CPU 簇负载分析 (Composite Skill)
# =============================================================================
# 计算指定时间范围内各 CPU 簇（大核/小核）的整体负载
# 负载 = Running 时间 / (时间范围 × 簇内核心数)
# 100% 表示该簇所有核心完全跑满
#
# v2.0: 重构为 composite skill，复用 _cpu_topology 视图
#   - 调用 cpu_topology_view 创建共享拓扑视图
#   - 主 SQL 通过 JOIN _cpu_topology 获取核心分类
#   - 支持 prime/big/medium/little 四级分类

name: cpu_cluster_load_in_range
version: "2.0"
type: composite
category: cpu

meta:
  display_name: "CPU 簇负载分析"
  description: "计算大核簇和小核簇的整体 CPU 负载百分比（动态拓扑检测）"
  icon: "memory"
  tags: [cpu, cluster, load, atomic]

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "分析结束时间戳(ns)"

steps:
  # ========== 初始化 CPU 拓扑视图（供后续步骤 JOIN）==========
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  # ========== 簇负载计算 ==========
  - id: cluster_load
    type: atomic
    name: "CPU 簇负载计算"
    optional: true
    display:
      level: detail
      layer: deep
      title: "CPU 簇负载"
      columns:
        - name: cluster
          label: "CPU 簇"
          type: string
        - name: core_count
          label: "核心数"
          type: number
        - name: running_ms
          label: "Running 时间"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_capacity_ms
          label: "总容量"
          type: duration
          format: duration_ms
          unit: ms
        - name: load_pct
          label: "负载"
          type: percentage
          format: percentage
        - name: idle_pct
          label: "空闲"
          type: percentage
          format: percentage
        - name: max_single_core_pct
          label: "最忙核心"
          type: percentage
          format: percentage
    sql: |
      WITH
      -- 获取每个 CPU 上的 Running 状态时间
      cpu_running AS (
        SELECT
          ts.cpu,
          ct.core_type as cluster_type,
          -- 裁剪 slice 到时间范围内
          MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts}) as clipped_dur
        FROM thread_state ts
        JOIN _cpu_topology ct ON ts.cpu = ct.cpu_id
        WHERE ts.ts < ${end_ts}
          AND ts.ts + ts.dur > ${start_ts}
          AND ts.state = 'Running'
          AND ts.cpu IS NOT NULL
      ),
      -- 按 CPU 聚合
      per_cpu_stats AS (
        SELECT
          cpu,
          cluster_type,
          SUM(CASE WHEN clipped_dur > 0 THEN clipped_dur ELSE 0 END) as running_ns
        FROM cpu_running
        GROUP BY cpu, cluster_type
      ),
      -- 按簇聚合
      cluster_stats AS (
        SELECT
          cluster_type,
          COUNT(DISTINCT cpu) as core_count,
          SUM(running_ns) as total_running_ns,
          MAX(running_ns) as max_core_running_ns
        FROM per_cpu_stats
        GROUP BY cluster_type
      )
      SELECT
        CASE
          WHEN cluster_type = 'big' THEN '大核簇'
          ELSE '小核簇'
        END as cluster,
        core_count,
        ROUND(total_running_ns / 1e6, 2) as running_ms,
        ROUND((${end_ts} - ${start_ts}) * core_count / 1e6, 2) as total_capacity_ms,
        ROUND(100.0 * total_running_ns / NULLIF((${end_ts} - ${start_ts}) * core_count, 0), 1) as load_pct,
        ROUND(100.0 - 100.0 * total_running_ns / NULLIF((${end_ts} - ${start_ts}) * core_count, 0), 1) as idle_pct,
        ROUND(100.0 * max_core_running_ns / NULLIF(${end_ts} - ${start_ts}, 0), 1) as max_single_core_pct
      FROM cluster_stats
      ORDER BY cluster_type DESC
    save_as: cluster_load

output:
  format: structured
