# =============================================================================
# Rendering Pipeline Detection (24-Type Fine-Grained Detection)
# =============================================================================
# Identifies the primary rendering pipeline type used by the application.
#
# Supported Pipeline Types (24):
#   HWUI Family:
#     - ANDROID_VIEW_STANDARD_BLAST: Standard HWUI + BLAST (Android 12+)
#     - ANDROID_VIEW_STANDARD_LEGACY: Standard HWUI + Legacy BufferQueue
#     - ANDROID_VIEW_SOFTWARE: CPU Skia rendering (no RenderThread)
#     - ANDROID_VIEW_MIXED: View + SurfaceView hybrid
#     - ANDROID_VIEW_MULTI_WINDOW: Same-process multi-window serialization
#
#   Surface-Based:
#     - ANDROID_PIP_FREEFORM: PIP/Freeform window features
#     - SURFACEVIEW_BLAST: Independent Surface + BLAST
#     - TEXTUREVIEW_STANDARD: SurfaceTexture updateTexImage
#     - SURFACE_CONTROL_API: NDK SurfaceControl transactions
#
#   Graphics APIs:
#     - OPENGL_ES: GLES/EGL thread rendering
#     - VULKAN_NATIVE: vkQueuePresent/Swappy
#     - ANGLE_GLES_VULKAN: GLES-over-Vulkan (ANGLE)
#
#   Flutter:
#     - FLUTTER_SURFACEVIEW_IMPELLER: Flutter + Impeller engine
#     - FLUTTER_SURFACEVIEW_SKIA: Flutter + Skia engine
#     - FLUTTER_TEXTUREVIEW: Flutter PlatformView fallback
#
#   WebView:
#     - WEBVIEW_GL_FUNCTOR: App RT sync wait for WebView
#     - WEBVIEW_SURFACE_CONTROL: Viz/OOP-R/SC independent composition
#     - WEBVIEW_SURFACEVIEW_WRAPPER: Full-screen video wrapper
#     - WEBVIEW_TEXTUREVIEW_CUSTOM: X5/UC custom kernel
#
#   Specialized:
#     - GAME_ENGINE: Unity/Unreal/Godot engines
#     - CAMERA_PIPELINE: Camera2/HAL3 multi-stream
#     - VIDEO_OVERLAY_HWC: HWC video layer overlay
#     - HARDWARE_BUFFER_RENDERER: Android 14+ HBR
#     - VARIABLE_REFRESH_RATE: VRR/ARR/FrameTimeline
#
# =============================================================================

name: rendering_pipeline_detection
version: "2.0"
type: composite
category: rendering

meta:
  display_name: "渲染管线检测 (24 类型)"
  description: "细粒度识别应用使用的渲染管线类型，输出主链路+候选+特性"
  icon: "layers"
  tags: [rendering, pipeline, detection, teaching]

prerequisites:
  required_tables:
    - thread
    - process
  optional_tables:
    - slice
    - thread_track
    - counter
    - counter_track

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名 (可选，用于过滤)"

steps:
  # ==========================================================================
  # Step 1: Collect Thread Signals
  # ==========================================================================
  - id: thread_signals
    type: atomic
    name: "采集线程信号"
    display:
      level: detail
      title: "线程特征检测"
    sql: |
      WITH app_threads AS (
        SELECT DISTINCT
          t.name as thread_name,
          p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE t.name IS NOT NULL
          AND (p.name GLOB '${package}*' OR '${package}' = '')
      )
      SELECT
        -- Flutter signals
        SUM(CASE WHEN thread_name IN ('ui', '1.ui') THEN 1 ELSE 0 END) as flutter_ui_count,
        SUM(CASE WHEN thread_name GLOB '*raster*' OR thread_name = '1.raster' THEN 1 ELSE 0 END) as flutter_raster_count,
        SUM(CASE WHEN thread_name GLOB '*io.flutter*' THEN 1 ELSE 0 END) as flutter_io_count,
        -- Standard Android signals
        SUM(CASE WHEN thread_name = 'RenderThread' THEN 1 ELSE 0 END) as render_thread_count,
        SUM(CASE WHEN thread_name = 'main' THEN 1 ELSE 0 END) as main_thread_count,
        -- WebView/Chromium signals
        SUM(CASE WHEN thread_name GLOB '*Chrome*' THEN 1 ELSE 0 END) as chrome_count,
        SUM(CASE WHEN thread_name GLOB '*CrRenderer*' THEN 1 ELSE 0 END) as cr_renderer_count,
        SUM(CASE WHEN thread_name GLOB '*CompositorTileW*' THEN 1 ELSE 0 END) as compositor_tile_count,
        SUM(CASE WHEN thread_name GLOB '*VizCompositor*' THEN 1 ELSE 0 END) as viz_compositor_count,
        SUM(CASE WHEN thread_name GLOB '*WebViewCore*' THEN 1 ELSE 0 END) as webview_core_count,
        -- Game Engine signals
        SUM(CASE WHEN thread_name GLOB '*UnityMain*' THEN 1 ELSE 0 END) as unity_main_count,
        SUM(CASE WHEN thread_name GLOB '*UnityGfx*' THEN 1 ELSE 0 END) as unity_gfx_count,
        SUM(CASE WHEN thread_name GLOB '*GameThread*' THEN 1 ELSE 0 END) as unreal_game_count,
        SUM(CASE WHEN thread_name GLOB '*RHIThread*' THEN 1 ELSE 0 END) as unreal_rhi_count,
        SUM(CASE WHEN thread_name GLOB '*GodotMain*' THEN 1 ELSE 0 END) as godot_count,
        -- Surface-related signals
        SUM(CASE WHEN thread_name GLOB '*GLThread*' OR thread_name GLOB '*GLSurface*' THEN 1 ELSE 0 END) as gl_thread_count,
        SUM(CASE WHEN thread_name GLOB '*MediaCodec*' OR thread_name GLOB '*Decoder*' THEN 1 ELSE 0 END) as media_thread_count,
        SUM(CASE WHEN thread_name GLOB '*Camera*' THEN 1 ELSE 0 END) as camera_thread_count,
        -- Vulkan signals
        SUM(CASE WHEN thread_name GLOB '*Vulkan*' OR thread_name GLOB '*VkQueue*' THEN 1 ELSE 0 END) as vulkan_thread_count
      FROM app_threads
    save_as: thread_signals

  # ==========================================================================
  # Step 2: Collect Slice Signals
  # ==========================================================================
  - id: slice_signals
    type: atomic
    name: "采集 Slice 信号"
    display:
      level: detail
      title: "Slice 特征检测"
    sql: |
      WITH slice_counts AS (
        SELECT
          s.name as slice_name,
          COUNT(*) as cnt
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        GROUP BY s.name
        LIMIT 10000
      )
      SELECT
        -- BLAST signals
        SUM(CASE WHEN slice_name GLOB '*BLASTBufferQueue*' THEN cnt ELSE 0 END) as blast_bq_count,
        SUM(CASE WHEN slice_name GLOB '*applyTransaction*' THEN cnt ELSE 0 END) as apply_transaction_count,
        SUM(CASE WHEN slice_name GLOB '*setTransactionState*' THEN cnt ELSE 0 END) as set_transaction_count,
        -- Standard HWUI signals
        SUM(CASE WHEN slice_name GLOB 'DrawFrame*' THEN cnt ELSE 0 END) as draw_frame_count,
        SUM(CASE WHEN slice_name GLOB '*syncFrameState*' THEN cnt ELSE 0 END) as sync_frame_count,
        SUM(CASE WHEN slice_name GLOB '*Choreographer#doFrame*' THEN cnt ELSE 0 END) as choreographer_count,
        SUM(CASE WHEN slice_name GLOB '*queueBuffer*' THEN cnt ELSE 0 END) as queue_buffer_count,
        SUM(CASE WHEN slice_name GLOB '*dequeueBuffer*' THEN cnt ELSE 0 END) as dequeue_buffer_count,
        -- Flutter signals
        SUM(CASE WHEN slice_name GLOB '*Flutter*' THEN cnt ELSE 0 END) as flutter_slice_count,
        SUM(CASE WHEN slice_name GLOB '*Engine::BeginFrame*' THEN cnt ELSE 0 END) as flutter_begin_frame_count,
        SUM(CASE WHEN slice_name GLOB '*Rasterizer*' THEN cnt ELSE 0 END) as flutter_rasterizer_count,
        SUM(CASE WHEN slice_name GLOB '*EntityPass*' THEN cnt ELSE 0 END) as impeller_entity_count,
        SUM(CASE WHEN slice_name GLOB '*SkGpu*' OR slice_name GLOB '*SkiaGpu*' THEN cnt ELSE 0 END) as skia_gpu_count,
        -- WebView signals
        SUM(CASE WHEN slice_name GLOB '*DrawGL*' OR slice_name GLOB '*DrawFunctor*' THEN cnt ELSE 0 END) as draw_gl_functor_count,
        SUM(CASE WHEN slice_name GLOB '*Blink*' THEN cnt ELSE 0 END) as blink_count,
        SUM(CASE WHEN slice_name GLOB '*V8*' THEN cnt ELSE 0 END) as v8_count,
        SUM(CASE WHEN slice_name GLOB '*WebView*' THEN cnt ELSE 0 END) as webview_slice_count,
        -- Vulkan signals
        SUM(CASE WHEN slice_name GLOB '*vkQueuePresent*' THEN cnt ELSE 0 END) as vk_present_count,
        SUM(CASE WHEN slice_name GLOB '*Swappy*' THEN cnt ELSE 0 END) as swappy_count,
        SUM(CASE WHEN slice_name GLOB '*vkCmd*' THEN cnt ELSE 0 END) as vk_cmd_count,
        -- ANGLE signals
        SUM(CASE WHEN slice_name GLOB '*ANGLE*' THEN cnt ELSE 0 END) as angle_count,
        -- OpenGL signals
        SUM(CASE WHEN slice_name GLOB '*eglSwapBuffers*' THEN cnt ELSE 0 END) as egl_swap_count,
        SUM(CASE WHEN slice_name GLOB '*glDraw*' THEN cnt ELSE 0 END) as gl_draw_count,
        -- SurfaceView/TextureView signals
        SUM(CASE WHEN slice_name GLOB '*SurfaceView*' THEN cnt ELSE 0 END) as surfaceview_count,
        SUM(CASE WHEN slice_name GLOB '*SurfaceTexture*' OR slice_name GLOB '*updateTexImage*' THEN cnt ELSE 0 END) as texture_view_count,
        -- SurfaceControl signals
        SUM(CASE WHEN slice_name GLOB '*SurfaceControl*' THEN cnt ELSE 0 END) as surface_control_count,
        -- Game Engine signals
        SUM(CASE WHEN slice_name GLOB '*Unity*' THEN cnt ELSE 0 END) as unity_slice_count,
        SUM(CASE WHEN slice_name GLOB '*PlayerLoop*' THEN cnt ELSE 0 END) as unity_player_loop_count,
        SUM(CASE WHEN slice_name GLOB '*Unreal*' THEN cnt ELSE 0 END) as unreal_slice_count,
        -- Camera signals
        SUM(CASE WHEN slice_name GLOB '*Camera*' THEN cnt ELSE 0 END) as camera_slice_count,
        SUM(CASE WHEN slice_name GLOB '*CaptureSession*' THEN cnt ELSE 0 END) as capture_session_count,
        -- Video/HWC signals
        SUM(CASE WHEN slice_name GLOB '*MediaCodec*' OR slice_name GLOB '*Video*' THEN cnt ELSE 0 END) as video_slice_count,
        SUM(CASE WHEN slice_name GLOB '*HWC*' OR slice_name GLOB '*HardwareComposer*' THEN cnt ELSE 0 END) as hwc_slice_count,
        -- VRR/ARR signals
        SUM(CASE WHEN slice_name GLOB '*FrameTimeline*' THEN cnt ELSE 0 END) as frame_timeline_count,
        SUM(CASE WHEN slice_name GLOB '*setFrameRate*' OR slice_name GLOB '*FrameRateVote*' THEN cnt ELSE 0 END) as frame_rate_count,
        -- Software rendering signals
        SUM(CASE WHEN slice_name GLOB '*lockCanvas*' THEN cnt ELSE 0 END) as lock_canvas_count,
        -- Multi-window signals
        SUM(CASE WHEN slice_name GLOB '*Dialog*' OR slice_name GLOB '*PopupWindow*' THEN cnt ELSE 0 END) as dialog_count,
        -- PIP/Freeform signals
        SUM(CASE WHEN slice_name GLOB '*PictureInPicture*' OR slice_name GLOB '*PIP*' THEN cnt ELSE 0 END) as pip_count,
        -- X5/UC custom kernel signals
        SUM(CASE WHEN slice_name GLOB '*TBS*' OR slice_name GLOB '*X5*' OR slice_name GLOB '*UCCore*' THEN cnt ELSE 0 END) as custom_webview_count,
        -- HardwareBufferRenderer signals
        SUM(CASE WHEN slice_name GLOB '*HardwareBufferRenderer*' OR slice_name GLOB '*HBR*' THEN cnt ELSE 0 END) as hbr_count
      FROM slice_counts
    save_as: slice_signals

  # ==========================================================================
  # Step 3: Score Pipeline Types
  # ==========================================================================
  - id: score_pipelines
    type: atomic
    name: "计算管线得分"
    display:
      level: detail
      title: "管线类型评分"
    sql: |
      WITH thread_data AS (SELECT * FROM ${thread_signals}),
           slice_data AS (SELECT * FROM ${slice_signals}),
           scores AS (
        SELECT
          -- =====================================================================
          -- HWUI Family
          -- =====================================================================
          -- ANDROID_VIEW_STANDARD_BLAST: HWUI + BLAST
          CASE
            WHEN (SELECT render_thread_count FROM thread_data) > 0
                 AND (SELECT blast_bq_count + apply_transaction_count FROM slice_data) > 0
            THEN 0.40 +
                 CASE WHEN (SELECT draw_frame_count FROM slice_data) > 0 THEN 0.25 ELSE 0 END +
                 CASE WHEN (SELECT choreographer_count FROM slice_data) > 0 THEN 0.20 ELSE 0 END +
                 CASE WHEN (SELECT sync_frame_count FROM slice_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_android_view_standard_blast,

          -- ANDROID_VIEW_STANDARD_LEGACY: HWUI + Legacy (no BLAST)
          CASE
            WHEN (SELECT render_thread_count FROM thread_data) > 0
                 AND (SELECT blast_bq_count + apply_transaction_count FROM slice_data) = 0
                 AND (SELECT queue_buffer_count FROM slice_data) > 0
            THEN 0.35 +
                 CASE WHEN (SELECT draw_frame_count FROM slice_data) > 0 THEN 0.25 ELSE 0 END +
                 CASE WHEN (SELECT choreographer_count FROM slice_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_android_view_standard_legacy,

          -- ANDROID_VIEW_SOFTWARE: No RenderThread, CPU Skia
          CASE
            WHEN (SELECT render_thread_count FROM thread_data) = 0
                 AND (SELECT lock_canvas_count FROM slice_data) > 0
            THEN 0.60 + CASE WHEN (SELECT draw_frame_count FROM slice_data) = 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_android_view_software,

          -- ANDROID_VIEW_MIXED: View + SurfaceView hybrid
          CASE
            WHEN (SELECT render_thread_count FROM thread_data) > 0
                 AND (SELECT surfaceview_count FROM slice_data) > 0
                 AND (SELECT draw_frame_count FROM slice_data) > 0
            THEN 0.50 + CASE WHEN (SELECT media_thread_count FROM thread_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_android_view_mixed,

          -- ANDROID_VIEW_MULTI_WINDOW: Dialog/PopupWindow serialization
          CASE
            WHEN (SELECT dialog_count FROM slice_data) > 0
            THEN 0.40 + CASE WHEN (SELECT render_thread_count FROM thread_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_android_view_multi_window,

          -- =====================================================================
          -- Surface-Based
          -- =====================================================================
          -- ANDROID_PIP_FREEFORM: PIP/Freeform
          CASE
            WHEN (SELECT pip_count FROM slice_data) > 0
            THEN 0.70
            ELSE 0
          END as score_android_pip_freeform,

          -- SURFACEVIEW_BLAST: Independent SurfaceView + BLAST
          CASE
            WHEN (SELECT surfaceview_count FROM slice_data) > 10
                 AND (SELECT blast_bq_count FROM slice_data) > 0
                 AND (SELECT flutter_ui_count FROM thread_data) = 0
                 AND (SELECT chrome_count + cr_renderer_count FROM thread_data) = 0
            THEN 0.55 + CASE WHEN (SELECT gl_thread_count FROM thread_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_surfaceview_blast,

          -- TEXTUREVIEW_STANDARD: SurfaceTexture updateTexImage
          CASE
            WHEN (SELECT texture_view_count FROM slice_data) > 5
            THEN 0.60 + CASE WHEN (SELECT render_thread_count FROM thread_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_textureview_standard,

          -- SURFACE_CONTROL_API: NDK SurfaceControl
          CASE
            WHEN (SELECT surface_control_count FROM slice_data) > 10
            THEN 0.65 + CASE WHEN (SELECT apply_transaction_count FROM slice_data) > 0 THEN 0.20 ELSE 0 END
            ELSE 0
          END as score_surface_control_api,

          -- =====================================================================
          -- Graphics APIs
          -- =====================================================================
          -- OPENGL_ES: GLES/EGL rendering
          CASE
            WHEN (SELECT egl_swap_count FROM slice_data) > 0
                 AND (SELECT vk_present_count FROM slice_data) = 0
                 AND (SELECT angle_count FROM slice_data) = 0
                 AND (SELECT flutter_ui_count FROM thread_data) = 0
            THEN 0.50 +
                 CASE WHEN (SELECT gl_draw_count FROM slice_data) > 0 THEN 0.20 ELSE 0 END +
                 CASE WHEN (SELECT gl_thread_count FROM thread_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_opengl_es,

          -- VULKAN_NATIVE: Native Vulkan
          CASE
            WHEN (SELECT vk_present_count FROM slice_data) > 0
                 OR (SELECT vk_cmd_count FROM slice_data) > 10
            THEN 0.60 +
                 CASE WHEN (SELECT swappy_count FROM slice_data) > 0 THEN 0.20 ELSE 0 END +
                 CASE WHEN (SELECT vulkan_thread_count FROM thread_data) > 0 THEN 0.10 ELSE 0 END
            ELSE 0
          END as score_vulkan_native,

          -- ANGLE_GLES_VULKAN: ANGLE translation layer
          CASE
            WHEN (SELECT angle_count FROM slice_data) > 0
            THEN 0.80
            ELSE 0
          END as score_angle_gles_vulkan,

          -- =====================================================================
          -- Flutter
          -- =====================================================================
          -- FLUTTER_SURFACEVIEW_IMPELLER: Flutter + Impeller
          CASE
            WHEN (SELECT flutter_ui_count FROM thread_data) > 0
                 AND (SELECT impeller_entity_count FROM slice_data) > 0
            THEN 0.80 + CASE WHEN (SELECT flutter_raster_count FROM thread_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_flutter_surfaceview_impeller,

          -- FLUTTER_SURFACEVIEW_SKIA: Flutter + Skia
          CASE
            WHEN (SELECT flutter_ui_count FROM thread_data) > 0
                 AND (SELECT skia_gpu_count FROM slice_data) > 0
                 AND (SELECT impeller_entity_count FROM slice_data) = 0
            THEN 0.75 + CASE WHEN (SELECT flutter_raster_count FROM thread_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_flutter_surfaceview_skia,

          -- FLUTTER_TEXTUREVIEW: Flutter PlatformView fallback
          CASE
            WHEN (SELECT flutter_ui_count FROM thread_data) > 0
                 AND (SELECT texture_view_count FROM slice_data) > 0
            THEN 0.65
            ELSE 0
          END as score_flutter_textureview,

          -- =====================================================================
          -- WebView
          -- =====================================================================
          -- WEBVIEW_GL_FUNCTOR: App RT sync wait
          CASE
            WHEN (SELECT draw_gl_functor_count FROM slice_data) > 0
                 OR ((SELECT cr_renderer_count FROM thread_data) > 0
                     AND (SELECT render_thread_count FROM thread_data) > 0
                     AND (SELECT viz_compositor_count FROM thread_data) = 0)
            THEN 0.70 + CASE WHEN (SELECT blink_count + v8_count FROM slice_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_webview_gl_functor,

          -- WEBVIEW_SURFACE_CONTROL: Viz/OOP-R/SC
          CASE
            WHEN (SELECT viz_compositor_count FROM thread_data) > 0
            THEN 0.75 + CASE WHEN (SELECT surface_control_count FROM slice_data) > 0 THEN 0.15 ELSE 0 END
            ELSE 0
          END as score_webview_surface_control,

          -- WEBVIEW_SURFACEVIEW_WRAPPER: Full-screen video
          CASE
            WHEN (SELECT webview_slice_count + webview_core_count FROM slice_data) > 0
                 AND (SELECT surfaceview_count FROM slice_data) > 0
                 AND (SELECT video_slice_count FROM slice_data) > 0
            THEN 0.65
            ELSE 0
          END as score_webview_surfaceview_wrapper,

          -- WEBVIEW_TEXTUREVIEW_CUSTOM: X5/UC custom kernel
          CASE
            WHEN (SELECT custom_webview_count FROM slice_data) > 0
            THEN 0.80
            ELSE 0
          END as score_webview_textureview_custom,

          -- =====================================================================
          -- Specialized
          -- =====================================================================
          -- GAME_ENGINE: Unity/Unreal/Godot
          CASE
            WHEN (SELECT unity_main_count + unity_gfx_count FROM thread_data) > 0
            THEN 0.85
            WHEN (SELECT unreal_game_count + unreal_rhi_count FROM thread_data) > 0
            THEN 0.85
            WHEN (SELECT godot_count FROM thread_data) > 0
            THEN 0.80
            WHEN (SELECT unity_slice_count + unity_player_loop_count FROM slice_data) > 0
            THEN 0.75
            WHEN (SELECT unreal_slice_count FROM slice_data) > 0
            THEN 0.75
            ELSE 0
          END as score_game_engine,

          -- CAMERA_PIPELINE: Camera2/HAL3
          CASE
            WHEN (SELECT camera_thread_count FROM thread_data) > 0
                 AND (SELECT camera_slice_count + capture_session_count FROM slice_data) > 0
            THEN 0.70
            ELSE 0
          END as score_camera_pipeline,

          -- VIDEO_OVERLAY_HWC: HWC video layer
          CASE
            WHEN (SELECT hwc_slice_count FROM slice_data) > 0
                 AND (SELECT video_slice_count FROM slice_data) > 0
            THEN 0.65
            ELSE 0
          END as score_video_overlay_hwc,

          -- HARDWARE_BUFFER_RENDERER: Android 14+ HBR
          CASE
            WHEN (SELECT hbr_count FROM slice_data) > 0
            THEN 0.75
            ELSE 0
          END as score_hardware_buffer_renderer,

          -- VARIABLE_REFRESH_RATE: VRR/ARR
          CASE
            WHEN (SELECT frame_timeline_count FROM slice_data) > 0
                 AND (SELECT frame_rate_count FROM slice_data) > 0
            THEN 0.60
            WHEN (SELECT frame_timeline_count FROM slice_data) > 5
            THEN 0.40
            ELSE 0
          END as score_variable_refresh_rate
      )
      SELECT * FROM scores
    save_as: pipeline_scores

  # ==========================================================================
  # Step 4: Determine Primary Pipeline and Candidates
  # ==========================================================================
  - id: determine_pipeline
    type: atomic
    name: "确定主管线"
    display:
      level: summary
      title: "渲染管线识别结果"
    sql: |
      WITH scores AS (SELECT * FROM ${pipeline_scores}),
           all_scores AS (
        SELECT 'ANDROID_VIEW_STANDARD_BLAST' as pipeline_id, score_android_view_standard_blast as score FROM scores
        UNION ALL SELECT 'ANDROID_VIEW_STANDARD_LEGACY', score_android_view_standard_legacy FROM scores
        UNION ALL SELECT 'ANDROID_VIEW_SOFTWARE', score_android_view_software FROM scores
        UNION ALL SELECT 'ANDROID_VIEW_MIXED', score_android_view_mixed FROM scores
        UNION ALL SELECT 'ANDROID_VIEW_MULTI_WINDOW', score_android_view_multi_window FROM scores
        UNION ALL SELECT 'ANDROID_PIP_FREEFORM', score_android_pip_freeform FROM scores
        UNION ALL SELECT 'SURFACEVIEW_BLAST', score_surfaceview_blast FROM scores
        UNION ALL SELECT 'TEXTUREVIEW_STANDARD', score_textureview_standard FROM scores
        UNION ALL SELECT 'SURFACE_CONTROL_API', score_surface_control_api FROM scores
        UNION ALL SELECT 'OPENGL_ES', score_opengl_es FROM scores
        UNION ALL SELECT 'VULKAN_NATIVE', score_vulkan_native FROM scores
        UNION ALL SELECT 'ANGLE_GLES_VULKAN', score_angle_gles_vulkan FROM scores
        UNION ALL SELECT 'FLUTTER_SURFACEVIEW_IMPELLER', score_flutter_surfaceview_impeller FROM scores
        UNION ALL SELECT 'FLUTTER_SURFACEVIEW_SKIA', score_flutter_surfaceview_skia FROM scores
        UNION ALL SELECT 'FLUTTER_TEXTUREVIEW', score_flutter_textureview FROM scores
        UNION ALL SELECT 'WEBVIEW_GL_FUNCTOR', score_webview_gl_functor FROM scores
        UNION ALL SELECT 'WEBVIEW_SURFACE_CONTROL', score_webview_surface_control FROM scores
        UNION ALL SELECT 'WEBVIEW_SURFACEVIEW_WRAPPER', score_webview_surfaceview_wrapper FROM scores
        UNION ALL SELECT 'WEBVIEW_TEXTUREVIEW_CUSTOM', score_webview_textureview_custom FROM scores
        UNION ALL SELECT 'GAME_ENGINE', score_game_engine FROM scores
        UNION ALL SELECT 'CAMERA_PIPELINE', score_camera_pipeline FROM scores
        UNION ALL SELECT 'VIDEO_OVERLAY_HWC', score_video_overlay_hwc FROM scores
        UNION ALL SELECT 'HARDWARE_BUFFER_RENDERER', score_hardware_buffer_renderer FROM scores
        UNION ALL SELECT 'VARIABLE_REFRESH_RATE', score_variable_refresh_rate FROM scores
      ),
      ranked AS (
        SELECT
          pipeline_id,
          score,
          ROW_NUMBER() OVER (ORDER BY score DESC) as rank
        FROM all_scores
        WHERE score > 0.3
      ),
      primary_pipeline AS (
        SELECT pipeline_id, score FROM ranked WHERE rank = 1
      ),
      candidates AS (
        SELECT pipeline_id, score FROM ranked WHERE rank <= 5
      ),
      features AS (
        SELECT pipeline_id, score FROM all_scores
        WHERE pipeline_id IN ('VARIABLE_REFRESH_RATE', 'VIDEO_OVERLAY_HWC', 'SURFACE_CONTROL_API')
          AND score > 0.3
      )
      SELECT
        COALESCE((SELECT pipeline_id FROM primary_pipeline), 'ANDROID_VIEW_STANDARD_BLAST') as primary_pipeline_id,
        COALESCE((SELECT score FROM primary_pipeline), 0.50) as primary_confidence,
        (SELECT GROUP_CONCAT(pipeline_id || ':' || ROUND(score, 2), '; ') FROM candidates) as candidates_list,
        (SELECT GROUP_CONCAT(pipeline_id || ':' || ROUND(score, 2), '; ') FROM features) as features_list,
        CASE COALESCE((SELECT pipeline_id FROM primary_pipeline), 'ANDROID_VIEW_STANDARD_BLAST')
          WHEN 'ANDROID_VIEW_STANDARD_BLAST' THEN 'rendering_pipelines/android_view_standard.md'
          WHEN 'ANDROID_VIEW_STANDARD_LEGACY' THEN 'rendering_pipelines/android_view_standard.md'
          WHEN 'ANDROID_VIEW_SOFTWARE' THEN 'rendering_pipelines/android_view_software.md'
          WHEN 'ANDROID_VIEW_MIXED' THEN 'rendering_pipelines/android_view_mixed.md'
          WHEN 'ANDROID_VIEW_MULTI_WINDOW' THEN 'rendering_pipelines/android_view_multi_window.md'
          WHEN 'ANDROID_PIP_FREEFORM' THEN 'rendering_pipelines/android_pip_freeform.md'
          WHEN 'SURFACEVIEW_BLAST' THEN 'rendering_pipelines/surfaceview.md'
          WHEN 'TEXTUREVIEW_STANDARD' THEN 'rendering_pipelines/textureview.md'
          WHEN 'SURFACE_CONTROL_API' THEN 'rendering_pipelines/surface_control_api.md'
          WHEN 'OPENGL_ES' THEN 'rendering_pipelines/opengl_es.md'
          WHEN 'VULKAN_NATIVE' THEN 'rendering_pipelines/vulkan_native.md'
          WHEN 'ANGLE_GLES_VULKAN' THEN 'rendering_pipelines/angle_gles_vulkan.md'
          WHEN 'FLUTTER_SURFACEVIEW_IMPELLER' THEN 'rendering_pipelines/flutter_surfaceview.md'
          WHEN 'FLUTTER_SURFACEVIEW_SKIA' THEN 'rendering_pipelines/flutter_surfaceview.md'
          WHEN 'FLUTTER_TEXTUREVIEW' THEN 'rendering_pipelines/flutter_textureview.md'
          WHEN 'WEBVIEW_GL_FUNCTOR' THEN 'rendering_pipelines/webview_gl_functor.md'
          WHEN 'WEBVIEW_SURFACE_CONTROL' THEN 'rendering_pipelines/webview_surface_control.md'
          WHEN 'WEBVIEW_SURFACEVIEW_WRAPPER' THEN 'rendering_pipelines/webview_surfaceview_wrapper.md'
          WHEN 'WEBVIEW_TEXTUREVIEW_CUSTOM' THEN 'rendering_pipelines/webview_textureview_custom.md'
          WHEN 'GAME_ENGINE' THEN 'rendering_pipelines/game_engine.md'
          WHEN 'CAMERA_PIPELINE' THEN 'rendering_pipelines/camera_pipeline.md'
          WHEN 'VIDEO_OVERLAY_HWC' THEN 'rendering_pipelines/video_overlay_hwc.md'
          WHEN 'HARDWARE_BUFFER_RENDERER' THEN 'rendering_pipelines/hardware_buffer_renderer.md'
          WHEN 'VARIABLE_REFRESH_RATE' THEN 'rendering_pipelines/variable_refresh_rate.md'
          ELSE 'rendering_pipelines/android_view_standard.md'
        END as doc_path
    save_as: pipeline_result

  # ==========================================================================
  # Step 5: Determine Subvariants
  # ==========================================================================
  - id: subvariants
    type: atomic
    name: "确定子变体"
    display:
      level: detail
      title: "子变体检测"
    sql: |
      WITH slice_data AS (SELECT * FROM ${slice_signals}),
           thread_data AS (SELECT * FROM ${thread_signals})
      SELECT
        -- Buffer Mode
        CASE
          WHEN (SELECT blast_bq_count + apply_transaction_count FROM slice_data) > 0 THEN 'BLAST'
          WHEN (SELECT queue_buffer_count FROM slice_data) > 0 THEN 'LEGACY'
          ELSE 'UNKNOWN'
        END as buffer_mode,
        -- Flutter Engine
        CASE
          WHEN (SELECT impeller_entity_count FROM slice_data) > 0 THEN 'IMPELLER'
          WHEN (SELECT skia_gpu_count FROM slice_data) > 0 THEN 'SKIA'
          WHEN (SELECT flutter_ui_count FROM thread_data) > 0 THEN 'UNKNOWN'
          ELSE 'N/A'
        END as flutter_engine,
        -- WebView Mode
        CASE
          WHEN (SELECT viz_compositor_count FROM thread_data) > 0 THEN 'SURFACE_CONTROL'
          WHEN (SELECT draw_gl_functor_count FROM slice_data) > 0 THEN 'GL_FUNCTOR'
          WHEN (SELECT custom_webview_count FROM slice_data) > 0 THEN 'TEXTUREVIEW_CUSTOM'
          WHEN (SELECT webview_slice_count FROM slice_data) > 0 AND (SELECT surfaceview_count FROM slice_data) > 0 THEN 'SURFACEVIEW_WRAPPER'
          WHEN (SELECT chrome_count + cr_renderer_count FROM thread_data) > 0 THEN 'UNKNOWN'
          ELSE 'N/A'
        END as webview_mode,
        -- Game Engine
        CASE
          WHEN (SELECT unity_main_count FROM thread_data) > 0 THEN 'UNITY'
          WHEN (SELECT unreal_game_count FROM thread_data) > 0 THEN 'UNREAL'
          WHEN (SELECT godot_count FROM thread_data) > 0 THEN 'GODOT'
          ELSE 'N/A'
        END as game_engine
    save_as: subvariants

  # ==========================================================================
  # Step 6: Generate Pin Instructions
  # ==========================================================================
  - id: pin_instructions
    type: atomic
    name: "生成 Pin 指令"
    display:
      level: detail
      title: "Track 固定建议"
    sql: |
      WITH pipeline AS (SELECT * FROM ${pipeline_result})
      SELECT
        (SELECT primary_pipeline_id FROM pipeline) as pipeline_id,
        CASE (SELECT primary_pipeline_id FROM pipeline)
          -- HWUI Family
          WHEN 'ANDROID_VIEW_STANDARD_BLAST' THEN 'main|RenderThread|SurfaceFlinger|VSYNC'
          WHEN 'ANDROID_VIEW_STANDARD_LEGACY' THEN 'main|RenderThread|SurfaceFlinger'
          WHEN 'ANDROID_VIEW_SOFTWARE' THEN 'main|SurfaceFlinger'
          WHEN 'ANDROID_VIEW_MIXED' THEN 'main|RenderThread|SurfaceFlinger|GLThread'
          WHEN 'ANDROID_VIEW_MULTI_WINDOW' THEN 'main|RenderThread|SurfaceFlinger'
          -- Surface-Based
          WHEN 'SURFACEVIEW_BLAST' THEN 'GLThread|SurfaceFlinger|VSYNC'
          WHEN 'TEXTUREVIEW_STANDARD' THEN 'main|RenderThread|SurfaceFlinger'
          WHEN 'SURFACE_CONTROL_API' THEN 'main|SurfaceFlinger|SurfaceControl'
          -- Graphics APIs
          WHEN 'OPENGL_ES' THEN 'GLThread|RenderThread|SurfaceFlinger'
          WHEN 'VULKAN_NATIVE' THEN 'main|RenderThread|SurfaceFlinger|VkQueue'
          WHEN 'ANGLE_GLES_VULKAN' THEN 'main|RenderThread|SurfaceFlinger'
          -- Flutter
          WHEN 'FLUTTER_SURFACEVIEW_IMPELLER' THEN '1.ui|1.raster|io.flutter|SurfaceFlinger'
          WHEN 'FLUTTER_SURFACEVIEW_SKIA' THEN '1.ui|1.raster|io.flutter|SurfaceFlinger'
          WHEN 'FLUTTER_TEXTUREVIEW' THEN '1.ui|1.raster|RenderThread|SurfaceFlinger'
          -- WebView
          WHEN 'WEBVIEW_GL_FUNCTOR' THEN 'main|RenderThread|CrRendererMain|SurfaceFlinger'
          WHEN 'WEBVIEW_SURFACE_CONTROL' THEN 'CrRendererMain|VizCompositor|SurfaceFlinger'
          WHEN 'WEBVIEW_SURFACEVIEW_WRAPPER' THEN 'main|CrRendererMain|SurfaceFlinger'
          WHEN 'WEBVIEW_TEXTUREVIEW_CUSTOM' THEN 'main|RenderThread|CrRendererMain|SurfaceFlinger'
          -- Specialized
          WHEN 'GAME_ENGINE' THEN 'UnityMain|UnityGfx|GameThread|RenderThread|SurfaceFlinger'
          WHEN 'CAMERA_PIPELINE' THEN 'CameraSession|SurfaceFlinger'
          WHEN 'VIDEO_OVERLAY_HWC' THEN 'MediaCodec|SurfaceFlinger|HWC'
          WHEN 'HARDWARE_BUFFER_RENDERER' THEN 'main|SurfaceFlinger'
          WHEN 'VARIABLE_REFRESH_RATE' THEN 'main|RenderThread|SurfaceFlinger|VSYNC'
          ELSE 'main|RenderThread|SurfaceFlinger'
        END as pin_patterns
    save_as: pin_instructions

  # ==========================================================================
  # Step 7: Check Trace Requirements
  # ==========================================================================
  - id: trace_requirements
    type: atomic
    name: "检查采集完整性"
    display:
      level: detail
      title: "采集建议"
    sql: |
      WITH slice_data AS (SELECT * FROM ${slice_signals}),
           thread_data AS (SELECT * FROM ${thread_signals})
      SELECT
        -- Check for common missing data
        CASE WHEN (SELECT draw_frame_count FROM slice_data) = 0 THEN 'gfx:RenderThread slices missing - add atrace category: gfx' ELSE NULL END as hint_gfx,
        CASE WHEN (SELECT choreographer_count FROM slice_data) = 0 THEN 'Choreographer slices missing - add atrace category: input' ELSE NULL END as hint_input,
        CASE WHEN (SELECT blast_bq_count FROM slice_data) = 0
             AND (SELECT queue_buffer_count FROM slice_data) = 0
        THEN 'BufferQueue slices missing - add atrace category: binder_driver' ELSE NULL END as hint_buffer,
        CASE WHEN NOT EXISTS (SELECT 1 FROM slice WHERE name GLOB '*SurfaceFlinger*' LIMIT 1)
        THEN 'SurfaceFlinger slices missing - add atrace category: sf or run as root' ELSE NULL END as hint_sf,
        CASE WHEN (SELECT frame_timeline_count FROM slice_data) = 0
        THEN 'FrameTimeline missing - add ftrace event: surfaceflinger/frametimeline' ELSE NULL END as hint_timeline
    save_as: trace_requirements

  # ==========================================================================
  # Step 8: Identify Active Rendering Processes (v3 Smart Pin Enhancement)
  # ==========================================================================
  # Uses actual_frame_timeline_slice to identify processes that are actually
  # producing frames, avoiding pinning idle background RenderThreads
  - id: active_rendering_processes
    type: atomic
    name: "识别活跃渲染进程"
    display:
      level: detail
      title: "活跃渲染进程"
    sql: |
      -- Query active rendering processes from actual_frame_timeline_slice
      -- This table contains real frame production events with surface_frame_token
      SELECT
        p.upid,
        p.name as process_name,
        COUNT(*) as frame_count,
        -- Get the main RenderThread tid for this process
        (SELECT t.tid FROM thread t
         WHERE t.upid = p.upid AND t.name = 'RenderThread'
         LIMIT 1) as render_thread_tid
      FROM actual_frame_timeline_slice a
      LEFT JOIN process p ON a.upid = p.upid
      WHERE a.surface_frame_token IS NOT NULL
        AND p.name IS NOT NULL
        AND p.name NOT LIKE 'com.android.systemui%'  -- Exclude always-present SystemUI
      GROUP BY a.upid
      HAVING frame_count > 0
      ORDER BY frame_count DESC
      LIMIT 10
    save_as: active_rendering_processes

output:
  format: structured
  fields:
    - name: pipeline_result
      description: "主管线识别结果"
    - name: subvariants
      description: "子变体信息"
    - name: pin_instructions
      description: "Track 固定建议"
    - name: trace_requirements
      description: "采集完整性检查"
    - name: pipeline_scores
      description: "各管线类型得分 (调试用)"
    - name: active_rendering_processes
      description: "活跃渲染进程列表 (用于智能 Pin)"
