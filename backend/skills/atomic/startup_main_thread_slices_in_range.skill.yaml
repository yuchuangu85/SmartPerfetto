# =============================================================================
# 启动主线程热点切片（原子 Skill）
# =============================================================================

name: startup_main_thread_slices_in_range
version: "1.0"
type: atomic
category: app_lifecycle

meta:
  display_name: "启动主线程切片热点 (区间)"
  description: "统计启动阶段主线程切片热点"
  icon: "view_timeline"
  tags: [startup, main_thread, slice, atomic]

prerequisites:
  modules:
    - android.startup.startups

inputs:
  - name: package
    type: string
    required: false
  - name: startup_id
    type: integer
    required: false
  - name: startup_type
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false
  - name: min_dur_ns
    type: integer
    required: false
  - name: top_k
    type: integer
    required: false

display:
  level: key
  layer: overview
  title: "主线程耗时操作 Top15"
  columns:
    - name: slice_name
      label: "操作名称"
      type: string
    - name: thread_name
      label: "线程"
      type: string
    - name: count
      label: "次数"
      type: number
      format: compact
    - name: total_dur_ms
      label: "总耗时"
      type: duration
      format: duration_ms
    - name: avg_dur_ms
      label: "平均耗时"
      type: duration
      format: duration_ms
    - name: max_dur_ms
      label: "最大耗时"
      type: duration
      format: duration_ms
    - name: percent_of_startup
      label: "启动占比"
      type: percentage
      format: percentage
    - name: startup_type
      label: "启动类型"
      type: string

sql: |
  SELECT
    ts.slice_name,
    ts.thread_name,
    COUNT(*) as count,
    SUM(ts.slice_dur) / 1e6 as total_dur_ms,
    ROUND(AVG(ts.slice_dur) / 1e6, 2) as avg_dur_ms,
    ROUND(MAX(ts.slice_dur) / 1e6, 2) as max_dur_ms,
    ROUND(100.0 * SUM(ts.slice_dur) / s.dur, 1) as percent_of_startup,
    s.startup_type,
    s.package
  FROM android_thread_slices_for_all_startups ts
  JOIN android_startups s ON ts.startup_id = s.startup_id
  WHERE ts.is_main_thread = 1
    AND (s.package GLOB '${package}*' OR '${package}' = '')
    AND (${startup_id} IS NULL OR s.startup_id = ${startup_id})
    AND ('${startup_type}' = '' OR s.startup_type = '${startup_type}')
    AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
    AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
    AND ts.slice_dur > ${min_dur_ns|1000000}
  GROUP BY ts.slice_name, s.startup_id
  ORDER BY total_dur_ms DESC
  LIMIT ${top_k|15}

output:
  format: structured
