# =============================================================================
# Vsync 配置检测 Skill
# =============================================================================
# 从 trace 中解析实际的 Vsync 周期和刷新率设置
#
# 数据来源 (按优先级):
#   1. SurfaceFlinger 的 VSYNC-sf/vsync-app slice 间隔 (最可靠)
#   2. expected_frame_timeline_slice 的帧 duration
#   3. 默认 60Hz (16.67ms)
#
# 输出:
#   - vsync_period_ns: Vsync 周期（纳秒）
#   - refresh_rate_hz: 刷新率（Hz）
#   - vsync_source: 数据来源
# =============================================================================

name: vsync_config
version: "1.1"
type: atomic

meta:
  display_name: "Vsync 配置检测"
  description: "检测当前的 Vsync 周期和刷新率设置"
  icon: "refresh"
  tags: [vsync, refresh_rate, environment]

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间（可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间（可选）"

steps:
  - id: detect_vsync_config
    type: atomic
    name: "检测 Vsync 配置"
    sql: |
      WITH
      -- 方法1: 从 SurfaceFlinger 的 VSYNC slice 间隔推算周期 (最可靠)
      sf_vsync_intervals AS (
        SELECT
          s.ts,
          LEAD(s.ts) OVER (ORDER BY s.ts) - s.ts AS interval_ns
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name = 'surfaceflinger' OR p.name LIKE '%surfaceflinger%')
          AND (s.name GLOB '*VSYNC*' OR s.name GLOB '*vsync-sf*' OR s.name GLOB '*vsync-app*')
        LIMIT 500
      ),
      sf_vsync AS (
        SELECT
          CAST(AVG(interval_ns) AS INTEGER) as vsync_period_ns,
          'sf_vsync_interval' as source
        FROM sf_vsync_intervals
        WHERE interval_ns > 5000000 AND interval_ns < 30000000
      ),
      -- 方法2: 从 expected_frame_timeline_slice 获取 vsync 周期
      expected_frame_vsync AS (
        SELECT
          -- expected frame 的 dur 就是 vsync 周期
          CAST(AVG(dur) AS INTEGER) as vsync_period_ns,
          'expected_frame_dur' as source
        FROM expected_frame_timeline_slice
        WHERE dur > 5000000 AND dur < 20000000  -- 5ms-20ms 的合理范围
        LIMIT 1000
      ),
      -- 合并结果，按优先级选择
      combined AS (
        SELECT vsync_period_ns, source FROM sf_vsync WHERE vsync_period_ns > 0
        UNION ALL
        SELECT vsync_period_ns, source FROM expected_frame_vsync WHERE vsync_period_ns > 0
      )
      SELECT
        COALESCE(
          (SELECT vsync_period_ns FROM combined LIMIT 1),
          16666666  -- 默认 60Hz
        ) as vsync_period_ns,
        ROUND(1e9 / COALESCE(
          (SELECT vsync_period_ns FROM combined LIMIT 1),
          16666666
        ), 0) as refresh_rate_hz,
        ROUND(COALESCE(
          (SELECT vsync_period_ns FROM combined LIMIT 1),
          16666666
        ) / 1e6, 2) as vsync_period_ms,
        COALESCE(
          (SELECT source FROM combined LIMIT 1),
          'default_60hz'
        ) as vsync_source,
        CASE
          WHEN COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) < 9000000 THEN 120
          WHEN COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) < 12000000 THEN 90
          ELSE 60
        END as detected_refresh_rate
    save_as: vsync_config

output:
  format: single_row
  fields:
    - name: vsync_period_ns
      type: integer
      description: "Vsync 周期（纳秒）"
    - name: refresh_rate_hz
      type: number
      description: "刷新率（Hz）"
    - name: vsync_period_ms
      type: number
      description: "Vsync 周期（毫秒）"
    - name: vsync_source
      type: string
      description: "数据来源"
    - name: detected_refresh_rate
      type: integer
      description: "检测到的刷新率"
