# =============================================================================
# 启动类加载分析（原子 Skill）
# =============================================================================

name: startup_class_loading_in_range
version: "1.0"
type: atomic
category: app_lifecycle

meta:
  display_name: "启动类加载分析 (区间)"
  description: "统计启动阶段类加载切片耗时"
  icon: "dataset"
  tags: [startup, class_loading, dex, atomic]

prerequisites:
  modules:
    - android.startup.startups

inputs:
  - name: package
    type: string
    required: false
  - name: startup_id
    type: integer
    required: false
  - name: startup_type
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false
  - name: top_k
    type: integer
    required: false

display:
  level: detail
  layer: list
  title: "启动期间类加载"
  columns:
    - name: slice_name
      label: "类名"
      type: string
    - name: thread_name
      label: "线程"
      type: string
    - name: count
      label: "次数"
      type: number
      format: compact
    - name: total_dur_ms
      label: "总耗时"
      type: duration
      format: duration_ms
    - name: avg_dur_ms
      label: "平均耗时"
      type: duration
      format: duration_ms
    - name: percent_of_startup
      label: "启动占比"
      type: percentage
      format: percentage

sql: |
  SELECT
    cl.slice_name,
    cl.thread_name,
    COUNT(*) as count,
    SUM(cl.slice_dur) / 1e6 as total_dur_ms,
    ROUND(AVG(cl.slice_dur) / 1e6, 2) as avg_dur_ms,
    s.startup_type,
    ROUND(100.0 * SUM(cl.slice_dur) / s.dur, 1) as percent_of_startup
  FROM android_class_loading_for_startup cl
  JOIN android_startups s ON cl.startup_id = s.startup_id
  WHERE (s.package GLOB '${package}*' OR '${package}' = '')
    AND (${startup_id} IS NULL OR s.startup_id = ${startup_id})
    AND ('${startup_type}' = '' OR s.startup_type = '${startup_type}')
    AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
    AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
  GROUP BY cl.slice_name
  ORDER BY total_dur_ms DESC
  LIMIT ${top_k|10}

output:
  format: structured
