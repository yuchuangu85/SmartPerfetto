# GPU Analysis Skill v2.1
# Uses Perfetto stdlib tables:
# - android_gpu_frequency: ts, dur, gpu_id, gpu_freq, prev_gpu_freq, next_gpu_freq
# - android_gpu_memory_per_process: ts, dur, upid, gpu_memory
# - android_gpu_work_period (if available)
# - actual_frame_timeline_slice for GPU jank correlation

name: gpu_analysis
version: "2.1"
type: composite
display:
  name: "GPU 分析"
  level: expert
  description: "GPU 频率、内存、负载分析，关联帧渲染和 Jank 检测"

triggers:
  - pattern: "(GPU|gpu|显卡|图形|渲染|rendering)"
    confidence: 0.95
  - pattern: "(GPU 频率|gpu freq|graphics|mali|adreno)"
    confidence: 0.9
  - pattern: "(GPU 内存|gpu memory|显存)"
    confidence: 0.9

parameters:
  - name: process_name
    type: string
    required: false
    description: "目标进程名，留空分析全局 GPU 状态"
  - name: time_range_start
    type: number
    required: false
    description: "分析时间范围起始 (秒)"
  - name: time_range_end
    type: number
    required: false
    description: "分析时间范围结束 (秒)"

analysis_steps:
  # Step 1: GPU 频率分布分析
  - id: gpu_frequency_distribution
    type: diagnostic
    name: "GPU 频率分布"
    description: "分析 GPU 各频率档位的时间占比"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.frequency;

      SELECT
        gpu_id,
        gpu_freq / 1000000 AS gpu_freq_mhz,
        SUM(dur) / 1e9 AS total_time_sec,
        ROUND(SUM(dur) * 100.0 / (SELECT SUM(dur) FROM android_gpu_frequency WHERE gpu_id = g.gpu_id), 2) AS time_pct
      FROM android_gpu_frequency g
      WHERE dur > 0
        AND CASE WHEN {{time_range_start}} IS NOT NULL
                 THEN ts >= {{time_range_start}} * 1e9
                 ELSE 1 END
        AND CASE WHEN {{time_range_end}} IS NOT NULL
                 THEN ts <= {{time_range_end}} * 1e9
                 ELSE 1 END
      GROUP BY gpu_id, gpu_freq
      ORDER BY gpu_id, gpu_freq DESC;
    interpretation:
      key_metrics:
        - name: "time_pct"
          description: "各频率档位时间占比"
      analysis_hints:
        - condition: "gpu_freq_mhz = MAX(gpu_freq_mhz) AND time_pct > 50"
          insight: "GPU 长时间运行在最高频，可能存在性能瓶颈或发热问题"
        - condition: "gpu_freq_mhz = MIN(gpu_freq_mhz) AND time_pct > 80"
          insight: "GPU 大部分时间低频运行，负载较轻"

  # Step 2: GPU 频率变化分析
  - id: gpu_frequency_changes
    type: diagnostic
    name: "GPU 频率变化统计"
    description: "分析 GPU 频率变化模式"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.frequency;

      WITH freq_changes AS (
        SELECT
          gpu_id,
          ts,
          gpu_freq,
          prev_gpu_freq,
          CASE
            WHEN gpu_freq > prev_gpu_freq THEN 'UP'
            WHEN gpu_freq < prev_gpu_freq THEN 'DOWN'
            ELSE 'SAME'
          END AS direction
        FROM android_gpu_frequency
        WHERE prev_gpu_freq IS NOT NULL
          AND gpu_freq != prev_gpu_freq
      )
      SELECT
        gpu_id,
        direction,
        COUNT(*) AS change_count,
        AVG(ABS(gpu_freq - prev_gpu_freq)) / 1e6 AS avg_change_mhz
      FROM freq_changes
      GROUP BY gpu_id, direction
      ORDER BY gpu_id, direction;
    interpretation:
      key_metrics:
        - name: "change_count"
          description: "频率变化次数"
      analysis_hints:
        - condition: "change_count > 1000"
          insight: "GPU 频率频繁变化，可能导致功耗波动"

  # Step 3: GPU 内存使用分析 (按进程)
  - id: gpu_memory_by_process
    type: diagnostic
    name: "各进程 GPU 内存使用"
    description: "统计各进程的 GPU 内存使用量"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.memory;

      SELECT
        p.name AS process_name,
        MAX(gm.gpu_memory) / 1024 / 1024 AS max_gpu_memory_mb,
        AVG(gm.gpu_memory) / 1024 / 1024 AS avg_gpu_memory_mb,
        MIN(gm.gpu_memory) / 1024 / 1024 AS min_gpu_memory_mb
      FROM android_gpu_memory_per_process gm
      JOIN process p ON gm.upid = p.id
      WHERE CASE WHEN '{{process_name}}' != ''
                 THEN p.name GLOB '*{{process_name}}*'
                 ELSE 1 END
      GROUP BY p.name
      ORDER BY max_gpu_memory_mb DESC
      LIMIT 20;
    interpretation:
      key_metrics:
        - name: "max_gpu_memory_mb"
          description: "GPU 内存峰值使用"
          thresholds:
            warning: 512
            critical: 1024

  # Step 4: GPU 内存变化趋势
  - id: gpu_memory_timeline
    type: diagnostic
    name: "GPU 内存变化趋势"
    description: "追踪目标进程 GPU 内存随时间变化"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.memory;

      WITH memory_samples AS (
        SELECT
          CAST(ts / 1e9 AS INTEGER) AS time_sec,
          p.name AS process_name,
          MAX(gm.gpu_memory) AS gpu_memory
        FROM android_gpu_memory_per_process gm
        JOIN process p ON gm.upid = p.id
        WHERE CASE WHEN '{{process_name}}' != ''
                   THEN p.name GLOB '*{{process_name}}*'
                   ELSE 1 END
        GROUP BY time_sec, p.name
      )
      SELECT
        time_sec,
        process_name,
        gpu_memory / 1024 / 1024 AS gpu_memory_mb,
        gpu_memory / 1024 / 1024 - LAG(gpu_memory / 1024 / 1024) OVER (
          PARTITION BY process_name ORDER BY time_sec
        ) AS delta_mb
      FROM memory_samples
      ORDER BY process_name, time_sec;
    interpretation:
      analysis_hints:
        - condition: "delta_mb > 50"
          insight: "GPU 内存突增，检查是否有大纹理或 buffer 分配"
        - condition: "delta_mb < -50"
          insight: "GPU 内存释放，可能是资源回收"

  # Step 5: GPU 与帧渲染关联分析
  - id: gpu_frame_correlation
    type: diagnostic
    name: "GPU 与帧渲染关联"
    description: "分析 GPU 频率与帧渲染/Jank 的关系"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.frequency;
      INCLUDE PERFETTO MODULE android.frames;

      WITH frame_gpu_freq AS (
        SELECT
          f.ts,
          f.dur,
          f.jank_type,
          (
            SELECT gpu_freq / 1e6
            FROM android_gpu_frequency g
            WHERE g.ts <= f.ts
              AND g.ts + g.dur > f.ts
            LIMIT 1
          ) AS gpu_freq_mhz
        FROM actual_frame_timeline_slice f
        WHERE f.dur > 0
      )
      SELECT
        jank_type,
        COUNT(*) AS frame_count,
        AVG(gpu_freq_mhz) AS avg_gpu_freq_mhz,
        AVG(dur) / 1e6 AS avg_frame_dur_ms
      FROM frame_gpu_freq
      GROUP BY jank_type
      ORDER BY frame_count DESC;
    interpretation:
      key_metrics:
        - name: "avg_gpu_freq_mhz"
          description: "各 Jank 类型对应的平均 GPU 频率"
      analysis_hints:
        - condition: "jank_type = 'SurfaceFlinger GPU Deadline Missed' AND avg_gpu_freq_mhz < MAX(avg_gpu_freq_mhz)"
          insight: "GPU Deadline Missed 时 GPU 未运行在最高频，可能是调频不及时"

  # Step 6: GPU 高负载时段识别
  - id: gpu_high_load_periods
    type: diagnostic
    name: "GPU 高负载时段"
    description: "识别 GPU 持续高频运行的时段"
    sql: |
      INCLUDE PERFETTO MODULE android.gpu.frequency;

      WITH max_freq AS (
        SELECT gpu_id, MAX(gpu_freq) AS max_gpu_freq
        FROM android_gpu_frequency
        GROUP BY gpu_id
      ),
      high_freq_periods AS (
        SELECT
          g.gpu_id,
          g.ts,
          g.dur,
          g.gpu_freq,
          g.gpu_freq = mf.max_gpu_freq AS is_max_freq
        FROM android_gpu_frequency g
        JOIN max_freq mf ON g.gpu_id = mf.gpu_id
        WHERE g.gpu_freq >= mf.max_gpu_freq * 0.9
      )
      SELECT
        gpu_id,
        ts / 1e9 AS start_sec,
        SUM(dur) / 1e9 AS high_freq_duration_sec,
        COUNT(*) AS segment_count
      FROM high_freq_periods
      GROUP BY gpu_id, CAST(ts / 1e9 AS INTEGER)
      HAVING high_freq_duration_sec > 0.5
      ORDER BY start_sec;
    interpretation:
      key_metrics:
        - name: "high_freq_duration_sec"
          description: "每秒内高频运行时间"
          thresholds:
            warning: 0.8
            critical: 0.95

  # Step 7: AI 综合分析
  - id: gpu_ai_summary
    type: ai_summary
    name: "GPU 性能 AI 分析"
    description: "综合分析 GPU 频率、内存和帧渲染"
    depends_on:
      - gpu_frequency_distribution
      - gpu_frequency_changes
      - gpu_memory_by_process
      - gpu_frame_correlation
      - gpu_high_load_periods
    prompt: |
      请基于以下 GPU 分析数据，提供专业的性能分析：

      ## GPU 频率分布
      {{gpu_frequency_distribution}}

      ## 频率变化统计
      {{gpu_frequency_changes}}

      ## GPU 内存使用
      {{gpu_memory_by_process}}

      ## 帧渲染关联
      {{gpu_frame_correlation}}

      ## 高负载时段
      {{gpu_high_load_periods}}

      请分析：
      1. GPU 整体负载水平评估
      2. GPU 频率调节是否合理
      3. GPU 内存使用是否正常
      4. GPU 与帧卡顿的关联性
      5. 优化建议

      使用中文回答，结构清晰。

output:
  format: markdown
  sections:
    - title: "GPU 分析总结"
      content: |
        ## GPU 频率分析
        {{gpu_frequency_distribution}}

        ## GPU 内存分析
        {{gpu_memory_by_process}}

        ## GPU-帧渲染关联
        {{gpu_frame_correlation}}

        ## AI 综合分析
        {{gpu_ai_summary}}
