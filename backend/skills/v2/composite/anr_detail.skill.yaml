# =============================================================================
# ANR 事件详细分析（组合 Skill）v2.0
# =============================================================================
# 分析单个 ANR 事件的详细信息，包括：
# - 主线程状态分析
# - Binder 调用分析
# - CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 分布
# - 唤醒链分析
#
# 四大象限说明：
# 1. Running on Big Core - 在大核上运行（正常执行）
# 2. Running on Little Core - 在小核上运行（可能性能不足）
# 3. Runnable - 等待 CPU 调度（CPU 资源争抢）
# 4. Sleeping/Blocked - 睡眠或阻塞（ANR 通常在这里）

name: anr_detail
version: "2.0"
type: composite

meta:
  display_name: "ANR 事件详细分析"
  description: "分析单个 ANR 事件的线程状态、Binder、大小核、四象限等详细信息"
  icon: "error"
  tags: [anr, detail, analysis, cpu, core, quadrant, binder]

prerequisites:
  modules:
    - android.binder

inputs:
  - name: anr_ts
    type: timestamp
    required: true
    description: "ANR 发生时间戳(ns)"
  - name: timeout_ns
    type: timestamp
    required: true
    description: "ANR 超时时间(ns)"
  - name: process_name
    type: string
    required: true
    description: "进程名"
  - name: pid
    type: integer
    required: true
    description: "进程 ID"
  - name: anr_type
    type: string
    required: true
    description: "ANR 类型"
  - name: anr_dur_ms
    type: number
    required: false
    description: "ANR 持续时间(ms)"
  # Perfetto 跳转参数
  - name: perfetto_start
    type: timestamp
    required: false
    description: "Perfetto 跳转开始时间"
  - name: perfetto_end
    type: timestamp
    required: false
    description: "Perfetto 跳转结束时间"

steps:
  # ========== ANR 基本信息 ==========
  - id: anr_info
    type: atomic
    name: "ANR 基本信息"
    display:
      level: key
      title: "ANR 详情"
    sql: |
      SELECT
        '${process_name}' as process_name,
        ${pid} as pid,
        '${anr_type}' as anr_type,
        ROUND(COALESCE(${anr_dur_ms}, 0), 2) as anr_dur_ms,
        ROUND(${timeout_ns} / 1e6, 2) as timeout_ms,
        printf('%d', ${anr_ts}) as anr_ts,
        -- Perfetto 跳转链接参数
        printf('%d', COALESCE(${perfetto_start}, ${anr_ts} - ${timeout_ns})) as perfetto_start,
        printf('%d', COALESCE(${perfetto_end}, ${anr_ts})) as perfetto_end,
        CASE '${anr_type}'
          WHEN 'INPUT_DISPATCHING_TIMEOUT' THEN '输入超时'
          WHEN 'BROADCAST_OF_INTENT' THEN '广播超时'
          WHEN 'EXECUTING_SERVICE' THEN '服务执行超时'
          WHEN 'CONTENT_PROVIDER_NOT_RESPONDING' THEN 'ContentProvider 超时'
          ELSE '${anr_type}'
        END as type_display
    save_as: anr_basic

  # ========== 大小核占比分析 ==========
  - id: cpu_core_analysis
    type: atomic
    name: "大小核占比分析"
    display:
      level: key
      title: "大小核占比"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${process_name}*'
          AND t.tid = p.pid  -- 主线程
      ),
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} as start_ts,
          ${anr_ts} as end_ts
      ),
      cpu_time AS (
        SELECT
          ss.utid,
          ss.cpu,
          SUM(
            MIN(ss.ts + ss.dur, aw.end_ts) - MAX(ss.ts, aw.start_ts)
          ) / 1e6 as dur_ms,
          CASE
            WHEN ss.cpu >= 4 THEN 'big'
            ELSE 'little'
          END as core_type
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        CROSS JOIN anr_window aw
        WHERE ss.ts < aw.end_ts
          AND ss.ts + ss.dur > aw.start_ts
        GROUP BY ss.utid, ss.cpu
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END), 2) as big_core_ms,
        ROUND(SUM(CASE WHEN core_type = 'little' THEN dur_ms ELSE 0 END), 2) as little_core_ms,
        ROUND(SUM(dur_ms), 2) as total_running_ms,
        ROUND(100.0 * SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as big_core_pct,
        ROUND(100.0 * SUM(dur_ms) / (${timeout_ns} / 1e6), 1) as running_pct
      FROM cpu_time
      GROUP BY 1
    save_as: cpu_core

  # ========== 四大象限分析 ==========
  - id: quadrant_analysis
    type: atomic
    name: "四大象限分析"
    display:
      level: key
      title: "四大象限分析"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${process_name}*'
          AND t.tid = p.pid
      ),
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} as start_ts,
          ${anr_ts} as end_ts
      ),
      thread_states AS (
        SELECT
          ts.utid,
          ts.state,
          ts.cpu,
          ts.blocked_function,
          SUM(
            MIN(ts.ts + ts.dur, aw.end_ts) - MAX(ts.ts, aw.start_ts)
          ) / 1e6 as dur_ms
        FROM thread_state ts
        JOIN main_thread mt ON ts.utid = mt.utid
        CROSS JOIN anr_window aw
        WHERE ts.ts < aw.end_ts
          AND ts.ts + ts.dur > aw.start_ts
        GROUP BY ts.utid, ts.state, ts.cpu, ts.blocked_function
      ),
      quadrant_data AS (
        SELECT
          CASE
            WHEN state = 'Running' AND cpu >= 4 THEN 'Q1_big_running'
            WHEN state = 'Running' AND cpu < 4 THEN 'Q2_little_running'
            WHEN state IN ('R', 'R+') THEN 'Q3_runnable'
            WHEN state IN ('S', 'D', 'I') THEN 'Q4_sleeping'
            ELSE 'other'
          END as quadrant,
          dur_ms,
          blocked_function
        FROM thread_states
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END), 2) as q1_big_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END), 2) as q2_little_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END), 2) as q3_runnable_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END), 2) as q4_sleeping_ms,
        ROUND(SUM(dur_ms), 2) as total_ms,
        -- 百分比
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as sleeping_pct
      FROM quadrant_data
      GROUP BY 1
    save_as: quadrant

  # ========== 主线程阻塞原因分析 ==========
  - id: blocking_analysis
    type: atomic
    name: "阻塞原因分析"
    display:
      level: key
      title: "阻塞原因 Top10"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${process_name}*'
          AND t.tid = p.pid
      ),
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} as start_ts,
          ${anr_ts} as end_ts
      )
      SELECT
        ts.state,
        CASE ts.state
          WHEN 'Running' THEN 'Running (CPU执行)'
          WHEN 'R' THEN 'Runnable (等待调度)'
          WHEN 'R+' THEN 'Runnable+ (抢占等待)'
          WHEN 'S' THEN 'Sleeping (主动睡眠)'
          WHEN 'D' THEN 'Disk Sleep (IO等待)'
          ELSE ts.state
        END as state_desc,
        ts.blocked_function,
        ROUND(SUM(
          MIN(ts.ts + ts.dur, aw.end_ts) - MAX(ts.ts, aw.start_ts)
        ) / 1e6, 2) as dur_ms,
        COUNT(*) as count
      FROM thread_state ts
      JOIN main_thread mt ON ts.utid = mt.utid
      CROSS JOIN anr_window aw
      WHERE ts.ts < aw.end_ts
        AND ts.ts + ts.dur > aw.start_ts
      GROUP BY ts.state, ts.blocked_function
      ORDER BY dur_ms DESC
      LIMIT 10
    save_as: blocking

  # ========== Binder 调用分析 ==========
  - id: binder_analysis
    type: atomic
    name: "Binder 调用分析"
    display:
      level: key
      title: "Binder 调用"
    sql: |
      WITH anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} as start_ts,
          ${anr_ts} as end_ts
      )
      SELECT
        bt.server_process,
        bt.aidl_name,
        COUNT(*) as call_count,
        ROUND(SUM(bt.client_dur) / 1e6, 2) as total_ms,
        ROUND(AVG(bt.client_dur) / 1e6, 2) as avg_ms,
        ROUND(MAX(bt.client_dur) / 1e6, 2) as max_ms,
        SUM(CASE WHEN bt.is_main_thread THEN 1 ELSE 0 END) as main_thread_calls
      FROM android_binder_txns bt
      CROSS JOIN anr_window aw
      WHERE bt.client_process GLOB '${process_name}*'
        AND bt.client_ts >= aw.start_ts
        AND bt.client_ts < aw.end_ts
        AND bt.is_main_thread = 1
      GROUP BY bt.server_process, bt.aidl_name
      ORDER BY total_ms DESC
      LIMIT 10
    save_as: binder_calls

  # ========== 唤醒链分析 ==========
  - id: wakeup_chain
    type: atomic
    name: "唤醒链分析"
    display:
      level: detail
      title: "唤醒链分析"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${process_name}*'
          AND t.tid = p.pid
      ),
      anr_window AS (
        SELECT
          ${anr_ts} - ${timeout_ns} as start_ts,
          ${anr_ts} as end_ts
      )
      SELECT
        waker_thread.name AS waker_thread_name,
        waker_process.name AS waker_process_name,
        ts.blocked_function,
        COUNT(*) AS wakeup_count,
        ROUND(AVG(ts.dur) / 1e6, 2) AS avg_sleep_ms,
        ROUND(MAX(ts.dur) / 1e6, 2) AS max_sleep_ms
      FROM thread_state ts
      JOIN main_thread mt ON ts.utid = mt.utid
      CROSS JOIN anr_window aw
      LEFT JOIN thread waker_thread ON ts.waker_utid = waker_thread.utid
      LEFT JOIN process waker_process ON waker_thread.upid = waker_process.upid
      WHERE ts.ts >= aw.start_ts
        AND ts.ts < aw.end_ts
        AND ts.waker_utid IS NOT NULL
      GROUP BY waker_thread.name, waker_process.name, ts.blocked_function
      ORDER BY avg_sleep_ms DESC
      LIMIT 10
    save_as: wakeup

  # ========== ANR 诊断 ==========
  - id: anr_diagnosis
    type: diagnostic
    name: "ANR 诊断"
    display:
      level: key
      title: "问题诊断"
    inputs: [anr_basic, cpu_core, quadrant, blocking, binder_calls]
    rules:
      # Sleeping 占比过高（ANR 典型特征）
      - condition: "${quadrant.data[0]?.sleeping_pct > 80}"
        severity: critical
        diagnosis: "主线程 Sleeping 占比 ${quadrant.data[0].sleeping_pct}%，严重阻塞"
        confidence: high
        suggestions:
          - "检查主线程阻塞原因：IO/锁/Binder"
          - "将阻塞操作移到后台线程"

      # Running 占比过低
      - condition: "${cpu_core.data[0]?.running_pct < 10}"
        severity: critical
        diagnosis: "主线程 Running 占比仅 ${cpu_core.data[0].running_pct}%，几乎完全阻塞"
        confidence: high
        suggestions:
          - "主线程长时间无法执行，检查阻塞原因"
          - "检查是否有死锁或长时间等待"

      # Binder 调用耗时过长
      - condition: "${binder_calls.data[0]?.total_ms > 1000}"
        severity: critical
        diagnosis: "Binder 调用 ${binder_calls.data[0].server_process} 耗时 ${binder_calls.data[0].total_ms}ms"
        confidence: high
        suggestions:
          - "检查目标进程是否繁忙或卡死"
          - "使用异步 Binder 或减少调用频率"

      # Runnable 等待过长
      - condition: "${quadrant.data[0]?.q3_runnable_ms > 500}"
        severity: warning
        diagnosis: "主线程 Runnable 等待 ${quadrant.data[0].q3_runnable_ms}ms"
        confidence: medium
        suggestions:
          - "CPU 资源争抢严重"
          - "检查后台进程 CPU 占用"

      # 大核占比过低
      - condition: "${cpu_core.data[0]?.big_core_pct < 20 && cpu_core.data[0]?.total_running_ms > 100}"
        severity: warning
        diagnosis: "主线程大核占比仅 ${cpu_core.data[0].big_core_pct}%"
        confidence: medium
        suggestions:
          - "主线程被调度到小核运行"
          - "检查是否有高优先级进程抢占大核"

output:
  display:
    level: key
    format: detail
