name: jank_frame_detail
version: "3.0"
type: composite

meta:
  display_name: "掉帧帧详细分析"
  description: "分析单帧：四象限、Binder、CPU频率、主线程耗时操作"
  icon: "bug_report"
  tags: [jank, frame, detail, quadrant, binder, cpu]

prerequisites:
  modules:
    - android.binder
    - android.slices

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true
  - name: main_start_ts
    type: timestamp
    required: false
  - name: main_end_ts
    type: timestamp
    required: false
  - name: main_dur_ms
    type: number
    required: false
  - name: render_start_ts
    type: timestamp
    required: false
  - name: render_end_ts
    type: timestamp
    required: false
  - name: render_dur_ms
    type: number
    required: false
  - name: package
    type: string
    required: false
  - name: pid
    type: integer
    required: false
  - name: frame_id
    type: integer
    required: true
  - name: frame_index
    type: integer
    required: false
  - name: jank_type
    type: string
    required: true
  - name: dur_ms
    type: number
    required: true
  - name: session_id
    type: integer
    required: false
  - name: layer_name
    type: string
    required: false

steps:
  - id: quadrant_analysis
    type: atomic
    name: "四象限分析"
    display:
      level: key
      title: "四大象限"
    sql: |
      WITH target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name,
          CASE
            WHEN t.tid = p.pid THEN 'MainThread'
            WHEN t.name = 'RenderThread' THEN 'RenderThread'
            ELSE 'Other'
          END as thread_type,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_start_ts}, ${start_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_start_ts}, ${start_ts})
            ELSE ${start_ts}
          END as thread_start_ts,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_end_ts}, ${end_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_end_ts}, ${end_ts})
            ELSE ${end_ts}
          END as thread_end_ts
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      thread_states AS (
        SELECT
          tt.thread_type,
          ts.state,
          ts.cpu,
          ts.dur,
          CASE
            WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN 'Q1_BigCore'
            WHEN ts.state = 'Running' AND ts.cpu < 4 THEN 'Q2_LittleCore'
            WHEN ts.state = 'R' THEN 'Q3_Runnable'
            WHEN ts.state IN ('S', 'D', 'I') THEN 'Q4_Sleeping'
            ELSE 'Other'
          END as quadrant
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= tt.thread_start_ts
          AND ts.ts < tt.thread_end_ts
      )
      SELECT
        thread_type,
        ROUND(SUM(dur) / 1e6, 2) as total_ms,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q1_BigCore' THEN dur ELSE 0 END) / NULLIF(SUM(dur), 0), 1) as q1_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q2_LittleCore' THEN dur ELSE 0 END) / NULLIF(SUM(dur), 0), 1) as q2_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q3_Runnable' THEN dur ELSE 0 END) / NULLIF(SUM(dur), 0), 1) as q3_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4_Sleeping' THEN dur ELSE 0 END) / NULLIF(SUM(dur), 0), 1) as q4_pct
      FROM thread_states
      GROUP BY thread_type
      ORDER BY thread_type
    save_as: quadrant_data

  - id: binder_calls
    type: atomic
    name: "Binder 调用"
    display:
      level: detail
      title: "Binder 调用"
    sql: |
      SELECT
        server_process,
        COUNT(*) as call_count,
        ROUND(SUM(client_dur) / 1e6, 2) as total_ms,
        ROUND(MAX(client_dur) / 1e6, 2) as max_ms,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_count
      FROM android_binder_txns
      WHERE client_ts >= ${start_ts}
        AND client_ts < ${end_ts}
        AND (client_process GLOB '${package}*' OR '${package}' = '')
      GROUP BY server_process
      HAVING total_ms > 0.5
      ORDER BY total_ms DESC
      LIMIT 5
    save_as: binder_data
    optional: true

  - id: cpu_freq_analysis
    type: atomic
    name: "CPU频率"
    display:
      level: detail
      title: "CPU 频率"
    sql: |
      WITH freq_data AS (
        SELECT
          cpu,
          CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          value as freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        core_type,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz
      FROM freq_data
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: freq_data
    optional: true

  - id: main_thread_slices
    type: atomic
    name: "主线程耗时操作"
    display:
      level: key
      title: "主线程耗时操作"
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.tid = p.pid
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as total_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM main_thread)
        AND s.ts >= COALESCE(${main_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${main_end_ts}, ${end_ts})
        AND s.dur >= 1000000
      GROUP BY s.name
      HAVING total_ms > 1
      ORDER BY total_ms DESC
      LIMIT 10
    save_as: main_slices

  - id: render_thread_slices
    type: atomic
    name: "RenderThread 耗时操作"
    display:
      level: key
      title: "RenderThread 耗时操作"
    sql: |
      WITH render_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.name = 'RenderThread'
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as total_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        ROUND(AVG(s.dur) / 1e6, 2) as avg_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM render_thread)
        AND s.ts >= COALESCE(${render_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${render_end_ts}, ${end_ts})
        AND s.dur >= 500000
      GROUP BY s.name
      HAVING total_ms > 0.5
      ORDER BY total_ms DESC
      LIMIT 10
    save_as: render_slices
    optional: true

  - id: cpu_freq_timeline
    type: atomic
    name: "CPU 频率变化时间线"
    display:
      level: detail
      title: "CPU 频率变化"
    sql: |
      WITH freq_events AS (
        SELECT
          c.ts,
          t.cpu,
          c.value as freq_khz,
          CASE WHEN t.cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        printf('%d', ts) as ts,
        ROUND((ts - ${start_ts}) / 1e6, 2) as relative_ms,
        cpu,
        core_type,
        ROUND(freq_khz / 1000, 0) as freq_mhz,
        ROUND(COALESCE(prev_freq_khz, freq_khz) / 1000, 0) as prev_freq_mhz,
        CASE 
          WHEN freq_khz > COALESCE(prev_freq_khz, freq_khz) THEN 'up'
          WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 'down'
          ELSE 'stable'
        END as change_direction
      FROM freq_events
      WHERE freq_khz != COALESCE(prev_freq_khz, 0)
      ORDER BY ts, cpu
      LIMIT 50
    save_as: freq_timeline
    optional: true

  - id: lock_contention
    type: atomic
    name: "锁竞争分析"
    display:
      level: detail
      title: "锁竞争"
    sql: |
      SELECT
        short_blocking_method as blocking_method,
        blocking_thread_name,
        short_blocked_method as blocked_method,
        blocked_thread_name,
        CASE WHEN is_blocked_thread_main THEN 1 ELSE 0 END as main_blocked,
        ROUND(dur / 1e6, 2) as wait_ms,
        waiter_count
      FROM android_monitor_contention
      WHERE ts >= ${start_ts}
        AND ts < ${end_ts}
        AND (process_name GLOB '${package}*' OR '${package}' = '')
        AND dur >= 500000
      ORDER BY dur DESC
      LIMIT 5
    save_as: lock_data
    optional: true

  - id: frame_diagnosis
    type: diagnostic
    name: "帧诊断"
    display:
      level: key
      title: "诊断结果"
    inputs: [quadrant_data, binder_data, freq_data, main_slices, render_slices, freq_timeline, lock_data]
    rules:
      - condition: "lock_data.data[0]?.wait_ms > 2"
        severity: warning
        diagnosis: "锁竞争等待 ${lock_data.data[0].wait_ms}ms (${lock_data.data[0].blocking_method})"
        confidence: high
        suggestions:
          - "检查持锁线程是否在做耗时操作"
          - "考虑减少锁粒度或使用无锁数据结构"

      - condition: "lock_data.data[0]?.main_blocked === 1"
        severity: warning
        diagnosis: "主线程被锁阻塞 (等待 ${lock_data.data[0].blocking_thread_name})"
        confidence: high
        suggestions:
          - "避免在持锁时做 Binder/IO 操作"
          - "考虑使用异步锁或拆分锁"

      - condition: "binder_data.data[0]?.total_ms > 5"
        severity: warning
        diagnosis: "Binder 调用耗时过长 (${binder_data.data[0].total_ms}ms)"
        confidence: high
        suggestions:
          - "检查是否可以异步调用"
          - "考虑使用缓存减少调用次数"

      - condition: "quadrant_data.data[0]?.q3_pct > 20"
        severity: warning
        diagnosis: "主线程 Runnable 等待过长 (${quadrant_data.data[0].q3_pct}%)"
        confidence: high
        suggestions:
          - "CPU 资源争抢，检查后台任务"
          - "考虑提高线程优先级"

      - condition: "quadrant_data.data[0]?.q1_pct < 30 && quadrant_data.data[0]?.q2_pct > 50"
        severity: warning
        diagnosis: "主线程主要运行在小核 (大核占比 ${quadrant_data.data[0].q1_pct}%)"
        confidence: medium
        suggestions:
          - "检查系统温控是否限制大核"
          - "考虑提高线程优先级"

      - condition: "main_slices.data[0]?.total_ms > 10"
        severity: warning
        diagnosis: "主线程操作 '${main_slices.data[0].name}' 耗时 ${main_slices.data[0].total_ms}ms"
        confidence: high
        suggestions:
          - "考虑将耗时操作移到后台线程"
          - "优化该操作的执行效率"

      - condition: "render_slices.data[0]?.total_ms > 5"
        severity: warning
        diagnosis: "RenderThread 操作 '${render_slices.data[0].name}' 耗时 ${render_slices.data[0].total_ms}ms"
        confidence: high
        suggestions:
          - "检查是否有复杂的自定义绘制"
          - "考虑减少绘制复杂度或使用硬件加速"

      - condition: "freq_data.data.find(f => f.core_type === 'big')?.avg_freq_mhz < 1500"
        severity: info
        diagnosis: "大核频率偏低 (${freq_data.data.find(f => f.core_type === 'big')?.avg_freq_mhz || 0}MHz)"
        confidence: medium
        suggestions:
          - "系统可能处于省电模式"
          - "检查温控策略"

      - condition: "freq_timeline.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length > 3"
        severity: info
        diagnosis: "大核频率频繁降频 (${freq_timeline.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length || 0}次)"
        confidence: medium
        suggestions:
          - "可能触发了温控降频"
          - "检查系统负载和温度"

output:
  format: structured
