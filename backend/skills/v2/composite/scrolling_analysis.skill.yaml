# =============================================================================
# 滑动性能分析 v2.3（组合 Skill）- 专家优化版
# =============================================================================
# 基于 Perfetto 标准库的专业滑动分析
#
# 核心改进：
# 1. 使用 android_frames 表代替手动帧检测
# 2. 使用 actual_frame_timeline_slice.jank_type 进行精确掉帧分类
# 3. 使用 expected/actual frame timeline 计算准确的帧延迟
# 4. 基于 input 事件区分 touch/fling 阶段
# 5. 【新增】每个掉帧帧的详细分析，包含：
#    - 大小核占比分析（big/little core ratio）
#    - 大小核频率分析
#    - 四大象限分析（针对主线程和渲染线程）
#
# 掉帧类型（jank_type）：
# - None: 无掉帧
# - Self Jank: 应用自身导致
# - Buffer Stuffing: 缓冲区堆积
# - SurfaceFlinger CPU/GPU Deadline Missed: SF 问题
# - App Deadline Missed: 应用超时
# - Prediction Error: 预测错误
# - Display HAL: 显示硬件问题
#
# 四大象限说明：
# ┌─────────────────┬─────────────────┐
# │  Q1: 大核运行    │  Q2: 小核运行   │
# │  (性能最优)      │  (可能不足)     │
# ├─────────────────┼─────────────────┤
# │  Q3: Runnable   │  Q4: Sleeping   │
# │  (等待CPU调度)   │  (阻塞/睡眠)    │
# └─────────────────┴─────────────────┘
#
# 分析流程：
# 1. 环境检测 → 刷新率、帧数据可用性
# 2. 帧数据概览 → 所有帧基本信息
# 3. 掉帧检测 → 使用 FrameTimeline jank_type
# 4. 掉帧类型统计 → 分类统计
# 5. 帧性能汇总 → 总体指标
# 6. 滑动区间识别 → 基于连续帧渲染
# 7. 应用掉帧帧获取 → 准备迭代分析
# 8. 【迭代】逐帧详细分析：
#    - 主线程耗时操作
#    - Binder 调用
#    - CPU 调度
#    - 锁竞争
#    - 大小核占比
#    - CPU 频率
#    - 四大象限（主线程 + RenderThread）
# 9. 问题诊断 → 规则匹配
# 10. AI 总结 → 智能分析

name: scrolling_analysis
version: "2.3"
type: composite

meta:
  display_name: "滑动性能分析"
  description: "基于 Perfetto 标准库的专业滑动分析，精确识别掉帧原因，含大小核和四象限分析"
  icon: "swipe"
  tags: [scrolling, jank, fps, fling, touch, composite, frames, cpu, core, quadrant]

triggers:
  keywords:
    zh: [滑动, 卡顿, 帧率, 掉帧, 丢帧, FPS, 流畅度, 列表滑动, fling]
    en: [scroll, jank, fps, frame, fling, stutter, smoothness, list]
  patterns:
    - ".*滑动.*卡.*"
    - ".*scroll.*jank.*"
    - ".*帧率.*"
    - ".*fling.*"

prerequisites:
  modules:
    - android.frames.timeline
    - android.frames.jank_type

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选，不填则分析所有应用）"

steps:
  # ========== 环境检测 ==========
  - id: detect_environment
    type: atomic
    name: "检测环境"
    display:
      level: summary
      title: "环境信息"
    sql: |
      -- 检测刷新率和帧数据可用性
      WITH frame_info AS (
        SELECT
          COUNT(*) as total_frames,
          COUNT(DISTINCT upid) as app_count
        FROM android_frames
        WHERE process_name GLOB '${package}*' OR '${package}' = ''
      ),
      vsync_info AS (
        SELECT
          CASE
            WHEN AVG(dur) < 9000000 THEN 120
            WHEN AVG(dur) < 12000000 THEN 90
            ELSE 60
          END AS refresh_rate_hz,
          ROUND(AVG(dur) / 1e6, 2) AS vsync_period_ms
        FROM android_frames
        WHERE dur > 0
        LIMIT 1000
      )
      SELECT
        COALESCE((SELECT refresh_rate_hz FROM vsync_info), 60) as refresh_rate_hz,
        COALESCE((SELECT vsync_period_ms FROM vsync_info), 16.67) as vsync_period_ms,
        (SELECT total_frames FROM frame_info) as total_frames,
        (SELECT app_count FROM frame_info) as app_count,
        CASE WHEN (SELECT total_frames FROM frame_info) > 0 THEN 'available' ELSE 'unavailable' END as frame_data_status
    save_as: environment

  # ========== 使用 android_frames 获取帧数据 ==========
  - id: get_frames_from_stdlib
    type: atomic
    name: "获取帧数据"
    display:
      level: detail
      title: "帧数据概览"
    sql: |
      -- 使用 Perfetto 标准库的 android_frames 表
      SELECT
        f.frame_id,
        f.ts,
        f.dur,
        f.dur / 1e6 as dur_ms,
        f.process_name,
        f.upid,
        f.do_frame_id,
        f.draw_frame_id,
        f.actual_frame_timeline_id,
        f.expected_frame_timeline_id,
        printf('%d', f.ts) as ts_str,
        printf('%d', f.dur) as dur_str
      FROM android_frames f
      WHERE (f.process_name GLOB '${package}*' OR '${package}' = '')
        AND f.dur > 0
      ORDER BY f.ts
      LIMIT 5000
    save_as: all_frames
    condition: environment.data[0]?.frame_data_status === 'available'

  # ========== 使用 actual_frame_timeline_slice 获取掉帧信息 ==========
  - id: get_jank_frames
    type: atomic
    name: "获取掉帧信息"
    display:
      level: key
      title: "掉帧详情（基于 FrameTimeline）"
    sql: |
      -- 使用 actual_frame_timeline_slice 获取精确的掉帧类型
      SELECT
        a.display_frame_token as frame_id,
        a.ts,
        a.dur,
        a.dur / 1e6 as dur_ms,
        a.jank_type,
        a.jank_severity_type,
        a.present_type,
        a.on_time_finish,
        a.gpu_composition,
        a.prediction_type,
        a.jank_tag,
        p.name as process_name,
        printf('%d', a.ts) as ts_str,
        printf('%d', a.dur) as dur_str,
        -- 掉帧分类
        CASE
          WHEN a.jank_type = 'None' THEN 'normal'
          WHEN a.jank_type GLOB '*App*' THEN 'app_jank'
          WHEN a.jank_type GLOB '*SurfaceFlinger*' THEN 'sf_jank'
          WHEN a.jank_type GLOB '*Buffer*' THEN 'buffer_jank'
          WHEN a.jank_type GLOB '*Prediction*' THEN 'prediction_error'
          ELSE 'other_jank'
        END as jank_category
      FROM actual_frame_timeline_slice a
      LEFT JOIN process p ON a.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND a.jank_type != 'None'
        AND a.surface_frame_token IS NOT NULL  -- 只看 surface frames
      ORDER BY a.dur DESC
      LIMIT 100
    save_as: jank_frames
    condition: environment.data[0]?.frame_data_status === 'available'

  # ========== 掉帧类型统计 ==========
  - id: jank_type_stats
    type: atomic
    name: "掉帧类型统计"
    display:
      level: key
      title: "掉帧类型分布"
    sql: |
      -- 按掉帧类型统计
      SELECT
        a.jank_type,
        a.jank_severity_type,
        COUNT(*) as count,
        ROUND(AVG(a.dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(a.dur) / 1e6, 2) as max_dur_ms,
        SUM(a.dur) / 1e6 as total_dur_ms,
        -- 责任归属
        CASE
          WHEN a.jank_type GLOB '*App*' OR a.jank_type = 'Self Jank' THEN '应用责任'
          WHEN a.jank_type GLOB '*SurfaceFlinger*' THEN 'SF责任'
          WHEN a.jank_type GLOB '*Buffer*' THEN '缓冲区问题'
          WHEN a.jank_type GLOB '*Display*' THEN '显示硬件'
          ELSE '其他'
        END as responsibility
      FROM actual_frame_timeline_slice a
      LEFT JOIN process p ON a.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND a.jank_type != 'None'
        AND a.surface_frame_token IS NOT NULL
      GROUP BY a.jank_type, a.jank_severity_type
      ORDER BY count DESC
    save_as: jank_stats
    condition: environment.data[0]?.frame_data_status === 'available'

  # ========== 帧性能汇总 ==========
  - id: frame_performance_summary
    type: atomic
    name: "帧性能汇总"
    display:
      level: key
      title: "帧性能汇总"
    sql: |
      WITH frame_stats AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN a.jank_type != 'None' THEN 1 ELSE 0 END) as janky_frames,
          SUM(CASE WHEN a.jank_type GLOB '*App*' OR a.jank_type = 'Self Jank' THEN 1 ELSE 0 END) as app_janky_frames,
          SUM(CASE WHEN a.jank_type GLOB '*SurfaceFlinger*' THEN 1 ELSE 0 END) as sf_janky_frames,
          AVG(a.dur) / 1e6 as avg_frame_ms,
          MAX(a.dur) / 1e6 as max_frame_ms,
          -- 计算 FPS（基于平均帧时间）
          1000.0 / NULLIF(AVG(a.dur) / 1e6, 0) as avg_fps
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.surface_frame_token IS NOT NULL
      )
      SELECT
        total_frames,
        janky_frames,
        app_janky_frames,
        sf_janky_frames,
        ROUND(100.0 * janky_frames / NULLIF(total_frames, 0), 2) as jank_rate,
        ROUND(100.0 * app_janky_frames / NULLIF(total_frames, 0), 2) as app_jank_rate,
        ROUND(100.0 * sf_janky_frames / NULLIF(total_frames, 0), 2) as sf_jank_rate,
        ROUND(avg_frame_ms, 2) as avg_frame_ms,
        ROUND(max_frame_ms, 2) as max_frame_ms,
        ROUND(avg_fps, 1) as avg_fps,
        -- 评级
        CASE
          WHEN 100.0 * janky_frames / NULLIF(total_frames, 0) < 1 THEN '优秀'
          WHEN 100.0 * janky_frames / NULLIF(total_frames, 0) < 5 THEN '良好'
          WHEN 100.0 * janky_frames / NULLIF(total_frames, 0) < 15 THEN '一般'
          ELSE '较差'
        END as rating
      FROM frame_stats
    save_as: performance_summary
    condition: environment.data[0]?.frame_data_status === 'available'

  # ========== 识别滑动区间（基于连续帧渲染）==========
  - id: find_scroll_sessions
    type: atomic
    name: "识别滑动区间"
    display:
      level: summary
      title: "滑动区间"
    sql: |
      -- 基于 android_frames 识别连续渲染区间
      WITH frame_gaps AS (
        SELECT
          frame_id,
          ts,
          dur,
          upid,
          process_name,
          LAG(ts + dur) OVER (PARTITION BY upid ORDER BY ts) as prev_end,
          ts - LAG(ts + dur) OVER (PARTITION BY upid ORDER BY ts) as gap_ns
        FROM android_frames
        WHERE (process_name GLOB '${package}*' OR '${package}' = '')
          AND dur > 0
      ),
      session_markers AS (
        SELECT
          *,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions AS (
        SELECT
          *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      )
      SELECT
        session_id,
        process_name,
        MIN(ts) as start_ts,
        MAX(ts + dur) as end_ts,
        COUNT(*) as frame_count,
        ROUND((MAX(ts + dur) - MIN(ts)) / 1e6, 1) as duration_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_frame_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_frame_ms,
        printf('%d', MIN(ts)) as start_ts_str,
        printf('%d', MAX(ts + dur)) as end_ts_str
      FROM sessions
      GROUP BY upid, session_id
      HAVING COUNT(*) >= 10  -- 至少10帧
        AND (MAX(ts + dur) - MIN(ts)) > 200000000  -- 至少200ms
      ORDER BY start_ts
      LIMIT 20
    save_as: scroll_sessions
    condition: environment.data[0]?.frame_data_status === 'available'

  # ========== 每个区间的掉帧分析 ==========
  - id: session_jank_analysis
    type: atomic
    name: "区间掉帧分析"
    display:
      level: detail
      title: "各区间掉帧分析"
    sql: |
      -- 分析每个滑动区间的掉帧情况
      WITH frame_gaps AS (
        SELECT
          frame_id,
          ts,
          dur,
          upid,
          process_name,
          LAG(ts + dur) OVER (PARTITION BY upid ORDER BY ts) as prev_end,
          ts - LAG(ts + dur) OVER (PARTITION BY upid ORDER BY ts) as gap_ns
        FROM android_frames
        WHERE (process_name GLOB '${package}*' OR '${package}' = '')
          AND dur > 0
      ),
      session_markers AS (
        SELECT
          *,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions_raw AS (
        SELECT
          *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      sessions AS (
        SELECT
          session_id,
          process_name,
          MIN(ts) as start_ts,
          MAX(ts + dur) as end_ts,
          COUNT(*) as frame_count,
          ROUND((MAX(ts + dur) - MIN(ts)) / 1e6, 1) as duration_ms
        FROM sessions_raw
        GROUP BY upid, session_id
        HAVING COUNT(*) >= 10
          AND (MAX(ts + dur) - MIN(ts)) > 200000000
      )
      SELECT
        s.session_id,
        s.process_name,
        s.frame_count,
        s.duration_ms,
        COUNT(a.id) as janky_count,
        ROUND(100.0 * COUNT(a.id) / NULLIF(s.frame_count, 0), 2) as jank_rate,
        GROUP_CONCAT(DISTINCT a.jank_type) as jank_types
      FROM sessions s
      LEFT JOIN actual_frame_timeline_slice a ON
        a.ts >= s.start_ts AND a.ts <= s.end_ts
        AND a.jank_type != 'None'
        AND a.surface_frame_token IS NOT NULL
      LEFT JOIN process p ON a.upid = p.upid AND p.name = s.process_name
      GROUP BY s.session_id
      ORDER BY s.session_id
    save_as: session_jank
    optional: true  # Skip if no sessions found

  # ========== 获取应用掉帧帧列表（用于详细分析） ==========
  - id: get_app_jank_frames
    type: atomic
    name: "获取应用掉帧帧"
    display:
      level: detail
      title: "应用掉帧帧列表"
    sql: |
      -- 基于 Perfetto FrameTimeline 获取掉帧帧
      -- actual_frame_timeline_slice 包含完整的帧生命周期：
      --   ts = 帧开始时间（主线程开始处理）
      --   ts + dur = 帧结束时间（GPU/SF 完成）
      --
      -- 关联 expected_frame_timeline_slice 获取预期时间
      -- 使用字符串格式保持 64 位时间戳精度
      WITH frame_slices AS (
        -- 获取主线程和 RenderThread 的 slice 信息
        SELECT
          a.display_frame_token as frame_id,
          a.upid,
          a.ts as actual_start,
          a.ts + a.dur as actual_end,
          a.dur as actual_dur,
          e.ts as expected_start,
          e.ts + e.dur as expected_end,
          a.jank_type,
          a.jank_severity_type,
          a.layer_name
        FROM actual_frame_timeline_slice a
        LEFT JOIN expected_frame_timeline_slice e
          ON a.display_frame_token = e.display_frame_token
          AND a.upid = e.upid
        WHERE a.surface_frame_token IS NOT NULL
      ),
      frame_thread_info AS (
        -- 获取每帧的主线程和 RenderThread 时间
        SELECT
          fs.frame_id,
          fs.upid,
          fs.actual_start,
          fs.actual_end,
          fs.actual_dur,
          fs.expected_start,
          fs.expected_end,
          fs.jank_type,
          fs.jank_severity_type,
          fs.layer_name,
          -- 从 slice 表获取主线程 doFrame 信息
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = fs.upid AND t.tid = p.pid
             AND s.ts >= fs.actual_start - 5000000
             AND s.ts <= fs.actual_end
             AND s.name LIKE 'Choreographer#doFrame%'
          ) as main_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = fs.upid AND t.tid = p.pid
             AND s.ts >= fs.actual_start - 5000000
             AND s.ts <= fs.actual_end
             AND (s.name LIKE 'Choreographer#doFrame%' OR s.name LIKE 'draw%' OR s.name = 'traversal')
          ) as main_end_ts,
          -- RenderThread syncFrameState/draw 信息
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = fs.upid AND t.name = 'RenderThread'
             AND s.ts >= fs.actual_start
             AND s.ts <= fs.actual_end
             AND (s.name LIKE 'syncFrameState%' OR s.name LIKE 'DrawFrame%')
          ) as render_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = fs.upid AND t.name = 'RenderThread'
             AND s.ts >= fs.actual_start
             AND s.ts <= fs.actual_end
          ) as render_end_ts
        FROM frame_slices fs
      )
      SELECT
        fti.frame_id,
        -- 完整区间（FrameTimeline 的实际区间）
        printf('%d', fti.actual_start) as start_ts,
        printf('%d', fti.actual_end) as end_ts,
        -- 主线程区间
        printf('%d', COALESCE(fti.main_start_ts, fti.actual_start)) as main_start_ts,
        printf('%d', COALESCE(fti.main_end_ts, fti.actual_start + fti.actual_dur/2)) as main_end_ts,
        ROUND(COALESCE(fti.main_end_ts - fti.main_start_ts, 0) / 1e6, 2) as main_dur_ms,
        -- RenderThread 区间
        printf('%d', COALESCE(fti.render_start_ts, fti.actual_start + fti.actual_dur/2)) as render_start_ts,
        printf('%d', COALESCE(fti.render_end_ts, fti.actual_end)) as render_end_ts,
        ROUND(COALESCE(fti.render_end_ts - fti.render_start_ts, 0) / 1e6, 2) as render_dur_ms,
        -- 帧信息
        fti.actual_dur as dur,
        fti.actual_dur / 1e6 as dur_ms,
        fti.jank_type,
        fti.jank_severity_type,
        fti.layer_name,
        p.name as process_name,
        p.pid,
        ROW_NUMBER() OVER (ORDER BY fti.actual_start) as frame_index,
        -- Perfetto 跳转参数（前端可用于生成链接，前后各加 1ms 余量）
        printf('%d', fti.actual_start - 1000000) as perfetto_start,
        printf('%d', fti.actual_end + 1000000) as perfetto_end
      FROM frame_thread_info fti
      JOIN process p ON fti.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND (fti.jank_type GLOB '*App*' OR fti.jank_type = 'Self Jank')
      ORDER BY fti.actual_start
    save_as: app_jank_frames
    condition: "${performance_summary.data[0]?.app_janky_frames > 0}"

  # ========== 迭代分析每个掉帧帧 ==========
  - id: analyze_jank_frames
    type: iterator
    name: "逐帧详细分析"
    display:
      level: key
      title: "掉帧帧详细分析"
    source: app_jank_frames
    # 不限制数量，分析所有掉帧帧
    item_skill: jank_frame_detail
    item_params:
      # 完整区间（主线程开始 → RenderThread 结束）
      start_ts: start_ts
      end_ts: end_ts
      # 主线程区间
      main_start_ts: main_start_ts
      main_end_ts: main_end_ts
      main_dur_ms: main_dur_ms
      # RenderThread 区间
      render_start_ts: render_start_ts
      render_end_ts: render_end_ts
      render_dur_ms: render_dur_ms
      # 帧信息
      package: process_name
      pid: pid
      frame_id: frame_id
      frame_index: frame_index
      jank_type: jank_type
      dur_ms: dur_ms
      # Perfetto 跳转参数
      perfetto_start: perfetto_start
      perfetto_end: perfetto_end

  # ========== 掉帧诊断 ==========
  - id: jank_diagnosis
    type: diagnostic
    name: "掉帧诊断"
    display:
      level: key
      title: "问题诊断"
    inputs: [performance_summary, jank_stats, jank_frames]
    rules:
      # 应用掉帧严重
      - condition: "${performance_summary.data[0]?.app_jank_rate > 10}"
        severity: critical
        diagnosis: "应用掉帧率过高 (${performance_summary.data[0].app_jank_rate}%)"
        confidence: high
        suggestions:
          - "检查主线程耗时操作（Binder、IO、计算）"
          - "优化 onDraw/onLayout 方法"
          - "使用 RenderThread 减轻主线程负担"

      - condition: "${performance_summary.data[0]?.app_jank_rate > 5}"
        severity: warning
        diagnosis: "应用掉帧率偏高 (${performance_summary.data[0].app_jank_rate}%)"
        confidence: medium
        suggestions:
          - "检查 RecyclerView 的 onBindViewHolder 耗时"
          - "避免滑动时加载大图"

      # SurfaceFlinger 掉帧
      - condition: "${performance_summary.data[0]?.sf_jank_rate > 5}"
        severity: warning
        diagnosis: "SurfaceFlinger 掉帧率较高 (${performance_summary.data[0].sf_jank_rate}%)"
        confidence: medium
        suggestions:
          - "可能是系统合成问题"
          - "检查是否有过多图层叠加"
          - "考虑减少透明度和阴影使用"

      # 最大帧耗时过长
      - condition: "${performance_summary.data[0]?.max_frame_ms > 100}"
        severity: critical
        diagnosis: "存在严重卡顿帧 (${performance_summary.data[0].max_frame_ms}ms)"
        confidence: high
        suggestions:
          - "检查是否有主线程 IO 操作"
          - "检查是否有同步 Binder 调用"
          - "分析该帧期间的 CPU 和调度情况"

      # Buffer Stuffing
      - condition: "${jank_stats.data.find(j => j.jank_type.includes('Buffer'))?.count > 5}"
        severity: warning
        diagnosis: "存在 Buffer Stuffing 问题"
        confidence: medium
        suggestions:
          - "应用渲染过快导致缓冲区堆积"
          - "检查是否有不必要的 invalidate 调用"

  # ========== AI 总结 ==========
  - id: global_summary
    type: ai_summary
    name: "分析总结"
    display:
      level: key
      title: "滑动分析总结"
    inputs: [environment, performance_summary, jank_stats, scroll_sessions, jank_diagnosis]
    prompt: |
      请基于以下滑动分析结果，生成专业的性能评估总结。

      ## 环境信息
      刷新率: ${environment.data[0].refresh_rate_hz}Hz
      帧数据状态: ${environment.data[0].frame_data_status}

      ## 帧性能汇总
      ${performance_summary}

      ## 掉帧类型分布
      ${jank_stats}

      ## 滑动区间
      ${scroll_sessions}

      ## 诊断结果
      ${jank_diagnosis}

      ## 专业分析要求

      如果帧数据不可用或为空，请输出：
      "未检测到帧数据。

      可能原因：
      - Trace 未包含 FrameTimeline 数据（需要 Android 12+）
      - 应用未进行滑动操作
      - 包名不匹配

      建议：请确保在 Android 12+ 设备上采集 Trace，并包含 android.frames 数据源。"

      如果有数据，请分析并输出：
      1. **整体评价**：
         - 掉帧率：<1%优秀，1-5%良好，5-15%一般，>15%较差
         - 区分应用掉帧和 SurfaceFlinger 掉帧
      2. **掉帧原因分析**：
         - 哪种 jank_type 最多
         - 责任归属（应用 vs 系统）
      3. **关键指标**：总帧数、掉帧数、掉帧率、平均帧耗时、最大帧耗时
      4. **优化建议**：基于 jank_type 给出1-3条具体建议

      ## 严格要求
      - 只基于提供的实际数据分析
      - 使用 Perfetto 标准的 jank_type 术语
      - 格式清晰，不超过300字

output:
  display:
    level: key
    format: summary
