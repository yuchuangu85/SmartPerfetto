# =============================================================================
# Binder 分析 v2.2（组合 Skill）- 基于 Perfetto stdlib 优化版
# =============================================================================
# 使用 Perfetto stdlib 的 android_binder 系列表
#
# v2.2 新增：
# - Iterator 模式：逐个慢 Binder 事务详细分析
# - 大小核分析：Binder 期间 CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 状态分布
# - Perfetto 跳转链接：点击跳转到 Binder 事务区间
#
# 核心表：
# - android_binder_txns: Binder 事务基础信息
#   - is_main_thread: 是否主线程发起
#   - client_ts, client_dur, server_ts, server_dur
#   - aidl_name, aidl_interface
# - android_sync_binder_thread_state_by_txn: Binder 阻塞期间的线程状态

name: binder_analysis
version: "2.2"
type: composite

meta:
  display_name: "Binder IPC 分析"
  description: "分析 Binder 跨进程调用延迟和服务交互"
  icon: "exchange"
  tags: [binder, ipc, aidl, service, transaction, composite]

triggers:
  keywords:
    zh: [Binder, IPC, 跨进程, 服务调用, AIDL, 进程通信]
    en: [binder, ipc, cross process, service call, aidl, transaction]
  patterns:
    - ".*[Bb]inder.*"
    - ".*IPC.*"
    - ".*跨进程.*"

prerequisites:
  modules:
    - android.binder

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"

steps:
  # ========== 检查 Binder 数据 ==========
  - id: check_binder
    type: atomic
    name: "检查 Binder 数据"
    display:
      level: summary
      title: "数据检查"
    sql: |
      SELECT
        COUNT(*) as txn_count,
        CASE WHEN COUNT(*) > 0 THEN 'available' ELSE 'unavailable' END as status
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
         OR server_process GLOB '${package}*'
         OR '${package}' = ''
    save_as: binder_check

  # ========== Binder 概览（关联多个统计维度）==========
  - id: binder_overview
    type: atomic
    name: "Binder 概览"
    display:
      level: key
      title: "Binder 调用概览"
    sql: |
      SELECT
        COUNT(*) as total_txns,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_txns,
        SUM(CASE WHEN is_sync = 0 THEN 1 ELSE 0 END) as async_txns,
        -- 使用正确的列名 is_main_thread
        SUM(CASE WHEN is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_txns,
        ROUND(AVG(client_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(client_dur) / 1e6, 2) as max_dur_ms,
        SUM(client_dur) / 1e6 as total_dur_ms,
        SUM(CASE WHEN client_dur / 1e6 > 10 THEN 1 ELSE 0 END) as slow_calls_count,
        -- 主线程慢调用
        SUM(CASE WHEN is_main_thread = 1 AND client_dur / 1e6 > 16 THEN 1 ELSE 0 END) as main_thread_slow_count,
        CASE
          WHEN MAX(client_dur) / 1e6 > 100 THEN '严重'
          WHEN MAX(client_dur) / 1e6 > 50 THEN '需优化'
          WHEN MAX(client_dur) / 1e6 > 16 THEN '良好'
          ELSE '优秀'
        END as rating
      FROM android_binder_txns
      WHERE client_process GLOB '${package}*'
         OR server_process GLOB '${package}*'
    save_as: binder_overview
    condition: binder_check.data[0]?.status === 'available'

  # ========== 发出的调用分析（按接口分组）==========
  - id: outgoing_by_interface
    type: atomic
    name: "发出的调用（按接口）"
    display:
      level: key
      title: "发出的 Binder 调用（按接口）"
    sql: |
      SELECT
        bt.aidl_interface,
        bt.server_process,
        COUNT(*) as call_count,
        SUM(bt.client_dur) / 1e6 as total_dur_ms,
        ROUND(AVG(bt.client_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(bt.client_dur) / 1e6, 2) as max_dur_ms,
        -- 主线程调用统计
        SUM(CASE WHEN bt.is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_count,
        SUM(CASE WHEN bt.is_main_thread = 1 THEN bt.client_dur ELSE 0 END) / 1e6 as main_thread_dur_ms,
        -- 同步/异步
        SUM(CASE WHEN bt.is_sync = 1 THEN 1 ELSE 0 END) as sync_count
      FROM android_binder_txns bt
      WHERE bt.client_process GLOB '${package}*'
      GROUP BY bt.aidl_interface, bt.server_process
      ORDER BY total_dur_ms DESC
      LIMIT 15
    save_as: outgoing_by_interface
    condition: binder_check.data[0]?.status === 'available'

  # ========== 主线程同步 Binder（关键卡顿原因）==========
  - id: main_thread_sync_binder
    type: atomic
    name: "主线程同步 Binder"
    display:
      level: key
      title: "主线程同步 Binder 调用（可能导致掉帧）"
    sql: |
      SELECT
        bt.client_ts / 1e6 as ts_ms,
        ROUND(bt.client_dur / 1e6, 2) as dur_ms,
        bt.server_process,
        bt.aidl_name,
        bt.aidl_interface,
        bt.client_process as process_name,
        -- 时间戳用于详细分析
        printf('%d', bt.client_ts) as binder_ts,
        printf('%d', bt.client_ts + bt.client_dur) as binder_end_ts,
        -- Perfetto 跳转参数（前后各扩展 10ms）
        printf('%d', CAST(bt.client_ts - 10000000 AS INTEGER)) as perfetto_start,
        printf('%d', CAST(bt.client_ts + bt.client_dur + 10000000 AS INTEGER)) as perfetto_end,
        CASE
          WHEN bt.client_dur / 1e6 > 50 THEN 'critical'
          WHEN bt.client_dur / 1e6 > 16 THEN 'warning'
          WHEN bt.client_dur / 1e6 > 8 THEN 'notice'
          ELSE 'normal'
        END as severity
      FROM android_binder_txns bt
      WHERE bt.client_process GLOB '${package}*'
        AND bt.is_sync = 1
        AND bt.is_main_thread = 1
      ORDER BY bt.client_dur DESC
      LIMIT 20
    save_as: main_thread_binder
    condition: binder_check.data[0]?.status === 'available'

  # ========== Binder 阻塞分析（JOIN thread_state）==========
  - id: binder_blocking_analysis
    type: atomic
    name: "Binder 阻塞分析"
    display:
      level: key
      title: "Binder 阻塞期间状态分析"
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_name,
        bt.client_dur / 1e6 as binder_dur_ms,
        -- JOIN thread_state 分析阻塞期间的状态
        ts.state,
        ts.blocked_function,
        SUM(ts.dur) / 1e6 as state_dur_ms,
        ROUND(100.0 * SUM(ts.dur) / bt.client_dur, 1) as state_percent,
        printf('%d', bt.client_ts) as ts_str
      FROM android_binder_txns bt
      JOIN thread_state ts ON (
        ts.utid = bt.client_utid
        AND ts.ts >= bt.client_ts
        AND ts.ts < bt.client_ts + bt.client_dur
      )
      WHERE bt.client_process GLOB '${package}*'
        AND bt.is_main_thread = 1
        AND bt.client_dur > 5000000  -- > 5ms
      GROUP BY bt.id, ts.state
      ORDER BY bt.client_dur DESC, state_dur_ms DESC
      LIMIT 30
    save_as: binder_blocking
    condition: binder_check.data[0]?.status === 'available'

  # ========== 服务端响应分析（JOIN 服务进程）==========
  - id: server_response_analysis
    type: atomic
    name: "服务端响应分析"
    display:
      level: detail
      title: "服务端处理时间分析"
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_interface,
        COUNT(*) as call_count,
        -- 客户端等待 vs 服务端处理
        SUM(bt.client_dur) / 1e6 as total_client_wait_ms,
        SUM(bt.server_dur) / 1e6 as total_server_process_ms,
        ROUND(AVG(bt.server_dur) / 1e6, 2) as avg_server_dur_ms,
        ROUND(MAX(bt.server_dur) / 1e6, 2) as max_server_dur_ms,
        -- 传输开销 = client_dur - server_dur
        ROUND(AVG(bt.client_dur - bt.server_dur) / 1e6, 2) as avg_transport_overhead_ms
      FROM android_binder_txns bt
      WHERE bt.client_process GLOB '${package}*'
        AND bt.is_sync = 1
      GROUP BY bt.server_process, bt.aidl_interface
      ORDER BY total_client_wait_ms DESC
      LIMIT 15
    save_as: server_response
    condition: binder_check.data[0]?.status === 'available'

  # ========== Binder 与帧关联分析（深度 JOIN）==========
  - id: binder_frame_correlation
    type: atomic
    name: "Binder 与帧关联"
    display:
      level: detail
      title: "Binder 调用与帧渲染关联"
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_name,
        bt.client_dur / 1e6 as binder_dur_ms,
        -- 关联帧信息（如果可用）
        af.frame_id,
        af.dur / 1e6 as frame_dur_ms,
        -- 判断是否在帧期间
        CASE WHEN af.frame_id IS NOT NULL THEN '帧内' ELSE '帧外' END as in_frame
      FROM android_binder_txns bt
      LEFT JOIN android_frames af ON (
        bt.client_ts >= af.ts
        AND bt.client_ts < af.ts + af.dur
        AND af.upid = (
          SELECT upid FROM process WHERE name GLOB '${package}*' LIMIT 1
        )
      )
      WHERE bt.client_process GLOB '${package}*'
        AND bt.is_main_thread = 1
        AND bt.client_dur > 1000000  -- > 1ms
      ORDER BY bt.client_dur DESC
      LIMIT 20
    save_as: binder_frame
    condition: binder_check.data[0]?.status === 'available'

  # ========== 接收的调用分析 ==========
  - id: incoming_calls
    type: atomic
    name: "接收的调用"
    display:
      level: summary
      title: "接收的 Binder 调用"
    sql: |
      SELECT
        bt.client_process,
        bt.aidl_interface,
        COUNT(*) as call_count,
        SUM(bt.server_dur) / 1e6 as total_dur_ms,
        ROUND(AVG(bt.server_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(bt.server_dur) / 1e6, 2) as max_dur_ms
      FROM android_binder_txns bt
      WHERE bt.server_process GLOB '${package}*'
      GROUP BY bt.client_process, bt.aidl_interface
      ORDER BY total_dur_ms DESC
      LIMIT 15
    save_as: incoming_calls
    condition: binder_check.data[0]?.status === 'available'

  # ========== 逐个慢 Binder 事务详细分析 ==========
  - id: analyze_slow_binder
    type: iterator
    name: "慢 Binder 详细分析"
    display:
      level: key
      title: "慢 Binder 事务详细分析"
    source: main_thread_binder
    skill: binder_detail
    item_params:
      binder_ts: binder_ts
      binder_end_ts: binder_end_ts
      dur_ms: dur_ms
      server_process: server_process
      aidl_name: aidl_name
      process_name: process_name
      perfetto_start: perfetto_start
      perfetto_end: perfetto_end
    max_items: 10
    condition: main_thread_binder.data.length > 0

  # ========== Binder 诊断 ==========
  - id: binder_diagnosis
    type: diagnostic
    name: "Binder 诊断"
    display:
      level: key
      title: "问题诊断"
    inputs: [binder_overview, main_thread_binder, binder_blocking, server_response]
    rules:
      # 主线程慢 Binder
      - condition: "${main_thread_binder.data[0]?.dur_ms > 50}"
        severity: critical
        diagnosis: "主线程存在严重慢 Binder 调用 (${main_thread_binder.data[0].dur_ms}ms)"
        confidence: high
        suggestions:
          - "将该 Binder 调用移到后台线程"
          - "检查服务 ${main_thread_binder.data[0].server_process} 响应延迟"
          - "考虑使用异步 Binder 接口"

      - condition: "${main_thread_binder.data[0]?.dur_ms > 16}"
        severity: warning
        diagnosis: "主线程 Binder 调用超过一帧时间 (${main_thread_binder.data[0].dur_ms}ms)"
        confidence: high
        suggestions:
          - "可能导致掉帧，考虑异步化"
          - "优化服务端处理时间"

      # 主线程 Binder 调用过多
      - condition: "${binder_overview.data[0]?.main_thread_txns > 50}"
        severity: warning
        diagnosis: "主线程发起 ${binder_overview.data[0].main_thread_txns} 次 Binder 调用"
        confidence: medium
        suggestions:
          - "批量合并多次调用"
          - "使用缓存减少重复调用"
          - "将非必要调用移到后台线程"

      # 服务端响应慢
      - condition: "${server_response.data[0]?.avg_server_dur_ms > 20}"
        severity: warning
        diagnosis: "服务端平均处理时间较长 (${server_response.data[0].avg_server_dur_ms}ms)"
        confidence: medium
        suggestions:
          - "联系服务提供方优化"
          - "考虑缓存服务调用结果"

      # 阻塞状态分析
      - condition: "${binder_blocking.data.find(b => b.state === 'D')?.state_percent > 50}"
        severity: warning
        diagnosis: "Binder 阻塞期间存在大量 IO 等待"
        confidence: medium
        suggestions:
          - "检查服务端是否有 IO 操作"
          - "考虑使用异步接口"

  # ========== AI 总结 ==========
  - id: global_summary
    type: ai_summary
    name: "分析总结"
    display:
      level: key
      title: "Binder 分析总结"
    inputs: [binder_check, binder_overview, outgoing_by_interface, main_thread_binder, analyze_slow_binder, binder_blocking, binder_diagnosis]
    prompt: |
      请基于以下 Binder 分析结果，生成专业的性能评估总结。

      ## 数据检查
      ${binder_check}

      ## Binder 概览
      ${binder_overview}

      ## 发出的调用（按接口）
      ${outgoing_by_interface}

      ## 主线程 Binder 调用
      ${main_thread_binder}

      ## 逐个慢 Binder 详细分析（大小核、四象限）
      ${analyze_slow_binder}

      ## Binder 阻塞分析
      ${binder_blocking}

      ## 诊断结果
      ${binder_diagnosis}

      ## 专业分析要求

      如果无 Binder 数据，请输出：
      "未检测到 Binder 调用数据。

      可能原因：
      - Trace 未包含 Binder 事件（需要启用 android.binder 模块）
      - 应用未进行跨进程调用

      建议：如需分析 Binder 问题，请确保 Trace 包含 android.binder 数据。"

      如果有数据，请分析并输出：
      1. **整体评价**：
         - 主线程 Binder：<16ms优秀，16-50ms需优化，>50ms严重
         - 关注主线程同步调用占比
      2. **热点服务**：哪些服务/接口被频繁调用
      3. **四象限分析**：Binder 期间主线程状态分布（通常以 Sleeping 为主）
      4. **阻塞分析**：主线程阻塞期间的状态分布
      5. **优化建议**：基于实际问题给出1-3条具体建议

      ## 严格要求
      - 只基于提供的实际数据分析
      - 重点关注主线程同步 Binder 调用的影响
      - 格式清晰，不超过250字

output:
  display:
    level: key
    format: summary
