# =============================================================================
# 启动事件详细分析（组合 Skill）v2.0
# =============================================================================
# 分析单个启动事件的详细信息，包括：
# - 主线程耗时操作
# - Binder 调用
# - CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 分布
# - 调度延迟分析
#
# 四大象限说明：
# 1. Running on Big Core - 在大核上运行（性能最优）
# 2. Running on Little Core - 在小核上运行（可能性能不足）
# 3. Runnable - 等待 CPU 调度（CPU 资源争抢）
# 4. Sleeping/Blocked - 睡眠或阻塞（等待 IO/锁/Binder）
#
# 大小核判定（通用规则）：
# - 4+4 配置：CPU 0-3 小核，CPU 4-7 大核
# - 2+2+4 配置：CPU 0-3 小核，CPU 4-5 中核，CPU 6-7 大核

name: startup_detail
version: "2.0"
type: composite

meta:
  display_name: "启动事件详细分析"
  description: "分析单个启动事件的 CPU、Binder、大小核、四象限等详细信息"
  icon: "rocket"
  tags: [startup, detail, analysis, cpu, core, quadrant]

prerequisites:
  modules:
    - android.startup.startups
    - android.binder

inputs:
  - name: startup_id
    type: integer
    required: true
    description: "启动事件 ID"
  - name: start_ts
    type: timestamp
    required: true
    description: "启动开始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "启动结束时间戳(ns)"
  - name: dur_ms
    type: number
    required: true
    description: "启动耗时(ms)"
  - name: package
    type: string
    required: true
    description: "应用包名"
  - name: startup_type
    type: string
    required: true
    description: "启动类型 (cold/warm/hot)"
  - name: ttid_ms
    type: number
    required: false
    description: "TTID (ms)"
  - name: ttfd_ms
    type: number
    required: false
    description: "TTFD (ms)"
  # Perfetto 跳转参数
  - name: perfetto_start
    type: timestamp
    required: false
    description: "Perfetto 跳转开始时间"
  - name: perfetto_end
    type: timestamp
    required: false
    description: "Perfetto 跳转结束时间"

steps:
  # ========== 启动基本信息 ==========
  - id: startup_info
    type: atomic
    name: "启动基本信息"
    display:
      level: key
      title: "启动 #${startup_id} 详情"
    sql: |
      SELECT
        ${startup_id} as startup_id,
        '${package}' as package,
        '${startup_type}' as startup_type,
        CASE '${startup_type}'
          WHEN 'cold' THEN '冷启动'
          WHEN 'warm' THEN '温启动'
          WHEN 'hot' THEN '热启动'
          ELSE '${startup_type}'
        END as type_display,
        ROUND(${dur_ms}, 2) as dur_ms,
        ROUND(COALESCE(${ttid_ms}, 0), 2) as ttid_ms,
        ROUND(COALESCE(${ttfd_ms}, 0), 2) as ttfd_ms,
        -- 时间戳
        printf('%d', ${start_ts}) as start_ts,
        printf('%d', ${end_ts}) as end_ts,
        -- Perfetto 跳转链接参数
        printf('%d', COALESCE(${perfetto_start}, ${start_ts})) as perfetto_start,
        printf('%d', COALESCE(${perfetto_end}, ${end_ts})) as perfetto_end,
        -- 评级
        CASE
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 500 THEN '优秀'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 1000 THEN '良好'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 2000 THEN '需优化'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 200 THEN '优秀'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 500 THEN '良好'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 100 THEN '优秀'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 200 THEN '良好'
          ELSE '需优化'
        END as rating
    save_as: startup_basic

  # ========== 大小核占比分析 ==========
  - id: cpu_core_analysis
    type: atomic
    name: "大小核占比分析"
    display:
      level: key
      title: "大小核占比"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid  -- 主线程
      ),
      cpu_time AS (
        SELECT
          ss.utid,
          ss.cpu,
          SUM(
            MIN(ss.ts + ss.dur, ${end_ts}) - MAX(ss.ts, ${start_ts})
          ) / 1e6 as dur_ms,
          CASE
            WHEN ss.cpu >= 4 THEN 'big'
            ELSE 'little'
          END as core_type
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
        GROUP BY ss.utid, ss.cpu
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END), 2) as big_core_ms,
        ROUND(SUM(CASE WHEN core_type = 'little' THEN dur_ms ELSE 0 END), 2) as little_core_ms,
        ROUND(SUM(dur_ms), 2) as total_running_ms,
        ROUND(100.0 * SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as big_core_pct,
        ROUND(100.0 * SUM(CASE WHEN core_type = 'little' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as little_core_pct,
        GROUP_CONCAT(DISTINCT cpu) as used_cpus
      FROM cpu_time
      GROUP BY 1
    save_as: cpu_core

  # ========== CPU 频率分析 ==========
  - id: cpu_freq_analysis
    type: atomic
    name: "CPU 频率分析"
    display:
      level: detail
      title: "CPU 频率"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      running_samples AS (
        SELECT
          ss.cpu,
          ss.ts,
          ss.dur,
          CASE WHEN ss.cpu >= 4 THEN 'big' ELSE 'little' END as core_type
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
      ),
      freq_samples AS (
        SELECT
          c.cpu,
          c.value as freq_khz,
          rs.core_type,
          MIN(c.ts + c.dur, ${end_ts}) - MAX(c.ts, rs.ts) as overlap_dur
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        JOIN running_samples rs ON cct.cpu = rs.cpu
        WHERE cct.name = 'cpufreq'
          AND c.ts < ${end_ts}
          AND c.ts + c.dur > rs.ts
          AND c.ts < rs.ts + rs.dur
      )
      SELECT
        core_type,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz
      FROM freq_samples
      WHERE overlap_dur > 0
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: cpu_freq

  # ========== 四大象限分析 ==========
  - id: quadrant_analysis
    type: atomic
    name: "四大象限分析"
    display:
      level: key
      title: "四大象限分析"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      thread_states AS (
        SELECT
          ts.utid,
          ts.state,
          ts.cpu,
          SUM(
            MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts})
          ) / 1e6 as dur_ms
        FROM thread_state ts
        JOIN main_thread mt ON ts.utid = mt.utid
        WHERE ts.ts < ${end_ts}
          AND ts.ts + ts.dur > ${start_ts}
        GROUP BY ts.utid, ts.state, ts.cpu
      ),
      quadrant_data AS (
        SELECT
          CASE
            WHEN state = 'Running' AND cpu >= 4 THEN 'Q1_big_running'
            WHEN state = 'Running' AND cpu < 4 THEN 'Q2_little_running'
            WHEN state IN ('R', 'R+') THEN 'Q3_runnable'
            WHEN state IN ('S', 'D', 'I') THEN 'Q4_sleeping'
            ELSE 'other'
          END as quadrant,
          dur_ms
        FROM thread_states
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END), 2) as q1_big_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END), 2) as q2_little_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END), 2) as q3_runnable_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END), 2) as q4_sleeping_ms,
        ROUND(SUM(dur_ms), 2) as total_ms,
        -- 百分比
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q1_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q2_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q3_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q4_pct
      FROM quadrant_data
      GROUP BY 1
    save_as: quadrant

  # ========== 主线程关键 Slice ==========
  - id: main_thread_slices
    type: atomic
    name: "主线程耗时操作"
    display:
      level: key
      title: "主线程耗时操作 Top10"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      )
      SELECT
        s.name as slice_name,
        COUNT(*) as count,
        ROUND(SUM(s.dur) / 1e6, 2) as total_ms,
        ROUND(AVG(s.dur) / 1e6, 2) as avg_ms,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        ROUND(100.0 * SUM(s.dur) / (${end_ts} - ${start_ts}), 1) as percent
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN main_thread mt ON tt.utid = mt.utid
      WHERE s.ts >= ${start_ts}
        AND s.ts < ${end_ts}
        AND s.dur > 1000000  -- > 1ms
      GROUP BY s.name
      ORDER BY total_ms DESC
      LIMIT 10
    save_as: main_slices

  # ========== Binder 调用分析 ==========
  - id: binder_analysis
    type: atomic
    name: "Binder 调用分析"
    display:
      level: key
      title: "Binder 调用"
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_name,
        COUNT(*) as call_count,
        ROUND(SUM(bt.client_dur) / 1e6, 2) as total_ms,
        ROUND(AVG(bt.client_dur) / 1e6, 2) as avg_ms,
        ROUND(MAX(bt.client_dur) / 1e6, 2) as max_ms,
        SUM(CASE WHEN bt.is_main_thread THEN 1 ELSE 0 END) as main_thread_calls,
        ROUND(100.0 * SUM(bt.client_dur) / (${end_ts} - ${start_ts}), 1) as percent
      FROM android_binder_txns bt
      WHERE bt.client_process GLOB '${package}*'
        AND bt.client_ts >= ${start_ts}
        AND bt.client_ts < ${end_ts}
      GROUP BY bt.server_process, bt.aidl_name
      ORDER BY total_ms DESC
      LIMIT 10
    save_as: binder_calls

  # ========== 调度延迟分析 ==========
  - id: sched_latency
    type: atomic
    name: "调度延迟分析"
    display:
      level: detail
      title: "调度延迟"
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      )
      SELECT
        ts.state,
        COUNT(*) as count,
        ROUND(SUM(ts.dur) / 1e6, 2) as total_ms,
        ROUND(AVG(ts.dur) / 1e6, 2) as avg_ms,
        ROUND(MAX(ts.dur) / 1e6, 2) as max_ms,
        -- 超过 8ms 的严重延迟次数
        SUM(CASE WHEN ts.dur / 1e6 > 8 THEN 1 ELSE 0 END) as severe_count
      FROM thread_state ts
      JOIN main_thread mt ON ts.utid = mt.utid
      WHERE ts.ts >= ${start_ts}
        AND ts.ts < ${end_ts}
        AND ts.state IN ('R', 'R+')
      GROUP BY ts.state
    save_as: sched_delay

  # ========== 启动诊断 ==========
  - id: startup_diagnosis
    type: diagnostic
    name: "启动诊断"
    display:
      level: key
      title: "问题诊断"
    inputs: [startup_basic, cpu_core, quadrant, main_slices, binder_calls, sched_delay]
    rules:
      # 大核占比过低
      - condition: "${cpu_core.data[0]?.big_core_pct < 30}"
        severity: warning
        diagnosis: "主线程大核占比仅 ${cpu_core.data[0].big_core_pct}%，性能受限"
        confidence: high
        suggestions:
          - "检查是否有其他高优先级进程抢占大核"
          - "考虑调整进程优先级或使用 setThreadPriority"

      # Runnable 等待过长
      - condition: "${quadrant.data[0]?.q3_runnable_ms > 50}"
        severity: warning
        diagnosis: "主线程 Runnable 等待 ${quadrant.data[0].q3_runnable_ms}ms"
        confidence: high
        suggestions:
          - "CPU 资源争抢严重，检查后台线程负载"
          - "减少启动期间的并发线程数"

      # Sleeping 占比过高
      - condition: "${quadrant.data[0]?.q4_pct > 50}"
        severity: warning
        diagnosis: "主线程 Sleeping 占比 ${quadrant.data[0].q4_pct}%"
        confidence: medium
        suggestions:
          - "检查主线程是否在等待 IO 或锁"
          - "将阻塞操作移到后台线程"

      # Binder 调用耗时过长
      - condition: "${binder_calls.data[0]?.total_ms > 100}"
        severity: warning
        diagnosis: "Binder 调用 ${binder_calls.data[0].server_process} 耗时 ${binder_calls.data[0].total_ms}ms"
        confidence: high
        suggestions:
          - "减少启动期间的 IPC 调用"
          - "使用异步 Binder 或延迟调用"

      # 严重调度延迟
      - condition: "${sched_delay.data[0]?.severe_count > 5}"
        severity: warning
        diagnosis: "存在 ${sched_delay.data[0].severe_count} 次严重调度延迟 (>8ms)"
        confidence: medium
        suggestions:
          - "检查系统负载，减少后台进程"
          - "考虑使用 SCHED_FIFO 策略"

      # 单个 Slice 耗时过长
      - condition: "${main_slices.data[0]?.max_ms > 100}"
        severity: warning
        diagnosis: "主线程操作 '${main_slices.data[0].slice_name}' 最长耗时 ${main_slices.data[0].max_ms}ms"
        confidence: high
        suggestions:
          - "优化该操作或移到后台线程"
          - "检查是否可以分批执行"

output:
  display:
    level: key
    format: detail
