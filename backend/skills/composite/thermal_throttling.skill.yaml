# =============================================================================
# Thermal Throttling Analysis v3.0 (Composite Skill)
# =============================================================================
# 系统级分析：温度监控、热节流检测、CPU 频率相关性
#
# 核心表：
# - counter: 系统计数器 (温度传感器、频率)
# - counter_track: 计数器轨道元数据
# - cpu_counter_track: CPU 频率轨道
#
# 分析维度：
# - L0: 温度数据存在性检查
# - L1: 温度概览 (zone/传感器温度统计)
# - L1: CPU 频率与温度关联
# - L2: 温度事件时间线
# - L2: 节流检测 (频率下降与温度上升关联)
# - 诊断: SQL 驱动根因分类
#
# 温度单位注意：
# - 部分设备上报 millidegrees (值 > 1000)，需归一化为摄氏度
# - 频率阈值使用相对值 (基于最大观测频率)，不硬编码绝对值
# =============================================================================

name: thermal_throttling
version: "3.0"
type: composite

meta:
  display_name: "热节流分析"
  description: "分析系统温度、热节流对 CPU 频率和性能的影响"
  icon: "thermometer"
  tags: [thermal, throttling, temperature, cpu, frequency, system]

triggers:
  keywords:
    zh: [温度, 热节流, 降频, 发热, 过热, 散热, 温控]
    en: [thermal, throttling, temperature, frequency, overheat, cooling, heat]
  patterns:
    - ".*温度.*"
    - ".*[热發].*节流.*"
    - ".*[Tt]hermal.*"
    - ".*[Tt]hrottl.*"
    - ".*降频.*"
    - ".*过热.*"

prerequisites:
  required_tables:
    - counter
  modules: []

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"

steps:
  # ========== L0: 温度数据检查 ==========
  - id: data_check
    type: atomic
    name: "温度数据检测"
    display: false
    sql: |
      SELECT
        CASE WHEN EXISTS (
          SELECT 1 FROM counter_track
          WHERE name LIKE '%thermal%'
             OR name LIKE '%temp%'
             OR name LIKE '%temperature%'
             OR name LIKE '%tsens%'
        ) THEN 1 ELSE 0 END as has_thermal_data,
        CASE WHEN EXISTS (
          SELECT 1 FROM cpu_counter_track WHERE name = 'cpufreq'
        ) THEN 1 ELSE 0 END as has_freq_data
    save_as: data_check

  # ========== L1: 温度传感器概览 ==========
  - id: thermal_overview
    type: atomic
    name: "温度传感器概览"
    synthesize:
      role: overview
      fields:
        - key: sensor_name
          label: 传感器
        - key: max_temp_c
          label: 最高温度
          format: "{{value}} C"
        - key: avg_temp_c
          label: 平均温度
          format: "{{value}} C"
        - key: temp_severity
          label: 温度评级
      insights:
        - condition: "max_temp_c > 80"
          template: "传感器 {{sensor_name}} 峰值 {{max_temp_c}}C，存在严重过热"
        - condition: "max_temp_c > 60 && max_temp_c <= 80"
          template: "传感器 {{sensor_name}} 峰值 {{max_temp_c}}C，温度偏高"
        - condition: "temp_range_c > 20"
          template: "传感器 {{sensor_name}} 温度波动 {{temp_range_c}}C，波动较大"
    display:
      level: summary
      layer: overview
      title: "温度传感器概览"
      columns:
        - name: sensor_name
          label: "传感器"
          type: string
        - name: sample_count
          label: "采样数"
          type: number
          format: compact
        - name: min_temp_c
          label: "最低温度"
          type: number
          format: compact
        - name: max_temp_c
          label: "最高温度"
          type: number
          format: compact
        - name: avg_temp_c
          label: "平均温度"
          type: number
          format: compact
        - name: temp_range_c
          label: "温度波动"
          type: number
          format: compact
        - name: temp_severity
          label: "评级"
          type: string
    sql: |
      SELECT
        ct.name as sensor_name,
        COUNT(*) as sample_count,
        -- 归一化：millidegrees (>1000) → Celsius
        ROUND(MIN(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END), 1) as min_temp_c,
        ROUND(MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END), 1) as max_temp_c,
        ROUND(AVG(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END), 1) as avg_temp_c,
        ROUND(
          MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END)
          - MIN(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END), 1
        ) as temp_range_c,
        CASE
          WHEN MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) > 80 THEN '严重过热'
          WHEN MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) > 60 THEN '温度偏高'
          WHEN MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) > 45 THEN '温度正常'
          ELSE '温度良好'
        END as temp_severity
      FROM counter c
      JOIN counter_track ct ON c.track_id = ct.id
      WHERE (
          ct.name LIKE '%thermal%'
          OR ct.name LIKE '%temp%'
          OR ct.name LIKE '%temperature%'
          OR ct.name LIKE '%tsens%'
        )
        AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      GROUP BY ct.name
      ORDER BY max_temp_c DESC
    save_as: thermal_overview
    optional: true
    condition: "data_check.data[0]?.has_thermal_data === 1"

  # ========== L1: CPU 频率概览 (与温度关联) ==========
  - id: cpu_freq_overview
    type: atomic
    name: "CPU 频率概览"
    synthesize:
      role: overview
      fields:
        - key: cpu_id
          label: CPU 核心
        - key: min_freq_mhz
          label: 最低频率
          format: "{{value}} MHz"
        - key: max_freq_mhz
          label: 最高频率
          format: "{{value}} MHz"
        - key: throttle_ratio
          label: 节流比例
      insights:
        - condition: "throttle_ratio > 50"
          template: "CPU{{cpu_id}} 频率下降超过最大频率 50%，存在显著节流"
        - condition: "throttle_ratio > 30"
          template: "CPU{{cpu_id}} 频率下降超过最大频率 30%，存在中度节流"
    display:
      level: summary
      layer: overview
      title: "CPU 频率与节流状态"
      columns:
        - name: cpu_id
          label: "CPU"
          type: number
        - name: min_freq_mhz
          label: "最低频率"
          type: number
          format: compact
        - name: max_freq_mhz
          label: "最高频率"
          type: number
          format: compact
        - name: avg_freq_mhz
          label: "平均频率"
          type: number
          format: compact
        - name: sample_count
          label: "采样数"
          type: number
          format: compact
        - name: throttle_ratio
          label: "节流比例(%)"
          type: percentage
          format: percentage
        - name: throttling_status
          label: "状态"
          type: string
    sql: |
      SELECT
        cct.cpu as cpu_id,
        ROUND(MIN(c.value / 1000.0), 0) as min_freq_mhz,
        ROUND(MAX(c.value / 1000.0), 0) as max_freq_mhz,
        ROUND(AVG(c.value / 1000.0), 0) as avg_freq_mhz,
        COUNT(*) as sample_count,
        -- 相对节流比例：(max - min) / max * 100
        ROUND((MAX(c.value) - MIN(c.value)) * 100.0 / NULLIF(MAX(c.value), 0), 1) as throttle_ratio,
        CASE
          WHEN MIN(c.value) < MAX(c.value) * 0.3 THEN '严重节流'
          WHEN MIN(c.value) < MAX(c.value) * 0.5 THEN '显著节流'
          WHEN MIN(c.value) < MAX(c.value) * 0.7 THEN '中度节流'
          ELSE '正常'
        END as throttling_status
      FROM counter c
      JOIN cpu_counter_track cct ON c.track_id = cct.id
      WHERE cct.name = 'cpufreq'
        AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      GROUP BY cct.cpu
      ORDER BY cpu_id
    save_as: cpu_freq_overview
    optional: true
    condition: "data_check.data[0]?.has_freq_data === 1"

  # ========== L2: 温度变化时间线 ==========
  - id: thermal_timeline
    type: atomic
    name: "温度变化时间线"
    display:
      level: detail
      layer: list
      title: "温度变化趋势"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: sensor_name
          label: "传感器"
          type: string
        - name: temp_c
          label: "温度(C)"
          type: number
          format: compact
        - name: delta_c
          label: "变化(C)"
          type: number
          format: compact
        - name: severity
          label: "状态"
          type: string
    sql: |
      WITH thermal_samples AS (
        SELECT
          c.ts,
          ct.name as sensor_name,
          CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END as temp_c,
          LAG(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END)
            OVER (PARTITION BY ct.name ORDER BY c.ts) as prev_temp_c,
          ROW_NUMBER() OVER (PARTITION BY ct.name ORDER BY c.ts) as rn,
          COUNT(*) OVER (PARTITION BY ct.name) as total_samples
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (
            ct.name LIKE '%thermal%'
            OR ct.name LIKE '%temp%'
            OR ct.name LIKE '%temperature%'
            OR ct.name LIKE '%tsens%'
          )
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      )
      SELECT
        printf('%d', ts) as ts,
        sensor_name,
        ROUND(temp_c, 1) as temp_c,
        ROUND(temp_c - COALESCE(prev_temp_c, temp_c), 1) as delta_c,
        CASE
          WHEN temp_c > 80 THEN 'critical'
          WHEN temp_c > 60 THEN 'warning'
          WHEN temp_c > 45 THEN 'normal'
          ELSE 'cool'
        END as severity
      FROM thermal_samples
      -- 采样：取每个传感器的均匀分布样本，最多 100 条
      WHERE rn % MAX(1, total_samples / 100) = 0
         OR temp_c > 60
         OR ABS(temp_c - COALESCE(prev_temp_c, temp_c)) > 3
      ORDER BY ts
      LIMIT 200
    save_as: thermal_timeline
    optional: true
    condition: "data_check.data[0]?.has_thermal_data === 1"

  # ========== L2: 频率骤降事件 (节流检测) ==========
  - id: frequency_drop_events
    type: atomic
    name: "频率骤降事件"
    synthesize:
      role: list
      groupBy:
        - field: cpu_id
          title: 按 CPU 核心分布
      fields:
        - key: cpu_id
          label: CPU
        - key: drop_pct
          label: 降频幅度
          format: "{{value}}%"
        - key: prev_freq_mhz
          label: 降频前
          format: "{{value}} MHz"
    display:
      level: detail
      layer: list
      title: "CPU 频率骤降事件（可能因热节流）"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: cpu_id
          label: "CPU"
          type: number
        - name: prev_freq_mhz
          label: "降频前"
          type: number
          format: compact
        - name: new_freq_mhz
          label: "降频后"
          type: number
          format: compact
        - name: drop_pct
          label: "降幅(%)"
          type: percentage
          format: percentage
        - name: severity
          label: "严重程度"
          type: string
    sql: |
      WITH freq_with_max AS (
        SELECT
          cct.cpu as cpu_id,
          c.ts,
          c.value / 1000.0 as freq_mhz,
          LAG(c.value / 1000.0) OVER (PARTITION BY cct.cpu ORDER BY c.ts) as prev_freq_mhz,
          MAX(c.value / 1000.0) OVER (PARTITION BY cct.cpu) as cpu_max_freq_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      )
      SELECT
        printf('%d', ts) as ts,
        cpu_id,
        ROUND(prev_freq_mhz, 0) as prev_freq_mhz,
        ROUND(freq_mhz, 0) as new_freq_mhz,
        ROUND((prev_freq_mhz - freq_mhz) * 100.0 / prev_freq_mhz, 1) as drop_pct,
        CASE
          WHEN freq_mhz < cpu_max_freq_mhz * 0.3 THEN 'critical'
          WHEN freq_mhz < cpu_max_freq_mhz * 0.5 THEN 'warning'
          ELSE 'notice'
        END as severity
      FROM freq_with_max
      WHERE prev_freq_mhz IS NOT NULL
        AND freq_mhz < prev_freq_mhz * 0.7  -- 30%+ 降频
      ORDER BY (prev_freq_mhz - freq_mhz) DESC
      LIMIT 30
    save_as: frequency_drops
    optional: true
    condition: "data_check.data[0]?.has_freq_data === 1"

  # ========== L2: 温度-频率相关性分析 ==========
  - id: thermal_freq_correlation
    type: atomic
    name: "温度-频率相关性"
    synthesize:
      role: list
      fields:
        - key: second
          label: 时间(秒)
        - key: max_temp_c
          label: 最高温度
          format: "{{value}} C"
        - key: avg_freq_mhz
          label: 平均频率
          format: "{{value}} MHz"
        - key: status
          label: 状态
      insights:
        - condition: "status === 'thermal_throttled'"
          template: "在 {{second}}s 检测到高温伴随低频，存在热节流"
    display:
      level: detail
      layer: list
      title: "温度与 CPU 频率关联（按秒聚合）"
      columns:
        - name: second
          label: "时间(s)"
          type: number
        - name: max_temp_c
          label: "最高温度(C)"
          type: number
          format: compact
        - name: avg_freq_mhz
          label: "平均频率(MHz)"
          type: number
          format: compact
        - name: freq_ratio_pct
          label: "频率利用率(%)"
          type: percentage
          format: percentage
        - name: status
          label: "状态"
          type: string
    sql: |
      WITH
      time_range AS (
        SELECT MIN(ts) as base_ts FROM counter
      ),
      thermal_by_sec AS (
        SELECT
          CAST((c.ts - (SELECT base_ts FROM time_range)) / 1e9 AS INT) as second,
          MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) as max_temp_c
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (ct.name LIKE '%thermal%' OR ct.name LIKE '%temp%' OR ct.name LIKE '%tsens%')
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
        GROUP BY CAST((c.ts - (SELECT base_ts FROM time_range)) / 1e9 AS INT)
      ),
      freq_by_sec AS (
        SELECT
          CAST((c.ts - (SELECT base_ts FROM time_range)) / 1e9 AS INT) as second,
          AVG(c.value / 1000.0) as avg_freq_mhz,
          MAX(c.value / 1000.0) as max_freq_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
        GROUP BY CAST((c.ts - (SELECT base_ts FROM time_range)) / 1e9 AS INT)
      ),
      global_max_freq AS (
        SELECT MAX(c.value / 1000.0) as global_max_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
      )
      SELECT
        t.second,
        ROUND(t.max_temp_c, 1) as max_temp_c,
        ROUND(f.avg_freq_mhz, 0) as avg_freq_mhz,
        ROUND(f.avg_freq_mhz * 100.0 / NULLIF((SELECT global_max_mhz FROM global_max_freq), 0), 1) as freq_ratio_pct,
        CASE
          WHEN t.max_temp_c > 70 AND f.avg_freq_mhz < (SELECT global_max_mhz FROM global_max_freq) * 0.5
            THEN 'thermal_throttled'
          WHEN t.max_temp_c > 60 AND f.avg_freq_mhz < (SELECT global_max_mhz FROM global_max_freq) * 0.7
            THEN 'moderate_throttle'
          WHEN t.max_temp_c > 60 THEN 'high_temp'
          ELSE 'normal'
        END as status
      FROM thermal_by_sec t
      JOIN freq_by_sec f ON t.second = f.second
      ORDER BY t.second
      LIMIT 120
    save_as: thermal_freq_correlation
    optional: true
    condition: "data_check.data[0]?.has_thermal_data === 1 && data_check.data[0]?.has_freq_data === 1"

  # ========== L2: 高温时段识别 ==========
  - id: high_temp_periods
    type: atomic
    name: "高温时段"
    display:
      level: detail
      layer: list
      title: "高温持续时段"
      columns:
        - name: sensor_name
          label: "传感器"
          type: string
        - name: start_ts
          label: "开始"
          type: timestamp
          clickAction: navigate_timeline
        - name: end_ts
          label: "结束"
          type: timestamp
          clickAction: navigate_timeline
        - name: duration_sec
          label: "持续(秒)"
          type: number
          format: compact
        - name: peak_temp_c
          label: "峰值温度(C)"
          type: number
          format: compact
        - name: sample_count
          label: "采样数"
          type: number
          format: compact
    sql: |
      WITH high_temp_samples AS (
        SELECT
          c.ts,
          ct.name as sensor_name,
          CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END as temp_c
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (
            ct.name LIKE '%thermal%'
            OR ct.name LIKE '%temp%'
            OR ct.name LIKE '%tsens%'
          )
          AND (CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) > 60
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      )
      SELECT
        sensor_name,
        printf('%d', MIN(ts)) as start_ts,
        printf('%d', MAX(ts)) as end_ts,
        ROUND((MAX(ts) - MIN(ts)) / 1e9, 2) as duration_sec,
        ROUND(MAX(temp_c), 1) as peak_temp_c,
        COUNT(*) as sample_count
      FROM high_temp_samples
      GROUP BY sensor_name
      HAVING COUNT(*) > 1
      ORDER BY peak_temp_c DESC
    save_as: high_temp_periods
    optional: true
    condition: "data_check.data[0]?.has_thermal_data === 1"

  # ========== 根因分类 (SQL-driven) ==========
  - id: root_cause_classification
    type: atomic
    name: "根因分类"
    synthesize:
      role: conclusion
      fields:
        - key: classification
          label: 分类
        - key: peak_temp_c
          label: 峰值温度
          format: "{{value}} C"
        - key: throttled_cpu_count
          label: 受影响CPU数
      insights:
        - condition: "classification === 'THERMAL_THROTTLING'"
          template: "热节流严重：峰值 {{peak_temp_c}}C，{{throttled_cpu_count}} 核受影响"
        - condition: "classification === 'SUSTAINED_HIGH_TEMP'"
          template: "持续高温 {{peak_temp_c}}C，存在热节流风险"
    display:
      level: summary
      layer: overview
      title: "热节流根因分类"
      columns:
        - name: classification
          label: "分类"
          type: string
        - name: peak_temp_c
          label: "峰值温度(C)"
          type: number
          format: compact
        - name: throttled_cpu_count
          label: "受影响CPU数"
          type: number
        - name: severe_drop_count
          label: "严重降频次数"
          type: number
          format: compact
        - name: description
          label: "描述"
          type: string
    sql: |
      WITH
      thermal_peak AS (
        SELECT
          MAX(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) as peak_temp_c,
          AVG(CASE WHEN c.value > 1000 THEN c.value / 1000.0 ELSE c.value END) as avg_temp_c
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (ct.name LIKE '%thermal%' OR ct.name LIKE '%temp%' OR ct.name LIKE '%tsens%')
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      cpu_freq_stats AS (
        SELECT
          cct.cpu as cpu_id,
          MIN(c.value / 1000.0) as min_freq_mhz,
          MAX(c.value / 1000.0) as max_freq_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
        GROUP BY cct.cpu
      ),
      throttled_cpus AS (
        SELECT COUNT(*) as cnt
        FROM cpu_freq_stats
        WHERE min_freq_mhz < max_freq_mhz * 0.5
      ),
      freq_drops AS (
        SELECT COUNT(*) as cnt
        FROM (
          SELECT
            cct.cpu,
            c.value / 1000.0 as freq_mhz,
            LAG(c.value / 1000.0) OVER (PARTITION BY cct.cpu ORDER BY c.ts) as prev_freq
          FROM counter c
          JOIN cpu_counter_track cct ON c.track_id = cct.id
          WHERE cct.name = 'cpufreq'
            AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
            AND (${end_ts} IS NULL OR c.ts < ${end_ts})
        ) sub
        WHERE prev_freq IS NOT NULL AND freq_mhz < prev_freq * 0.7
      )
      SELECT
        CASE
          WHEN (SELECT cnt FROM throttled_cpus) > 4
               AND COALESCE((SELECT peak_temp_c FROM thermal_peak), 0) > 70
            THEN 'THERMAL_THROTTLING'
          WHEN COALESCE((SELECT peak_temp_c FROM thermal_peak), 0) > 60
               AND COALESCE((SELECT avg_temp_c FROM thermal_peak), 0) > 55
            THEN 'SUSTAINED_HIGH_TEMP'
          WHEN (SELECT cnt FROM freq_drops) > 20
               AND COALESCE((SELECT peak_temp_c FROM thermal_peak), 0) > 50
            THEN 'THERMAL_THROTTLING'
          WHEN (SELECT cnt FROM freq_drops) > 10
            THEN 'FREQ_INSTABILITY'
          ELSE 'THERMAL_NORMAL'
        END as classification,
        ROUND(COALESCE((SELECT peak_temp_c FROM thermal_peak), 0), 1) as peak_temp_c,
        (SELECT cnt FROM throttled_cpus) as throttled_cpu_count,
        (SELECT cnt FROM freq_drops) as severe_drop_count,
        CASE
          WHEN (SELECT cnt FROM throttled_cpus) > 4
               AND COALESCE((SELECT peak_temp_c FROM thermal_peak), 0) > 70
            THEN '多核严重降频，热节流显著影响性能，建议降低负载或优化散热'
          WHEN COALESCE((SELECT peak_temp_c FROM thermal_peak), 0) > 60
               AND COALESCE((SELECT avg_temp_c FROM thermal_peak), 0) > 55
            THEN '持续高温，存在热节流风险，建议减少后台任务和 CPU 密集操作'
          WHEN (SELECT cnt FROM freq_drops) > 20
            THEN '频繁触发热节流降频，建议添加冷却间隔或优化计算密度'
          WHEN (SELECT cnt FROM freq_drops) > 10
            THEN '频率不稳定，可能受温度影响，建议监控散热'
          ELSE '温度正常，无明显热节流'
        END as description
    save_as: root_cause
    condition: "data_check.data[0]?.has_thermal_data === 1 || data_check.data[0]?.has_freq_data === 1"

  # ========== 诊断 ==========
  - id: thermal_diagnosis
    type: diagnostic
    name: "热节流诊断"
    synthesize:
      role: conclusion
      fields:
        - key: diagnosis
          label: 诊断结论
        - key: severity
          label: 严重程度
        - key: confidence
          label: 置信度
      insights:
        - template: "热节流诊断：{{diagnosis}}"
    display:
      level: key
      layer: overview
      title: "问题诊断"
    inputs: [thermal_overview, cpu_freq_overview, frequency_drops, high_temp_periods, root_cause]
    rules:
      # 严重热节流
      - condition: "root_cause.data[0]?.classification === 'THERMAL_THROTTLING'"
        severity: critical
        diagnosis: "检测到热节流：峰值 ${root_cause.data[0].peak_temp_c}C，${root_cause.data[0].throttled_cpu_count} 核受影响"
        confidence: high
        suggestions:
          - "减少后台 CPU 密集任务"
          - "优化计算密集操作，添加冷却间隔"
          - "检查设备散热条件"

      # 持续高温
      - condition: "root_cause.data[0]?.classification === 'SUSTAINED_HIGH_TEMP'"
        severity: warning
        diagnosis: "持续高温 ${root_cause.data[0].peak_temp_c}C，存在热节流风险"
        confidence: high
        suggestions:
          - "降低持续 CPU 负载"
          - "避免长时间高强度计算"
          - "监控温度变化趋势"

      # 频率不稳定
      - condition: "root_cause.data[0]?.classification === 'FREQ_INSTABILITY'"
        severity: warning
        diagnosis: "CPU 频率不稳定 (${root_cause.data[0].severe_drop_count} 次骤降)，可能受温度影响"
        confidence: medium
        suggestions:
          - "检查散热条件"
          - "优化任务调度避免突发负载"

      # 正常
      - condition: "root_cause.data[0]?.classification === 'THERMAL_NORMAL'"
        severity: info
        diagnosis: "温度正常，无明显热节流"
        confidence: high
        suggestions:
          - "当前热状态良好"

  # ========== 无数据回退 ==========
  - id: no_data_fallback
    type: atomic
    name: "无温度数据"
    display:
      level: summary
      layer: overview
      title: "温度数据不可用"
      columns:
        - name: message
          label: "说明"
          type: string
    sql: |
      SELECT '未检测到温度传感器数据。可能原因：Trace 未包含 thermal/temperature counter，或设备不支持温度上报。建议：确保 Trace 包含 ftrace thermal 事件。' as message
    save_as: no_data_fallback
    condition: "data_check.data[0]?.has_thermal_data !== 1 && data_check.data[0]?.has_freq_data !== 1"

output:
  format: layered
  default_expanded: [thermal_overview, cpu_freq_overview, root_cause_classification]
