name: scrolling_analysis
version: "3.1"
type: composite

meta:
  display_name: "滑动性能分析"
  description: "基于 Perfetto FrameTimeline 的滑动分析，分层展示：概览 → 区间 → 帧详情"
  icon: "swipe"
  tags: [scrolling, jank, fps, frames, layered]

triggers:
  keywords:
    zh: [滑动, 卡顿, 帧率, 掉帧, 丢帧, FPS, 流畅度, 列表滑动, fling]
    en: [scroll, jank, fps, frame, fling, stutter, smoothness, list]
  patterns:
    - ".*滑动.*卡.*"
    - ".*scroll.*jank.*"
    - ".*帧率.*"

prerequisites:
  modules:
    - android.frames.timeline
    - android.binder

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选，不填则分析所有应用）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"
  - name: enable_frame_details
    type: boolean
    required: false
    description: "是否执行逐帧详情分析（L4，默认不执行）"
  - name: max_frames_per_session
    type: number
    required: false
    description: "每个滑动区间最多分析的掉帧帧数（默认 8）"

steps:
  # ==========================================================================
  # L0: 数据源检测 - FrameTimeline 是否可用
  # ==========================================================================
  - id: frame_timeline_check
    type: atomic
    name: "FrameTimeline 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type = 'table' AND name = 'actual_frame_timeline_slice'
          ) THEN 1
          ELSE 0
        END as has_frame_timeline
    save_as: frame_timeline

  # ==========================================================================
  # L1: 环境配置检测 - Vsync/刷新率
  # ==========================================================================
  - id: vsync_config
    type: atomic
    name: "Vsync 配置"
    display:
      level: summary
      layer: overview
      title: "显示配置"
      columns:
        - name: refresh_rate_hz
          label: "刷新率"
          type: number
          format: compact
        - name: vsync_period_ms
          label: "VSync 周期"
          type: duration
          format: duration_ms
        - name: vsync_source
          label: "来源"
          type: string
        - name: total_frames
          label: "总帧数"
          type: number
          format: compact
    sql: |
      WITH
      -- 方法1: 从 SurfaceFlinger 的 VSYNC slice 推算周期 (最可靠)
      sf_vsync_intervals AS (
        SELECT
          s.ts,
          LEAD(s.ts) OVER (ORDER BY s.ts) - s.ts AS interval_ns
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name = 'surfaceflinger' OR p.name LIKE '%surfaceflinger%')
          AND (s.name GLOB '*VSYNC*' OR s.name GLOB '*vsync-sf*' OR s.name GLOB '*vsync-app*')
        LIMIT 500
      ),
      sf_vsync AS (
        SELECT
          CAST(AVG(interval_ns) AS INTEGER) as vsync_period_ns,
          'sf_vsync_slice' as source
        FROM sf_vsync_intervals
        WHERE interval_ns > 5000000 AND interval_ns < 30000000
      ),
      -- 方法2: 从 expected_frame_timeline_slice 推算 vsync 周期
      expected_frame_vsync AS (
        SELECT
          CAST(AVG(dur) AS INTEGER) as vsync_period_ns,
          'expected_frame' as source
        FROM expected_frame_timeline_slice
        WHERE dur > 5000000 AND dur < 20000000
        LIMIT 1000
      ),
      combined AS (
        SELECT vsync_period_ns, source FROM sf_vsync WHERE vsync_period_ns > 0
        UNION ALL
        SELECT vsync_period_ns, source FROM expected_frame_vsync WHERE vsync_period_ns > 0
      ),
      frame_count AS (
        SELECT COUNT(*) as total_frames
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      )
      SELECT
        COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) as vsync_period_ns,
        ROUND(1e9 / COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666), 0) as refresh_rate_hz,
        ROUND(COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) / 1e6, 2) as vsync_period_ms,
        COALESCE((SELECT source FROM combined LIMIT 1), 'default') as vsync_source,
        (SELECT total_frames FROM frame_count) as total_frames,
        CASE WHEN (SELECT total_frames FROM frame_count) > 0 THEN 1 ELSE 0 END as has_data
    save_as: environment
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1"

  # ==========================================================================
  # L1: 帧性能汇总 (基于 VSYNC-sf 间隔检测掉帧)
  # ==========================================================================
  # 核心原理：
  # - 用户可见掉帧 = VSYNC-sf 间隔 > 1.5x 正常周期（SF 跳过了 VSync）
  # - BufferTX 状态用于判断责任归属，而非是否掉帧：
  #   - BufferTX = 0 → App 侧掉帧（App 没有及时提交 Buffer）
  #   - BufferTX > 0 → SF 侧掉帧（有 Buffer 但 SF 没消费，可能是 GPU 忙）
  # - 总掉帧 = App 侧掉帧 + SF 侧掉帧
  - id: performance_summary
    type: atomic
    name: "帧性能汇总"
    synthesize:
      role: overview
      fields:
        - key: total_frames
          label: 总帧数
        - key: janky_frames
          label: 掉帧数
          format: "{{value}} ({{jank_rate}}%)"
        - key: avg_fps
          label: 平均 FPS
        - key: duration_ms
          label: 持续时间
          format: "{{value}} ms"
        - key: app_jank
          label: App 侧掉帧
        - key: sf_jank
          label: SF 侧掉帧
      insights:
        - condition: "jank_rate > 10"
          template: "掉帧率 {{jank_rate}}% 较高，需要优化"
        - condition: "app_jank > sf_jank"
          template: "App 侧掉帧 ({{app_jank}}) 多于 SF 侧 ({{sf_jank}})"
    display:
      level: summary
      layer: overview
      title: "滑动性能概览"
      columns:
        - name: total_frames
          label: "总帧数"
          type: number
          format: compact
        - name: janky_frames
          label: "掉帧数"
          type: number
          format: compact
        - name: jank_rate
          label: "掉帧率"
          type: percentage
          format: percentage
        - name: app_janky_frames
          label: "App 侧掉帧"
          type: number
          format: compact
        - name: sf_jank_count
          label: "SF 侧掉帧"
          type: number
          format: compact
        - name: actual_fps
          label: "实际 FPS"
          type: number
        - name: refresh_rate
          label: "刷新率"
          type: number
        - name: avg_frame_dur_ms
          label: "平均帧耗时"
          type: duration
          format: duration_ms
        - name: p95_frame_dur_ms
          label: "P95 帧耗时"
          type: duration
          format: duration_ms
        - name: rating
          label: "评级"
          type: string
    sql: |
      WITH
      -- 获取 VSync 周期（从 VSYNC-sf 信号计算）
      vsync_intervals AS (
        SELECT
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
      ),
      vsync_config AS (
        SELECT
          COALESCE(
            (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
             FROM vsync_intervals
             WHERE interval_ns > 5000000 AND interval_ns < 15000000),
            8333333  -- 默认 120Hz
          ) as vsync_period_ns
      ),
      time_range AS (
        SELECT
          MIN(a.ts) as start_ts,
          MAX(a.ts + a.dur) as end_ts,
          MAX(a.ts + a.dur) - MIN(a.ts) as duration_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      -- VSYNC-sf 事件
      vsync_events AS (
        SELECT
          c.ts as vsync_ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- BufferTX 事件
      buffer_events AS (
        SELECT c.ts, c.value as buffer_count
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name LIKE '%BufferTX%'
          AND (t.name LIKE '%${package}%' OR '${package}' = '')
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- 在每个 VSync 时刻查找 BufferTX 状态
      vsync_with_buffer AS (
        SELECT
          v.vsync_ts,
          v.interval_ns,
          (SELECT b.buffer_count
           FROM buffer_events b
           WHERE b.ts <= v.vsync_ts
           ORDER BY b.ts DESC
           LIMIT 1
          ) as buffer_at_vsync
        FROM vsync_events v
        WHERE v.interval_ns IS NOT NULL
      ),
      -- 计算掉帧（VSYNC-sf 间隔大 = 用户可见掉帧，BufferTX 状态决定责任）
      jank_analysis AS (
        SELECT
          COUNT(*) as total_vsync,
          -- 总用户可见掉帧: VSYNC-sf 间隔 > 1.5x 正常周期
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
                    THEN 1 ELSE 0 END) as total_jank_count,
          -- App 侧掉帧: VSYNC-sf 间隔大且 BufferTX = 0（App 责任）
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
                    AND buffer_at_vsync = 0 THEN 1 ELSE 0 END) as app_jank_count,
          -- SF 侧掉帧: VSYNC-sf 间隔大但 BufferTX > 0（SF 责任）
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
                    AND COALESCE(buffer_at_vsync, 1) > 0 THEN 1 ELSE 0 END) as sf_jank_count,
          -- 计算最大跳过的 VSync 数（任意掉帧事件）
          MAX(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
              THEN ROUND(interval_ns * 1.0 / (SELECT vsync_period_ns FROM vsync_config) - 1)
              ELSE 0 END) as max_vsync_missed,
          -- 累计跳过的 VSync 数
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
              THEN ROUND(interval_ns * 1.0 / (SELECT vsync_period_ns FROM vsync_config) - 1)
              ELSE 0 END) as total_vsync_missed
        FROM vsync_with_buffer
        WHERE buffer_at_vsync IS NOT NULL
      ),
      -- App 报告的掉帧（旧逻辑，仅供参考）
      app_stats AS (
        SELECT
          COUNT(*) as total,
          SUM(CASE WHEN jank_type != 'None' THEN 1 ELSE 0 END) as app_janky_frames,
          AVG(dur) / 1e6 as avg_dur_ms,
          MAX(dur) / 1e6 as max_dur_ms,
          PERCENTILE(dur, 0.5) / 1e6 as median_dur_ms,
          PERCENTILE(dur, 0.95) / 1e6 as p95_dur_ms,
          PERCENTILE(dur, 0.99) / 1e6 as p99_dur_ms
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      consumer_gap_stats AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN display_frame_token - prev_display_token > 1 THEN 1 ELSE 0 END) as consumer_jank_frames,
          SUM(CASE WHEN display_frame_token - prev_display_token > 1 THEN (display_frame_token - prev_display_token - 1) ELSE 0 END) as total_vsync_missed,
          MAX(display_frame_token - prev_display_token) as max_token_gap
        FROM (
          SELECT
            COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
            LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token
          FROM actual_frame_timeline_slice a
          LEFT JOIN process p ON a.upid = p.upid
          WHERE (p.name GLOB '${package}*' OR '${package}' = '')
            AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
            AND (${end_ts} IS NULL OR a.ts < ${end_ts})
            AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
        )
        WHERE prev_display_token IS NOT NULL
      )
      SELECT
        (SELECT total FROM app_stats) as total_frames,
        -- 总用户可见掉帧 (App侧 + SF侧)
        COALESCE(
          (SELECT total_jank_count FROM jank_analysis),
          (SELECT consumer_jank_frames FROM consumer_gap_stats),
          (SELECT app_janky_frames FROM app_stats),
          0
        ) as janky_frames,
        -- App 侧掉帧 (BufferTX = 0, App 责任)
        COALESCE(
          (SELECT app_jank_count FROM jank_analysis),
          (SELECT app_janky_frames FROM app_stats),
          0
        ) as app_janky_frames,
        -- SF 侧掉帧 (BufferTX > 0, SF 责任)
        COALESCE((SELECT sf_jank_count FROM jank_analysis), 0) as sf_jank_count,
        -- 总掉帧率
        ROUND(
          100.0 * COALESCE(
            (SELECT total_jank_count FROM jank_analysis),
            (SELECT consumer_jank_frames FROM consumer_gap_stats),
            (SELECT app_janky_frames FROM app_stats),
            0
          ) / NULLIF((SELECT total FROM app_stats), 0),
          2
        ) as jank_rate,
        -- App 侧掉帧率
        ROUND(
          100.0 * COALESCE(
            (SELECT app_jank_count FROM jank_analysis),
            (SELECT app_janky_frames FROM app_stats),
            0
          ) / NULLIF((SELECT total FROM app_stats), 0),
          2
        ) as app_jank_rate,
        -- SF 侧掉帧率
        ROUND(100.0 * COALESCE((SELECT sf_jank_count FROM jank_analysis), 0) / NULLIF((SELECT total FROM app_stats), 0), 2) as sf_jank_rate,
        ROUND((SELECT avg_dur_ms FROM app_stats), 2) as avg_frame_dur_ms,
        ROUND((SELECT max_dur_ms FROM app_stats), 2) as max_frame_dur_ms,
        ROUND((SELECT median_dur_ms FROM app_stats), 2) as median_frame_dur_ms,
        ROUND((SELECT p95_dur_ms FROM app_stats), 2) as p95_frame_dur_ms,
        ROUND((SELECT p99_dur_ms FROM app_stats), 2) as p99_frame_dur_ms,
        ROUND((SELECT duration_ns FROM time_range) / 1e9, 2) as duration_sec,
        ROUND(1e9 * (SELECT total FROM app_stats) / NULLIF((SELECT duration_ns FROM time_range), 0), 1) as actual_fps,
        ROUND(1e9 / ((SELECT vsync_period_ns FROM vsync_config) * 1.0), 1) as refresh_rate,
        CASE
          WHEN COALESCE((SELECT total_jank_count FROM jank_analysis), (SELECT consumer_jank_frames FROM consumer_gap_stats), 0) = 0 THEN '优秀'
          WHEN 100.0 * COALESCE((SELECT total_jank_count FROM jank_analysis), (SELECT consumer_jank_frames FROM consumer_gap_stats), 0) / NULLIF((SELECT total FROM app_stats), 0) < 1 THEN '优秀'
          WHEN 100.0 * COALESCE((SELECT total_jank_count FROM jank_analysis), (SELECT consumer_jank_frames FROM consumer_gap_stats), 0) / NULLIF((SELECT total FROM app_stats), 0) < 5 THEN '良好'
          WHEN 100.0 * COALESCE((SELECT total_jank_count FROM jank_analysis), (SELECT consumer_jank_frames FROM consumer_gap_stats), 0) / NULLIF((SELECT total FROM app_stats), 0) < 15 THEN '一般'
          ELSE '较差'
        END as rating,
        CASE
          WHEN (SELECT total_jank_count FROM jank_analysis) IS NULL THEN 'frame_token_gap'
          ELSE 'vsync_sf_interval'
        END as fps_source,
        COALESCE(
          (SELECT max_vsync_missed FROM jank_analysis),
          (SELECT max_token_gap FROM consumer_gap_stats) - 1,
          0
        ) as max_vsync_missed,
        COALESCE(
          (SELECT total_vsync_missed FROM jank_analysis),
          (SELECT total_vsync_missed FROM consumer_gap_stats),
          0
        ) as total_vsync_missed,
        ROUND((SELECT vsync_period_ns FROM vsync_config) / 1e6, 2) as vsync_period_ms
      LIMIT 1
    save_as: perf_summary
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L1: 掉帧分析 - 消费端 vs App 报告对比
  # ==========================================================================
  # 展示 jank_type 与实际消费端掉帧的关系
  # - 假阳性: jank_type 报告掉帧，但 gap=1 (用户看到流畅)
  # - 假阴性: jank_type=None，但 gap>1 (用户看到卡顿)
  - id: jank_type_stats
    type: atomic
    name: "掉帧类型统计"
    display:
      level: summary
      layer: overview
      title: "掉帧类型分布"
      columns:
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: count
          label: "帧数"
          type: number
          format: compact
        - name: real_jank_count
          label: "实际掉帧"
          type: number
          format: compact
        - name: false_positive
          label: "假阳性"
          type: number
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: responsibility
          label: "责任归属"
          type: string
    sql: |
      WITH
      app_frames AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          a.ts,
          a.dur,
          a.jank_type,
          a.layer_name,
          LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      jank_analysis AS (
        SELECT
          jank_type,
          dur,
          display_frame_token - prev_display_token as token_gap,
          CASE
            WHEN display_frame_token - prev_display_token > 1 THEN 1
            ELSE 0
          END as is_consumer_jank
        FROM app_frames
        WHERE prev_display_token IS NOT NULL
      )
      SELECT
        jank_type,
        COUNT(*) as count,
        -- 实际用户感知掉帧数 (gap > 1)
        SUM(is_consumer_jank) as real_jank_count,
        -- 假阳性数 (jank_type报告掉帧但gap=1)
        SUM(CASE WHEN jank_type != 'None' AND is_consumer_jank = 0 THEN 1 ELSE 0 END) as false_positive,
        ROUND(SUM(dur) / 1e6, 2) as total_dur_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_dur_ms,
        CASE
          WHEN jank_type GLOB '*App*' OR jank_type = 'Self Jank' THEN '应用'
          WHEN jank_type GLOB '*SurfaceFlinger*' THEN 'SF'
          WHEN jank_type GLOB '*Buffer*' THEN '缓冲区'
          WHEN jank_type = 'None' THEN '无(可能漏检)'
          ELSE '其他'
        END as responsibility
      FROM jank_analysis
      GROUP BY jank_type
      ORDER BY real_jank_count DESC, count DESC
      LIMIT 10
    save_as: jank_stats
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 滑动区间列表
  # ==========================================================================
  - id: scroll_sessions
    type: atomic
    name: "滑动区间列表"
    display:
      level: detail
      layer: list
      title: "滑动区间"
      columns:
        - name: session_id
          label: "区间"
          type: number
        - name: process_name
          label: "进程"
          type: string
        - name: start_ts
          label: "开始时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: end_ts
          label: "结束时间"
          type: timestamp
          clickAction: navigate_range
          durationColumn: start_ts
        - name: frame_count
          label: "帧数"
          type: number
          format: compact
        - name: duration_ms
          label: "持续时间"
          type: duration
          format: duration_ms
        - name: avg_frame_ms
          label: "平均帧耗时"
          type: duration
          format: duration_ms
        - name: max_frame_ms
          label: "最大帧耗时"
          type: duration
          format: duration_ms
        - name: session_fps
          label: "FPS"
          type: number
    sql: |
      WITH frame_gaps AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as frame_id,
          a.ts,
          a.dur,
          a.upid,
          p.name as process_name,
          LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as prev_end,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as gap_ns
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND a.dur > 0
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      )
      SELECT
        session_id,
        process_name,
        printf('%d', MIN(ts)) as start_ts,
        printf('%d', MAX(ts + dur)) as end_ts,
        COUNT(*) as frame_count,
        ROUND((MAX(ts + dur) - MIN(ts)) / 1e6, 1) as duration_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_frame_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_frame_ms,
        ROUND(1e9 * COUNT(*) / NULLIF(MAX(ts + dur) - MIN(ts), 0), 1) as session_fps
      FROM sessions
      GROUP BY upid, session_id
      HAVING COUNT(*) >= 10
        AND (MAX(ts + dur) - MIN(ts)) > 200000000
      ORDER BY MIN(ts)
      LIMIT 20
    save_as: sessions
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 区间掉帧统计 (基于消费端 display_frame_token 跳跃)
  # ==========================================================================
  - id: session_jank
    type: atomic
    name: "区间掉帧统计"
    display:
      level: detail
      layer: list
      title: "区间掉帧"
      columns:
        - name: session_id
          label: "区间"
          type: number
        - name: frame_count
          label: "总帧数"
          type: number
          format: compact
        - name: janky_count
          label: "掉帧数"
          type: number
          format: compact
        - name: jank_rate
          label: "掉帧率"
          type: percentage
          format: percentage
        - name: app_janky_count
          label: "App 掉帧"
          type: number
          format: compact
        - name: max_vsync_missed
          label: "最大跳帧"
          type: number
        - name: jank_types
          label: "掉帧类型"
          type: string
          format: truncate
    sql: |
      WITH frame_gaps AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          a.ts, a.dur, a.upid,
          a.layer_name,
          a.jank_type,
          p.name as process_name,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as time_gap_ns,
          LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND a.dur > 0
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN time_gap_ns IS NULL OR time_gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions_raw AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      sessions AS (
        SELECT
          session_id,
          process_name,
          MIN(ts) as start_ts,
          MAX(ts + dur) as end_ts,
          COUNT(*) as frame_count
        FROM sessions_raw
        GROUP BY upid, session_id
        HAVING COUNT(*) >= 10
          AND (MAX(ts + dur) - MIN(ts)) > 200000000
      ),
      session_jank_stats AS (
        SELECT
          sr.session_id,
          -- 消费端掉帧 (display_frame_token 跳跃 > 1)
          SUM(CASE WHEN sr.prev_display_token IS NOT NULL AND sr.display_frame_token - sr.prev_display_token > 1 THEN 1 ELSE 0 END) as consumer_jank_count,
          -- App 报告掉帧 (旧逻辑，仅供参考)
          SUM(CASE WHEN sr.jank_type != 'None' THEN 1 ELSE 0 END) as app_jank_count,
          -- 最大跳跃
          MAX(sr.display_frame_token - sr.prev_display_token) as max_gap,
          GROUP_CONCAT(DISTINCT sr.jank_type) as jank_types
        FROM sessions_raw sr
        WHERE sr.prev_display_token IS NOT NULL
        GROUP BY sr.session_id
      )
      SELECT
        s.session_id,
        s.frame_count,
        COALESCE(sjs.consumer_jank_count, 0) as janky_count,
        ROUND(100.0 * COALESCE(sjs.consumer_jank_count, 0) / NULLIF(s.frame_count, 0), 2) as jank_rate,
        COALESCE(sjs.app_jank_count, 0) as app_janky_count,
        COALESCE(sjs.max_gap, 1) - 1 as max_vsync_missed,
        sjs.jank_types
      FROM sessions s
      LEFT JOIN session_jank_stats sjs ON s.session_id = sjs.session_id
      ORDER BY s.session_id
    save_as: session_jank_data
    optional: true
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # 内部步骤：获取所有掉帧的帧列表 (基于 VSYNC-sf 间隔检测)
  # ==========================================================================
  # 核心原理：
  # - 找到所有 VSYNC-sf 间隔 > 1.5x 正常周期的时刻（SF 跳帧）
  # - 这些都是用户可见的掉帧
  # - BufferTX 状态用于标记责任归属（App 侧 vs SF 侧）
  - id: get_app_jank_frames
    type: atomic
    name: "获取真正掉帧帧"
    synthesize:
      role: list
      groupBy:
        - field: jank_responsibility
          title: 责任归属分布
        - field: jank_type
          title: 掉帧类型分布
    display:
      level: detail
      layer: list
      title: "掉帧列表"
      expandable: true  # 支持展开查看详细分析
      # 提取固定值到元数据（这些列在列表中值相同，移至标题显示）
      metadataFields:
        - layer_name
        - process_name
      columns:
        - name: frame_id
          label: "帧 ID"
          type: number
        - name: start_ts
          label: "开始时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: end_ts
          label: "结束时间"
          type: timestamp
          clickAction: navigate_range
          durationColumn: start_ts
        - name: dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: vsync_missed
          label: "跳帧数"
          type: number
        - name: jank_responsibility
          label: "责任归属"
          type: enum
        - name: main_start_ts
          label: "主线程开始"
          type: timestamp
          hidden: true
        - name: main_end_ts
          label: "主线程结束"
          type: timestamp
          hidden: true
        - name: main_dur_ms
          label: "主线程耗时"
          type: duration
          format: duration_ms
          hidden: true
        - name: render_start_ts
          label: "渲染开始"
          type: timestamp
          hidden: true
        - name: render_end_ts
          label: "渲染结束"
          type: timestamp
          hidden: true
        - name: render_dur_ms
          label: "渲染耗时"
          type: duration
          format: duration_ms
          hidden: true
        - name: jank_severity_type
          label: "严重程度"
          type: string
          hidden: true
        - name: layer_name
          label: "图层名"
          type: string
          hidden: true
        - name: process_name
          label: "进程名"
          type: string
          hidden: true
        - name: pid
          label: "PID"
          type: number
          hidden: true
        - name: session_id
          label: "会话"
          type: number
          hidden: true
        - name: token_gap
          label: "Token 跳跃"
          type: number
          hidden: true
        - name: frame_index
          label: "帧索引"
          type: number
          hidden: true
    sql: |
      WITH
      -- VSync 周期
      vsync_intervals AS (
        SELECT c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
      ),
      vsync_config AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
           FROM vsync_intervals WHERE interval_ns > 5000000 AND interval_ns < 15000000),
          8333333
        ) as vsync_period_ns
      ),
      -- VSYNC-sf 事件
      vsync_events AS (
        SELECT
          c.ts as vsync_ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- BufferTX 事件
      buffer_events AS (
        SELECT c.ts, c.value as buffer_count
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name LIKE '%BufferTX%'
          AND (t.name LIKE '%${package}%' OR '${package}' = '')
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- 找到所有掉帧事件（VSYNC-sf 间隔大，不限制 BufferTX 状态）
      jank_events AS (
        SELECT
          v.vsync_ts,
          v.interval_ns,
          ROUND(v.interval_ns * 1.0 / (SELECT vsync_period_ns FROM vsync_config) - 1, 0) as vsync_missed,
          (SELECT b.buffer_count FROM buffer_events b WHERE b.ts <= v.vsync_ts ORDER BY b.ts DESC LIMIT 1) as buffer_at_vsync,
          CASE
            WHEN (SELECT b.buffer_count FROM buffer_events b WHERE b.ts <= v.vsync_ts ORDER BY b.ts DESC LIMIT 1) = 0 THEN 'APP'
            ELSE 'SF'
          END as jank_responsibility
        FROM vsync_events v
        WHERE v.interval_ns IS NOT NULL
          AND v.interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
      ),
      -- 所有掉帧事件（不再仅限 BufferTX=0）
      all_jank_events AS (
        SELECT * FROM jank_events
      ),
      -- 帧时间范围
      all_frames AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token,
          a.ts,
          a.dur,
          a.upid,
          a.layer_name,
          a.jank_type,
          a.jank_severity_type,
          COALESCE(a.display_frame_token, a.surface_frame_token) - LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as token_gap,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as time_gap_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT
          *,
          CASE WHEN time_gap_ns IS NULL OR time_gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM all_frames
      ),
      sessions_map AS (
        SELECT
          *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      -- 找到接近掉帧事件的帧
      jank_frames AS (
        SELECT
          sm.display_frame_token as frame_id,
          sm.upid,
          sm.ts as actual_start,
          sm.ts + sm.dur as actual_end,
          sm.dur as actual_dur,
          sm.jank_type,
          sm.jank_severity_type,
          sm.layer_name,
          sm.session_id,
          COALESCE(
            (SELECT je.vsync_missed FROM all_jank_events je
             WHERE je.vsync_ts >= sm.ts AND je.vsync_ts <= sm.ts + sm.dur + 50000000
             ORDER BY je.vsync_ts LIMIT 1),
            sm.token_gap - 1
          ) as vsync_missed,
          -- 责任归属：APP（BufferTX=0）或 SF（BufferTX>0）
          COALESCE(
            (SELECT je.jank_responsibility FROM all_jank_events je
             WHERE je.vsync_ts >= sm.ts AND je.vsync_ts <= sm.ts + sm.dur + 50000000
             ORDER BY je.vsync_ts LIMIT 1),
            CASE
              WHEN (SELECT b.buffer_count FROM buffer_events b WHERE b.ts <= sm.ts ORDER BY b.ts DESC LIMIT 1) = 0 THEN 'APP'
              WHEN (SELECT b.buffer_count FROM buffer_events b WHERE b.ts <= sm.ts ORDER BY b.ts DESC LIMIT 1) IS NULL THEN 'UNKNOWN'
              ELSE 'SF'
            END
          ) as jank_responsibility,
          sm.token_gap as token_gap
        FROM sessions_map sm
        WHERE (sm.token_gap > 1)
           OR EXISTS (
             SELECT 1 FROM all_jank_events je
             WHERE je.vsync_ts >= sm.ts AND je.vsync_ts <= sm.ts + sm.dur + 50000000
           )
      ),
      frame_thread_info AS (
        SELECT
          jf.frame_id,
          jf.upid,
          jf.actual_start,
          jf.actual_end,
          jf.actual_dur,
          jf.jank_type,
          jf.jank_severity_type,
          jf.layer_name,
          jf.session_id,
          jf.token_gap,
          jf.vsync_missed,
          jf.jank_responsibility,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
             AND s.name LIKE 'Choreographer#doFrame%'
          ) as main_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
          ) as main_end_ts,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_end_ts
        FROM jank_frames jf
      )
      ,
      ranked_frames AS (
        SELECT
          fti.frame_id,
          fti.actual_start,
          fti.actual_end,
          fti.main_start_ts,
          fti.main_end_ts,
          fti.render_start_ts,
          fti.render_end_ts,
          fti.actual_dur,
          fti.jank_type,
          fti.jank_severity_type,
          fti.layer_name,
          fti.session_id,
          fti.token_gap,
          fti.vsync_missed,
          fti.jank_responsibility,
          p.name as process_name,
          p.pid,
          p.upid,
          -- 按 vsync_missed 排序（最严重的掉帧优先）
          ROW_NUMBER() OVER (PARTITION BY fti.session_id ORDER BY fti.vsync_missed DESC, fti.actual_dur DESC) as rank_in_session
        FROM frame_thread_info fti
        JOIN process p ON fti.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
      )
      SELECT
        frame_id,
        printf('%d', actual_start) as start_ts,
        printf('%d', actual_end) as end_ts,
        printf('%d', COALESCE(main_start_ts, actual_start)) as main_start_ts,
        printf('%d', COALESCE(main_end_ts, actual_end)) as main_end_ts,
        ROUND(COALESCE(main_end_ts - main_start_ts, 0) / 1e6, 2) as main_dur_ms,
        printf('%d', COALESCE(render_start_ts, actual_start)) as render_start_ts,
        printf('%d', COALESCE(render_end_ts, actual_end)) as render_end_ts,
        ROUND(COALESCE(render_end_ts - render_start_ts, 0) / 1e6, 2) as render_dur_ms,
        printf('%d', actual_dur) as dur_ns,
        actual_dur / 1e6 as dur_ms,
        jank_type,
        jank_severity_type,
        layer_name,
        process_name,
        pid,
        session_id,
        token_gap,
        vsync_missed,
        jank_responsibility,
        ROW_NUMBER() OVER (ORDER BY session_id, actual_start) as frame_index
      FROM ranked_frames
      ORDER BY session_id, actual_start
    save_as: app_jank_frames
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && typeof environment !== 'undefined' && environment.data[0]?.has_data === 1 && perf_summary.data[0]?.janky_frames > 0"

  # ==========================================================================
  # L3: 逐帧诊断 (所有掉帧帧 → janky_frame_analysis)
  # ==========================================================================
  - id: diagnose_jank_frames
    type: iterator
    name: "逐帧诊断分析"
    source: app_jank_frames
    max_items: 9999
    item_skill: janky_frame_analysis
    item_params:
      frame_ts: start_ts
      frame_dur: dur_ns
      package: process_name
    display:
      level: key
      layer: overview
      title: "帧诊断结果"
    condition: "app_jank_frames.data?.length > 0"

  # ==========================================================================
  # L4: 逐帧详细分析 (Iterator)
  # ==========================================================================
  - id: analyze_jank_frames
    type: iterator
    name: "逐帧详细分析"
    synthesize:
      role: clusters
      clusterBy: cause_type
    display:
      level: key
      layer: deep
      title: "帧详细分析"
      columns:
        - name: frame_id
          label: "帧 ID"
          type: number
        - name: cause_type
          label: "原因类型"
          type: string
        - name: diagnosis
          label: "诊断结论"
          type: string
        - name: confidence
          label: "置信度"
          type: percentage
          format: percentage
    source: app_jank_frames
    max_items: 50
    item_skill: jank_frame_detail
    condition: "enable_frame_details === true"
    item_params:
      start_ts: start_ts
      end_ts: end_ts
      main_start_ts: main_start_ts
      main_end_ts: main_end_ts
      main_dur_ms: main_dur_ms
      render_start_ts: render_start_ts
      render_end_ts: render_end_ts
      render_dur_ms: render_dur_ms
      package: process_name
      pid: pid
      frame_id: frame_id
      frame_index: frame_index
      jank_type: jank_type
      dur_ms: dur_ms
      session_id: session_id
      layer_name: layer_name
      token_gap: token_gap
      vsync_missed: vsync_missed
      jank_responsibility: jank_responsibility

  # ==========================================================================
  # Root Cause Classification - Aggregate analysis for final conclusion
  # ==========================================================================
  # 综合所有分析数据，给出最终的根因分类和结论
  # 输出: problem_category, problem_component, confidence, evidence
  - id: root_cause_classification
    type: atomic
    name: "根因分类"
    synthesize:
      role: conclusion
      fields:
        - key: problem_category
          label: 问题类别
        - key: problem_component
          label: 问题组件
        - key: confidence
          label: 置信度
          format: "{{value}}%"
      insights:
        - template: "根因分类：{{problem_category}} - {{problem_component}}"
    display:
      level: summary
      layer: overview
      title: "🎯 分析结论"
      columns:
        - name: problem_category
          label: "问题类别"
          type: enum
        - name: problem_component
          label: "问题组件"
          type: string
        - name: confidence
          label: "置信度"
          type: percentage
          format: percentage
        - name: root_cause_summary
          label: "根因总结"
          type: string
        - name: suggestion
          label: "优化建议"
          type: string
    sql: |
      WITH
      -- 从 performance_summary 获取掉帧统计
      jank_stats AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN jank_type != 'None' THEN 1 ELSE 0 END) as app_reported_jank,
          -- 基于 BufferTX 判断的真实责任归属（来自 get_app_jank_frames 的逻辑）
          SUM(CASE WHEN jank_type GLOB '*App*' OR jank_type = 'Self Jank' THEN 1 ELSE 0 END) as app_jank,
          SUM(CASE WHEN jank_type GLOB '*SurfaceFlinger*' THEN 1 ELSE 0 END) as sf_jank,
          SUM(CASE WHEN jank_type GLOB '*Buffer*' THEN 1 ELSE 0 END) as buffer_jank,
          AVG(dur) / 1e6 as avg_dur_ms,
          MAX(dur) / 1e6 as max_dur_ms
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            ELSE 'little'
          END as core_type
        FROM cpu
      ),
      -- 主线程四象限分析
      main_thread_analysis AS (
        SELECT
          SUM(CASE WHEN ts.state = 'Running' AND c.core_type = 'big' THEN ts.dur ELSE 0 END) as q1_big_core_ns,
          SUM(CASE WHEN ts.state = 'Running' AND c.core_type = 'little' THEN ts.dur ELSE 0 END) as q2_small_core_ns,
          SUM(CASE WHEN ts.state = 'R' THEN ts.dur ELSE 0 END) as q3_runnable_ns,
          SUM(CASE WHEN ts.state IN ('S', 'D', 'I') THEN ts.dur ELSE 0 END) as q4_sleep_ns,
          SUM(ts.dur) as total_dur_ns
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        LEFT JOIN cpu_info c ON ts.cpu = c.cpu
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.tid = p.pid
          AND (${start_ts} IS NULL OR ts.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ts.ts < ${end_ts})
      ),
      -- RenderThread 分析
      render_thread_analysis AS (
        SELECT
          SUM(CASE WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN ts.dur ELSE 0 END) as q1_big_core_ns,
          SUM(CASE WHEN ts.state = 'Running' AND ts.cpu < 4 THEN ts.dur ELSE 0 END) as q2_small_core_ns,
          SUM(CASE WHEN ts.state = 'R' THEN ts.dur ELSE 0 END) as q3_runnable_ns,
          SUM(CASE WHEN ts.state IN ('S', 'D', 'I') THEN ts.dur ELSE 0 END) as q4_sleep_ns,
          SUM(ts.dur) as total_dur_ns
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.name = 'RenderThread'
          AND (${start_ts} IS NULL OR ts.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ts.ts < ${end_ts})
      ),
      -- 计算主线程各象限百分比
      main_pct AS (
        SELECT
          ROUND(100.0 * q1_big_core_ns / NULLIF(total_dur_ns, 0), 1) as q1_pct,
          ROUND(100.0 * q2_small_core_ns / NULLIF(total_dur_ns, 0), 1) as q2_pct,
          ROUND(100.0 * q3_runnable_ns / NULLIF(total_dur_ns, 0), 1) as q3_pct,
          ROUND(100.0 * q4_sleep_ns / NULLIF(total_dur_ns, 0), 1) as q4_pct
        FROM main_thread_analysis
      ),
      -- 计算 RenderThread 各象限百分比
      render_pct AS (
        SELECT
          ROUND(100.0 * q1_big_core_ns / NULLIF(total_dur_ns, 0), 1) as q1_pct,
          ROUND(100.0 * q2_small_core_ns / NULLIF(total_dur_ns, 0), 1) as q2_pct,
          ROUND(100.0 * q3_runnable_ns / NULLIF(total_dur_ns, 0), 1) as q3_pct,
          ROUND(100.0 * q4_sleep_ns / NULLIF(total_dur_ns, 0), 1) as q4_pct
        FROM render_thread_analysis
      ),
      -- Binder 调用统计
      binder_stats AS (
        SELECT
          COUNT(*) as total_calls,
          SUM(client_dur) / 1e6 as total_dur_ms,
          MAX(client_dur) / 1e6 as max_dur_ms,
          AVG(client_dur) / 1e6 as avg_dur_ms
        FROM android_binder_txns
        WHERE (client_process GLOB '${package}*' OR '${package}' = '')
      ),
      -- 综合分析
      analysis AS (
        SELECT
          (SELECT total_frames FROM jank_stats) as total_frames,
          (SELECT app_jank FROM jank_stats) as app_jank,
          (SELECT sf_jank FROM jank_stats) as sf_jank,
          (SELECT buffer_jank FROM jank_stats) as buffer_jank,
          (SELECT avg_dur_ms FROM jank_stats) as avg_dur_ms,
          (SELECT max_dur_ms FROM jank_stats) as max_dur_ms,
          (SELECT q3_pct FROM main_pct) as main_q3_pct,
          (SELECT q4_pct FROM main_pct) as main_q4_pct,
          (SELECT q2_pct FROM main_pct) as main_q2_pct,
          (SELECT q4_pct FROM render_pct) as render_q4_pct,
          (SELECT total_dur_ms FROM binder_stats) as binder_total_ms,
          (SELECT max_dur_ms FROM binder_stats) as binder_max_ms
      )
      SELECT
        -- 问题分类: APP / SYSTEM / MIXED
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 'SYSTEM'
          WHEN (SELECT app_jank FROM analysis) > (SELECT sf_jank FROM analysis) * 2 THEN 'APP'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN 'SYSTEM'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN 'MIXED'
          WHEN (SELECT app_jank FROM analysis) > 0 THEN 'APP'
          ELSE 'UNKNOWN'
        END as problem_category,
        -- 问题组件
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 'SURFACE_FLINGER'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN 'CPU_SCHEDULING'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN 'BINDER'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN 'MAIN_THREAD_BLOCKING'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN 'RENDER_THREAD'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN 'CPU_AFFINITY'
          WHEN (SELECT avg_dur_ms FROM analysis) > 16 THEN 'MAIN_THREAD'
          ELSE 'UNKNOWN'
        END as problem_component,
        -- 置信度 (0-1)
        CASE
          WHEN (SELECT total_frames FROM analysis) < 10 THEN 0.3
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 0.9
          WHEN (SELECT app_jank FROM analysis) > (SELECT sf_jank FROM analysis) * 2 THEN 0.85
          WHEN (SELECT main_q3_pct FROM analysis) > 20 THEN 0.8
          WHEN (SELECT main_q4_pct FROM analysis) > 40 THEN 0.8
          ELSE 0.6
        END as confidence,
        -- 根因总结
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN
            '系统级问题: SurfaceFlinger 处理异常，导致 ' || (SELECT sf_jank FROM analysis) || ' 帧掉帧'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN
            '系统级问题: CPU 调度拥堵，主线程 ' || (SELECT main_q3_pct FROM analysis) || '% 时间在等待调度'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN
            '跨进程阻塞: Binder 调用最大耗时 ' || ROUND((SELECT binder_max_ms FROM analysis), 1) || 'ms'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN
            '主线程阻塞: ' || (SELECT main_q4_pct FROM analysis) || '% 时间在休眠/等待'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN
            'RenderThread 等待: ' || (SELECT render_q4_pct FROM analysis) || '% 时间在休眠'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN
            'CPU 亲和性问题: 主线程 ' || (SELECT main_q2_pct FROM analysis) || '% 时间运行在小核'
          WHEN (SELECT app_jank FROM analysis) > 0 THEN
            '应用级问题: ' || (SELECT app_jank FROM analysis) || ' 帧因应用原因掉帧，平均帧耗时 ' || ROUND((SELECT avg_dur_ms FROM analysis), 1) || 'ms'
          ELSE
            '分析数据不足，建议查看详细帧数据'
        END as root_cause_summary,
        -- 证据列表 (JSON 数组)
        '[' ||
          '"总帧数: ' || (SELECT total_frames FROM analysis) || '",' ||
          '"App 掉帧: ' || (SELECT app_jank FROM analysis) || '",' ||
          '"SF 掉帧: ' || (SELECT sf_jank FROM analysis) || '",' ||
          '"主线程 Q3 (等待调度): ' || COALESCE((SELECT main_q3_pct FROM analysis), 0) || '%",' ||
          '"主线程 Q4 (休眠阻塞): ' || COALESCE((SELECT main_q4_pct FROM analysis), 0) || '%",' ||
          '"Binder 最大耗时: ' || COALESCE(ROUND((SELECT binder_max_ms FROM analysis), 1), 0) || 'ms"' ||
        ']' as evidence,
        -- 优化建议
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN
            '检查系统负载和 SurfaceFlinger 状态'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN
            '减少后台任务，考虑提高主线程优先级'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN
            '优化 Binder 调用，考虑异步化或缓存'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN
            '检查主线程阻塞原因 (IO/锁/Binder)'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN
            '优化绘制流程，减少主线程耗时操作'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN
            '考虑使用 setThreadAffinity 或提高线程优先级'
          ELSE
            '查看详细帧分析，定位具体问题'
        END as suggestion
    save_as: conclusion
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && (perf_summary?.data?.[0]?.total_frames || 0) > 0 && enable_frame_details === true"

  # ==========================================================================
  # Fallback: 当 FrameTimeline 数据不可用时提供基础信息
  # ==========================================================================
  - id: fallback_no_frame_timeline
    type: atomic
    name: "数据源不可用提示"
    condition: "frame_timeline.data[0]?.has_frame_timeline === 0"
    display:
      level: summary
      layer: overview
      title: "滑动分析 - 数据源缺失"
      columns:
        - name: status
          label: "状态"
          type: string
        - name: missing_table
          label: "缺失数据表"
          type: string
        - name: suggestion
          label: "建议"
          type: string
    sql: |
      SELECT
        '⚠️ 无法执行帧分析' as status,
        'actual_frame_timeline_slice' as missing_table,
        '请确保 trace 采集时启用了 Frame Timeline (需要 Android 12+ 且开启 Choreographer tracing)' as suggestion
      UNION ALL
      SELECT
        'ℹ️ 可用替代方案' as status,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type='table' AND name='frame_slice') THEN 'frame_slice (可用)'
          ELSE 'frame_slice (不可用)'
        END as missing_table,
        '可尝试使用 frame_slice 进行基础帧耗时分析' as suggestion
    save_as: fallback_info

output:
  format: layered
  default_expanded: [overview, list]
  # 结论输出映射
  conclusion:
    category: $conclusion.problem_category
    component: $conclusion.problem_component
    confidence: $conclusion.confidence
    summary: $conclusion.root_cause_summary
    evidence: $conclusion.evidence
    suggestion: $conclusion.suggestion
