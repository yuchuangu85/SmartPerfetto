name: scrolling_analysis
version: "2.0"  # v2.0: refactored to use shared _cpu_topology VIEW
type: composite

meta:
  display_name: "滑动性能分析"
  description: "基于 Perfetto FrameTimeline 的滑动分析，分层展示：概览 → 区间 → 帧详情"
  icon: "swipe"
  tags: [scrolling, jank, fps, frames, layered]

triggers:
  keywords:
    zh: [滑动, 卡顿, 帧率, 掉帧, 丢帧, FPS, 流畅度, 列表滑动, fling]
    en: [scroll, jank, fps, frame, fling, stutter, smoothness, list]
  patterns:
    - ".*滑动.*卡.*"
    - ".*scroll.*jank.*"
    - ".*帧率.*"

prerequisites:
  modules:
    - android.frames.timeline
    - android.binder

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选，不填则分析所有应用）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"
  - name: enable_frame_details
    type: boolean
    required: false
    description: "是否执行逐帧详情分析（L4，默认不执行）"
  - name: max_frames_per_session
    type: number
    required: false
    description: "每个滑动区间最多分析的掉帧帧数（默认 8）"
  - name: enable_expert_probes
    type: boolean
    required: false
    default: true
    description: "是否启用专家探针（帧方差等）"
  - name: frame_variance_probe_min_janky_frames
    type: number
    required: false
    default: 5
    description: "触发帧方差探针的最小掉帧数"
  - name: frame_variance_transition_threshold_ms
    type: number
    required: false
    default: 8
    description: "帧间高抖动阈值（ms）"

steps:
  # ==========================================================================
  # Step 0: 初始化共享 CPU 拓扑视图
  # ==========================================================================
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  # ==========================================================================
  # L0: 数据源检测 - FrameTimeline 是否可用
  # ==========================================================================
  - id: frame_timeline_check
    type: atomic
    name: "FrameTimeline 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type = 'table' AND name = 'actual_frame_timeline_slice'
          ) THEN 1
          ELSE 0
        END as has_frame_timeline
    save_as: frame_timeline

  # ==========================================================================
  # L1: 环境配置检测 - Vsync/刷新率
  # ==========================================================================
  - id: vsync_config
    type: atomic
    name: "Vsync 配置"
    display:
      level: summary
      layer: overview
      title: "显示配置"
      columns:
        - name: refresh_rate_hz
          label: "刷新率"
          type: number
          format: compact
        - name: vsync_period_ms
          label: "VSync 周期"
          type: duration
          format: duration_ms
          unit: ms
        - name: vsync_source
          label: "来源"
          type: string
        - name: total_frames
          label: "总帧数"
          type: number
          format: compact
    sql: |
      WITH
      -- 方法1: 从 VSYNC-sf counter track 推算周期
      -- counter 值在 0/1 间交替，每次变化代表一个 vsync tick
      -- 当提供 start_ts/end_ts 时，只看滑动区间内的 VSync（避免 VRR 省电时段干扰）
      sf_vsync_intervals AS (
        SELECT
          c.ts,
          c.value,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- 只取连续变化段的间隔（过滤掉 idle 时的长间隔和异常短间隔）
      -- 120Hz=8.33ms, 90Hz=11.1ms, 60Hz=16.7ms → 范围 4ms-20ms 覆盖 240Hz-50Hz
      sf_vsync AS (
        SELECT
          CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER) as vsync_period_ns,
          'sf_vsync_counter' as source
        FROM sf_vsync_intervals
        WHERE interval_ns > 4000000 AND interval_ns < 20000000
      ),
      -- 方法2: 从 expected_frame_timeline_slice 推算 vsync 周期
      expected_frame_vsync AS (
        SELECT
          CAST(AVG(dur) AS INTEGER) as vsync_period_ns,
          'expected_frame' as source
        FROM expected_frame_timeline_slice
        WHERE dur > 5000000 AND dur < 35000000
          AND (${start_ts} IS NULL OR ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ),
      combined AS (
        SELECT vsync_period_ns, source FROM sf_vsync WHERE vsync_period_ns > 0
        UNION ALL
        SELECT vsync_period_ns, source FROM expected_frame_vsync WHERE vsync_period_ns > 0
      ),
      frame_count AS (
        SELECT COUNT(*) as total_frames
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      -- 将原始周期 snap 到最近的标准刷新率（边界为相邻标准率周期的几何均值）
      raw_period AS (
        SELECT
          COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 8333333) as period_ns,
          COALESCE((SELECT source FROM combined LIMIT 1), 'default') as source
      ),
      snapped AS (
        SELECT
          CASE
            WHEN period_ns < 4880000 THEN 240   -- < sqrt(4.17ms * 5.71ms)
            WHEN period_ns < 6300000 THEN 175   -- < sqrt(5.71ms * 6.94ms)
            WHEN period_ns < 7610000 THEN 144   -- < sqrt(6.94ms * 8.33ms)
            WHEN period_ns < 9620000 THEN 120   -- < sqrt(8.33ms * 11.11ms)
            WHEN period_ns < 13610000 THEN 90   -- < sqrt(11.11ms * 16.67ms)
            WHEN period_ns < 23570000 THEN 60   -- < sqrt(16.67ms * 33.33ms)
            WHEN period_ns < 37270000 THEN 30   -- < sqrt(33.33ms * 41.67ms)
            WHEN period_ns < 52700000 THEN 24   -- < sqrt(41.67ms * 66.67ms)
            ELSE 15
          END as refresh_rate_hz,
          source
        FROM raw_period
      )
      SELECT
        CAST(ROUND(1e9 / refresh_rate_hz, 0) AS INTEGER) as vsync_period_ns,
        refresh_rate_hz,
        ROUND(1e9 / refresh_rate_hz / 1e6, 2) as vsync_period_ms,
        source as vsync_source,
        (SELECT total_frames FROM frame_count) as total_frames,
        CASE WHEN (SELECT total_frames FROM frame_count) > 0 THEN 1 ELSE 0 END as has_data
      FROM snapped
    save_as: environment
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1"

  # ==========================================================================
  # L1: 帧性能汇总 (基于 VSYNC-sf 间隔检测掉帧)
  # ==========================================================================
  # 核心原理：
  # - 用户可见掉帧 = VSYNC-sf 间隔 > 1.5x 正常周期（SF 跳过了 VSync）
  # - BufferTX 状态用于判断责任归属，而非是否掉帧：
  #   - BufferTX = 0 → App 侧掉帧（App 没有及时提交 Buffer）
  #   - BufferTX > 0 → SF 侧掉帧（有 Buffer 但 SF 没消费，可能是 GPU 忙）
  # - 总掉帧 = App 侧掉帧 + SF 侧掉帧
  - id: performance_summary
    type: atomic
    name: "帧性能汇总"
    synthesize:
      role: overview
      fields:
        - key: total_frames
          label: 总帧数
        - key: janky_frames
          label: 掉帧数
          format: "{{value}} ({{jank_rate}}%)"
        - key: avg_fps
          label: 平均 FPS
        - key: duration_ms
          label: 持续时间
          format: "{{value}} ms"
        - key: app_jank
          label: App 侧掉帧
        - key: sf_jank
          label: SF 侧掉帧
      insights:
        - condition: "jank_rate > 10"
          template: "掉帧率 {{jank_rate}}% 较高，需要优化"
        - condition: "app_jank > sf_jank"
          template: "App 侧掉帧 ({{app_jank}}) 多于 SF 侧 ({{sf_jank}})"
    display:
      level: summary
      layer: overview
      title: "滑动性能概览"
      columns:
        - name: total_frames
          label: "总帧数"
          type: number
          format: compact
        - name: janky_frames
          label: "掉帧数"
          type: number
          format: compact
        - name: jank_rate
          label: "掉帧率"
          type: percentage
          format: percentage
        - name: app_janky_frames
          label: "App 侧掉帧"
          type: number
          format: compact
        - name: sf_jank_count
          label: "SF 侧掉帧"
          type: number
          format: compact
        - name: actual_fps
          label: "实际 FPS"
          type: number
        - name: refresh_rate
          label: "刷新率"
          type: number
        - name: avg_frame_dur
          label: "平均呈现间隔"
          type: duration
          format: duration_ms
          unit: ns
        - name: p95_frame_dur
          label: "P95 呈现间隔"
          type: duration
          format: duration_ms
          unit: ns
        - name: rating
          label: "评级"
          type: string
    sql: |
      WITH
      -- 获取 VSync 周期（从 VSYNC-sf 信号计算，限定在分析区间内）
      vsync_intervals AS (
        SELECT
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config AS (
        SELECT
          COALESCE(
            (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
             FROM vsync_intervals
             WHERE interval_ns > 4000000 AND interval_ns < 50000000),
            8333333  -- 默认 120Hz
          ) as raw_vsync_period_ns
      ),
      snapped_refresh AS (
        SELECT
          CASE
            WHEN raw_vsync_period_ns < 4880000 THEN 240
            WHEN raw_vsync_period_ns < 6300000 THEN 175
            WHEN raw_vsync_period_ns < 7610000 THEN 144
            WHEN raw_vsync_period_ns < 9620000 THEN 120
            WHEN raw_vsync_period_ns < 13610000 THEN 90
            WHEN raw_vsync_period_ns < 23570000 THEN 60
            WHEN raw_vsync_period_ns < 37270000 THEN 30
            WHEN raw_vsync_period_ns < 52700000 THEN 24
            ELSE 15
          END as refresh_rate_hz
        FROM vsync_config
      ),
      timing_config AS (
        SELECT
          CAST(ROUND(1e9 / refresh_rate_hz, 0) AS INTEGER) as vsync_period_ns,
          refresh_rate_hz
        FROM snapped_refresh
      ),
      time_range AS (
        SELECT
          MIN(a.ts) as start_ts,
          MAX(a.ts + a.dur) as end_ts,
          MAX(a.ts + a.dur) - MIN(a.ts) as duration_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      -- VSYNC-sf 事件
      vsync_events AS (
        SELECT
          c.ts as vsync_ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- BufferTX 事件
      buffer_events AS (
        SELECT c.ts, c.value as buffer_count
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name LIKE '%BufferTX%'
          AND (t.name LIKE '%${package}%' OR '${package}' = '')
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- 在每个 VSync 时刻查找 BufferTX 状态 + 最近帧的 jank_type
      vsync_with_buffer AS (
        SELECT
          v.vsync_ts,
          v.interval_ns,
          (SELECT b.buffer_count
           FROM buffer_events b
           WHERE b.ts <= v.vsync_ts
           ORDER BY b.ts DESC
           LIMIT 1
          ) as buffer_at_vsync,
          -- 查找覆盖此 VSYNC 时刻的帧的 jank_type（±20ms 容差）
          (SELECT a.jank_type
           FROM actual_frame_timeline_slice a
           LEFT JOIN process p ON a.upid = p.upid
           WHERE (p.name GLOB '${package}*' OR '${package}' = '')
             AND p.name NOT LIKE '/system/%'
             AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
             AND a.ts <= v.vsync_ts AND a.ts + a.dur >= v.vsync_ts - 20000000
           ORDER BY ABS(a.ts + a.dur / 2 - v.vsync_ts)
           LIMIT 1
          ) as frame_jank_type
        FROM vsync_events v
        WHERE v.interval_ns IS NOT NULL
      ),
      -- 计算掉帧（VSYNC-sf 间隔大 = 用户可见掉帧，jank_type 优先 + BufferTX 补充）
      jank_analysis AS (
        SELECT
          COUNT(*) as total_vsync,
          -- 总用户可见掉帧: VSYNC-sf 间隔 > 1.5x 正常周期
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM timing_config) * 1.5
                    AND interval_ns <= (SELECT vsync_period_ns FROM timing_config) * 6
                    THEN 1 ELSE 0 END) as total_jank_count,
          -- App 侧掉帧: jank_type 优先，BufferTX 补充
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM timing_config) * 1.5
                    AND interval_ns <= (SELECT vsync_period_ns FROM timing_config) * 6
                    AND (
                      frame_jank_type IN ('Self Jank', 'App Deadline Missed')
                      OR (frame_jank_type IS NULL AND buffer_at_vsync = 0)
                      OR (buffer_at_vsync = 0 AND frame_jank_type NOT GLOB '*SurfaceFlinger*')
                    ) THEN 1 ELSE 0 END) as app_jank_count,
          -- SF 侧掉帧: 仅当 jank_type 明确标记 SF
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM timing_config) * 1.5
                    AND interval_ns <= (SELECT vsync_period_ns FROM timing_config) * 6
                    AND frame_jank_type GLOB '*SurfaceFlinger*'
                    THEN 1 ELSE 0 END) as sf_jank_count,
          -- 计算最大跳过的 VSync 数（任意掉帧事件）
          MAX(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM timing_config) * 1.5
                    AND interval_ns <= (SELECT vsync_period_ns FROM timing_config) * 6
              THEN CAST(ROUND(interval_ns * 1.0 / (SELECT vsync_period_ns FROM timing_config) - 1) AS INTEGER)
              ELSE 0 END) as max_vsync_missed,
          -- 累计跳过的 VSync 数
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM timing_config) * 1.5
                    AND interval_ns <= (SELECT vsync_period_ns FROM timing_config) * 6
              THEN CAST(ROUND(interval_ns * 1.0 / (SELECT vsync_period_ns FROM timing_config) - 1) AS INTEGER)
              ELSE 0 END) as total_vsync_missed
        FROM vsync_with_buffer
        WHERE buffer_at_vsync IS NOT NULL
      ),
      app_frame_intervals AS (
        SELECT
          a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END as present_ts,
          LAG(a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END)
            OVER (PARTITION BY a.layer_name ORDER BY a.ts, COALESCE(a.display_frame_token, a.surface_frame_token)) as prev_present_ts
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      valid_frame_intervals AS (
        SELECT
          present_ts - prev_present_ts as frame_interval_ns
        FROM app_frame_intervals
        WHERE prev_present_ts IS NOT NULL
          AND present_ts > prev_present_ts
          AND present_ts - prev_present_ts >= (SELECT vsync_period_ns FROM timing_config) * 0.5
          AND present_ts - prev_present_ts <= (SELECT vsync_period_ns FROM timing_config) * 6
      ),
      -- App 报告的掉帧（旧逻辑，仅供参考）
      app_stats AS (
        SELECT
          COUNT(*) as total,
          SUM(CASE WHEN jank_type != 'None' THEN 1 ELSE 0 END) as app_janky_frames,
          COALESCE(
            (SELECT CAST(ROUND(AVG(frame_interval_ns)) AS INTEGER) FROM valid_frame_intervals),
            CAST(ROUND(AVG(CASE WHEN dur > 0 THEN dur ELSE NULL END)) AS INTEGER),
            0
          ) as avg_present_interval,
          COALESCE(
            (SELECT CAST(MAX(frame_interval_ns) AS INTEGER) FROM valid_frame_intervals),
            MAX(CASE WHEN dur > 0 THEN dur ELSE NULL END),
            0
          ) as max_present_interval,
          COALESCE(
            (SELECT CAST(ROUND(PERCENTILE(frame_interval_ns, 0.5)) AS INTEGER) FROM valid_frame_intervals),
            CAST(ROUND(PERCENTILE(CASE WHEN dur > 0 THEN dur ELSE NULL END, 0.5)) AS INTEGER),
            0
          ) as median_present_interval,
          COALESCE(
            (SELECT CAST(ROUND(PERCENTILE(frame_interval_ns, 0.95)) AS INTEGER) FROM valid_frame_intervals),
            CAST(ROUND(PERCENTILE(CASE WHEN dur > 0 THEN dur ELSE NULL END, 0.95)) AS INTEGER),
            0
          ) as p95_present_interval,
          COALESCE(
            (SELECT CAST(ROUND(PERCENTILE(frame_interval_ns, 0.99)) AS INTEGER) FROM valid_frame_intervals),
            CAST(ROUND(PERCENTILE(CASE WHEN dur > 0 THEN dur ELSE NULL END, 0.99)) AS INTEGER),
            0
          ) as p99_present_interval
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      consumer_gap_stats AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN display_frame_token - prev_display_token > 1 THEN 1 ELSE 0 END) as consumer_jank_frames,
          SUM(CASE WHEN display_frame_token - prev_display_token > 1 THEN (display_frame_token - prev_display_token - 1) ELSE 0 END) as total_vsync_missed,
          MAX(display_frame_token - prev_display_token) as max_token_gap
        FROM (
          SELECT
            COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
            LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token
          FROM actual_frame_timeline_slice a
          LEFT JOIN process p ON a.upid = p.upid
          WHERE (p.name GLOB '${package}*' OR '${package}' = '')
            AND p.name NOT LIKE '/system/%'
            AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
            AND (${end_ts} IS NULL OR a.ts < ${end_ts})
            AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
        )
        WHERE prev_display_token IS NOT NULL
      ),
      resolved_jank AS (
        SELECT
          COALESCE(
            (SELECT total_jank_count FROM jank_analysis),
            (SELECT consumer_jank_frames FROM consumer_gap_stats),
            (SELECT app_janky_frames FROM app_stats),
            0
          ) as janky_frames,
          CASE
            WHEN (SELECT total_jank_count FROM jank_analysis) IS NOT NULL
              THEN COALESCE((SELECT app_jank_count FROM jank_analysis), 0)
            ELSE COALESCE((SELECT app_janky_frames FROM app_stats), 0)
          END as app_jank_raw,
          COALESCE(
            (SELECT max_vsync_missed FROM jank_analysis),
            (SELECT max_token_gap FROM consumer_gap_stats) - 1,
            0
          ) as max_vsync_missed,
          COALESCE(
            (SELECT total_vsync_missed FROM jank_analysis),
            (SELECT total_vsync_missed FROM consumer_gap_stats),
            0
          ) as total_vsync_missed,
          CASE
            WHEN (SELECT total_jank_count FROM jank_analysis) IS NULL THEN 'frame_token_gap'
            ELSE 'vsync_sf_interval'
          END as fps_source
      ),
      resolved_jank_clamped AS (
        SELECT
          janky_frames,
          CASE
            WHEN app_jank_raw < 0 THEN 0
            WHEN app_jank_raw > janky_frames THEN janky_frames
            ELSE app_jank_raw
          END as app_janky_frames,
          max_vsync_missed,
          total_vsync_missed,
          fps_source
        FROM resolved_jank
      )
      SELECT
        (SELECT total FROM app_stats) as total_frames,
        (SELECT janky_frames FROM resolved_jank_clamped) as janky_frames,
        (SELECT app_janky_frames FROM resolved_jank_clamped) as app_janky_frames,
        MAX(
          (SELECT janky_frames FROM resolved_jank_clamped) -
          (SELECT app_janky_frames FROM resolved_jank_clamped),
          0
        ) as sf_jank_count,
        -- 总掉帧率
        ROUND(
          100.0 * (SELECT janky_frames FROM resolved_jank_clamped) / NULLIF((SELECT total FROM app_stats), 0),
          2
        ) as jank_rate,
        -- App 侧掉帧率
        ROUND(
          100.0 * (SELECT app_janky_frames FROM resolved_jank_clamped) / NULLIF((SELECT total FROM app_stats), 0),
          2
        ) as app_jank_rate,
        -- SF 侧掉帧率
        ROUND(
          100.0 * MAX(
            (SELECT janky_frames FROM resolved_jank_clamped) -
            (SELECT app_janky_frames FROM resolved_jank_clamped),
            0
          ) / NULLIF((SELECT total FROM app_stats), 0),
          2
        ) as sf_jank_rate,
        (SELECT avg_present_interval FROM app_stats) as avg_frame_dur,
        (SELECT max_present_interval FROM app_stats) as max_frame_dur,
        (SELECT median_present_interval FROM app_stats) as median_frame_dur,
        (SELECT p95_present_interval FROM app_stats) as p95_frame_dur,
        (SELECT p99_present_interval FROM app_stats) as p99_frame_dur,
        ROUND((SELECT duration_ns FROM time_range) / 1e9, 2) as duration_sec,
        MIN(
          ROUND(1e9 * (SELECT total FROM app_stats) / NULLIF((SELECT duration_ns FROM time_range), 0), 1),
          (SELECT refresh_rate_hz FROM timing_config)
        ) as actual_fps,
        (SELECT refresh_rate_hz FROM timing_config) as refresh_rate,
        CASE
          WHEN (SELECT janky_frames FROM resolved_jank_clamped) = 0 THEN '优秀'
          WHEN 100.0 * (SELECT janky_frames FROM resolved_jank_clamped) / NULLIF((SELECT total FROM app_stats), 0) < 1 THEN '优秀'
          WHEN 100.0 * (SELECT janky_frames FROM resolved_jank_clamped) / NULLIF((SELECT total FROM app_stats), 0) < 5 THEN '良好'
          WHEN 100.0 * (SELECT janky_frames FROM resolved_jank_clamped) / NULLIF((SELECT total FROM app_stats), 0) < 15 THEN '一般'
          ELSE '较差'
        END as rating,
        (SELECT fps_source FROM resolved_jank_clamped) as fps_source,
        (SELECT max_vsync_missed FROM resolved_jank_clamped) as max_vsync_missed,
        (SELECT total_vsync_missed FROM resolved_jank_clamped) as total_vsync_missed,
        ROUND((SELECT vsync_period_ns FROM timing_config) / 1e6, 2) as vsync_period_ms
      LIMIT 1
    save_as: perf_summary
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L1: 专家探针 - 时间窗与帧波动
  # ==========================================================================
  # 原则：
  # 1) 用户显式给 start_ts/end_ts 时严格尊重用户窗口
  # 2) 未给窗口时，自动使用目标包名的 FrameTimeline 边界作为分析窗口
  # 3) 仅在已确认存在可见掉帧时才启用额外探针，避免无谓开销
  - id: expert_analysis_window
    type: atomic
    name: "专家分析窗口"
    display: false
    sql: |
      WITH frame_bounds AS (
        SELECT
          MIN(a.ts) as min_ts,
          MAX(a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END) as max_ts
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
      )
      SELECT
        CASE
          WHEN COALESCE(${start_ts}, min_ts) IS NOT NULL
            THEN printf('%d', COALESCE(${start_ts}, min_ts))
          ELSE NULL
        END as window_start_ts,
        CASE
          WHEN COALESCE(${end_ts}, max_ts) IS NOT NULL
            THEN printf('%d', COALESCE(${end_ts}, max_ts))
          ELSE NULL
        END as window_end_ts,
        CASE
          WHEN COALESCE(${start_ts}, min_ts) IS NOT NULL
            AND COALESCE(${end_ts}, max_ts) IS NOT NULL
            THEN ROUND((COALESCE(${end_ts}, max_ts) - COALESCE(${start_ts}, min_ts)) / 1e6, 2)
          ELSE NULL
        END as window_ms,
        CASE
          WHEN ${start_ts} IS NOT NULL OR ${end_ts} IS NOT NULL THEN 'user_selected'
          WHEN min_ts IS NOT NULL AND max_ts IS NOT NULL THEN 'auto_frame_bounds'
          ELSE 'unavailable'
        END as window_source
      FROM frame_bounds
    save_as: expert_window
    condition: "${enable_expert_probes|true} == true && frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"
    optional: true

  - id: frame_variance_probe
    type: skill
    name: "帧方差探针"
    skill: frame_pipeline_variance
    params:
      package: "${package}"
      start_ts: "${expert_window.data?.[0]?.window_start_ts ?? start_ts ?? null}"
      end_ts: "${expert_window.data?.[0]?.window_end_ts ?? end_ts ?? null}"
      transition_threshold_ms: "${frame_variance_transition_threshold_ms|8}"
    display:
      level: summary
      layer: overview
      title: "帧稳定性方差（专家探针）"
      columns:
        - name: total_frames
          label: "总帧数"
          type: number
        - name: avg_frame_ms
          label: "平均帧耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: stddev_ms
          label: "标准差"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_delta_ms
          label: "帧间波动"
          type: duration
          format: duration_ms
          unit: ms
        - name: high_variance_transitions
          label: "高抖动转折"
          type: number
        - name: variance_level
          label: "波动等级"
          type: string
    save_as: frame_variance_probe
    condition: "${enable_expert_probes|true} == true && frame_timeline.data[0]?.has_frame_timeline === 1 && (perf_summary?.data?.[0]?.janky_frames || 0) >= (frame_variance_probe_min_janky_frames || 5)"
    optional: true

  # ==========================================================================
  # L1: 掉帧分析 - 消费端 vs App 报告对比
  # ==========================================================================
  # 展示 jank_type 与实际消费端掉帧的关系
  # - 假阳性: jank_type 报告掉帧，但 gap=1 (用户看到流畅)
  # - 假阴性: jank_type=None，但 gap>1 (用户看到卡顿)
  - id: jank_type_stats
    type: atomic
    name: "掉帧类型统计"
    display:
      level: summary
      layer: overview
      title: "掉帧类型分布"
      columns:
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: count
          label: "帧数"
          type: number
          format: compact
        - name: real_jank_count
          label: "实际掉帧"
          type: number
          format: compact
        - name: false_positive
          label: "假阳性"
          type: number
        - name: total_dur
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: avg_dur
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: responsibility
          label: "类型标签"
          type: string
    sql: |
      WITH
      vsync_intervals AS (
        SELECT
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config AS (
        SELECT
          COALESCE(
            (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
             FROM vsync_intervals
             WHERE interval_ns > 4000000 AND interval_ns < 50000000),
            8333333
          ) as vsync_period_ns
      ),
      app_frames AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          a.ts,
          CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END as dur,
          COALESCE(a.jank_type, 'Unknown') as jank_type,
          a.layer_name,
          a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END as present_ts,
          LAG(a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END)
            OVER (PARTITION BY a.layer_name ORDER BY a.ts, COALESCE(a.display_frame_token, a.surface_frame_token)) as prev_present_ts
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      jank_analysis AS (
        SELECT
          jank_type,
          dur,
          present_ts - prev_present_ts as interval_ns,
          CASE
            WHEN prev_present_ts IS NULL THEN 1
            WHEN present_ts - prev_present_ts > (SELECT vsync_period_ns * 6 FROM vsync_config) THEN 1
            ELSE 0
          END as is_session_break,
          MAX(CAST(ROUND((present_ts - prev_present_ts) * 1.0 / (SELECT vsync_period_ns FROM vsync_config) - 1, 0) AS INTEGER), 0) as vsync_missed,
          CASE
            WHEN prev_present_ts IS NULL THEN 0
            WHEN present_ts - prev_present_ts > (SELECT vsync_period_ns * 6 FROM vsync_config) THEN 0
            WHEN present_ts - prev_present_ts > (SELECT vsync_period_ns FROM vsync_config) * 1.5 THEN 1
            ELSE 0
          END as is_consumer_jank
        FROM app_frames
        WHERE prev_present_ts IS NOT NULL
      )
      SELECT
        jank_type,
        COUNT(*) as count,
        -- 实际用户感知掉帧数（呈现间隔 > 1.5 * VSync）
        SUM(is_consumer_jank) as real_jank_count,
        -- 假阳性数（jank_type 报告掉帧，但消费端未跳帧）
        SUM(CASE WHEN jank_type != 'None' AND is_consumer_jank = 0 THEN 1 ELSE 0 END) as false_positive,
        CAST(SUM(CASE WHEN dur > 0 THEN dur ELSE 0 END) AS REAL) as total_dur,
        CAST(ROUND(AVG(CASE WHEN dur > 0 THEN dur ELSE NULL END)) AS INTEGER) as avg_dur,
        CASE
          WHEN jank_type GLOB '*App*' OR jank_type = 'Self Jank' THEN '标签:App'
          WHEN jank_type GLOB '*SurfaceFlinger*' THEN '标签:SurfaceFlinger'
          WHEN jank_type GLOB '*Buffer*' THEN '标签:Buffer Stuffing(需验证)'
          WHEN jank_type = 'None' THEN '标签:None(可能漏检)'
          ELSE '标签:Other'
        END as responsibility
      FROM jank_analysis
      WHERE is_session_break = 0
      GROUP BY jank_type
      ORDER BY real_jank_count DESC, count DESC
      LIMIT 10
    save_as: jank_stats
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 滑动区间列表
  # ==========================================================================
  - id: scroll_sessions
    type: atomic
    name: "滑动区间列表"
    display:
      level: detail
      layer: list
      title: "滑动区间"
      columns:
        - name: session_id
          label: "区间"
          type: number
        - name: process_name
          label: "进程"
          type: string
        - name: start_ts
          label: "开始时间"
          type: timestamp
          clickAction: navigate_range
          durationColumn: duration
        - name: end_ts
          label: "结束时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: frame_count
          label: "帧数"
          type: number
          format: compact
        - name: duration_ms
          label: "持续时间"
          type: duration
          format: duration_ms
          unit: ms
          hidden: true
        - name: duration
          label: "持续时间"
          type: duration
          format: duration_ms
          unit: ns
        - name: avg_dur
          label: "平均帧耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: max_dur
          label: "最大帧耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: session_fps
          label: "FPS"
          type: number
    sql: |
      WITH
      -- 动态 VSync 周期检测用于 session 切分（限定在分析区间内）
      vsync_intervals AS (
        SELECT c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
           FROM vsync_intervals
           WHERE interval_ns > 4000000 AND interval_ns < 50000000),
          8333333
        ) as vsync_period_ns
      ),
      frame_gaps AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as frame_id,
          a.ts,
          a.dur,
          a.upid,
          p.name as process_name,
          LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as prev_end,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as gap_ns
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND a.dur > 0
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN gap_ns IS NULL OR gap_ns > (SELECT vsync_period_ns * 6 FROM vsync_config) THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      )
      SELECT
        session_id,
        process_name,
        printf('%d', MIN(ts)) as start_ts,
        printf('%d', MAX(ts + dur)) as end_ts,
        COUNT(*) as frame_count,
        -- duration_ms is the primary display column (already in ms)
        ROUND((MAX(ts + dur) - MIN(ts)) / 1e6, 1) as duration_ms,
        -- duration in ns as string to avoid 32-bit integer overflow (for downstream consumers)
        printf('%d', MAX(ts + dur) - MIN(ts)) as duration,
        CAST(ROUND(AVG(dur)) AS INTEGER) as avg_dur,
        MAX(dur) as max_dur,
        ROUND(1e9 * COUNT(*) / NULLIF(MAX(ts + dur) - MIN(ts), 0), 1) as session_fps
      FROM sessions
      GROUP BY upid, session_id
      HAVING COUNT(*) >= 10
        AND (MAX(ts + dur) - MIN(ts)) > 200000000
      ORDER BY MIN(ts)
    save_as: sessions
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 区间掉帧统计 (基于消费端 display_frame_token 跳跃)
  # ==========================================================================
  - id: session_jank
    type: atomic
    name: "区间掉帧统计"
    display:
      level: detail
      layer: list
      title: "区间掉帧"
      columns:
        - name: session_id
          label: "区间"
          type: number
        - name: frame_count
          label: "总帧数"
          type: number
          format: compact
        - name: janky_count
          label: "掉帧数"
          type: number
          format: compact
        - name: jank_rate
          label: "掉帧率"
          type: percentage
          format: percentage
        - name: app_janky_count
          label: "App 掉帧"
          type: number
          format: compact
        - name: max_vsync_missed
          label: "最大跳帧"
          type: number
        - name: jank_types
          label: "掉帧类型"
          type: string
          format: truncate
    sql: |
      WITH
      -- 动态 VSync 周期检测（限定在分析区间内）
      vsync_intervals_for_session AS (
        SELECT
          c.ts as vsync_ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config_for_session AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
           FROM vsync_intervals_for_session
           WHERE interval_ns > 4000000 AND interval_ns < 50000000),
          8333333
        ) as vsync_period_ns
      ),
      -- BufferTX 事件（用于判断掉帧责任归属）
      buffer_events_for_session AS (
        SELECT c.ts, c.value as buffer_count
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name LIKE '%BufferTX%'
          AND (t.name LIKE '%${package}%' OR '${package}' = '')
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      -- 在每个 VSync 时刻查找 BufferTX 状态 + 最近帧的 jank_type
      vsync_with_buffer_for_session AS (
        SELECT
          v.vsync_ts,
          v.interval_ns,
          (SELECT b.buffer_count
           FROM buffer_events_for_session b
           WHERE b.ts <= v.vsync_ts
           ORDER BY b.ts DESC
           LIMIT 1
          ) as buffer_at_vsync,
          -- 查找覆盖此 VSYNC 时刻的帧的 jank_type（±20ms 容差）
          (SELECT a.jank_type
           FROM actual_frame_timeline_slice a
           LEFT JOIN process p ON a.upid = p.upid
           WHERE (p.name GLOB '${package}*' OR '${package}' = '')
             AND p.name NOT LIKE '/system/%'
             AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
             AND a.ts <= v.vsync_ts AND a.ts + a.dur >= v.vsync_ts - 20000000
           ORDER BY ABS(a.ts + a.dur / 2 - v.vsync_ts)
           LIMIT 1
          ) as frame_jank_type
        FROM vsync_intervals_for_session v
        WHERE v.interval_ns IS NOT NULL
      ),
      frame_gaps AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          a.ts, a.dur, a.upid,
          a.layer_name,
          a.jank_type,
          p.name as process_name,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as time_gap_ns,
          LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as prev_display_token
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND a.dur > 0
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN time_gap_ns IS NULL OR time_gap_ns > (SELECT vsync_period_ns * 6 FROM vsync_config_for_session) THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions_raw AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      sessions AS (
        SELECT
          session_id,
          process_name,
          MIN(ts) as start_ts,
          MAX(ts + dur) as end_ts,
          COUNT(*) as frame_count
        FROM sessions_raw
        GROUP BY upid, session_id
        HAVING COUNT(*) >= 10
          AND (MAX(ts + dur) - MIN(ts)) > 200000000
      ),
      -- 基于 VSYNC-sf 间隔 > 1.5x period 检测掉帧（jank_type 优先 + BufferTX 补充）
      session_vsync_jank AS (
        SELECT
          s.session_id,
          SUM(CASE WHEN vwb.interval_ns > (SELECT vsync_period_ns FROM vsync_config_for_session) * 1.5
                    AND vwb.interval_ns <= (SELECT vsync_period_ns FROM vsync_config_for_session) * 6
                    THEN 1 ELSE 0 END) as consumer_jank_count,
          -- App jank: jank_type 优先
          SUM(CASE WHEN vwb.interval_ns > (SELECT vsync_period_ns FROM vsync_config_for_session) * 1.5
                    AND vwb.interval_ns <= (SELECT vsync_period_ns FROM vsync_config_for_session) * 6
                    AND (
                      vwb.frame_jank_type IN ('Self Jank', 'App Deadline Missed')
                      OR (vwb.frame_jank_type IS NULL AND vwb.buffer_at_vsync = 0)
                      OR (vwb.buffer_at_vsync = 0 AND vwb.frame_jank_type NOT GLOB '*SurfaceFlinger*')
                    ) THEN 1 ELSE 0 END) as app_jank_count,
          MAX(CASE WHEN vwb.interval_ns > (SELECT vsync_period_ns FROM vsync_config_for_session) * 1.5
                    AND vwb.interval_ns <= (SELECT vsync_period_ns FROM vsync_config_for_session) * 6
              THEN CAST(ROUND(vwb.interval_ns * 1.0 / (SELECT vsync_period_ns FROM vsync_config_for_session) - 1) AS INTEGER)
              ELSE 0 END) as max_vsync_missed,
          -- jank_types: 使用 frame_jank_type 而非硬编码
          GROUP_CONCAT(DISTINCT CASE WHEN vwb.interval_ns > (SELECT vsync_period_ns FROM vsync_config_for_session) * 1.5
              AND vwb.interval_ns <= (SELECT vsync_period_ns FROM vsync_config_for_session) * 6
              THEN COALESCE(vwb.frame_jank_type, CASE WHEN vwb.buffer_at_vsync = 0 THEN 'App Deadline Missed' ELSE 'Unknown' END)
              END) as jank_types
        FROM sessions s
        CROSS JOIN vsync_with_buffer_for_session vwb
        WHERE vwb.vsync_ts >= s.start_ts AND vwb.vsync_ts < s.end_ts
          AND vwb.buffer_at_vsync IS NOT NULL
        GROUP BY s.session_id
      )
      SELECT
        s.session_id,
        s.frame_count,
        COALESCE(svj.consumer_jank_count, 0) as janky_count,
        ROUND(100.0 * COALESCE(svj.consumer_jank_count, 0) / NULLIF(s.frame_count, 0), 2) as jank_rate,
        COALESCE(svj.app_jank_count, 0) as app_janky_count,
        COALESCE(svj.max_vsync_missed, 0) as max_vsync_missed,
        svj.jank_types
      FROM sessions s
      LEFT JOIN session_vsync_jank svj ON s.session_id = svj.session_id
      ORDER BY s.session_id
    save_as: session_jank_data
    optional: true
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && environment.data[0]?.has_data === 1"

  # ==========================================================================
  # 内部步骤：获取所有掉帧的帧列表 (基于 VSYNC-sf 间隔检测)
  # ==========================================================================
  # 核心原理：
  # - 找到所有 VSYNC-sf 间隔 > 1.5x 正常周期的时刻（SF 跳帧）
  # - 这些都是用户可见的掉帧
  # - BufferTX 状态用于标记责任归属（App 侧 vs SF 侧）
  - id: get_app_jank_frames
    type: atomic
    name: "获取真正掉帧帧"
    synthesize:
      role: list
      groupBy:
        - field: jank_responsibility
          title: 责任归属分布
        - field: jank_type
          title: 掉帧类型分布
    display:
      level: detail
      layer: list
      title: "掉帧列表"
      expandable: true  # 支持展开查看详细分析
      # 提取固定值到元数据（这些列在列表中值相同，移至标题/副标题显示）
      metadataFields:
        - layer_name
        - process_name
        - pid
      columns:
        - name: frame_id
          label: "帧 ID"
          type: string
        - name: start_ts
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: end_ts
          label: "结束时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur
          label: "帧耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: vsync_missed
          label: "跳帧数"
          type: number
        - name: jank_responsibility
          label: "责任归属"
          type: enum
        - name: jank_cause
          label: "原因说明"
          type: string
        - name: main_start_ts
          label: "主线程开始"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
          hidden: true
        - name: main_end_ts
          label: "主线程结束"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
          hidden: true
        - name: main_dur
          label: "主线程耗时"
          type: duration
          format: duration_ms
          unit: ns
          hidden: true
        - name: render_start_ts
          label: "渲染开始"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
          hidden: true
        - name: render_end_ts
          label: "渲染结束"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
          hidden: true
        - name: render_dur
          label: "渲染耗时"
          type: duration
          format: duration_ms
          unit: ns
          hidden: true
        - name: jank_severity_type
          label: "严重程度"
          type: string
          hidden: true
        - name: layer_name
          label: "图层名"
          type: string
          hidden: true
        - name: process_name
          label: "进程名"
          type: string
          hidden: true
        - name: pid
          label: "PID"
          type: number
          hidden: true
        - name: session_id
          label: "会话"
          type: number
          hidden: true
        - name: token_gap
          label: "Token 跳跃"
          type: number
          hidden: true
        - name: frame_index
          label: "帧索引"
          type: number
          hidden: true
        - name: is_hidden_jank
          label: "隐形掉帧"
          type: number
          hidden: true
        - name: main_dur_ms
          type: duration
          format: duration_ms
          unit: ms
          hidden: true
        - name: render_dur_ms
          type: duration
          format: duration_ms
          unit: ms
          hidden: true
        - name: dur_ms
          type: duration
          format: duration_ms
          unit: ms
          hidden: true
    sql: |
      WITH
      -- VSync 周期（限定在分析区间内，避免 VRR 省电时段干扰）
      vsync_intervals AS (
        SELECT c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
           FROM vsync_intervals WHERE interval_ns > 4000000 AND interval_ns < 50000000),
          8333333
        ) as raw_vsync_period_ns
      ),
      snapped_refresh AS (
        SELECT
          CASE
            WHEN raw_vsync_period_ns < 4880000 THEN 240
            WHEN raw_vsync_period_ns < 6300000 THEN 175
            WHEN raw_vsync_period_ns < 7610000 THEN 144
            WHEN raw_vsync_period_ns < 9620000 THEN 120
            WHEN raw_vsync_period_ns < 13610000 THEN 90
            WHEN raw_vsync_period_ns < 23570000 THEN 60
            WHEN raw_vsync_period_ns < 37270000 THEN 30
            WHEN raw_vsync_period_ns < 52700000 THEN 24
            ELSE 15
          END as refresh_rate_hz
        FROM vsync_config
      ),
      timing_config AS (
        SELECT
          CAST(ROUND(1e9 / refresh_rate_hz, 0) AS INTEGER) as vsync_period_ns,
          refresh_rate_hz
        FROM snapped_refresh
      ),
      -- 帧时间范围（含消费端呈现时间，与 jank_type_stats 检测方法一致）
      all_frames AS (
        SELECT
          COALESCE(a.display_frame_token, a.surface_frame_token) as display_frame_token,
          a.ts,
          a.dur,
          a.upid,
          a.layer_name,
          a.jank_type,
          a.jank_severity_type,
          -- 消费端呈现时间（与 jank_type_stats 一致）
          a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END as present_ts,
          LAG(a.ts + CASE WHEN a.dur > 0 THEN a.dur ELSE 0 END)
            OVER (PARTITION BY a.layer_name ORDER BY a.ts, COALESCE(a.display_frame_token, a.surface_frame_token)) as prev_present_ts,
          COALESCE(a.display_frame_token, a.surface_frame_token) - LAG(COALESCE(a.display_frame_token, a.surface_frame_token)) OVER (PARTITION BY a.layer_name ORDER BY a.ts) as token_gap,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as time_gap_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      session_markers AS (
        SELECT
          *,
          CASE WHEN time_gap_ns IS NULL OR time_gap_ns > (SELECT vsync_period_ns * 6 FROM timing_config) THEN 1 ELSE 0 END as new_session
        FROM all_frames
      ),
      sessions_map AS (
        SELECT
          *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      -- 消费端真实掉帧检测（与 jank_type_stats 完全一致的检测方法）
      -- 判定条件：呈现间隔 > 1.5x VSync 周期 且不是会话间断
      jank_frames AS (
        SELECT
          sm.display_frame_token as frame_id,
          sm.upid,
          sm.ts as actual_start,
          sm.ts + sm.dur as actual_end,
          sm.dur as actual_dur,
          sm.jank_type,
          sm.jank_severity_type,
          sm.layer_name,
          sm.session_id,
          -- 消费端跳帧数
          MAX(CAST(ROUND(
            (sm.present_ts - sm.prev_present_ts) * 1.0 / (SELECT vsync_period_ns FROM timing_config) - 1, 0
          ) AS INTEGER), 0) as vsync_missed,
          -- 责任归属
          CASE
            WHEN sm.jank_type IN ('Self Jank', 'App Deadline Missed') THEN 'APP'
            WHEN sm.jank_type GLOB '*SurfaceFlinger*' THEN 'SF'
            WHEN sm.jank_type GLOB '*Buffer*' THEN 'BUFFER_STUFFING'
            -- 隐形掉帧：框架标记 None 但消费端检测到真实掉帧
            WHEN sm.jank_type = 'None' OR sm.jank_type IS NULL THEN 'HIDDEN'
            ELSE 'UNKNOWN'
          END as jank_responsibility,
          sm.token_gap as token_gap,
          -- 隐形掉帧标记
          CASE WHEN sm.jank_type = 'None' OR sm.jank_type IS NULL THEN 1 ELSE 0 END as is_hidden_jank
        FROM sessions_map sm
        WHERE sm.prev_present_ts IS NOT NULL
          -- 排除会话间断
          AND (sm.present_ts - sm.prev_present_ts) <= (SELECT vsync_period_ns * 6 FROM timing_config)
          -- 消费端真实掉帧：呈现间隔 > 1.5x VSync 周期
          AND (sm.present_ts - sm.prev_present_ts) > (SELECT vsync_period_ns FROM timing_config) * 1.5
      ),
      frame_thread_info AS (
        SELECT
          jf.frame_id,
          jf.upid,
          jf.actual_start,
          jf.actual_end,
          jf.actual_dur,
          jf.jank_type,
          jf.jank_severity_type,
          jf.layer_name,
          jf.session_id,
          jf.token_gap,
          jf.vsync_missed,
          jf.jank_responsibility,
          jf.is_hidden_jank,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
             AND s.name LIKE 'Choreographer#doFrame%'
          ) as main_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
          ) as main_end_ts,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_end_ts
        FROM jank_frames jf
      )
      ,
      ranked_frames AS (
        SELECT
          fti.frame_id,
          fti.actual_start,
          fti.actual_end,
          fti.main_start_ts,
          fti.main_end_ts,
          fti.render_start_ts,
          fti.render_end_ts,
          fti.actual_dur,
          fti.jank_type,
          fti.jank_severity_type,
          fti.layer_name,
          fti.session_id,
          fti.token_gap,
          fti.vsync_missed,
          fti.jank_responsibility,
          p.name as process_name,
          p.pid,
          p.upid,
          fti.is_hidden_jank,
          -- 前序帧信息（用于掉帧原因诊断）
          LAG(fti.actual_dur) OVER (PARTITION BY fti.session_id ORDER BY fti.actual_start) as prev_frame_dur,
          LAG(fti.jank_type) OVER (PARTITION BY fti.session_id ORDER BY fti.actual_start) as prev_frame_jank_type,
          -- 按 vsync_missed 排序（最严重的掉帧优先）
          ROW_NUMBER() OVER (PARTITION BY fti.session_id ORDER BY fti.vsync_missed DESC, fti.actual_dur DESC) as rank_in_session
        FROM frame_thread_info fti
        JOIN process p ON fti.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
      )
      SELECT
        printf('%d', frame_id) as frame_id,
        printf('%d', actual_start) as start_ts,
        printf('%d', actual_end) as end_ts,
        printf('%d', COALESCE(main_start_ts, actual_start)) as main_start_ts,
        printf('%d', COALESCE(main_end_ts, actual_end)) as main_end_ts,
        COALESCE(main_end_ts - main_start_ts, 0) as main_dur,
        ROUND(COALESCE(main_end_ts - main_start_ts, 0) / 1e6, 2) as main_dur_ms,
        printf('%d', COALESCE(render_start_ts, actual_start)) as render_start_ts,
        printf('%d', COALESCE(render_end_ts, actual_end)) as render_end_ts,
        COALESCE(render_end_ts - render_start_ts, 0) as render_dur,
        ROUND(COALESCE(render_end_ts - render_start_ts, 0) / 1e6, 2) as render_dur_ms,
        printf('%d', actual_dur) as dur,
        ROUND(actual_dur / 1e6, 2) as dur_ms,
        jank_type,
        jank_severity_type,
        layer_name,
        process_name,
        pid,
        session_id,
        token_gap,
        vsync_missed,
        jank_responsibility,
        -- 掉帧原因说明
        CASE
          -- 隐形掉帧：框架标记 None 但消费端检测到真实掉帧
          WHEN jank_responsibility = 'HIDDEN' THEN
            '隐形掉帧 — 框架未标记但消费端呈现间隔 > 1.5x VSync（跳过 ' || vsync_missed || ' 帧），帧耗时 '
            || ROUND(actual_dur / 1e6, 2) || 'ms，可能为 SurfaceFlinger 合成延迟或跨帧管线积压'
          -- App Self Jank: 主线程自身超时
          WHEN jank_type = 'Self Jank' THEN
            'App 自身处理超时（' || ROUND(actual_dur / 1e6, 2) || 'ms，预算 '
            || ROUND((SELECT vsync_period_ns FROM timing_config) / 1e6, 1) || 'ms），跳过 ' || vsync_missed || ' 帧'
          -- App Deadline Missed: 未在 deadline 前完成
          WHEN jank_type = 'App Deadline Missed' THEN
            'App 未在 VSync deadline 前完成渲染（' || ROUND(actual_dur / 1e6, 2) || 'ms），跳过 ' || vsync_missed || ' 帧'
          -- SurfaceFlinger 问题
          WHEN jank_responsibility = 'SF' THEN
            'SurfaceFlinger 合成延迟（' || jank_type || '），App 已按时交付 buffer'
          -- Buffer Stuffing
          WHEN jank_responsibility = 'BUFFER_STUFFING' THEN
            '帧耗时 ' || ROUND(actual_dur / 1e6, 2) || 'ms，前序帧积压导致 BufferQueue 阻塞（Buffer Stuffing），延迟 ' || vsync_missed || ' 个 VSync 呈现'
            || CASE WHEN prev_frame_dur IS NOT NULL
               THEN '（前帧耗时 ' || ROUND(prev_frame_dur / 1e6, 1) || 'ms）'
               ELSE '' END
          -- App side
          WHEN jank_responsibility = 'APP' THEN
            'App 超时（' || ROUND(actual_dur / 1e6, 2) || 'ms），跳过 ' || vsync_missed || ' 帧'
          -- Unknown
          ELSE
            COALESCE(jank_type, '未知') || '，跳过 ' || vsync_missed || ' 帧'
        END as jank_cause,
        is_hidden_jank,
        ROW_NUMBER() OVER (ORDER BY session_id, actual_start) as frame_index
      FROM ranked_frames
      WHERE rank_in_session <= CASE
        WHEN ${max_frames_per_session} IS NULL THEN 8
        WHEN CAST(${max_frames_per_session} AS INTEGER) <= 0 THEN 8
        ELSE CAST(${max_frames_per_session} AS INTEGER)
      END
      ORDER BY session_id, actual_start
    save_as: app_jank_frames
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && typeof environment !== 'undefined' && environment.data[0]?.has_data === 1 && (perf_summary.data[0]?.janky_frames > 0 || (jank_stats?.data || []).some(r => r.real_jank_count > 0))"

  # ==========================================================================
  # L3: 逐帧诊断 (所有掉帧帧 → jank_frame_detail)
  # ==========================================================================
  - id: diagnose_jank_frames
    type: iterator
    name: "逐帧诊断分析"
    source: app_jank_frames
    item_skill: jank_frame_detail
    item_params:
      start_ts: start_ts
      end_ts: end_ts
      main_start_ts: main_start_ts
      main_end_ts: main_end_ts
      render_start_ts: render_start_ts
      render_end_ts: render_end_ts
      dur_ms: dur_ms
      frame_id: frame_id
      jank_type: jank_type
      package: process_name
      pid: pid
      session_id: session_id
      layer_name: layer_name
      token_gap: token_gap
      vsync_missed: vsync_missed
      jank_responsibility: jank_responsibility
      jank_cause: jank_cause
      frame_index: frame_index
    display:
      level: key
      layer: overview
      title: "帧诊断结果"
    condition: "app_jank_frames?.data?.length > 0 && enable_frame_details === true"

  # ==========================================================================
  # L4: 逐帧详细分析 (Iterator)
  # ==========================================================================
  - id: analyze_jank_frames
    type: iterator
    name: "逐帧详细分析"
    synthesize:
      role: clusters
      clusterBy: cause_type
    display:
      level: key
      layer: deep
      title: "帧详细分析"
      columns:
        - name: frame_id
          label: "帧 ID"
          type: string
        - name: cause_type
          label: "原因类型"
          type: string
        - name: diagnosis
          label: "诊断结论"
          type: string
        - name: confidence
          label: "置信度"
          type: percentage
          format: percentage
    source: app_jank_frames
    item_skill: jank_frame_detail
    condition: "enable_frame_details === true"
    item_params:
      start_ts: start_ts
      end_ts: end_ts
      main_start_ts: main_start_ts
      main_end_ts: main_end_ts
      main_dur_ms: main_dur_ms
      render_start_ts: render_start_ts
      render_end_ts: render_end_ts
      render_dur_ms: render_dur_ms
      package: process_name
      pid: pid
      frame_id: frame_id
      frame_index: frame_index
      jank_type: jank_type
      dur_ms: dur_ms
      session_id: session_id
      layer_name: layer_name
      token_gap: token_gap
      vsync_missed: vsync_missed
      jank_responsibility: jank_responsibility
      jank_cause: jank_cause

  # ==========================================================================
  # Root Cause Classification - Aggregate analysis for final conclusion
  # ==========================================================================
  # 综合所有分析数据，给出最终的根因分类和结论
  # 输出: problem_category, problem_component, confidence, evidence
  - id: root_cause_classification
    type: atomic
    name: "根因分类"
    optional: true
    synthesize:
      role: conclusion
      fields:
        - key: problem_category
          label: 问题类别
        - key: problem_component
          label: 问题组件
        - key: confidence
          label: 置信度
          format: "{{value}}%"
      insights:
        - template: "根因分类：{{problem_category}} - {{problem_component}}"
    display:
      level: summary
      layer: overview
      title: "🎯 分析结论"
      columns:
        - name: problem_category
          label: "问题类别"
          type: enum
        - name: problem_component
          label: "问题组件"
          type: string
        - name: confidence
          label: "置信度"
          type: percentage
          format: percentage
        - name: root_cause_summary
          label: "根因总结"
          type: string
        - name: suggestion
          label: "优化建议"
          type: string
    sql: |
      WITH
      -- 从 VSYNC-sf + BufferTX 获取真实掉帧责任（与 performance_summary 保持同口径）
      vsync_intervals AS (
        SELECT
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_config AS (
        SELECT
          COALESCE(
            (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER)
             FROM vsync_intervals
             WHERE interval_ns > 4000000 AND interval_ns < 50000000),
            8333333
          ) as vsync_period_ns
      ),
      vsync_events AS (
        SELECT
          c.ts as vsync_ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND (${start_ts} IS NULL OR c.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      buffer_events AS (
        SELECT c.ts, c.value as buffer_count
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name LIKE '%BufferTX%'
          AND (t.name LIKE '%${package}%' OR '${package}' = '')
          AND (${end_ts} IS NULL OR c.ts < ${end_ts})
      ),
      vsync_with_buffer AS (
        SELECT
          v.vsync_ts,
          v.interval_ns,
          (SELECT b.buffer_count
           FROM buffer_events b
           WHERE b.ts <= v.vsync_ts
           ORDER BY b.ts DESC
           LIMIT 1
          ) as buffer_at_vsync,
          -- 查找覆盖此 VSYNC 时刻的帧的 jank_type（±20ms 容差）
          (SELECT a.jank_type
           FROM actual_frame_timeline_slice a
           LEFT JOIN process p ON a.upid = p.upid
           WHERE (p.name GLOB '${package}*' OR '${package}' = '')
             AND p.name NOT LIKE '/system/%'
             AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
             AND a.ts <= v.vsync_ts AND a.ts + a.dur >= v.vsync_ts - 20000000
           ORDER BY ABS(a.ts + a.dur / 2 - v.vsync_ts)
           LIMIT 1
          ) as frame_jank_type
        FROM vsync_events v
        WHERE v.interval_ns IS NOT NULL
      ),
      vsync_jank AS (
        SELECT
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5 THEN 1 ELSE 0 END) as total_jank_count,
          -- App jank: jank_type 优先，BufferTX 补充
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
                     AND (
                       frame_jank_type IN ('Self Jank', 'App Deadline Missed')
                       OR (frame_jank_type IS NULL AND buffer_at_vsync = 0)
                       OR (buffer_at_vsync = 0 AND frame_jank_type NOT GLOB '*SurfaceFlinger*')
                     ) THEN 1 ELSE 0 END) as app_jank_count,
          -- SF jank: 仅当 jank_type 明确标记 SF
          SUM(CASE WHEN interval_ns > (SELECT vsync_period_ns FROM vsync_config) * 1.5
                     AND frame_jank_type GLOB '*SurfaceFlinger*'
                     THEN 1 ELSE 0 END) as sf_jank_count
        FROM vsync_with_buffer
        WHERE buffer_at_vsync IS NOT NULL
      ),
      app_frames AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN jank_type != 'None' THEN 1 ELSE 0 END) as app_reported_jank,
          AVG(CASE WHEN dur > 0 THEN dur ELSE NULL END) / 1e6 as avg_dur_ms,
          MAX(CASE WHEN dur > 0 THEN dur ELSE NULL END) / 1e6 as max_dur_ms
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND (${start_ts} IS NULL OR a.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR a.ts < ${end_ts})
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      jank_stats AS (
        SELECT
          (SELECT total_frames FROM app_frames) as total_frames,
          (SELECT app_reported_jank FROM app_frames) as app_reported_jank,
          COALESCE((SELECT app_jank_count FROM vsync_jank), 0) as app_jank,
          COALESCE((SELECT sf_jank_count FROM vsync_jank), 0) as sf_jank,
          COALESCE((SELECT sf_jank_count FROM vsync_jank), 0) as buffer_jank,
          (SELECT avg_dur_ms FROM app_frames) as avg_dur_ms,
          (SELECT max_dur_ms FROM app_frames) as max_dur_ms,
          ROUND((SELECT vsync_period_ns FROM vsync_config) / 1e6, 2) as frame_budget_ms
      ),
      -- 主线程四象限分析
      main_thread_analysis AS (
        SELECT
          SUM(CASE WHEN ts.state = 'Running' AND COALESCE(ct.core_type, 'little') IN ('prime', 'big') THEN ts.dur ELSE 0 END) as q1_big_core_ns,
          SUM(CASE WHEN ts.state = 'Running' AND COALESCE(ct.core_type, 'little') IN ('medium', 'little') THEN ts.dur ELSE 0 END) as q2_small_core_ns,
          SUM(CASE WHEN ts.state = 'R' THEN ts.dur ELSE 0 END) as q3_runnable_ns,
          SUM(CASE WHEN ts.state IN ('S', 'D', 'I') THEN ts.dur ELSE 0 END) as q4_sleep_ns,
          SUM(ts.dur) as total_dur_ns
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        LEFT JOIN _cpu_topology ct ON ts.cpu = ct.cpu_id
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND t.tid = p.pid
          AND (${start_ts} IS NULL OR ts.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ts.ts < ${end_ts})
      ),
      -- RenderThread 分析
      render_thread_analysis AS (
        SELECT
          SUM(CASE WHEN ts.state = 'Running' AND COALESCE(ct.core_type, 'little') IN ('prime', 'big') THEN ts.dur ELSE 0 END) as q1_big_core_ns,
          SUM(CASE WHEN ts.state = 'Running' AND COALESCE(ct.core_type, 'little') IN ('medium', 'little') THEN ts.dur ELSE 0 END) as q2_small_core_ns,
          SUM(CASE WHEN ts.state = 'R' THEN ts.dur ELSE 0 END) as q3_runnable_ns,
          SUM(CASE WHEN ts.state IN ('S', 'D', 'I') THEN ts.dur ELSE 0 END) as q4_sleep_ns,
          SUM(ts.dur) as total_dur_ns
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        LEFT JOIN _cpu_topology ct ON ts.cpu = ct.cpu_id
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND p.name NOT LIKE '/system/%'
          AND t.name = 'RenderThread'
          AND (${start_ts} IS NULL OR ts.ts >= ${start_ts})
          AND (${end_ts} IS NULL OR ts.ts < ${end_ts})
      ),
      -- 计算主线程各象限百分比
      main_pct AS (
        SELECT
          ROUND(100.0 * q1_big_core_ns / NULLIF(total_dur_ns, 0), 1) as q1_pct,
          ROUND(100.0 * q2_small_core_ns / NULLIF(total_dur_ns, 0), 1) as q2_pct,
          ROUND(100.0 * q3_runnable_ns / NULLIF(total_dur_ns, 0), 1) as q3_pct,
          ROUND(100.0 * q4_sleep_ns / NULLIF(total_dur_ns, 0), 1) as q4_pct
        FROM main_thread_analysis
      ),
      -- 计算 RenderThread 各象限百分比
      render_pct AS (
        SELECT
          ROUND(100.0 * q1_big_core_ns / NULLIF(total_dur_ns, 0), 1) as q1_pct,
          ROUND(100.0 * q2_small_core_ns / NULLIF(total_dur_ns, 0), 1) as q2_pct,
          ROUND(100.0 * q3_runnable_ns / NULLIF(total_dur_ns, 0), 1) as q3_pct,
          ROUND(100.0 * q4_sleep_ns / NULLIF(total_dur_ns, 0), 1) as q4_pct
        FROM render_thread_analysis
      ),
      -- Binder 调用统计
      binder_stats AS (
        SELECT
          COUNT(*) as total_calls,
          SUM(client_dur) / 1e6 as total_dur_ms,
          MAX(client_dur) / 1e6 as max_dur_ms,
          AVG(client_dur) / 1e6 as avg_dur_ms
        FROM android_binder_txns
        WHERE (client_process GLOB '${package}*' OR '${package}' = '')
          AND (${start_ts} IS NULL OR client_ts >= ${start_ts})
          AND (${end_ts} IS NULL OR client_ts < ${end_ts})
      ),
      -- 综合分析
      analysis AS (
        SELECT
          (SELECT total_frames FROM jank_stats) as total_frames,
          (SELECT app_jank FROM jank_stats) as app_jank,
          (SELECT sf_jank FROM jank_stats) as sf_jank,
          (SELECT buffer_jank FROM jank_stats) as buffer_jank,
          (SELECT avg_dur_ms FROM jank_stats) as avg_dur_ms,
          (SELECT max_dur_ms FROM jank_stats) as max_dur_ms,
          (SELECT frame_budget_ms FROM jank_stats) as frame_budget_ms,
          (SELECT q3_pct FROM main_pct) as main_q3_pct,
          (SELECT q4_pct FROM main_pct) as main_q4_pct,
          (SELECT q2_pct FROM main_pct) as main_q2_pct,
          (SELECT q4_pct FROM render_pct) as render_q4_pct,
          (SELECT total_dur_ms FROM binder_stats) as binder_total_ms,
          (SELECT max_dur_ms FROM binder_stats) as binder_max_ms
      )
      SELECT
        -- 问题分类: APP / SYSTEM / MIXED
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 'SYSTEM'
          WHEN (SELECT app_jank FROM analysis) > (SELECT sf_jank FROM analysis) * 2 THEN 'APP'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN 'SYSTEM'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN 'MIXED'
          WHEN (SELECT app_jank FROM analysis) > 0 THEN 'APP'
          ELSE 'UNKNOWN'
        END as problem_category,
        -- 问题组件
        -- 注意：MAIN_THREAD_BLOCKING (休眠/阻塞) 与 MAIN_THREAD (耗时操作) 是互斥的
        -- Q4 > 30% 表示主线程大部分时间在等待，问题是"阻塞"
        -- 只有 Q4 <= 30% 且 avg_dur 超过当前 VSync 预算，才判定为"主线程耗时操作"
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 'SURFACE_FLINGER'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN 'CPU_SCHEDULING'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN 'BINDER'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN 'MAIN_THREAD_BLOCKING'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN 'RENDER_THREAD'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN 'CPU_AFFINITY'
          WHEN (SELECT avg_dur_ms FROM analysis) > COALESCE((SELECT frame_budget_ms FROM analysis), 8.33)
               AND COALESCE((SELECT main_q4_pct FROM analysis), 0) <= 30 THEN 'MAIN_THREAD'
          ELSE 'UNKNOWN'
        END as problem_component,
        -- 置信度 (0-1)
        CASE
          WHEN (SELECT total_frames FROM analysis) < 10 THEN 0.3
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN 0.9
          WHEN (SELECT app_jank FROM analysis) > (SELECT sf_jank FROM analysis) * 2 THEN 0.85
          WHEN (SELECT main_q3_pct FROM analysis) > 20 THEN 0.8
          WHEN (SELECT main_q4_pct FROM analysis) > 40 THEN 0.8
          ELSE 0.6
        END as confidence,
        -- 根因总结
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN
            '系统级问题: SurfaceFlinger 处理异常，导致 ' || (SELECT sf_jank FROM analysis) || ' 帧掉帧'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN
            '系统级问题: CPU 调度拥堵，主线程 ' || (SELECT main_q3_pct FROM analysis) || '% 时间在等待调度'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN
            '跨进程阻塞: Binder 调用最大耗时 ' || ROUND((SELECT binder_max_ms FROM analysis), 1) || 'ms'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN
            '主线程阻塞: ' || (SELECT main_q4_pct FROM analysis) || '% 时间在休眠/等待'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN
            'RenderThread 等待: ' || (SELECT render_q4_pct FROM analysis) || '% 时间在休眠'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN
            'CPU 亲和性问题: 主线程 ' || (SELECT main_q2_pct FROM analysis) || '% 时间运行在小核'
          WHEN (SELECT app_jank FROM analysis) > 0 THEN
            '应用级问题: ' || (SELECT app_jank FROM analysis) || ' 帧因应用原因掉帧，平均帧耗时 ' || ROUND((SELECT avg_dur_ms FROM analysis), 1) || 'ms'
          ELSE
            '分析数据不足，建议查看详细帧数据'
        END as root_cause_summary,
        -- 证据列表 (JSON 数组)
        '[' ||
          '"总帧数: ' || (SELECT total_frames FROM analysis) || '",' ||
          '"App 掉帧: ' || (SELECT app_jank FROM analysis) || '",' ||
          '"SF 掉帧: ' || (SELECT sf_jank FROM analysis) || '",' ||
          '"主线程 Q3 (等待调度): ' || COALESCE((SELECT main_q3_pct FROM analysis), 0) || '%",' ||
          '"主线程 Q4 (休眠阻塞): ' || COALESCE((SELECT main_q4_pct FROM analysis), 0) || '%",' ||
          '"Binder 最大耗时: ' || COALESCE(ROUND((SELECT binder_max_ms FROM analysis), 1), 0) || 'ms"' ||
        ']' as evidence,
        -- 优化建议
        CASE
          WHEN (SELECT sf_jank FROM analysis) > (SELECT app_jank FROM analysis) * 2 THEN
            '检查系统负载和 SurfaceFlinger 状态'
          WHEN (SELECT main_q3_pct FROM analysis) > 15 THEN
            '减少后台任务，考虑提高主线程优先级'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 AND (SELECT binder_max_ms FROM analysis) > 5 THEN
            '优化 Binder 调用，考虑异步化或缓存'
          WHEN (SELECT main_q4_pct FROM analysis) > 30 THEN
            '检查主线程阻塞原因 (IO/锁/Binder)'
          WHEN (SELECT render_q4_pct FROM analysis) > 50 THEN
            '优化绘制流程，减少主线程耗时操作'
          WHEN (SELECT main_q2_pct FROM analysis) > 50 THEN
            '考虑使用 setThreadAffinity 或提高线程优先级'
          ELSE
            '查看详细帧分析，定位具体问题'
        END as suggestion
    save_as: conclusion
    condition: "frame_timeline.data[0]?.has_frame_timeline === 1 && (perf_summary?.data?.[0]?.total_frames || 0) > 0 && enable_frame_details === true"

  # ==========================================================================
  # Fallback: 当 FrameTimeline 数据不可用时提供基础信息
  # ==========================================================================
  - id: fallback_no_frame_timeline
    type: atomic
    name: "数据源不可用提示"
    condition: "frame_timeline.data[0]?.has_frame_timeline === 0"
    display:
      level: summary
      layer: overview
      title: "滑动分析 - 数据源缺失"
      columns:
        - name: status
          label: "状态"
          type: string
        - name: missing_table
          label: "缺失数据表"
          type: string
        - name: suggestion
          label: "建议"
          type: string
    sql: |
      SELECT
        '⚠️ 无法执行帧分析' as status,
        'actual_frame_timeline_slice' as missing_table,
        '请确保 trace 采集时启用了 Frame Timeline (需要 Android 12+ 且开启 Choreographer tracing)' as suggestion
      UNION ALL
      SELECT
        'ℹ️ 可用替代方案' as status,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type='table' AND name='frame_slice') THEN 'frame_slice (可用)'
          ELSE 'frame_slice (不可用)'
        END as missing_table,
        '可尝试使用 frame_slice 进行基础帧耗时分析' as suggestion
    save_as: fallback_info

output:
  format: layered
  default_expanded: [overview, list]
  # 结论输出映射
  conclusion:
    category: $conclusion.problem_category
    component: $conclusion.problem_component
    confidence: $conclusion.confidence
    summary: $conclusion.root_cause_summary
    evidence: $conclusion.evidence
    suggestion: $conclusion.suggestion
