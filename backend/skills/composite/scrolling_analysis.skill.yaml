name: scrolling_analysis
version: "3.1"
type: composite

meta:
  display_name: "滑动性能分析"
  description: "基于 Perfetto FrameTimeline 的滑动分析，分层展示：概览 → 区间 → 帧详情"
  icon: "swipe"
  tags: [scrolling, jank, fps, frames, layered]

triggers:
  keywords:
    zh: [滑动, 卡顿, 帧率, 掉帧, 丢帧, FPS, 流畅度, 列表滑动, fling]
    en: [scroll, jank, fps, frame, fling, stutter, smoothness, list]
  patterns:
    - ".*滑动.*卡.*"
    - ".*scroll.*jank.*"
    - ".*帧率.*"

prerequisites:
  modules:
    - android.frames.timeline

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选，不填则分析所有应用）"

steps:
  # ==========================================================================
  # L1: 环境配置检测 - Vsync/刷新率
  # ==========================================================================
  - id: vsync_config
    type: atomic
    name: "Vsync 配置"
    display:
      level: summary
      layer: overview
      title: "显示配置"
    sql: |
      WITH
      -- 方法1: 从 SurfaceFlinger 的 VSYNC slice 推算周期 (最可靠)
      sf_vsync_intervals AS (
        SELECT
          s.ts,
          LEAD(s.ts) OVER (ORDER BY s.ts) - s.ts AS interval_ns
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name = 'surfaceflinger' OR p.name LIKE '%surfaceflinger%')
          AND (s.name GLOB '*VSYNC*' OR s.name GLOB '*vsync-sf*' OR s.name GLOB '*vsync-app*')
        LIMIT 500
      ),
      sf_vsync AS (
        SELECT
          CAST(AVG(interval_ns) AS INTEGER) as vsync_period_ns,
          'sf_vsync_slice' as source
        FROM sf_vsync_intervals
        WHERE interval_ns > 5000000 AND interval_ns < 30000000
      ),
      -- 方法2: 从 expected_frame_timeline_slice 推算 vsync 周期
      expected_frame_vsync AS (
        SELECT
          CAST(AVG(dur) AS INTEGER) as vsync_period_ns,
          'expected_frame' as source
        FROM expected_frame_timeline_slice
        WHERE dur > 5000000 AND dur < 20000000
        LIMIT 1000
      ),
      combined AS (
        SELECT vsync_period_ns, source FROM sf_vsync WHERE vsync_period_ns > 0
        UNION ALL
        SELECT vsync_period_ns, source FROM expected_frame_vsync WHERE vsync_period_ns > 0
      ),
      frame_count AS (
        SELECT COUNT(*) as total_frames
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.surface_frame_token IS NOT NULL
      )
      SELECT
        COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) as vsync_period_ns,
        ROUND(1e9 / COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666), 0) as refresh_rate_hz,
        ROUND(COALESCE((SELECT vsync_period_ns FROM combined LIMIT 1), 16666666) / 1e6, 2) as vsync_period_ms,
        COALESCE((SELECT source FROM combined LIMIT 1), 'default') as vsync_source,
        (SELECT total_frames FROM frame_count) as total_frames,
        CASE WHEN (SELECT total_frames FROM frame_count) > 0 THEN 1 ELSE 0 END as has_data
    save_as: environment

  # ==========================================================================
  # L1: 帧性能汇总 (基于 SF 消费端计算 FPS)
  # ==========================================================================
  - id: performance_summary
    type: atomic
    name: "帧性能汇总"
    display:
      level: summary
      layer: overview
      title: "滑动性能概览"
    sql: |
      WITH 
      time_range AS (
        SELECT 
          MIN(a.ts) as start_ts,
          MAX(a.ts + a.dur) as end_ts,
          MAX(a.ts + a.dur) - MIN(a.ts) as duration_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.surface_frame_token IS NOT NULL
      ),
      frame_stats AS (
        SELECT
          COUNT(*) as total_frames,
          SUM(CASE WHEN a.jank_type != 'None' THEN 1 ELSE 0 END) as janky_frames,
          SUM(CASE WHEN a.jank_type GLOB '*App*' OR a.jank_type = 'Self Jank' THEN 1 ELSE 0 END) as app_janky_frames,
          SUM(CASE WHEN a.jank_type GLOB '*SurfaceFlinger*' THEN 1 ELSE 0 END) as sf_janky_frames,
          SUM(CASE WHEN a.jank_type GLOB '*Buffer*' THEN 1 ELSE 0 END) as buffer_janky_frames,
          AVG(a.dur) / 1e6 as avg_frame_dur_ms,
          MAX(a.dur) / 1e6 as max_frame_dur_ms,
          PERCENTILE(a.dur, 0.5) / 1e6 as median_frame_dur_ms,
          PERCENTILE(a.dur, 0.95) / 1e6 as p95_frame_dur_ms,
          PERCENTILE(a.dur, 0.99) / 1e6 as p99_frame_dur_ms
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.surface_frame_token IS NOT NULL
      ),
      frame_intervals AS (
        SELECT
          a.ts - LAG(a.ts) OVER (ORDER BY a.ts) as interval_ns
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.surface_frame_token IS NOT NULL
          AND a.jank_type = 'None'
      ),
      fps_stats AS (
        SELECT
          AVG(interval_ns) as avg_interval_ns,
          PERCENTILE(interval_ns, 0.5) as median_interval_ns
        FROM frame_intervals
        WHERE interval_ns IS NOT NULL
          AND interval_ns > 5000000
          AND interval_ns < 100000000
      )
      SELECT
        (SELECT total_frames FROM frame_stats) as total_frames,
        (SELECT janky_frames FROM frame_stats) as janky_frames,
        (SELECT app_janky_frames FROM frame_stats) as app_janky_frames,
        (SELECT sf_janky_frames FROM frame_stats) as sf_janky_frames,
        (SELECT buffer_janky_frames FROM frame_stats) as buffer_janky_frames,
        ROUND(100.0 * (SELECT janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0), 2) as jank_rate,
        ROUND(100.0 * (SELECT app_janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0), 2) as app_jank_rate,
        ROUND(100.0 * (SELECT sf_janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0), 2) as sf_jank_rate,
        ROUND((SELECT avg_frame_dur_ms FROM frame_stats), 2) as avg_frame_dur_ms,
        ROUND((SELECT max_frame_dur_ms FROM frame_stats), 2) as max_frame_dur_ms,
        ROUND((SELECT median_frame_dur_ms FROM frame_stats), 2) as median_frame_dur_ms,
        ROUND((SELECT p95_frame_dur_ms FROM frame_stats), 2) as p95_frame_dur_ms,
        ROUND((SELECT p99_frame_dur_ms FROM frame_stats), 2) as p99_frame_dur_ms,
        ROUND((SELECT duration_ns FROM time_range) / 1e9, 2) as duration_sec,
        ROUND(1e9 * (SELECT total_frames FROM frame_stats) / NULLIF((SELECT duration_ns FROM time_range), 0), 1) as actual_fps,
        ROUND(1e9 / NULLIF((SELECT median_interval_ns FROM fps_stats), 0), 1) as smooth_fps,
        CASE
          WHEN 100.0 * (SELECT janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0) < 1 THEN '优秀'
          WHEN 100.0 * (SELECT janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0) < 5 THEN '良好'
          WHEN 100.0 * (SELECT janky_frames FROM frame_stats) / NULLIF((SELECT total_frames FROM frame_stats), 0) < 15 THEN '一般'
          ELSE '较差'
        END as rating,
        'sf_consumption' as fps_source
      FROM frame_stats
      LIMIT 1
    save_as: perf_summary
    condition: "environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L1: 掉帧类型统计
  # ==========================================================================
  - id: jank_type_stats
    type: atomic
    name: "掉帧类型统计"
    display:
      level: summary
      layer: overview
      title: "掉帧类型分布"
    sql: |
      SELECT
        a.jank_type,
        COUNT(*) as count,
        ROUND(SUM(a.dur) / 1e6, 2) as total_dur_ms,
        ROUND(AVG(a.dur) / 1e6, 2) as avg_dur_ms,
        CASE
          WHEN a.jank_type GLOB '*App*' OR a.jank_type = 'Self Jank' THEN '应用'
          WHEN a.jank_type GLOB '*SurfaceFlinger*' THEN 'SF'
          WHEN a.jank_type GLOB '*Buffer*' THEN '缓冲区'
          ELSE '其他'
        END as responsibility
      FROM actual_frame_timeline_slice a
      LEFT JOIN process p ON a.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND a.jank_type != 'None'
        AND a.surface_frame_token IS NOT NULL
      GROUP BY a.jank_type
      ORDER BY count DESC
      LIMIT 10
    save_as: jank_stats
    condition: "environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 滑动区间列表
  # ==========================================================================
  - id: scroll_sessions
    type: atomic
    name: "滑动区间列表"
    display:
      level: detail
      layer: list
      title: "滑动区间"
    sql: |
      WITH frame_gaps AS (
        SELECT
          a.display_frame_token as frame_id,
          a.ts,
          a.dur,
          a.upid,
          p.name as process_name,
          LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as prev_end,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as gap_ns
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.dur > 0
          AND a.surface_frame_token IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      )
      SELECT
        session_id,
        process_name,
        printf('%d', MIN(ts)) as start_ts,
        printf('%d', MAX(ts + dur)) as end_ts,
        COUNT(*) as frame_count,
        ROUND((MAX(ts + dur) - MIN(ts)) / 1e6, 1) as duration_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_frame_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_frame_ms,
        ROUND(1e9 * COUNT(*) / NULLIF(MAX(ts + dur) - MIN(ts), 0), 1) as session_fps
      FROM sessions
      GROUP BY upid, session_id
      HAVING COUNT(*) >= 10
        AND (MAX(ts + dur) - MIN(ts)) > 200000000
      ORDER BY MIN(ts)
      LIMIT 20
    save_as: sessions
    condition: "environment.data[0]?.has_data === 1"

  # ==========================================================================
  # L2: 区间掉帧统计
  # ==========================================================================
  - id: session_jank
    type: atomic
    name: "区间掉帧统计"
    display:
      level: detail
      layer: list
      title: "区间掉帧"
    sql: |
      WITH frame_gaps AS (
        SELECT
          a.ts, a.dur, a.upid,
          p.name as process_name,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as gap_ns
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND a.dur > 0
          AND a.surface_frame_token IS NOT NULL
      ),
      session_markers AS (
        SELECT *,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM frame_gaps
      ),
      sessions_raw AS (
        SELECT *,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      sessions AS (
        SELECT
          session_id,
          process_name,
          MIN(ts) as start_ts,
          MAX(ts + dur) as end_ts,
          COUNT(*) as frame_count
        FROM sessions_raw
        GROUP BY upid, session_id
        HAVING COUNT(*) >= 10
          AND (MAX(ts + dur) - MIN(ts)) > 200000000
      )
      SELECT
        s.session_id,
        s.frame_count,
        COUNT(a.id) as janky_count,
        ROUND(100.0 * COUNT(a.id) / NULLIF(s.frame_count, 0), 2) as jank_rate,
        GROUP_CONCAT(DISTINCT a.jank_type) as jank_types
      FROM sessions s
      LEFT JOIN actual_frame_timeline_slice a ON
        a.ts >= s.start_ts AND a.ts <= s.end_ts
        AND a.jank_type != 'None'
        AND a.surface_frame_token IS NOT NULL
      LEFT JOIN process p ON a.upid = p.upid AND p.name = s.process_name
      GROUP BY s.session_id
      ORDER BY s.session_id
    save_as: session_jank_data
    optional: true

  # ==========================================================================
  # 内部步骤：获取应用掉帧帧列表
  # ==========================================================================
  - id: get_app_jank_frames
    type: atomic
    name: "获取应用掉帧帧"
    sql: |
      WITH all_frames AS (
        SELECT
          a.ts,
          a.upid,
          a.ts - LAG(a.ts + a.dur) OVER (PARTITION BY a.upid ORDER BY a.ts) as gap_ns
        FROM actual_frame_timeline_slice a
        WHERE a.surface_frame_token IS NOT NULL
      ),
      session_markers AS (
        SELECT 
          ts, 
          upid,
          CASE WHEN gap_ns IS NULL OR gap_ns > 100000000 THEN 1 ELSE 0 END as new_session
        FROM all_frames
      ),
      sessions_map AS (
        SELECT 
          ts, 
          upid,
          SUM(new_session) OVER (PARTITION BY upid ORDER BY ts) as session_id
        FROM session_markers
      ),
      jank_frames AS (
        SELECT
          a.display_frame_token as frame_id,
          a.upid,
          a.ts as actual_start,
          a.ts + a.dur as actual_end,
          a.dur as actual_dur,
          a.jank_type,
          a.jank_severity_type,
          a.layer_name,
          sm.session_id
        FROM actual_frame_timeline_slice a
        JOIN sessions_map sm ON a.ts = sm.ts AND a.upid = sm.upid
        WHERE a.surface_frame_token IS NOT NULL
          AND (a.jank_type GLOB '*App*' OR a.jank_type = 'Self Jank' 
               OR a.jank_type GLOB '*Buffer*' OR a.jank_type GLOB '*Deadline*')
      ),
      frame_thread_info AS (
        SELECT
          jf.frame_id,
          jf.upid,
          jf.actual_start,
          jf.actual_end,
          jf.actual_dur,
          jf.jank_type,
          jf.jank_severity_type,
          jf.layer_name,
          jf.session_id,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
             AND s.name LIKE 'Choreographer#doFrame%'
          ) as main_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.tid = p.pid
             AND s.ts >= jf.actual_start - 5000000
             AND s.ts <= jf.actual_end
          ) as main_end_ts,
          (SELECT MIN(s.ts) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_start_ts,
          (SELECT MAX(s.ts + s.dur) FROM slice s
           JOIN thread_track tt ON s.track_id = tt.id
           JOIN thread t ON tt.utid = t.utid
           JOIN process p ON t.upid = p.upid
           WHERE p.upid = jf.upid AND t.name = 'RenderThread'
             AND s.ts >= jf.actual_start
             AND s.ts <= jf.actual_end
          ) as render_end_ts
        FROM jank_frames jf
      )
      ,
      ranked_frames AS (
        SELECT
          fti.frame_id,
          fti.actual_start,
          fti.actual_end,
          fti.main_start_ts,
          fti.main_end_ts,
          fti.render_start_ts,
          fti.render_end_ts,
          fti.actual_dur,
          fti.jank_type,
          fti.jank_severity_type,
          fti.layer_name,
          fti.session_id,
          p.name as process_name,
          p.pid,
          p.upid,
          ROW_NUMBER() OVER (PARTITION BY fti.session_id ORDER BY fti.actual_dur DESC) as rank_in_session
        FROM frame_thread_info fti
        JOIN process p ON fti.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
      )
      SELECT
        frame_id,
        printf('%d', actual_start) as start_ts,
        printf('%d', actual_end) as end_ts,
        printf('%d', COALESCE(main_start_ts, actual_start)) as main_start_ts,
        printf('%d', COALESCE(main_end_ts, actual_end)) as main_end_ts,
        ROUND(COALESCE(main_end_ts - main_start_ts, 0) / 1e6, 2) as main_dur_ms,
        printf('%d', COALESCE(render_start_ts, actual_start)) as render_start_ts,
        printf('%d', COALESCE(render_end_ts, actual_end)) as render_end_ts,
        ROUND(COALESCE(render_end_ts - render_start_ts, 0) / 1e6, 2) as render_dur_ms,
        actual_dur / 1e6 as dur_ms,
        jank_type,
        jank_severity_type,
        layer_name,
        process_name,
        pid,
        session_id,
        ROW_NUMBER() OVER (ORDER BY session_id, actual_start) as frame_index
      FROM ranked_frames
      WHERE rank_in_session <= 15
      ORDER BY session_id, actual_start
    save_as: app_jank_frames
    condition: "perf_summary.data[0]?.app_janky_frames > 0"

  # ==========================================================================
  # L4: 逐帧详细分析 (Iterator)
  # ==========================================================================
  - id: analyze_jank_frames
    type: iterator
    name: "逐帧详细分析"
    display:
      level: key
      layer: deep
      title: "帧详细分析"
    source: app_jank_frames
    max_items: 50
    item_skill: jank_frame_detail
    item_params:
      start_ts: start_ts
      end_ts: end_ts
      main_start_ts: main_start_ts
      main_end_ts: main_end_ts
      main_dur_ms: main_dur_ms
      render_start_ts: render_start_ts
      render_end_ts: render_end_ts
      render_dur_ms: render_dur_ms
      package: process_name
      pid: pid
      frame_id: frame_id
      frame_index: frame_index
      jank_type: jank_type
      dur_ms: dur_ms
      session_id: session_id
      layer_name: layer_name

output:
  format: layered
  default_expanded: [L1, L2]
