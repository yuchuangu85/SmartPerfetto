# =============================================================================
# 卡顿帧分析（组合 Skill）
# =============================================================================
# 深度分析单个卡顿帧的原因

name: janky_frame_analysis
version: "2.0"
type: composite
category: rendering

meta:
  display_name: "卡顿帧分析"
  description: "深度分析单个卡顿帧的卡顿原因"
  icon: "bug_report"
  tags: [jank, frame, composite]

prerequisites:
  required_tables:
    - actual_frame_timeline_slice

inputs:
  - name: frame_ts
    type: timestamp
    required: true
    description: "帧开始时间戳(ns)"
  - name: frame_dur
    type: duration
    required: true
    description: "帧持续时间(ns)"
  - name: package
    type: string
    required: false

context:
  - vsync_period_ns
  - refresh_rate_hz

steps:
  # 并行执行多个分析
  - id: parallel_analysis
    type: parallel
    display:
      level: detail
      layer: deep
    steps:
      - id: cpu
        skill: cpu_slice_analysis
        params:
          start_ts: "${frame_ts}"
          end_ts: "${frame_ts} + ${frame_dur}"
          package: "${package}"
        display: false

      - id: scheduling
        skill: scheduling_analysis
        params:
          start_ts: "${frame_ts}"
          end_ts: "${frame_ts} + ${frame_dur}"
          package: "${package}"
        display: false

      - id: binder
        skill: binder_in_range
        params:
          start_ts: "${frame_ts}"
          end_ts: "${frame_ts} + ${frame_dur}"
          package: "${package}"
        display: false

  # 诊断推理
  - id: diagnose
    type: diagnostic
    display:
      level: key
      layer: deep
      title: "帧诊断结果"
    inputs: [cpu, scheduling, binder]
    ai_assist: false  # 禁用：逐帧 AI 调用导致 N×LLM，由 conclusion 阶段统一总结
    rules:
      # CPU 密集型
      - condition: "cpu.data?.[0]?.total_cpu_ms > ${frame_dur} / 1e6 * 0.8"
        diagnosis: "主线程CPU密集"
        confidence: high
        suggestions:
          - "检查是否有复杂计算在主线程执行"
          - "考虑将耗时操作移至后台线程"

      # Binder 阻塞
      - condition: "binder.data?.[0]?.max_delay_ms > 10"
        diagnosis: "Binder调用阻塞"
        confidence: high
        suggestions:
          - "检查是否有同步Binder调用"
          - "考虑使用异步IPC"

      # 调度延迟
      - condition: "scheduling.data?.[0]?.max_runnable_ms > 5"
        diagnosis: "线程调度延迟"
        confidence: medium
        suggestions:
          - "检查系统CPU负载是否过高"
          - "考虑调整线程优先级"

      # 睡眠等待
      - condition: "scheduling.data?.[0]?.sleeping_ms > ${frame_dur} / 1e6 * 0.5"
        diagnosis: "线程睡眠等待"
        confidence: medium
        suggestions:
          - "检查是否有锁竞争"
          - "检查是否在等待IO"

    fallback:
      type: ai_decision
      prompt: |
        无法通过规则确定卡顿原因，请分析：
        帧耗时: ${frame_dur} ns
        CPU数据: ${cpu}
        调度数据: ${scheduling}
        Binder数据: ${binder}

        请判断最可能的卡顿原因。

output:
  display:
    level: key
    format: summary
  fields:
    - name: frame_ts
      label: "时间戳"
    - name: frame_dur_ms
      label: "耗时(ms)"
    - name: diagnosis
      label: "诊断结论"
    - name: confidence
      label: "置信度"
