# =============================================================================
# Binder 分析 v2.2（组合 Skill）- 基于 Perfetto stdlib 优化版
# =============================================================================
# 使用 Perfetto stdlib 的 android_binder 系列表
#
# v2.2 新增：
# - Iterator 模式：逐个慢 Binder 事务详细分析
# - 大小核分析：Binder 期间 CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 状态分布
# - Perfetto 跳转链接：点击跳转到 Binder 事务区间
#
# 核心表：
# - android_binder_txns: Binder 事务基础信息
#   - is_main_thread: 是否主线程发起
#   - client_ts, client_dur, server_ts, server_dur
#   - aidl_name, aidl_interface
# - android_sync_binder_thread_state_by_txn: Binder 阻塞期间的线程状态

name: binder_analysis
version: "1.0"
type: composite
category: kernel

meta:
  display_name: "Binder 分析"
  description: "系统级 Binder 通信性能分析"
  icon: "link"
  tags: [binder, ipc, kernel, composite]

prerequisites:
  required_tables:
    - slice
  modules:
    - android.binder

triggers:
  keywords:
    zh: [Binder, IPC, 跨进程, 服务调用, AIDL, 进程通信]
    en: [binder, ipc, cross process, service call, aidl, transaction]
  patterns:
    - ".*[Bb]inder.*"
    - ".*IPC.*"
    - ".*跨进程.*"

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"
  - name: slow_binder_critical_ms
    type: number
    required: false
    default: 50
    description: "慢 Binder 严重阈值（ms）"
  - name: slow_binder_warning_ms
    type: number
    required: false
    default: 16
    description: "慢 Binder 警告阈值（ms）"
  - name: main_thread_txn_warning
    type: number
    required: false
    default: 50
    description: "主线程事务数告警阈值"
  - name: server_response_warning_ms
    type: number
    required: false
    default: 20
    description: "服务端响应告警阈值（ms）"

steps:
  # ========== 检查 Binder 数据 ==========
  - id: check_binder
    type: atomic
    name: "检查 Binder 数据"
    optional: true
    display:
      level: summary
      layer: overview
      title: "数据检查"
      columns:
        - name: txn_count
          label: "事务数"
          type: number
          format: compact
        - name: status
          label: "状态"
          type: string
    sql: |
      SELECT
        COUNT(*) as txn_count,
        CASE WHEN COUNT(*) > 0 THEN 'available' ELSE 'unavailable' END as status
      FROM android_binder_txns
      WHERE (
          client_process GLOB '${package}*'
          OR server_process GLOB '${package}*'
          OR '${package}' = ''
        )
        AND (${start_ts} IS NULL OR client_ts + client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR client_ts < ${end_ts})
    save_as: binder_check

  # ========== 选择目标进程（让分析更聚焦）==========
  - id: get_process
    type: atomic
    name: "选择目标进程"
    display:
      level: summary
      layer: overview
      title: "目标进程"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: txn_count
          label: "事务数"
          type: number
          format: compact
        - name: total_client_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最长耗时"
          type: duration
          format: duration_ms
    sql: |
      SELECT
        bt.client_process as process_name,
        COUNT(*) as txn_count,
        ROUND(SUM(bt.client_dur) / 1e6, 2) as total_client_ms,
        ROUND(MAX(bt.client_dur) / 1e6, 2) as max_dur_ms
      FROM android_binder_txns bt
      WHERE (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
        AND (bt.client_process GLOB '${package}*' OR '${package}' = '')
      GROUP BY bt.client_process
      ORDER BY txn_count DESC, total_client_ms DESC
      LIMIT 1
    save_as: target_process
    condition: binder_check.data[0]?.status === 'available'

  # ========== Binder 概览（关联多个统计维度）==========
  - id: binder_overview
    type: atomic
    name: "Binder 概览"
    synthesize:
      role: overview
      fields:
        - key: total_txns
          label: 总事务数
        - key: main_thread_txns
          label: 主线程调用
        - key: avg_dur_ms
          label: 平均耗时
          format: "{{value}} ms"
        - key: rating
          label: 评级
      insights:
        - condition: "main_thread_slow_count > 5"
          template: "主线程有 {{main_thread_slow_count}} 次慢 Binder 调用 (>16ms)"
        - condition: "max_dur_ms > 100"
          template: "最长 Binder 调用 {{max_dur_ms}}ms，严重阻塞"
    display:
      level: key
      layer: overview
      title: "Binder 调用概览"
      columns:
        - name: total_txns
          label: "总事务数"
          type: number
          format: compact
        - name: sync_txns
          label: "同步事务"
          type: number
          format: compact
        - name: async_txns
          label: "异步事务"
          type: number
          format: compact
        - name: main_thread_txns
          label: "主线程调用"
          type: number
          format: compact
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: slow_calls_count
          label: "慢调用"
          type: number
        - name: rating
          label: "评级"
          type: string
    sql: |
      SELECT
        COUNT(*) as total_txns,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_txns,
        SUM(CASE WHEN is_sync = 0 THEN 1 ELSE 0 END) as async_txns,
        -- 使用正确的列名 is_main_thread
        SUM(CASE WHEN is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_txns,
        ROUND(AVG(client_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(client_dur) / 1e6, 2) as max_dur_ms,
        SUM(client_dur) / 1e6 as total_dur_ms,
        SUM(CASE WHEN client_dur / 1e6 > 10 THEN 1 ELSE 0 END) as slow_calls_count,
        -- 主线程慢调用
        SUM(CASE WHEN is_main_thread = 1 AND client_dur / 1e6 > 16 THEN 1 ELSE 0 END) as main_thread_slow_count,
        CASE
          WHEN MAX(client_dur) / 1e6 > ${slow_binder_critical_ms|50} * 2 THEN '严重'
          WHEN MAX(client_dur) / 1e6 > ${slow_binder_critical_ms|50} THEN '需优化'
          WHEN MAX(client_dur) / 1e6 > ${slow_binder_warning_ms|16} THEN '良好'
          ELSE '优秀'
        END as rating
      FROM android_binder_txns bt
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
    save_as: binder_overview
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== 发出的调用分析（按接口分组）==========
  - id: outgoing_by_interface
    type: atomic
    name: "发出的调用（按接口）"
    synthesize:
      role: list
      groupBy:
        - field: server_process
          title: 按服务进程分布
      fields:
        - key: aidl_interface
          label: AIDL 接口
        - key: call_count
          label: 调用次数
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms"
    display:
      level: key
      layer: overview
      title: "发出的 Binder 调用（按接口）"
      columns:
        - name: aidl_interface
          label: "AIDL 接口"
          type: string
        - name: server_process
          label: "服务进程"
          type: string
        - name: call_count
          label: "调用次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: main_thread_count
          label: "主线程调用"
          type: number
    sql: |
      SELECT
        COALESCE(bt.aidl_name, 'unknown') as aidl_interface,
        bt.server_process,
        COUNT(*) as call_count,
        SUM(bt.client_dur) / 1e6 as total_dur_ms,
        ROUND(AVG(bt.client_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(bt.client_dur) / 1e6, 2) as max_dur_ms,
        -- 主线程调用统计
        SUM(CASE WHEN bt.is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_count,
        SUM(CASE WHEN bt.is_main_thread = 1 THEN bt.client_dur ELSE 0 END) / 1e6 as main_thread_dur_ms,
        -- 同步/异步
        SUM(CASE WHEN bt.is_sync = 1 THEN 1 ELSE 0 END) as sync_count
      FROM android_binder_txns bt
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
      GROUP BY COALESCE(bt.aidl_name, 'unknown'), bt.server_process
      ORDER BY total_dur_ms DESC
      LIMIT 15
    save_as: outgoing_by_interface
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== 主线程同步 Binder（关键卡顿原因）==========
  - id: main_thread_sync_binder
    type: atomic
    name: "主线程同步 Binder"
    synthesize:
      role: list
      groupBy:
        - field: server_process
          title: 按服务进程分布
        - field: severity
          title: 按严重程度分布
      fields:
        - key: aidl_name
          label: AIDL 方法
        - key: dur_ms
          label: 耗时
          format: "{{value}} ms"
        - key: severity
          label: 严重程度
    display:
      level: key
      layer: list
      title: "主线程同步 Binder 调用（可能导致掉帧）"
      columns:
        - name: binder_ts
          label: "开始时间"
          type: timestamp
          clickAction: navigate_timeline
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: aidl_interface
          label: "AIDL 接口"
          type: string
        - name: process_name
          label: "客户端"
          type: string
        - name: severity
          label: "严重程度"
          type: enum
    sql: |
      SELECT
        bt.client_ts / 1e6 as ts_ms,
        ROUND(bt.client_dur / 1e6, 2) as dur_ms,
        bt.server_process,
        bt.aidl_name,
        COALESCE(bt.aidl_name, 'unknown') as aidl_interface,
        bt.client_process as process_name,
        -- 时间戳用于详细分析
        printf('%d', bt.client_ts) as binder_ts,
        printf('%d', bt.client_ts + bt.client_dur) as binder_end_ts,
        -- Perfetto 跳转参数（前后各扩展 10ms）
        printf('%d', CAST(bt.client_ts - 10000000 AS INTEGER)) as perfetto_start,
        printf('%d', CAST(bt.client_ts + bt.client_dur + 10000000 AS INTEGER)) as perfetto_end,
        CASE
          WHEN bt.client_dur / 1e6 > ${slow_binder_critical_ms|50} THEN 'critical'
          WHEN bt.client_dur / 1e6 > ${slow_binder_warning_ms|16} THEN 'warning'
          WHEN bt.client_dur / 1e6 > 8 THEN 'notice'
          ELSE 'normal'
        END as severity
      FROM android_binder_txns bt
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
        AND bt.is_sync = 1
        AND bt.is_main_thread = 1
      ORDER BY bt.client_dur DESC
      LIMIT 20
    save_as: main_thread_binder
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== Binder 阻塞分析（JOIN thread_state）==========
  - id: binder_blocking_analysis
    type: atomic
    name: "Binder 阻塞分析"
    optional: true
    display:
      level: key
      layer: list
      title: "Binder 阻塞期间状态分析"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: binder_dur_ms
          label: "Binder 耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: state
          label: "线程状态"
          type: string
        - name: blocked_function
          label: "阻塞函数"
          type: string
        - name: state_dur_ms
          label: "状态耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: state_percent
          label: "状态占比"
          type: percentage
          format: percentage
        - name: ts_str
          label: "时间"
          type: timestamp
          clickAction: navigate_timeline
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_name,
        bt.client_dur / 1e6 as binder_dur_ms,
        -- JOIN thread_state 分析阻塞期间的状态
        ts.state,
        ts.blocked_function,
        SUM(ts.dur) / 1e6 as state_dur_ms,
        ROUND(100.0 * SUM(ts.dur) / bt.client_dur, 1) as state_percent,
        printf('%d', bt.client_ts) as ts_str
      FROM android_binder_txns bt
      JOIN thread_state ts ON (
        ts.utid = bt.client_utid
        AND ts.ts >= bt.client_ts
        AND ts.ts < bt.client_ts + bt.client_dur
      )
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
        AND bt.is_main_thread = 1
        AND bt.client_dur > 5000000  -- > 5ms
      GROUP BY bt.client_ts, bt.client_utid, bt.server_process, bt.aidl_name, bt.client_dur, ts.state
      ORDER BY bt.client_dur DESC, state_dur_ms DESC
      LIMIT 30
    save_as: binder_blocking
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== 服务端响应分析（JOIN 服务进程）==========
  - id: server_response_analysis
    type: atomic
    name: "服务端响应分析"
    display:
      level: detail
      layer: list
      title: "服务端处理时间分析"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_interface
          label: "AIDL 接口"
          type: string
        - name: call_count
          label: "调用次数"
          type: number
          format: compact
        - name: total_client_wait_ms
          label: "客户端总等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_server_process_ms
          label: "服务端总处理"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_server_dur_ms
          label: "服务端平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_server_dur_ms
          label: "服务端最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_transport_overhead_ms
          label: "平均传输开销"
          type: duration
          format: duration_ms
          unit: ms
    sql: |
      SELECT
        bt.server_process,
        COALESCE(bt.aidl_name, 'unknown') as aidl_interface,
        COUNT(*) as call_count,
        -- 客户端等待 vs 服务端处理
        SUM(bt.client_dur) / 1e6 as total_client_wait_ms,
        SUM(bt.server_dur) / 1e6 as total_server_process_ms,
        ROUND(AVG(bt.server_dur) / 1e6, 2) as avg_server_dur_ms,
        ROUND(MAX(bt.server_dur) / 1e6, 2) as max_server_dur_ms,
        -- 传输开销 = client_dur - server_dur
        ROUND(AVG(bt.client_dur - bt.server_dur) / 1e6, 2) as avg_transport_overhead_ms
      FROM android_binder_txns bt
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
        AND bt.is_sync = 1
      GROUP BY bt.server_process, COALESCE(bt.aidl_name, 'unknown')
      ORDER BY total_client_wait_ms DESC
      LIMIT 15
    save_as: server_response
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== Binder 与帧关联分析（深度 JOIN）==========
  - id: binder_frame_correlation
    type: atomic
    name: "Binder 与帧关联"
    optional: true
    display:
      level: detail
      layer: list
      title: "Binder 调用与帧渲染关联"
      columns:
        - name: server_process
          label: "服务进程"
          type: string
        - name: aidl_name
          label: "AIDL 方法"
          type: string
        - name: binder_dur_ms
          label: "Binder 耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: frame_id
          label: "帧 ID"
          type: number
        - name: frame_dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: in_frame
          label: "帧内/帧外"
          type: string
    sql: |
      SELECT
        bt.server_process,
        bt.aidl_name,
        bt.client_dur / 1e6 as binder_dur_ms,
        -- 关联帧信息（如果可用）
        af.frame_id,
        af.dur / 1e6 as frame_dur_ms,
        -- 判断是否在帧期间
        CASE WHEN af.frame_id IS NOT NULL THEN '帧内' ELSE '帧外' END as in_frame
      FROM android_binder_txns bt
      LEFT JOIN android_frames af ON (
        bt.client_ts >= af.ts
        AND bt.client_ts < af.ts + af.dur
        AND af.upid = (
          SELECT upid FROM process WHERE name = '${target_process.data[0].process_name}' LIMIT 1
        )
      )
      WHERE bt.client_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
        AND bt.is_main_thread = 1
        AND bt.client_dur > 1000000  -- > 1ms
      ORDER BY bt.client_dur DESC
      LIMIT 20
    save_as: binder_frame
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== 接收的调用分析 ==========
  - id: incoming_calls
    type: atomic
    name: "接收的调用"
    display:
      level: summary
      layer: list
      title: "接收的 Binder 调用"
      columns:
        - name: client_process
          label: "客户端进程"
          type: string
        - name: aidl_interface
          label: "AIDL 接口"
          type: string
        - name: call_count
          label: "调用次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
    sql: |
      SELECT
        bt.client_process,
        COALESCE(bt.aidl_name, 'unknown') as aidl_interface,
        COUNT(*) as call_count,
        SUM(bt.server_dur) / 1e6 as total_dur_ms,
        ROUND(AVG(bt.server_dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(bt.server_dur) / 1e6, 2) as max_dur_ms
      FROM android_binder_txns bt
      WHERE bt.server_process = '${target_process.data[0].process_name}'
        AND (${start_ts} IS NULL OR bt.client_ts + bt.client_dur > ${start_ts})
        AND (${end_ts} IS NULL OR bt.client_ts < ${end_ts})
      GROUP BY bt.client_process, COALESCE(bt.aidl_name, 'unknown')
      ORDER BY total_dur_ms DESC
      LIMIT 15
    save_as: incoming_calls
    condition: binder_check.data[0]?.status === 'available' && target_process.data.length > 0

  # ========== 逐个慢 Binder 事务详细分析 ==========
  - id: analyze_slow_binder
    type: iterator
    name: "慢 Binder 详细分析"
    synthesize:
      role: clusters
      clusterBy: server_process
    display:
      level: key
      layer: deep
      title: "慢 Binder 事务详细分析"
    source: main_thread_binder
    item_skill: binder_detail
    item_params:
      binder_ts: binder_ts
      binder_end_ts: binder_end_ts
      dur_ms: dur_ms
      server_process: server_process
      aidl_name: aidl_name
      process_name: process_name
      perfetto_start: perfetto_start
      perfetto_end: perfetto_end
    max_items: 10
    condition: main_thread_binder.data.length > 0

  # ========== Binder 诊断 ==========
  - id: binder_diagnosis
    type: diagnostic
    name: "Binder 诊断"
    synthesize:
      role: conclusion
      fields:
        - key: diagnosis
          label: 诊断结论
        - key: severity
          label: 严重程度
        - key: confidence
          label: 置信度
      insights:
        - template: "Binder 诊断：{{diagnosis}}"
    display:
      level: key
      layer: overview
      title: "问题诊断"
    inputs: [binder_overview, main_thread_binder, binder_blocking, server_response]
    rules:
      # 主线程慢 Binder
      - condition: "main_thread_binder.data[0]?.dur_ms > (inputs?.slow_binder_critical_ms ?? 50)"
        severity: critical
        diagnosis: "主线程存在严重慢 Binder 调用 (${main_thread_binder.data[0].dur_ms}ms)"
        confidence: high
        suggestions:
          - "将该 Binder 调用移到后台线程"
          - "检查服务 ${main_thread_binder.data[0].server_process} 响应延迟"
          - "考虑使用异步 Binder 接口"

      - condition: "main_thread_binder.data[0]?.dur_ms > (inputs?.slow_binder_warning_ms ?? 16)"
        severity: warning
        diagnosis: "主线程 Binder 调用超过一帧时间 (${main_thread_binder.data[0].dur_ms}ms)"
        confidence: high
        suggestions:
          - "可能导致掉帧，考虑异步化"
          - "优化服务端处理时间"

      # 主线程 Binder 调用过多
      - condition: "binder_overview.data[0]?.main_thread_txns > (inputs?.main_thread_txn_warning ?? 50)"
        severity: warning
        diagnosis: "主线程发起 ${binder_overview.data[0].main_thread_txns} 次 Binder 调用"
        confidence: medium
        suggestions:
          - "批量合并多次调用"
          - "使用缓存减少重复调用"
          - "将非必要调用移到后台线程"

      # 服务端响应慢
      - condition: "server_response.data[0]?.avg_server_dur_ms > (inputs?.server_response_warning_ms ?? 20)"
        severity: warning
        diagnosis: "服务端平均处理时间较长 (${server_response.data[0].avg_server_dur_ms}ms)"
        confidence: medium
        suggestions:
          - "联系服务提供方优化"
          - "考虑缓存服务调用结果"

      # 阻塞状态分析
      - condition: "binder_blocking.data.find(b => b.state === 'D')?.state_percent > 50"
        severity: warning
        diagnosis: "Binder 阻塞期间存在大量 IO 等待"
        confidence: medium
        suggestions:
          - "检查服务端是否有 IO 操作"
          - "考虑使用异步接口"

output:
  format: structured
