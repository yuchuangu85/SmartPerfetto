# =============================================================================
# DMA-BUF 内存分析 v3.0（组合 Skill）
# =============================================================================
# 使用 Perfetto stdlib: android_dmabuf_allocs, android_memory_cumulative_dmabuf 表
# Key columns (android_dmabuf_allocs): ts, buf_size, inode, utid, tid, thread_name, upid, pid, process_name
# Key columns (android_memory_cumulative_dmabuf): upid, process_name, utid, thread_name, ts, value
# Note: Requires ftrace event "dmabuf_allocs" enabled
#
# 分析流程：
# 1. 数据检测 → 是否有 dmabuf 数据
# 2. DMA Buffer 概览 → 按进程统计分配/释放
# 3. 累积使用 → 追踪累积使用量
# 4. 大型 Buffer 分配 → 识别大缓冲区
# 5. 分配频率 → 时间维度分析
# 6. 线程级统计 → 定位分配源头
# 7. 生命周期 → 泄漏检测
# 8. 根因分类 → SQL 驱动诊断

name: dmabuf_analysis
version: "3.0"
type: composite
category: memory

meta:
  display_name: "DMA-BUF 内存分析"
  description: "分析图形内存 (DMA-BUF) 使用情况和潜在泄漏"
  icon: "image"
  tags: [memory, dmabuf, graphics, composite]

prerequisites:
  optional_tables:
    - ion_heap_graph
  modules:
    - android.memory.dmabuf

triggers:
  keywords:
    zh: [DMA, dmabuf, 图形内存, gralloc, 缓冲区, 显示内存, GPU内存, 图形缓冲]
    en: [DMA, dmabuf, dma buffer, graphics memory, gralloc, buffer, display memory, GPU memory]
  patterns:
    - ".*[Dd][Mm][Aa].*"
    - ".*dmabuf.*"
    - ".*gralloc.*"
    - ".*图形内存.*"

inputs:
  - name: package
    type: string
    required: false
    description: "目标应用包名（支持 GLOB），留空分析所有 DMA Buffer"
  - name: min_size_mb
    type: number
    required: false
    default: 1
    description: "最小缓冲区大小阈值 (MB)"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"

steps:
  # ========== L0 数据检测 ==========
  - id: data_check
    type: atomic
    name: "数据检测"
    optional: true
    display: false
    sql: |
      SELECT CASE WHEN EXISTS (
        SELECT 1 FROM android_dmabuf_allocs
        WHERE (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ) THEN 1 ELSE 0 END as has_data
    save_as: data_check

  # ========== L1 DMA Buffer 概览 ==========
  - id: dmabuf_overview
    type: atomic
    name: "DMA Buffer 概览"
    synthesize:
      role: overview
      fields:
        - key: process_name
          label: 进程名
        - key: alloc_count
          label: 分配次数
        - key: total_alloc_mb
          label: 总分配量
          format: "{{value}} MB"
        - key: net_alloc_mb
          label: 净分配量
          format: "{{value}} MB"
        - key: max_single_alloc_mb
          label: 最大单次分配
          format: "{{value}} MB"
      insights:
        - condition: "net_alloc_mb > 200"
          template: "净分配量 {{net_alloc_mb}}MB，可能存在 Buffer 未释放"
        - condition: "net_alloc_mb > 500"
          template: "净分配量 {{net_alloc_mb}}MB，DMA-BUF 内存压力严重"
        - condition: "max_single_alloc_mb > 50"
          template: "单次最大分配 {{max_single_alloc_mb}}MB，存在大型 Buffer 分配"
    display:
      level: summary
      layer: overview
      title: "DMA Buffer 概览"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: alloc_count
          label: "分配次数"
          type: number
          format: compact
        - name: total_alloc_mb
          label: "总分配(MB)"
          type: number
          format: compact
        - name: total_free_mb
          label: "总释放(MB)"
          type: number
          format: compact
        - name: net_alloc_mb
          label: "净分配(MB)"
          type: number
          format: compact
        - name: max_single_alloc_mb
          label: "最大单次(MB)"
          type: number
          format: compact
    sql: |
      SELECT
        process_name,
        COUNT(*) AS alloc_count,
        ROUND(SUM(CASE WHEN buf_size > 0 THEN buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS total_alloc_mb,
        ROUND(SUM(CASE WHEN buf_size < 0 THEN -buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS total_free_mb,
        ROUND(SUM(buf_size) / 1024.0 / 1024.0, 2) AS net_alloc_mb,
        ROUND(MAX(buf_size) / 1024.0 / 1024.0, 2) AS max_single_alloc_mb
      FROM android_dmabuf_allocs
      WHERE (CASE WHEN '${package}' != ''
                  THEN process_name GLOB '*${package}*'
                  ELSE 1 END)
        AND (${start_ts} IS NULL OR ts > ${start_ts})
        AND (${end_ts} IS NULL OR ts < ${end_ts})
      GROUP BY process_name
      ORDER BY total_alloc_mb DESC
    save_as: dmabuf_overview
    condition: data_check.data[0]?.has_data === 1

  # ========== L1 DMA Buffer 累积使用 ==========
  - id: dmabuf_cumulative
    type: atomic
    name: "DMA Buffer 累积使用"
    optional: true
    display:
      level: summary
      layer: overview
      title: "DMA Buffer 累积使用量"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: current_mb
          label: "当前用量(MB)"
          type: number
          format: compact
        - name: peak_mb
          label: "峰值用量(MB)"
          type: number
          format: compact
    sql: |
      WITH latest_values AS (
        SELECT
          upid,
          process_name,
          value AS latest_value,
          ROW_NUMBER() OVER (PARTITION BY upid ORDER BY ts DESC) AS rn
        FROM android_memory_cumulative_dmabuf
        WHERE (CASE WHEN '${package}' != ''
                    THEN process_name GLOB '*${package}*'
                    ELSE 1 END)
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ),
      peak_values AS (
        SELECT
          upid,
          MAX(value) AS peak_value
        FROM android_memory_cumulative_dmabuf
        WHERE (CASE WHEN '${package}' != ''
                    THEN process_name GLOB '*${package}*'
                    ELSE 1 END)
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
        GROUP BY upid
      )
      SELECT
        l.process_name,
        ROUND(l.latest_value / 1024.0 / 1024.0, 2) AS current_mb,
        ROUND(p.peak_value / 1024.0 / 1024.0, 2) AS peak_mb
      FROM latest_values l
      JOIN peak_values p ON l.upid = p.upid
      WHERE l.rn = 1
      ORDER BY current_mb DESC
    save_as: dmabuf_cumulative
    condition: data_check.data[0]?.has_data === 1

  # ========== L2 大型 Buffer 分配 ==========
  - id: large_buffer_allocs
    type: atomic
    name: "大型 Buffer 分配"
    display:
      level: detail
      layer: list
      title: "大型 DMA Buffer 分配"
      columns:
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: size_mb
          label: "大小(MB)"
          type: number
          format: compact
        - name: inode
          label: "Inode"
          type: number
    sql: |
      SELECT
        printf('%d', ts) AS ts,
        process_name,
        thread_name,
        ROUND(buf_size / 1024.0 / 1024.0, 2) AS size_mb,
        inode
      FROM android_dmabuf_allocs
      WHERE buf_size / 1024.0 / 1024.0 >= COALESCE(${min_size_mb|1}, 1)
        AND (CASE WHEN '${package}' != ''
                  THEN process_name GLOB '*${package}*'
                  ELSE 1 END)
        AND (${start_ts} IS NULL OR ts > ${start_ts})
        AND (${end_ts} IS NULL OR ts < ${end_ts})
      ORDER BY buf_size DESC
      LIMIT 50
    save_as: large_buffer_allocs
    condition: data_check.data[0]?.has_data === 1

  # ========== L2 Buffer 分配频率 ==========
  - id: dmabuf_frequency
    type: atomic
    name: "Buffer 分配频率"
    display:
      level: detail
      layer: list
      title: "DMA Buffer 分配频率（按秒）"
      columns:
        - name: time_sec
          label: "时间(秒)"
          type: number
          format: compact
        - name: alloc_count
          label: "分配次数"
          type: number
          format: compact
        - name: free_count
          label: "释放次数"
          type: number
          format: compact
        - name: alloc_mb
          label: "分配量(MB)"
          type: number
          format: compact
        - name: free_mb
          label: "释放量(MB)"
          type: number
          format: compact
    sql: |
      SELECT
        CAST(ts / 1000000000 AS INTEGER) AS time_sec,
        COUNT(CASE WHEN buf_size > 0 THEN 1 END) AS alloc_count,
        COUNT(CASE WHEN buf_size < 0 THEN 1 END) AS free_count,
        ROUND(SUM(CASE WHEN buf_size > 0 THEN buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS alloc_mb,
        ROUND(SUM(CASE WHEN buf_size < 0 THEN -buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS free_mb
      FROM android_dmabuf_allocs
      WHERE (CASE WHEN '${package}' != ''
                  THEN process_name GLOB '*${package}*'
                  ELSE 1 END)
        AND (${start_ts} IS NULL OR ts > ${start_ts})
        AND (${end_ts} IS NULL OR ts < ${end_ts})
      GROUP BY time_sec
      ORDER BY time_sec
    save_as: dmabuf_frequency
    condition: data_check.data[0]?.has_data === 1

  # ========== L2 线程级分配统计 ==========
  - id: thread_alloc_stats
    type: atomic
    name: "线程级分配统计"
    display:
      level: detail
      layer: list
      title: "线程级 DMA Buffer 分配"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: alloc_count
          label: "分配次数"
          type: number
          format: compact
        - name: total_alloc_mb
          label: "总分配(MB)"
          type: number
          format: compact
    sql: |
      SELECT
        process_name,
        thread_name,
        COUNT(*) AS alloc_count,
        ROUND(SUM(CASE WHEN buf_size > 0 THEN buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS total_alloc_mb
      FROM android_dmabuf_allocs
      WHERE buf_size > 0
        AND (CASE WHEN '${package}' != ''
                  THEN process_name GLOB '*${package}*'
                  ELSE 1 END)
        AND (${start_ts} IS NULL OR ts > ${start_ts})
        AND (${end_ts} IS NULL OR ts < ${end_ts})
      GROUP BY process_name, thread_name
      ORDER BY total_alloc_mb DESC
      LIMIT 30
    save_as: thread_alloc_stats
    condition: data_check.data[0]?.has_data === 1

  # ========== L2 Buffer 生命周期分析 ==========
  - id: buffer_lifecycle
    type: atomic
    name: "Buffer 生命周期"
    synthesize:
      role: overview
      fields:
        - key: process_name
          label: 进程名
        - key: buffer_count
          label: Buffer 总数
        - key: freed_count
          label: 已释放
        - key: not_freed_count
          label: 未释放
        - key: avg_lifetime_sec
          label: 平均生命周期
          format: "{{value}} s"
      insights:
        - condition: "not_freed_count > buffer_count * 0.3"
          template: "未释放 Buffer 占比超 30%（{{not_freed_count}}/{{buffer_count}}），可能存在内存泄漏"
        - condition: "not_freed_count > 50"
          template: "{{not_freed_count}} 个 Buffer 未释放，内存泄漏风险高"
        - condition: "avg_lifetime_sec > 60"
          template: "平均 Buffer 生命周期 {{avg_lifetime_sec}}s，Buffer 持有时间过长"
    display:
      level: detail
      layer: list
      title: "Buffer 生命周期（泄漏检测）"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: buffer_count
          label: "Buffer 总数"
          type: number
          format: compact
        - name: freed_count
          label: "已释放"
          type: number
          format: compact
        - name: not_freed_count
          label: "未释放"
          type: number
          format: compact
        - name: avg_lifetime_sec
          label: "平均生命周期(s)"
          type: number
          format: compact
        - name: max_lifetime_sec
          label: "最大生命周期(s)"
          type: number
          format: compact
    sql: |
      WITH allocs AS (
        SELECT
          inode,
          ts AS alloc_ts,
          buf_size,
          process_name
        FROM android_dmabuf_allocs
        WHERE buf_size > 0
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ),
      frees AS (
        SELECT
          inode,
          ts AS free_ts
        FROM android_dmabuf_allocs
        WHERE buf_size < 0
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ),
      lifecycles AS (
        SELECT
          a.process_name,
          a.buf_size,
          MIN(f.free_ts) AS free_ts,
          a.alloc_ts,
          MIN(f.free_ts) - a.alloc_ts AS lifetime
        FROM allocs a
        LEFT JOIN frees f ON a.inode = f.inode AND f.free_ts > a.alloc_ts
        GROUP BY a.inode, a.alloc_ts
      )
      SELECT
        process_name,
        COUNT(*) AS buffer_count,
        COUNT(free_ts) AS freed_count,
        COUNT(*) - COUNT(free_ts) AS not_freed_count,
        ROUND(AVG(lifetime) / 1e9, 2) AS avg_lifetime_sec,
        ROUND(MAX(lifetime) / 1e9, 2) AS max_lifetime_sec
      FROM lifecycles
      WHERE (CASE WHEN '${package}' != ''
                  THEN process_name GLOB '*${package}*'
                  ELSE 1 END)
      GROUP BY process_name
      ORDER BY not_freed_count DESC
    save_as: buffer_lifecycle
    condition: data_check.data[0]?.has_data === 1

  # ========== L3 根因分类 ==========
  - id: root_cause_classification
    type: atomic
    name: "根因分类"
    synthesize:
      role: conclusion
      fields:
        - key: category
          label: 诊断类别
        - key: severity
          label: 严重程度
        - key: description
          label: 描述
      insights:
        - template: "DMA-BUF 诊断：{{category}} - {{description}}"
    display:
      level: summary
      layer: diagnosis
      title: "DMA-BUF 诊断"
      columns:
        - name: category
          label: "诊断类别"
          type: enum
        - name: severity
          label: "严重程度"
          type: enum
        - name: description
          label: "描述"
          type: string
        - name: evidence
          label: "依据"
          type: string
    sql: |
      WITH alloc_stats AS (
        SELECT
          COUNT(*) AS total_allocs,
          ROUND(SUM(CASE WHEN buf_size > 0 THEN buf_size ELSE 0 END) / 1024.0 / 1024.0, 2) AS total_alloc_mb,
          ROUND(SUM(buf_size) / 1024.0 / 1024.0, 2) AS net_alloc_mb
        FROM android_dmabuf_allocs
        WHERE (CASE WHEN '${package}' != ''
                    THEN process_name GLOB '*${package}*'
                    ELSE 1 END)
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      ),
      lifecycle_stats AS (
        WITH allocs AS (
          SELECT inode, ts AS alloc_ts, buf_size, process_name
          FROM android_dmabuf_allocs
          WHERE buf_size > 0
            AND (CASE WHEN '${package}' != ''
                      THEN process_name GLOB '*${package}*'
                      ELSE 1 END)
            AND (${start_ts} IS NULL OR ts > ${start_ts})
            AND (${end_ts} IS NULL OR ts < ${end_ts})
        ),
        frees AS (
          SELECT inode, ts AS free_ts
          FROM android_dmabuf_allocs
          WHERE buf_size < 0
            AND (${start_ts} IS NULL OR ts > ${start_ts})
            AND (${end_ts} IS NULL OR ts < ${end_ts})
        ),
        lifecycles AS (
          SELECT
            a.process_name,
            MIN(f.free_ts) AS free_ts
          FROM allocs a
          LEFT JOIN frees f ON a.inode = f.inode AND f.free_ts > a.alloc_ts
          GROUP BY a.inode, a.alloc_ts
        )
        SELECT
          COUNT(*) AS buffer_count,
          COUNT(free_ts) AS freed_count,
          COUNT(*) - COUNT(free_ts) AS not_freed_count
        FROM lifecycles
      ),
      frequency_stats AS (
        SELECT
          COUNT(*) AS total_events,
          CASE WHEN (MAX(ts) - MIN(ts)) > 0
            THEN ROUND(COUNT(*) * 1.0e9 / (MAX(ts) - MIN(ts)), 2)
            ELSE 0
          END AS events_per_second
        FROM android_dmabuf_allocs
        WHERE buf_size > 0
          AND (CASE WHEN '${package}' != ''
                    THEN process_name GLOB '*${package}*'
                    ELSE 1 END)
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})
      )
      SELECT * FROM (
        -- DMABUF_LEAK: 大量未释放 Buffer
        SELECT
          'DMABUF_LEAK' AS category,
          'critical' AS severity,
          'DMA-BUF 内存泄漏：大量 Buffer 未被释放' AS description,
          '未释放 ' || CAST(l.not_freed_count AS TEXT) || '/' || CAST(l.buffer_count AS TEXT)
            || ' 个 Buffer（'
            || CAST(ROUND(100.0 * l.not_freed_count / MAX(l.buffer_count, 1), 1) AS TEXT) || '%）'
            || '，净分配 ' || CAST(a.net_alloc_mb AS TEXT) || 'MB' AS evidence
        FROM lifecycle_stats l, alloc_stats a
        WHERE l.not_freed_count > 20 AND l.not_freed_count > l.buffer_count * 0.3

        UNION ALL

        -- DMABUF_PRESSURE: 高净分配量
        SELECT
          'DMABUF_PRESSURE' AS category,
          'critical' AS severity,
          'DMA-BUF 内存压力：净分配量过高' AS description,
          '净分配 ' || CAST(a.net_alloc_mb AS TEXT) || 'MB'
            || '，总分配 ' || CAST(a.total_alloc_mb AS TEXT) || 'MB' AS evidence
        FROM alloc_stats a
        WHERE a.net_alloc_mb > 200

        UNION ALL

        -- DMABUF_CHURN: 高频分配释放
        SELECT
          'DMABUF_CHURN' AS category,
          'warning' AS severity,
          'DMA-BUF 频繁分配释放（churn）' AS description,
          '分配频率 ' || CAST(f.events_per_second AS TEXT) || ' 次/秒'
            || '，总分配 ' || CAST(f.total_events AS TEXT) || ' 次' AS evidence
        FROM frequency_stats f
        WHERE f.events_per_second > 10

        UNION ALL

        -- DMABUF_LARGE_ALLOC: 单次大分配
        SELECT
          'DMABUF_LARGE_ALLOC' AS category,
          'warning' AS severity,
          '存在大型 DMA-BUF 分配' AS description,
          '最大单次分配 '
            || CAST(ROUND(MAX(buf_size) / 1024.0 / 1024.0, 2) AS TEXT) || 'MB' AS evidence
        FROM android_dmabuf_allocs
        WHERE buf_size > 0
          AND buf_size / 1024.0 / 1024.0 > 50
          AND (CASE WHEN '${package}' != ''
                    THEN process_name GLOB '*${package}*'
                    ELSE 1 END)
          AND (${start_ts} IS NULL OR ts > ${start_ts})
          AND (${end_ts} IS NULL OR ts < ${end_ts})

        UNION ALL

        -- DMABUF_NORMAL: 正常
        SELECT
          'DMABUF_NORMAL' AS category,
          'info' AS severity,
          'DMA-BUF 使用正常' AS description,
          '总分配 ' || CAST(a.total_allocs AS TEXT) || ' 次'
            || '，净分配 ' || CAST(a.net_alloc_mb AS TEXT) || 'MB'
            || '，未释放 ' || CAST(l.not_freed_count AS TEXT) || ' 个' AS evidence
        FROM alloc_stats a, lifecycle_stats l
        WHERE a.net_alloc_mb <= 200
          AND l.not_freed_count <= 20
      )
      ORDER BY CASE severity
        WHEN 'critical' THEN 1
        WHEN 'warning' THEN 2
        WHEN 'info' THEN 3
      END
    save_as: root_cause
    condition: data_check.data[0]?.has_data === 1

output:
  format: structured
