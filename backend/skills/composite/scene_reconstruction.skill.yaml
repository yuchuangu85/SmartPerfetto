name: scene_reconstruction
version: "1.0"
type: composite
category: interaction

meta:
  display_name: "场景还原"
  description: "通过用户输入和屏幕状态还原用户操作场景"
  icon: "movie_creation"
  tags: [scene, input, screen, composite]

prerequisites:
  modules:
    - android.input
    - android.binder
    - android.screen_state
    - android.battery_stats
    - android.startup.startups
    - android.frames.timeline

triggers:
  keywords:
    zh: [场景还原, 还原场景, 发生了什么, 用户操作, 操作场景, 用户行为, 操作记录]
    en: [scene, reconstruct, what happened, user action, user behavior]
  patterns:
    - ".*场景.*还原.*"
    - ".*发生.*什么.*"
    - ".*用户.*操作.*"

inputs:
  - name: trace_id
    type: string
    required: true

steps:
  # ==========================================================================
  # L1: Trace 时间范围
  # ==========================================================================
  - id: trace_time_range
    type: atomic
    name: "Trace 时间范围"
    display:
      level: summary
      layer: overview
      title: "Trace 概览"
      columns:
        - name: start_ts_str
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: end_ts_str
          label: "结束时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: duration_sec
          label: "时长(秒)"
          type: number
    sql: |
      SELECT
        MIN(ts) AS start_ts,
        MAX(ts) AS end_ts,
        printf('%d', MIN(ts)) AS start_ts_str,
        printf('%d', MAX(ts)) AS end_ts_str,
        ROUND((MAX(ts) - MIN(ts)) / 1e9, 2) AS duration_sec
      FROM (
        SELECT ts FROM slice WHERE dur > 0
        UNION ALL
        SELECT ts FROM counter WHERE value IS NOT NULL
      )
    save_as: time_range

  # ==========================================================================
  # L1: 可用数据表探测（用于门禁可选步骤，避免缺表报错）
  # ==========================================================================
  - id: table_availability
    type: atomic
    name: "可用数据表探测"
    display:
      level: hidden
    sql: |
      SELECT
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='android_screen_state') THEN 1
          ELSE 0
        END AS has_screen_state,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='android_battery_stats_event_slices') THEN 1
          ELSE 0
        END AS has_battery_top,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='android_input_events') THEN 1
          ELSE 0
        END AS has_input_events,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='android_startups') THEN 1
          ELSE 0
        END AS has_startups,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='actual_frame_timeline_slice') THEN 1
          ELSE 0
        END AS has_frame_timeline,
        CASE
          WHEN EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table', 'view') AND name='process_counter_track') THEN 1
          ELSE 0
        END AS has_process_counter_track
    save_as: table_availability

  # ==========================================================================
  # L2: 屏幕状态变化
  # ==========================================================================
  - id: screen_state_changes
    type: atomic
    name: "屏幕状态变化"
    condition: table_availability.data[0]?.has_screen_state === 1
    display:
      level: hidden
      layer: list
      title: "屏幕状态"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "状态"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH RECURSIVE screen_data AS (
        SELECT 1 AS dummy WHERE EXISTS (SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_screen_state')
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur,
        CASE screen_state
          WHEN 1 THEN '屏幕熄灭'
          WHEN 2 THEN '屏幕点亮'
          WHEN 3 THEN '屏幕休眠'
          ELSE '屏幕状态 ' || screen_state
        END AS event,
        'screen' AS category
      FROM android_screen_state
      WHERE dur > 0
      ORDER BY ts
      LIMIT 100
    save_as: screen_events
    optional: true

  # ==========================================================================
  # L2: Top App 切换
  # ==========================================================================
  - id: top_app_changes
    type: atomic
    name: "Top App 切换"
    condition: table_availability.data[0]?.has_battery_top === 1
    display:
      level: hidden
      layer: list
      title: "应用切换"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: app_package
          label: "包名"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH RECURSIVE battery_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_battery_stats_event_slices'
        )
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', safe_dur) AS dur,
        '切换到 ' || REPLACE(REPLACE(str_value, 'com.', ''), 'android.', '') AS event,
        str_value AS app_package,
        'app_switch' AS category
      FROM android_battery_stats_event_slices
      WHERE track_name = 'battery_stats.top'
        AND safe_dur > 50000000
      ORDER BY ts
      LIMIT 100
    save_as: app_switches
    optional: true

  # ==========================================================================
  # L2: Activity 生命周期事件
  # ==========================================================================
  - id: activity_lifecycle
    type: atomic
    name: "Activity 生命周期"
    display:
      level: hidden
      layer: list
      title: "Activity 生命周期"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: activity_name
          label: "Activity"
          type: string
        - name: lifecycle_event
          label: "生命周期事件"
          type: string
        - name: dur_ms
          label: "耗时(ms)"
          type: number
    sql: |
      WITH lifecycle_slices AS (
        SELECT
          s.ts,
          s.dur,
          s.name,
          CASE
            WHEN s.name GLOB '*activityStart*' THEN 'activityStart'
            WHEN s.name GLOB '*activityResume*' THEN 'activityResume'
            WHEN s.name GLOB '*activityPause*' THEN 'activityPause'
            WHEN s.name GLOB '*activityStop*' THEN 'activityStop'
            WHEN s.name GLOB '*activityDestroy*' THEN 'activityDestroy'
            WHEN s.name GLOB '*performCreate*' THEN 'performCreate'
            WHEN s.name GLOB '*performResume*' THEN 'performResume'
            WHEN s.name GLOB '*performPause*' THEN 'performPause'
            WHEN s.name GLOB '*performStop*' THEN 'performStop'
            WHEN s.name GLOB '*performDestroy*' THEN 'performDestroy'
            ELSE NULL
          END AS lifecycle_event,
          CASE
            WHEN s.name LIKE '%:%' THEN SUBSTR(s.name, INSTR(s.name, ':') + 1)
            ELSE s.name
          END AS activity_name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        WHERE t.is_main_thread = 1
          AND (
            s.name GLOB '*activityStart*'
            OR s.name GLOB '*activityResume*'
            OR s.name GLOB '*activityPause*'
            OR s.name GLOB '*activityStop*'
            OR s.name GLOB '*activityDestroy*'
            OR s.name GLOB '*performCreate*'
            OR s.name GLOB '*performResume*'
            OR s.name GLOB '*performPause*'
            OR s.name GLOB '*performStop*'
            OR s.name GLOB '*performDestroy*'
          )
          AND s.dur > 0
      ),
      startup_activities AS (
        SELECT
          s.ts,
          s.dur,
          s.package AS activity_name,
          'startup (' || s.startup_type || ')' AS lifecycle_event
        FROM android_startups s
        WHERE s.dur > 0
          AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_startups')
      )
      SELECT
        printf('%d', ts) AS ts,
        activity_name,
        lifecycle_event,
        ROUND(dur / 1e6, 1) AS dur_ms
      FROM (
        SELECT ts, activity_name, lifecycle_event, dur FROM lifecycle_slices WHERE lifecycle_event IS NOT NULL
        UNION ALL
        SELECT ts, activity_name, lifecycle_event, dur FROM startup_activities
      )
      ORDER BY ts
      LIMIT 200
    save_as: activity_lifecycle
    optional: true

  # ==========================================================================
  # L2: 用户手势识别 (点击/滑动/长按)
  # ==========================================================================
  - id: user_gestures
    type: atomic
    name: "用户手势识别"
    condition: table_availability.data[0]?.has_input_events === 1 && table_availability.data[0]?.has_startups === 1 && table_availability.data[0]?.has_frame_timeline === 1
    display:
      level: hidden
      layer: list
      title: "用户操作"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "操作"
          type: string
        - name: gesture_type
          label: "类型"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: move_count
          label: "移动次数"
          type: number
        - name: app_package
          label: "应用"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH RECURSIVE input_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_input_events'
        )
      ),
      startup_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_startups'
        )
      ),
      frame_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='actual_frame_timeline_slice'
        )
      ),
      startup_spans AS (
        SELECT
          ts AS start_ts,
          ts + dur AS end_ts,
          package AS app_package
        FROM android_startups
        WHERE dur > 0
      ),
      frame_apps AS (
        SELECT
          a.ts,
          a.ts + a.dur AS end_ts,
          COALESCE(
            NULLIF(p.name, ''),
            CASE
              WHEN a.layer_name IS NOT NULL AND instr(a.layer_name, '/') > 1
              THEN substr(a.layer_name, 1, instr(a.layer_name, '/') - 1)
              ELSE NULL
            END
          ) AS app_package
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON p.upid = a.upid
        WHERE a.dur > 0
          AND a.surface_frame_token IS NOT NULL
      ),
      gesture_events AS (
        SELECT
          read_time AS ts,
          event_action,
          process_name,
          CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END AS is_start
        FROM android_input_events
        WHERE event_type = 'MOTION'
          AND process_name NOT IN ('system_server', '/system/bin/inputflinger')
          AND process_name NOT GLOB 'com.android.systemui*'
      ),
      gesture_groups AS (
        SELECT ts, event_action, process_name,
               SUM(is_start) OVER (ORDER BY ts) AS gesture_id
        FROM gesture_events
      ),
      gestures AS (
        SELECT
          gesture_id,
          MIN(ts) AS ts,
          MAX(ts) AS end_ts,
          MAX(ts) - MIN(ts) AS dur,
          MAX(CASE WHEN event_action = 'UP' THEN ts END) AS up_ts,
          COUNT(*) AS event_count,
          COUNT(CASE WHEN event_action = 'MOVE' THEN 1 END) AS move_count,
          MAX(process_name) AS raw_process_name
        FROM gesture_groups
        WHERE gesture_id > 0
        GROUP BY gesture_id
      ),
      gesture_with_app AS (
        SELECT
          g.*,
          (SELECT MIN(g2.ts) FROM gestures g2 WHERE g2.ts > g.ts) AS next_gesture_ts,
          CASE
            WHEN g.raw_process_name GLOB 'com.*'
              OR g.raw_process_name GLOB 'org.*'
              OR g.raw_process_name GLOB 'io.*'
              OR g.raw_process_name GLOB 'net.*'
            THEN g.raw_process_name
            ELSE COALESCE(
              (SELECT f.app_package
               FROM frame_apps f
               WHERE f.app_package IS NOT NULL
                 AND f.app_package != ''
                 AND f.app_package NOT GLOB 'surfaceflinger*'
                 AND f.app_package NOT GLOB 'system_server*'
                 AND f.app_package NOT GLOB 'com.android.systemui*'
                 AND f.ts >= g.ts - 300000000
                 AND f.end_ts <= g.end_ts + 800000000
               GROUP BY f.app_package
               ORDER BY COUNT(*) DESC
               LIMIT 1),
              (SELECT s.app_package
               FROM startup_spans s
               WHERE g.ts BETWEEN s.start_ts AND s.end_ts
               ORDER BY s.start_ts DESC
               LIMIT 1),
              g.raw_process_name
            )
          END AS app_package
        FROM gestures g
      ),
      gesture_with_window AS (
        SELECT
          g.*,
          CASE
            WHEN g.up_ts IS NOT NULL THEN
              MIN(
                COALESCE(g.next_gesture_ts, g.up_ts + 3000000000),
                g.up_ts + 3000000000
              )
            ELSE g.end_ts
          END AS scroll_window_end
        FROM gesture_with_app g
      ),
      gesture_with_duration AS (
        SELECT
          g.*,
          CASE
            -- For scroll gestures, extend duration to the last rendered frame after UP
            -- (bounded by next gesture or 3s) to match user-perceived scroll length.
            WHEN g.move_count >= 3 AND g.up_ts IS NOT NULL THEN
              MAX(
                g.dur,
                COALESCE(
                  (SELECT MAX(f.end_ts)
                   FROM frame_apps f
                   WHERE f.ts >= g.up_ts
                     AND f.ts < g.scroll_window_end
                     AND (
                       g.app_package IS NULL
                       OR g.app_package = ''
                       OR f.app_package = g.app_package
                     )),
                  (SELECT MAX(f.end_ts)
                   FROM frame_apps f
                   WHERE f.ts >= g.up_ts
                     AND f.ts < g.scroll_window_end),
                  MIN(
                    COALESCE(g.next_gesture_ts, g.up_ts + 1800000000),
                    g.up_ts + 1800000000
                  )
                ) - g.ts
              )
            ELSE g.dur
          END AS scene_dur
        FROM gesture_with_window g
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', scene_dur) AS dur,
        CASE
          WHEN move_count >= 3 THEN '滑动 (' || move_count || '次移动, ' || CAST(scene_dur / 1000000 AS INT) || 'ms)'
          WHEN dur > 500000000 AND move_count <= 2 THEN '长按 (' || CAST(dur / 1000000 AS INT) || 'ms)'
          ELSE '点击'
        END ||
        CASE
          WHEN app_package IS NOT NULL AND app_package != ''
          THEN ' [' || REPLACE(REPLACE(app_package, 'com.', ''), 'android.', '') || ']'
          ELSE ''
        END AS event,
        CASE
          WHEN move_count >= 3 THEN 'scroll'
          WHEN dur > 500000000 AND move_count <= 2 THEN 'long_press'
          ELSE 'tap'
        END AS gesture_type,
        CASE
          WHEN move_count >= 10 THEN '高'
          WHEN move_count >= 5 THEN '中'
          WHEN move_count >= 3 THEN '低'
          ELSE '高'
        END AS confidence,
        move_count,
        app_package,
        'gesture' AS category
      FROM gesture_with_duration
      WHERE event_count >= 2
      ORDER BY ts
      LIMIT 200
    save_as: gestures
    optional: true

  # ==========================================================================
  # L2: 滑动启动检测 (面向初学者：精确定位滑动开始时刻)
  # ==========================================================================
  - id: scroll_initiation
    type: atomic
    name: "滑动启动时刻"
    condition: table_availability.data[0]?.has_input_events === 1
    display:
      level: hidden
      layer: list
      title: "滑动启动"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: event
          label: "事件"
          type: string
        - name: gesture_id
          label: "手势ID"
          type: number
        - name: category
          label: "类别"
          type: string
        - name: explanation
          label: "说明"
          type: string
    sql: |
      -- 此 step 检测滑动开始的精确时刻
      -- 原理：当手指 DOWN 后连续出现 2 个 MOVE 事件时，认为滑动启动
      WITH RECURSIVE input_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_input_events'
        )
      ),
      motion_base AS (
        SELECT
          event_action,
          read_time AS ts,
          process_name,
          SUM(CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END)
            OVER (ORDER BY read_time) AS gesture_id
        FROM android_input_events
        WHERE event_type = 'MOTION'
          AND event_action IN ('DOWN', 'MOVE', 'UP')
      ),
      motion_with_seq AS (
        SELECT
          event_action,
          ts,
          process_name,
          gesture_id,
          SUM(CASE WHEN event_action = 'MOVE' THEN 1 ELSE 0 END)
            OVER (
              PARTITION BY gesture_id
              ORDER BY ts
              ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
            ) AS move_seq
        FROM motion_base
      ),
      scroll_starts AS (
        SELECT
          MIN(ts) AS scroll_start_ts,
          gesture_id,
          MAX(process_name) AS app
        FROM motion_with_seq
        WHERE event_action = 'MOVE'
          AND move_seq >= 2
          AND gesture_id > 0
        GROUP BY gesture_id
      )
      SELECT
        printf('%d', scroll_start_ts) AS ts,
        '0' AS dur,
        '滑动启动' ||
        CASE
          WHEN app IS NOT NULL AND app != ''
          THEN ' [' || REPLACE(REPLACE(app, 'com.', ''), 'android.', '') || ']'
          ELSE ''
        END AS event,
        gesture_id,
        'scroll_start' AS category,
        '💡 此时刻手指已移动足够距离，系统开始响应滑动' AS explanation
      FROM scroll_starts
      ORDER BY scroll_start_ts
      LIMIT 100
    save_as: scroll_starts
    optional: true

  # ==========================================================================
  # L2: 惯性滑动检测 (UP 后仍持续渲染)
  # ==========================================================================
  - id: inertial_scrolls
    type: atomic
    name: "惯性滑动"
    condition: table_availability.data[0]?.has_input_events === 1 && table_availability.data[0]?.has_frame_timeline === 1
    display:
      level: hidden
      layer: list
      title: "惯性滑动"
      columns:
        - name: ts
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: frame_count
          label: "帧数"
          type: number
        - name: jank_frames
          label: "掉帧数"
          type: number
        - name: app_package
          label: "应用"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH RECURSIVE input_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_input_events'
        )
      ),
      frame_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='actual_frame_timeline_slice'
        )
      ),
      frame_apps AS (
        SELECT
          a.ts,
          a.dur,
          a.ts + a.dur AS end_ts,
          a.jank_type,
          COALESCE(
            NULLIF(p.name, ''),
            CASE
              WHEN a.layer_name IS NOT NULL AND instr(a.layer_name, '/') > 1
              THEN substr(a.layer_name, 1, instr(a.layer_name, '/') - 1)
              ELSE NULL
            END
          ) AS app_package
        FROM actual_frame_timeline_slice a
        LEFT JOIN process p ON p.upid = a.upid
        WHERE a.dur > 0
          AND a.surface_frame_token IS NOT NULL
      ),
      motion_base AS (
        SELECT
          read_time AS ts,
          event_action,
          process_name,
          SUM(CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END)
            OVER (ORDER BY read_time) AS gesture_id
        FROM android_input_events
        WHERE event_type = 'MOTION'
      ),
      gesture_stats AS (
        SELECT
          gesture_id,
          MIN(ts) AS down_ts,
          MAX(CASE WHEN event_action = 'UP' THEN ts END) AS up_ts,
          COUNT(*) AS event_count,
          SUM(CASE WHEN event_action = 'MOVE' THEN 1 ELSE 0 END) AS move_count,
          MAX(process_name) AS raw_process_name
        FROM motion_base
        WHERE gesture_id > 0
        GROUP BY gesture_id
        HAVING COUNT(*) >= 4 AND SUM(CASE WHEN event_action = 'MOVE' THEN 1 ELSE 0 END) >= 3
      ),
      fling_windows AS (
        SELECT
          g.gesture_id,
          g.down_ts,
          g.up_ts AS inertial_start,
          MIN(
            COALESCE(LEAD(g.down_ts) OVER (ORDER BY g.down_ts), g.up_ts + 3000000000),
            g.up_ts + 3000000000
          ) AS inertial_window_end,
          g.raw_process_name
        FROM gesture_stats g
        WHERE g.up_ts IS NOT NULL
      ),
      resolved_windows AS (
        SELECT
          w.*,
          CASE
            WHEN w.raw_process_name GLOB 'com.*'
              OR w.raw_process_name GLOB 'org.*'
              OR w.raw_process_name GLOB 'io.*'
              OR w.raw_process_name GLOB 'net.*'
            THEN w.raw_process_name
            ELSE COALESCE(
              (SELECT f.app_package
               FROM frame_apps f
               WHERE f.app_package IS NOT NULL
                 AND f.app_package != ''
                 AND f.app_package NOT GLOB 'surfaceflinger*'
                 AND f.app_package NOT GLOB 'system_server*'
                 AND f.app_package NOT GLOB 'com.android.systemui*'
                 AND f.ts >= w.down_ts - 300000000
                 AND f.end_ts <= w.inertial_window_end + 800000000
               GROUP BY f.app_package
               ORDER BY COUNT(*) DESC
               LIMIT 1),
              w.raw_process_name
            )
          END AS app_package
        FROM fling_windows w
      ),
      inertial_frames AS (
        SELECT
          w.gesture_id,
          w.inertial_start,
          w.inertial_window_end,
          w.app_package,
          MAX(CASE
            WHEN f.ts IS NOT NULL
              AND (w.app_package IS NULL OR w.app_package = '' OR f.app_package = w.app_package)
            THEN f.end_ts
            ELSE NULL
          END) AS matched_inertial_end,
          MAX(f.end_ts) AS fallback_inertial_end,
          SUM(CASE
            WHEN f.ts IS NOT NULL
              AND (w.app_package IS NULL OR w.app_package = '' OR f.app_package = w.app_package)
            THEN 1 ELSE 0 END
          ) AS matched_frame_count,
          COUNT(f.ts) AS fallback_frame_count,
          SUM(CASE
            WHEN f.ts IS NOT NULL
              AND (w.app_package IS NULL OR w.app_package = '' OR f.app_package = w.app_package)
              AND f.jank_type IS NOT NULL
              AND f.jank_type != 'None'
              AND f.jank_type != ''
            THEN 1 ELSE 0 END
          ) AS matched_jank_frames,
          SUM(CASE
            WHEN f.jank_type IS NOT NULL
              AND f.jank_type != 'None'
              AND f.jank_type != ''
            THEN 1 ELSE 0 END
          ) AS fallback_jank_frames
        FROM resolved_windows w
        LEFT JOIN frame_apps f
          ON f.ts >= w.inertial_start
         AND f.ts < w.inertial_window_end
        WHERE w.inertial_window_end > w.inertial_start + 80000000
        GROUP BY w.gesture_id, w.inertial_start, w.inertial_window_end, w.app_package
      ),
      resolved_inertial AS (
        SELECT
          gesture_id,
          inertial_start,
          MIN(
            COALESCE(
              CASE
                WHEN matched_frame_count >= 4 THEN matched_inertial_end
                ELSE fallback_inertial_end
              END,
              inertial_window_end
            ),
            inertial_window_end
          ) AS inertial_end,
          app_package,
          CASE
            WHEN matched_frame_count >= 4 THEN matched_frame_count
            ELSE fallback_frame_count
          END AS frame_count,
          CASE
            WHEN matched_frame_count >= 4 THEN matched_jank_frames
            ELSE fallback_jank_frames
          END AS jank_frames
        FROM inertial_frames
      )
      SELECT
        printf('%d', inertial_start) AS ts,
        printf('%d', inertial_end - inertial_start) AS dur,
        '惯性滑动' ||
        CASE
          WHEN app_package IS NOT NULL AND app_package != ''
          THEN ' [' || REPLACE(REPLACE(app_package, 'com.', ''), 'android.', '') || ']'
          ELSE ''
        END ||
        ' (' || CAST((inertial_end - inertial_start) / 1000000 AS INT) || 'ms, ' || frame_count || '帧)' AS event,
        frame_count,
        jank_frames,
        app_package,
        'inertial_scroll' AS category
      FROM resolved_inertial
      WHERE frame_count >= 4
        AND inertial_end > inertial_start + 80000000
      ORDER BY inertial_start
      LIMIT 100
    save_as: inertial_scrolls
    optional: true

  # ==========================================================================
  # L2: Idle 区间检测 (用户无交互)
  # ==========================================================================
  - id: idle_periods
    type: atomic
    name: "Idle 区间"
    condition: table_availability.data[0]?.has_input_events === 1 && table_availability.data[0]?.has_startups === 1
    display:
      level: hidden
      layer: list
      title: "空闲区间"
      columns:
        - name: ts
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH key_events AS (
        SELECT read_time AS ts
        FROM android_input_events
        WHERE event_type = 'MOTION'
          AND event_action = 'DOWN'
          AND process_name NOT IN ('system_server', '/system/bin/inputflinger')
          AND process_name NOT GLOB 'com.android.systemui*'

        UNION ALL

        SELECT ts
        FROM android_startups
        WHERE dur > 0

        UNION ALL

        SELECT ts
        FROM slice
        WHERE dur > 0
          AND (
            -- Screen unlock signals: keep lock-screen related patterns only.
            -- Avoid generic '*unlock*' to prevent false positives (e.g. render/mutex unlock slices).
            LOWER(name) LIKE '%keyguard%dismiss%'
            OR LOWER(name) LIKE '%keyguard%unlock%'
            OR LOWER(name) LIKE '%lockscreen%unlock%'
            OR LOWER(name) LIKE '%unlock%screen%'
            OR LOWER(name) LIKE '%notificationpanel%expand%'
            OR LOWER(name) LIKE '%notificationpanel%collapse%'
            OR (LOWER(name) LIKE '%splitscreen%' AND dur > 500000000)
          )
          AND LOWER(name) NOT LIKE '%unlockcanvasandpost%'
          AND LOWER(name) NOT LIKE '%unlockandpost%'
          AND LOWER(name) != 'unlock'
      ),
      ordered_events AS (
        SELECT
          ts,
          LEAD(ts) OVER (ORDER BY ts) AS next_ts
        FROM key_events
      ),
      idle_windows AS (
        SELECT
          ts AS start_ts,
          next_ts AS end_ts,
          next_ts - ts AS gap_ns
        FROM ordered_events
        WHERE next_ts IS NOT NULL
          AND next_ts - ts >= 800000000
      )
      SELECT
        printf('%d', start_ts) AS ts,
        printf('%d', gap_ns) AS dur,
        '空闲 (' || CAST(gap_ns / 1000000 AS INT) || 'ms)' AS event,
        CASE
          WHEN gap_ns >= 3000000000 THEN '高'
          WHEN gap_ns >= 1500000000 THEN '中'
          ELSE '低'
        END AS confidence,
        'idle' AS category
      FROM idle_windows
      ORDER BY start_ts
      LIMIT 120
    save_as: idle_periods
    optional: true

  # ==========================================================================
  # L2: App 启动事件
  # ==========================================================================
  - id: app_launches
    type: atomic
    name: "App 启动事件"
    condition: table_availability.data[0]?.has_startups === 1
    display:
      level: hidden
      layer: list
      title: "App 启动"
      columns:
        - name: startup_id
          label: "ID"
          type: number
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: startup_type
          label: "类型"
          type: string
        - name: package
          label: "包名"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH RECURSIVE startup_check AS (
        SELECT 1 AS dummy WHERE EXISTS (
          SELECT 1 FROM sqlite_master WHERE type='table' AND name='android_startups'
        )
      )
      SELECT
        s.startup_id,
        printf('%d', s.ts) AS ts,
        printf('%d', s.dur) AS dur,
        CASE s.startup_type
          WHEN 'cold' THEN '冷启动'
          WHEN 'warm' THEN '温启动'
          WHEN 'hot' THEN '热启动'
          ELSE '启动'
        END || ' ' ||
        REPLACE(REPLACE(s.package, 'com.', ''), 'android.', '') ||
        ' [' || CAST(s.dur / 1000000 AS INT) || 'ms]' AS event,
        s.startup_type,
        s.package,
        NULL AS ttid_ms,
        NULL AS ttfd_ms,
        'app_launch' AS category
      FROM android_startups s
      WHERE s.dur > 0
      ORDER BY s.ts
      LIMIT 50
    save_as: launches
    optional: true

  # ==========================================================================
  # L2: 系统事件 (解锁/通知栏/分屏等)
  # ==========================================================================
  - id: system_events
    type: atomic
    name: "系统事件"
    display:
      level: hidden
      layer: list
      title: "系统事件"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: event_type
          label: "类型"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur,
        CASE
          WHEN LOWER(name) LIKE '%keyguard%dismiss%'
            OR LOWER(name) LIKE '%keyguard%unlock%'
            OR LOWER(name) LIKE '%lockscreen%unlock%'
            OR LOWER(name) LIKE '%unlock%screen%'
            THEN '解锁屏幕'
          WHEN LOWER(name) LIKE '%notificationpanel%expand%' THEN '下拉通知栏'
          WHEN LOWER(name) LIKE '%notificationpanel%collapse%' THEN '收起通知栏'
          WHEN LOWER(name) LIKE '%splitscreen%' THEN '分屏操作'
          WHEN LOWER(name) LIKE '%enterpictureinpicture%' THEN '进入画中画'
          WHEN LOWER(name) LIKE '%exitpictureinpicture%' THEN '退出画中画'
          ELSE NULL
        END AS event,
        CASE
          WHEN LOWER(name) LIKE '%keyguard%dismiss%'
            OR LOWER(name) LIKE '%keyguard%unlock%'
            OR LOWER(name) LIKE '%lockscreen%unlock%'
            OR LOWER(name) LIKE '%unlock%screen%'
            THEN 'screen_unlock'
          WHEN LOWER(name) LIKE '%notificationpanel%' THEN 'notification'
          WHEN LOWER(name) LIKE '%splitscreen%' THEN 'split_screen'
          WHEN LOWER(name) LIKE '%pictureinpicture%' THEN 'pip'
          ELSE 'system'
        END AS event_type,
        'system' AS category
      FROM slice
      WHERE (
          -- 解锁: 真实解锁 >= 100ms
          (LOWER(name) LIKE '%keyguard%dismiss%' AND dur > 100000000)
          OR (LOWER(name) LIKE '%keyguard%unlock%' AND dur > 100000000)
          OR (LOWER(name) LIKE '%lockscreen%unlock%' AND dur > 100000000)
          OR (LOWER(name) LIKE '%unlock%screen%' AND dur > 100000000)
          -- 通知栏: 面板动画 >= 200ms
          OR (LOWER(name) LIKE '%notificationpanel%expand%' AND dur > 200000000)
          OR (LOWER(name) LIKE '%notificationpanel%collapse%' AND dur > 200000000)
          -- 分屏: 用户可感知操作 >= 500ms
          OR (LOWER(name) LIKE '%splitscreen%' AND dur > 500000000)
          -- 画中画: 过渡动画 >= 300ms
          OR (LOWER(name) LIKE '%enterpictureinpicture%' AND dur > 300000000)
          OR (LOWER(name) LIKE '%exitpictureinpicture%' AND dur > 300000000)
        )
        -- 排除干扰项
        AND LOWER(name) NOT LIKE '%unlockcanvasandpost%'
        AND LOWER(name) NOT LIKE '%unlockandpost%'
        AND LOWER(name) != 'unlock'
      ORDER BY ts
      LIMIT 100
    save_as: sys_events
    optional: true

  # ==========================================================================
  # L2: 广播事件 (Broadcast/Alarm)
  # ==========================================================================
  - id: broadcast_events
    type: atomic
    name: "广播事件"
    display:
      level: hidden
      layer: list
      title: "广播事件"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: receiver_name
          label: "接收者"
          type: string
        - name: broadcast_action
          label: "广播类型"
          type: string
        - name: dur_ms
          label: "耗时(ms)"
          type: number
    sql: |
      SELECT
        printf('%d', s.ts) AS ts,
        CASE
          WHEN s.name LIKE '%:%' THEN SUBSTR(s.name, INSTR(s.name, ':') + 1)
          WHEN s.name LIKE '% %' THEN SUBSTR(s.name, INSTR(s.name, ' ') + 1)
          ELSE p.name
        END AS receiver_name,
        CASE
          WHEN s.name GLOB '*BroadcastQueue*' THEN 'BroadcastQueue'
          WHEN s.name GLOB '*broadcastReceive*' THEN 'broadcastReceive'
          WHEN s.name GLOB '*AlarmManager*' THEN 'AlarmManager'
          ELSE s.name
        END AS broadcast_action,
        ROUND(s.dur / 1e6, 1) AS dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (
        s.name GLOB '*BroadcastQueue*'
        OR s.name GLOB '*broadcastReceive*'
        OR s.name GLOB '*AlarmManager*'
      )
        AND s.dur > 1000000
      ORDER BY s.ts
      LIMIT 200
    save_as: broadcast_events
    optional: true

  # ==========================================================================
  # L2: 跨进程交互 (显著 Binder 事务 >10ms)
  # ==========================================================================
  - id: cross_process_interactions
    type: atomic
    name: "跨进程交互"
    display:
      level: hidden
      layer: list
      title: "跨进程交互"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: client_process
          label: "客户端进程"
          type: string
        - name: server_process
          label: "服务端进程"
          type: string
        - name: dur_ms
          label: "耗时(ms)"
          type: number
        - name: interface_name
          label: "接口名"
          type: string
    sql: |
      -- 使用 stdlib android_binder_txns 替代手动 7-table JOIN
      SELECT
        printf('%d', bt.client_ts) AS ts,
        bt.client_process,
        bt.server_process,
        ROUND(bt.client_dur / 1e6, 1) AS dur_ms,
        COALESCE(bt.aidl_name, 'binder transaction') AS interface_name
      FROM android_binder_txns bt
      WHERE bt.client_dur > 10000000
        AND bt.client_process IS NOT NULL
        AND bt.server_process IS NOT NULL
        AND bt.client_process != bt.server_process
      ORDER BY bt.client_dur DESC
      LIMIT 100
    save_as: cross_process_interactions
    optional: true

  # ==========================================================================
  # L2: 性能事件 (掉帧)
  # ==========================================================================
  - id: jank_events
    type: atomic
    name: "掉帧事件"
    condition: table_availability.data[0]?.has_frame_timeline === 1
    display:
      level: hidden
      layer: list
      title: "性能事件"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: dur
          label: "帧耗时"
          type: duration
          format: duration_ms
          unit: ns
        - name: event
          label: "事件"
          type: string
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: jank_severity_type
          label: "严重程度"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur,
        CASE
          WHEN jank_type LIKE '%App Deadline%' OR jank_type = 'Self Jank' THEN 'App掉帧'
          WHEN jank_type LIKE '%SurfaceFlinger%' THEN '合成器掉帧'
          WHEN jank_type LIKE '%Buffer Stuffing%' THEN '缓冲区积压'
          ELSE '掉帧'
        END ||
        CASE jank_severity_type
          WHEN 'Partial' THEN ' (轻微)'
          WHEN 'Full' THEN ' (严重)'
          ELSE ''
        END ||
        ' [' || CAST(dur / 1000000 AS INT) || 'ms]' AS event,
        jank_type,
        jank_severity_type,
        'performance' AS category
      FROM actual_frame_timeline_slice
      WHERE jank_type IS NOT NULL
        AND jank_type != 'None'
        AND jank_type != ''
      ORDER BY ts
      LIMIT 200
    save_as: janks
    optional: true

  # ==========================================================================
  # L2: 设备状态（CPU频率/内存压力/温度/充电）
  # ==========================================================================
  - id: device_state
    type: atomic
    name: "设备状态"
    display:
      level: detail
      layer: list
      title: "设备状态"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: event
          label: "状态"
          type: string
        - name: value
          label: "值"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH time_bounds AS (
        SELECT MIN(ts) AS t_start, MAX(ts) AS t_end
        FROM (
          SELECT ts FROM slice WHERE dur > 0
          UNION ALL
          SELECT ts FROM counter WHERE value IS NOT NULL
        )
      ),
      -- CPU frequency ranges: report min/max freq per CPU cluster
      cpu_freq AS (
        SELECT
          printf('%d', MIN(c.ts)) AS ts,
          'CPU ' || ct.cpu || ' 频率范围' AS event,
          CAST(CAST(MIN(c.value) / 1000 AS INT) AS TEXT) || ' - ' ||
            CAST(CAST(MAX(c.value) / 1000 AS INT) AS TEXT) || ' MHz' AS value,
          'cpu_freq' AS category
        FROM counter c
        JOIN cpu_counter_track ct ON c.track_id = ct.id
        WHERE ct.name = 'cpufreq'
        GROUP BY ct.cpu
      ),
      -- Memory pressure (low memory killer / pressure stall)
      mem_pressure AS (
        SELECT
          printf('%d', c.ts) AS ts,
          'MemPressure: ' || ct.name AS event,
          CAST(ROUND(c.value) AS TEXT) AS value,
          'memory' AS category
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (ct.name LIKE '%mem%pressure%'
          OR ct.name LIKE '%MemFree%'
          OR ct.name LIKE '%SwapFree%'
          OR ct.name = 'oom_score_adj')
          AND c.value IS NOT NULL
        ORDER BY c.ts
        LIMIT 1
      ),
      -- Thermal zones
      thermal AS (
        SELECT
          printf('%d', c.ts) AS ts,
          '温度: ' || ct.name AS event,
          CAST(ROUND(c.value / 1000.0, 1) AS TEXT) || ' °C' AS value,
          'thermal' AS category
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE ct.name LIKE '%thermal_zone%'
          AND c.value IS NOT NULL
        GROUP BY ct.name
        HAVING c.ts = MAX(c.ts)
        LIMIT 10
      ),
      -- Battery / charging status from counter tracks
      battery AS (
        SELECT
          printf('%d', c.ts) AS ts,
          CASE
            WHEN ct.name LIKE '%charge%' THEN '电池电量'
            WHEN ct.name LIKE '%plugged%' THEN '充电状态'
            WHEN ct.name LIKE '%voltage%' THEN '电池电压'
            WHEN ct.name LIKE '%current%' THEN '电池电流'
            ELSE ct.name
          END AS event,
          CASE
            WHEN ct.name LIKE '%plugged%' THEN
              CASE CAST(c.value AS INT)
                WHEN 0 THEN '未充电'
                WHEN 1 THEN 'AC 充电'
                WHEN 2 THEN 'USB 充电'
                WHEN 4 THEN '无线充电'
                ELSE '充电(' || CAST(CAST(c.value AS INT) AS TEXT) || ')'
              END
            WHEN ct.name LIKE '%charge%' AND c.value <= 100 THEN CAST(CAST(c.value AS INT) AS TEXT) || '%'
            ELSE CAST(ROUND(c.value) AS TEXT)
          END AS value,
          'battery' AS category
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (ct.name LIKE '%battery%charge%'
          OR ct.name LIKE '%battery%plugged%'
          OR ct.name LIKE 'batt.%')
          AND c.value IS NOT NULL
        GROUP BY ct.name
        HAVING c.ts = MIN(c.ts)
        ORDER BY c.ts
        LIMIT 10
      ),
      -- Foreground apps (oom_adj <= 0)
      fg_apps AS (
        SELECT
          printf('%d', c.ts) AS ts,
          '前台进程: ' || p.name AS event,
          'oom_adj=' || CAST(CAST(c.value AS INT) AS TEXT) AS value,
          'foreground_app' AS category
        FROM counter c
        JOIN process_counter_track pct ON c.track_id = pct.id
        JOIN process p ON pct.upid = p.upid
        WHERE pct.name = 'oom_score_adj'
          AND c.value <= 0
          AND p.name IS NOT NULL
          AND p.name != ''
          AND p.name NOT LIKE '%system_server%'
          AND p.name NOT LIKE '%surfaceflinger%'
          AND p.name NOT LIKE '%zygote%'
        GROUP BY p.name
        HAVING c.ts = MIN(c.ts)
        ORDER BY c.ts
        LIMIT 20
      )
      SELECT * FROM cpu_freq
      UNION ALL SELECT * FROM mem_pressure
      UNION ALL SELECT * FROM thermal
      UNION ALL SELECT * FROM battery
      UNION ALL SELECT * FROM fg_apps
      ORDER BY ts
      LIMIT 100
    save_as: device_state
    optional: true

  # ==========================================================================
  # L2: App 前后台状态跟踪（oom_adj 变化 + 进程生死）
  # ==========================================================================
  - id: app_state_tracking
    type: atomic
    name: "App 状态跟踪"
    display:
      level: detail
      layer: list
      title: "App 前后台状态"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: event
          label: "事件"
          type: string
        - name: app_package
          label: "应用"
          type: string
        - name: oom_adj
          label: "oom_adj"
          type: number
        - name: state_label
          label: "状态"
          type: string
        - name: category
          label: "类别"
          type: string
    sql: |
      WITH oom_changes AS (
        SELECT
          c.ts,
          p.name AS app_package,
          CAST(c.value AS INT) AS oom_adj,
          LAG(CAST(c.value AS INT)) OVER (PARTITION BY p.name ORDER BY c.ts) AS prev_oom_adj
        FROM counter c
        JOIN process_counter_track pct ON c.track_id = pct.id
        JOIN process p ON pct.upid = p.upid
        WHERE pct.name = 'oom_score_adj'
          AND p.name IS NOT NULL
          AND p.name != ''
          AND p.name NOT LIKE '%system_server%'
          AND p.name NOT LIKE '%surfaceflinger%'
          AND p.name NOT LIKE '%servicemanager%'
          AND p.name NOT LIKE '%zygote%'
          AND p.name NOT LIKE '%init%'
          AND p.name NOT LIKE '%logd%'
          AND p.name NOT LIKE '%vold%'
          AND p.name NOT LIKE '%lmkd%'
      ),
      -- Filter to only significant transitions (foreground/visible/background boundaries)
      significant_changes AS (
        SELECT
          ts, app_package, oom_adj, prev_oom_adj,
          CASE
            WHEN oom_adj <= 0 THEN '前台'
            WHEN oom_adj <= 200 THEN '可见'
            WHEN oom_adj <= 700 THEN '后台'
            ELSE '缓存/即将回收'
          END AS state_label,
          CASE
            WHEN prev_oom_adj IS NULL THEN '进程出现'
            WHEN prev_oom_adj > 0 AND oom_adj <= 0 THEN '进入前台'
            WHEN prev_oom_adj <= 0 AND oom_adj > 0 THEN '离开前台'
            WHEN prev_oom_adj <= 200 AND oom_adj > 200 THEN '进入后台'
            WHEN prev_oom_adj > 700 AND oom_adj <= 200 THEN '恢复可见'
            ELSE NULL
          END AS transition
        FROM oom_changes
        WHERE prev_oom_adj IS NULL
          OR (prev_oom_adj > 0 AND oom_adj <= 0)
          OR (prev_oom_adj <= 0 AND oom_adj > 0)
          OR (prev_oom_adj <= 200 AND oom_adj > 200)
          OR (prev_oom_adj > 700 AND oom_adj <= 200)
      ),
      -- Process start events (from process table start_ts)
      proc_starts AS (
        SELECT
          p.start_ts AS ts,
          p.name AS app_package,
          -1000 AS oom_adj,
          '进程创建' AS state_label,
          '进程创建' AS transition
        FROM process p
        WHERE p.start_ts IS NOT NULL
          AND p.start_ts > 0
          AND p.name IS NOT NULL
          AND p.name GLOB '*.*'
          AND p.name NOT LIKE '%system_server%'
          AND p.name NOT LIKE '%zygote%'
      )
      SELECT
        printf('%d', ts) AS ts,
        COALESCE(transition, state_label) AS event,
        app_package,
        oom_adj,
        state_label,
        'app_state' AS category
      FROM (
        SELECT ts, app_package, oom_adj, state_label, transition
        FROM significant_changes
        WHERE transition IS NOT NULL
        UNION ALL
        SELECT ts, app_package, oom_adj, state_label, transition
        FROM proc_starts
      )
      ORDER BY ts
      LIMIT 200
    save_as: app_states
    optional: true

  # ==========================================================================
  # L2: 操作链（按时间顺序合并所有用户可感知事件）
  # ==========================================================================
  - id: operation_chain
    type: atomic
    name: "操作链"
    display:
      level: hidden
      layer: list
      title: "操作链"
      columns:
        - name: time_offset
          label: "时间偏移"
          type: string
        - name: ts
          label: "时间戳"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: event
          label: "事件"
          type: string
        - name: category
          label: "类别"
          type: string
        - name: priority
          label: "优先级"
          type: number
    sql: |
      WITH time_bounds AS (
        SELECT MIN(ts) AS t_start
        FROM (
          SELECT ts FROM slice WHERE dur > 0
          UNION ALL
          SELECT ts FROM counter WHERE value IS NOT NULL
        )
      ),
      -- Screen on/off
      screen_ev AS (
        SELECT ts,
          CASE screen_state WHEN 1 THEN '屏幕熄灭' WHEN 2 THEN '屏幕点亮' WHEN 3 THEN '屏幕休眠'
            ELSE '屏幕状态 ' || screen_state END AS event,
          'screen' AS category, 1 AS priority
        FROM android_screen_state WHERE dur > 0
        LIMIT 30
      ),
      -- App launches
      launch_ev AS (
        SELECT ts,
          CASE startup_type WHEN 'cold' THEN '冷启动' WHEN 'warm' THEN '温启动' WHEN 'hot' THEN '热启动'
            ELSE '启动' END || ' ' || package || ' [' || CAST(dur / 1000000 AS INT) || 'ms]' AS event,
          'app_launch' AS category, 2 AS priority
        FROM android_startups WHERE dur > 0
        LIMIT 30
      ),
      -- Top-app switches
      topapp_ev AS (
        SELECT ts,
          '切换前台: ' || str_value AS event,
          'app_switch' AS category, 3 AS priority
        FROM android_battery_stats_event_slices
        WHERE track_name = 'battery_stats.top' AND safe_dur > 100000000
        LIMIT 30
      ),
      -- Gestures (simplified from input events)
      gesture_base AS (
        SELECT
          read_time AS ts, event_action,
          SUM(CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END) OVER (ORDER BY read_time) AS gid
        FROM android_input_events
        WHERE event_type = 'MOTION'
          AND process_name NOT IN ('system_server', '/system/bin/inputflinger')
          AND process_name NOT GLOB 'com.android.systemui*'
      ),
      gesture_agg AS (
        SELECT gid, MIN(ts) AS ts, MAX(ts) - MIN(ts) AS dur,
          COUNT(CASE WHEN event_action = 'MOVE' THEN 1 END) AS mc
        FROM gesture_base WHERE gid > 0 GROUP BY gid HAVING COUNT(*) >= 2
      ),
      gesture_ev AS (
        SELECT ts,
          CASE
            WHEN mc >= 3 THEN '滑动列表 (' || mc || '次移动, ' || CAST(dur / 1000000 AS INT) || 'ms)'
            WHEN dur > 500000000 AND mc <= 2 THEN '长按 (' || CAST(dur / 1000000 AS INT) || 'ms)'
            ELSE '点击'
          END AS event,
          'gesture' AS category, 4 AS priority
        FROM gesture_agg
        LIMIT 60
      ),
      -- Foreground transitions (oom_adj crossing 0)
      fg_transitions AS (
        SELECT c.ts,
          CASE
            WHEN CAST(c.value AS INT) <= 0 THEN '进入前台: ' || p.name
            ELSE '离开前台: ' || p.name
          END AS event,
          'app_state' AS category, 5 AS priority
        FROM counter c
        JOIN process_counter_track pct ON c.track_id = pct.id
        JOIN process p ON pct.upid = p.upid
        WHERE pct.name = 'oom_score_adj'
          AND p.name GLOB '*.*'
          AND p.name NOT LIKE '%system_server%'
          AND p.name NOT LIKE '%zygote%'
          AND (
            (CAST(c.value AS INT) <= 0
              AND COALESCE(
                (SELECT CAST(c2.value AS INT) FROM counter c2
                 WHERE c2.track_id = c.track_id AND c2.ts < c.ts
                 ORDER BY c2.ts DESC LIMIT 1), 999) > 0)
            OR
            (CAST(c.value AS INT) > 0
              AND COALESCE(
                (SELECT CAST(c2.value AS INT) FROM counter c2
                 WHERE c2.track_id = c.track_id AND c2.ts < c.ts
                 ORDER BY c2.ts DESC LIMIT 1), 999) <= 0)
          )
        LIMIT 30
      ),
      -- System events (quality-gated: per-event duration thresholds)
      sys_ev AS (
        SELECT ts,
          CASE
            WHEN LOWER(name) LIKE '%keyguard%dismiss%' OR LOWER(name) LIKE '%keyguard%unlock%'
              OR LOWER(name) LIKE '%lockscreen%unlock%' OR LOWER(name) LIKE '%unlock%screen%'
              THEN '解锁屏幕'
            WHEN LOWER(name) LIKE '%notificationpanel%expand%' THEN '下拉通知栏'
            WHEN LOWER(name) LIKE '%notificationpanel%collapse%' THEN '收起通知栏'
            WHEN LOWER(name) LIKE '%splitscreen%' THEN '分屏操作'
            WHEN LOWER(name) LIKE '%enterpictureinpicture%' THEN '进入画中画'
            WHEN LOWER(name) LIKE '%exitpictureinpicture%' THEN '退出画中画'
            ELSE NULL
          END AS event,
          'system' AS category, 2 AS priority
        FROM slice
        WHERE (
            (LOWER(name) LIKE '%keyguard%dismiss%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%keyguard%unlock%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%lockscreen%unlock%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%unlock%screen%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%notificationpanel%expand%' AND dur > 200000000)
            OR (LOWER(name) LIKE '%notificationpanel%collapse%' AND dur > 200000000)
            OR (LOWER(name) LIKE '%splitscreen%' AND dur > 500000000)
            OR (LOWER(name) LIKE '%enterpictureinpicture%' AND dur > 300000000)
            OR (LOWER(name) LIKE '%exitpictureinpicture%' AND dur > 300000000)
          )
          AND LOWER(name) NOT LIKE '%unlockcanvasandpost%'
          AND LOWER(name) NOT LIKE '%unlockandpost%'
          AND LOWER(name) != 'unlock'
        LIMIT 20
      ),
      all_chain AS (
        SELECT * FROM screen_ev
        UNION ALL SELECT * FROM launch_ev
        UNION ALL SELECT * FROM topapp_ev
        UNION ALL SELECT * FROM gesture_ev
        UNION ALL SELECT * FROM fg_transitions
        UNION ALL SELECT * FROM sys_ev WHERE event IS NOT NULL
      )
      SELECT
        printf('%02d:%02d.%03d',
          CAST((ts - (SELECT t_start FROM time_bounds)) / 60000000000 AS INT),
          CAST(((ts - (SELECT t_start FROM time_bounds)) / 1000000000) % 60 AS INT),
          CAST(((ts - (SELECT t_start FROM time_bounds)) / 1000000) % 1000 AS INT)
        ) AS time_offset,
        printf('%d', ts) AS ts,
        event,
        category,
        priority
      FROM all_chain
      ORDER BY ts, priority
      LIMIT 200
    save_as: operation_chain
    optional: true

  # ==========================================================================
  # 干净时间线 — 用户看到的主要输出
  # ==========================================================================
  - id: clean_timeline
    type: atomic
    name: "场景时间线"
    condition: table_availability.data[0]?.has_input_events === 1 || table_availability.data[0]?.has_startups === 1
    display:
      level: detail
      layer: list
      title: "场景时间线"
      columns:
        - name: event_id
          label: "ID"
          type: string
          hidden: true
        - name: time_offset
          label: "时间"
          type: string
        - name: ts
          label: "时间戳"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
          hidden: true
        - name: dur_ms
          label: "耗时(ms)"
          type: number
        - name: event_type
          label: "类型"
          type: string
          hidden: true
        - name: event
          label: "事件"
          type: string
        - name: app_package
          label: "应用"
          type: string
        - name: rating
          label: "评级"
          type: string
    sql: |
      WITH time_bounds AS (
        SELECT MIN(ts) AS t_start
        FROM (
          SELECT ts FROM slice WHERE dur > 0
          UNION ALL
          SELECT ts FROM counter WHERE value IS NOT NULL
        )
      ),
      -- Screen state removed: now shown in dedicated Device State lane (state_timeline skill)
      -- ========== 数据源 1: App 启动 ==========
      launch_ev AS (
        SELECT
          s.ts,
          s.dur,
          CASE s.startup_type
            WHEN 'cold' THEN '冷启动'
            WHEN 'warm' THEN '温启动'
            WHEN 'hot' THEN '热启动'
            ELSE '启动'
          END || ' ' ||
          REPLACE(REPLACE(s.package, 'com.', ''), 'android.', '') ||
          ' [' || CAST(s.dur / 1000000 AS INT) || 'ms]' AS event,
          CASE s.startup_type
            WHEN 'cold' THEN 'cold_start'
            WHEN 'warm' THEN 'warm_start'
            WHEN 'hot' THEN 'hot_start'
            ELSE 'cold_start'
          END AS event_type,
          s.package AS app_package,
          'app_launch' AS category,
          2 AS priority
        FROM android_startups s
        WHERE s.dur > 0
          AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_startups')
        LIMIT 30
      ),
      -- ========== 数据源 3: 用户手势 (tap/scroll/long_press) ==========
      gesture_base AS (
        SELECT
          read_time AS ts, event_action, process_name,
          SUM(CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END) OVER (ORDER BY read_time) AS gid
        FROM android_input_events
        WHERE event_type = 'MOTION'
          AND process_name NOT IN ('system_server', '/system/bin/inputflinger')
          AND process_name NOT GLOB 'com.android.systemui*'
          AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_input_events')
      ),
      gesture_agg AS (
        SELECT
          gid,
          MIN(ts) AS ts,
          MAX(ts) - MIN(ts) AS dur,
          COUNT(*) AS event_count,
          COUNT(CASE WHEN event_action = 'MOVE' THEN 1 END) AS move_count,
          MAX(process_name) AS app
        FROM gesture_base
        WHERE gid > 0
        GROUP BY gid
        HAVING COUNT(*) >= 2
      ),
      gesture_ev AS (
        SELECT
          ts,
          dur,
          CASE
            WHEN move_count >= 3 THEN '滑动 (' || move_count || '次移动, ' || CAST(dur / 1000000 AS INT) || 'ms)'
            WHEN dur > 500000000 AND move_count <= 2 THEN '长按 (' || CAST(dur / 1000000 AS INT) || 'ms)'
            ELSE '点击'
          END ||
          CASE
            WHEN app IS NOT NULL AND app != ''
            THEN ' [' || REPLACE(REPLACE(app, 'com.', ''), 'android.', '') || ']'
            ELSE ''
          END AS event,
          CASE
            WHEN move_count >= 3 THEN 'scroll'
            WHEN dur > 500000000 AND move_count <= 2 THEN 'long_press'
            ELSE 'tap'
          END AS event_type,
          CASE
            WHEN app IS NOT NULL AND app != '' THEN app
            ELSE NULL
          END AS app_package,
          'gesture' AS category,
          3 AS priority
        FROM gesture_agg
        LIMIT 60
      ),
      -- ========== 数据源 4: Top App 切换 ==========
      topapp_ev AS (
        SELECT
          ts,
          safe_dur AS dur,
          '切换到 ' || REPLACE(REPLACE(str_value, 'com.', ''), 'android.', '') AS event,
          'app_switch' AS event_type,
          str_value AS app_package,
          'app_switch' AS category,
          4 AS priority
        FROM android_battery_stats_event_slices
        WHERE track_name = 'battery_stats.top'
          AND safe_dur > 100000000
          AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_battery_stats_event_slices')
        LIMIT 30
      ),
      -- ========== 数据源 5: 系统事件 (quality-gated) ==========
      system_ev AS (
        SELECT
          ts,
          dur,
          CASE
            WHEN LOWER(name) LIKE '%keyguard%dismiss%'
              OR LOWER(name) LIKE '%keyguard%unlock%'
              OR LOWER(name) LIKE '%lockscreen%unlock%'
              OR LOWER(name) LIKE '%unlock%screen%'
              THEN '解锁屏幕'
            WHEN LOWER(name) LIKE '%notificationpanel%expand%' THEN '下拉通知栏'
            WHEN LOWER(name) LIKE '%notificationpanel%collapse%' THEN '收起通知栏'
            WHEN LOWER(name) LIKE '%splitscreen%' THEN '分屏操作'
            WHEN LOWER(name) LIKE '%enterpictureinpicture%' THEN '进入画中画'
            WHEN LOWER(name) LIKE '%exitpictureinpicture%' THEN '退出画中画'
            ELSE NULL
          END AS event,
          CASE
            WHEN LOWER(name) LIKE '%keyguard%' OR LOWER(name) LIKE '%lockscreen%'
              OR LOWER(name) LIKE '%unlock%screen%' THEN 'screen_unlock'
            WHEN LOWER(name) LIKE '%notificationpanel%' THEN 'notification'
            WHEN LOWER(name) LIKE '%splitscreen%' THEN 'split_screen'
            WHEN LOWER(name) LIKE '%pictureinpicture%' THEN 'pip'
            ELSE 'system'
          END AS event_type,
          NULL AS app_package,
          'system' AS category,
          2 AS priority
        FROM slice
        WHERE (
            (LOWER(name) LIKE '%keyguard%dismiss%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%keyguard%unlock%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%lockscreen%unlock%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%unlock%screen%' AND dur > 100000000)
            OR (LOWER(name) LIKE '%notificationpanel%expand%' AND dur > 200000000)
            OR (LOWER(name) LIKE '%notificationpanel%collapse%' AND dur > 200000000)
            OR (LOWER(name) LIKE '%splitscreen%' AND dur > 500000000)
            OR (LOWER(name) LIKE '%enterpictureinpicture%' AND dur > 300000000)
            OR (LOWER(name) LIKE '%exitpictureinpicture%' AND dur > 300000000)
          )
          AND LOWER(name) NOT LIKE '%unlockcanvasandpost%'
          AND LOWER(name) NOT LIKE '%unlockandpost%'
          AND LOWER(name) != 'unlock'
        LIMIT 20
      ),
      -- ========== 数据源 6: Idle 空闲 ==========
      idle_ev AS (
        SELECT
          ts,
          gap_ns AS dur,
          '空闲 (' || CAST(gap_ns / 1000000 AS INT) || 'ms)' AS event,
          'idle' AS event_type,
          NULL AS app_package,
          'idle' AS category,
          5 AS priority
        FROM (
          SELECT
            ts,
            LEAD(ts) OVER (ORDER BY ts) AS next_ts,
            LEAD(ts) OVER (ORDER BY ts) - ts AS gap_ns
          FROM (
            SELECT read_time AS ts FROM android_input_events
            WHERE event_type = 'MOTION' AND event_action = 'DOWN'
              AND process_name NOT IN ('system_server', '/system/bin/inputflinger')
              AND process_name NOT GLOB 'com.android.systemui*'
              AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_input_events')
            UNION ALL
            SELECT ts FROM android_startups WHERE dur > 0
              AND EXISTS (SELECT 1 FROM sqlite_master WHERE type IN ('table','view') AND name='android_startups')
          )
        )
        WHERE gap_ns >= 800000000
        LIMIT 30
      ),
      -- ========== 合并 + 过滤 + 排序 ==========
      all_events AS (
        SELECT ts, dur, event, event_type, app_package, category, priority FROM launch_ev
        UNION ALL
        SELECT ts, dur, event, event_type, app_package, category, priority FROM gesture_ev
        UNION ALL
        SELECT ts, dur, event, event_type, app_package, category, priority FROM topapp_ev
        UNION ALL
        SELECT ts, dur, event, event_type, app_package, category, priority FROM system_ev WHERE event IS NOT NULL
        UNION ALL
        SELECT ts, dur, event, event_type, app_package, category, priority FROM idle_ev
      ),
      -- ========== 格式化输出 ==========
      ranked AS (
        SELECT *,
          ROW_NUMBER() OVER (ORDER BY ts, priority) AS rn
        FROM all_events
      )
      SELECT
        'evt_' || rn AS event_id,
        printf('%02d:%02d.%03d',
          CAST((ts - (SELECT t_start FROM time_bounds)) / 60000000000 AS INT),
          CAST(((ts - (SELECT t_start FROM time_bounds)) / 1000000000) % 60 AS INT),
          CAST(((ts - (SELECT t_start FROM time_bounds)) / 1000000) % 1000 AS INT)
        ) AS time_offset,
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur,
        CAST(dur / 1000000 AS INT) AS dur_ms,
        event_type,
        event,
        app_package,
        CASE
          -- 启动评级
          WHEN event_type = 'cold_start' AND dur / 1e6 < 500 THEN '🟢 优秀'
          WHEN event_type = 'cold_start' AND dur / 1e6 < 1000 THEN '🟡 良好'
          WHEN event_type = 'cold_start' THEN '🔴 需优化'
          WHEN event_type = 'warm_start' AND dur / 1e6 < 300 THEN '🟢 优秀'
          WHEN event_type = 'warm_start' AND dur / 1e6 < 600 THEN '🟡 良好'
          WHEN event_type = 'warm_start' THEN '🔴 需优化'
          WHEN event_type = 'hot_start' AND dur / 1e6 < 100 THEN '🟢 优秀'
          WHEN event_type = 'hot_start' AND dur / 1e6 < 200 THEN '🟡 良好'
          WHEN event_type = 'hot_start' THEN '🔴 需优化'
          -- 点击评级
          WHEN event_type = 'tap' AND dur / 1e6 < 100 THEN '🟢'
          WHEN event_type = 'tap' AND dur / 1e6 < 200 THEN '🟡'
          WHEN event_type = 'tap' AND dur / 1e6 > 200 THEN '🔴'
          -- 其他事件不评级
          ELSE ''
        END AS rating
      FROM ranked
      ORDER BY ts, priority
      LIMIT 200
    save_as: clean_timeline
    optional: true

  # ==========================================================================
  # 合并所有事件生成时间线 (deprecated — superseded by clean_timeline)
  # ==========================================================================
  - id: merged_timeline
    type: atomic
    name: "合并时间线"
    condition: table_availability.data[0]?.has_screen_state === 1 || table_availability.data[0]?.has_input_events === 1 || table_availability.data[0]?.has_startups === 1 || table_availability.data[0]?.has_frame_timeline === 1
    display:
      level: hidden
      layer: list
      title: "操作时间线"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur
        - name: dur
          label: "持续"
          type: duration
          format: duration_ms
          unit: ns
        - name: time_offset_sec
          label: "时间偏移(s)"
          type: number
        - name: event
          label: "事件"
          type: string
        - name: category
          label: "类别"
          type: string
        - name: priority
          label: "优先级"
          type: number
    sql: |
      WITH all_events AS (
        -- 屏幕状态
        SELECT
          CAST(ts AS INTEGER) AS ts,
          CAST(dur AS INTEGER) AS dur,
          event,
          'screen' AS category,
          1 AS priority
        FROM (
          SELECT
            printf('%d', ts) AS ts,
            printf('%d', dur) AS dur,
            CASE screen_state
              WHEN 1 THEN '屏幕熄灭'
              WHEN 2 THEN '屏幕点亮'
              WHEN 3 THEN '屏幕休眠'
              ELSE '屏幕状态 ' || screen_state
            END AS event
          FROM android_screen_state
          WHERE dur > 0
          LIMIT 50
        )

        UNION ALL

        -- Top App 切换
        SELECT
          CAST(ts AS INTEGER) AS ts,
          CAST(dur AS INTEGER) AS dur,
          event,
          'app_switch' AS category,
          2 AS priority
        FROM (
          SELECT
            printf('%d', ts) AS ts,
            printf('%d', safe_dur) AS dur,
            '切换到 ' || REPLACE(REPLACE(str_value, 'com.', ''), 'android.', '') AS event
          FROM android_battery_stats_event_slices
          WHERE track_name = 'battery_stats.top' AND safe_dur > 100000000
          LIMIT 50
        )

        UNION ALL

        -- 用户手势
        SELECT
          ts, dur, event, 'gesture' AS category, 3 AS priority
        FROM (
          WITH gesture_events AS (
            SELECT
              read_time AS ts,
              event_action,
              process_name,
              CASE WHEN event_action = 'DOWN' THEN 1 ELSE 0 END AS is_start
            FROM android_input_events
            WHERE event_type = 'MOTION'
          ),
          gesture_groups AS (
            SELECT ts, event_action, process_name,
                   SUM(is_start) OVER (ORDER BY ts) AS gesture_id
            FROM gesture_events
          ),
          gestures AS (
            SELECT
              gesture_id,
              MIN(ts) AS ts,
              MAX(ts) - MIN(ts) AS dur,
              COUNT(*) AS event_count,
              COUNT(CASE WHEN event_action = 'MOVE' THEN 1 END) AS move_count,
              MAX(process_name) AS app
            FROM gesture_groups
            WHERE gesture_id > 0
            GROUP BY gesture_id
            HAVING COUNT(*) >= 2
          )
          SELECT
            CAST(ts AS INTEGER) AS ts,
            CAST(dur AS INTEGER) AS dur,
            CASE
              WHEN move_count >= 3 THEN '滑动 (' || move_count || '次移动)'
              WHEN dur > 500000000 AND move_count <= 2 THEN '长按'
              ELSE '点击'
            END ||
            CASE
              WHEN app IS NOT NULL AND app != ''
              THEN ' [' || REPLACE(REPLACE(app, 'com.', ''), 'android.', '') || ']'
              ELSE ''
            END AS event
          FROM gestures
          LIMIT 100
        )

        UNION ALL

        -- App 启动
        SELECT
          CAST(ts AS INTEGER) AS ts,
          CAST(dur AS INTEGER) AS dur,
          event,
          'app_launch' AS category,
          4 AS priority
        FROM (
          SELECT
            printf('%d', ts) AS ts,
            printf('%d', dur) AS dur,
            CASE startup_type
              WHEN 'cold' THEN '冷启动'
              WHEN 'warm' THEN '温启动'
              WHEN 'hot' THEN '热启动'
              ELSE '启动'
            END || ' ' ||
            REPLACE(REPLACE(package, 'com.', ''), 'android.', '') ||
            ' [' || CAST(dur / 1000000 AS INT) || 'ms]' AS event
          FROM android_startups
          WHERE dur > 0
          LIMIT 30
        )

        UNION ALL

        -- 掉帧事件
        SELECT
          CAST(ts AS INTEGER) AS ts,
          CAST(dur AS INTEGER) AS dur,
          event,
          'performance' AS category,
          5 AS priority
        FROM (
          SELECT
            printf('%d', ts) AS ts,
            printf('%d', dur) AS dur,
            CASE
              WHEN jank_type LIKE '%App Deadline%' OR jank_type = 'Self Jank' THEN 'App掉帧'
              WHEN jank_type LIKE '%SurfaceFlinger%' THEN '合成器掉帧'
              ELSE '掉帧'
            END || ' [' || CAST(dur / 1000000 AS INT) || 'ms]' AS event
          FROM actual_frame_timeline_slice
          WHERE jank_type IS NOT NULL AND jank_type != 'None' AND jank_type != ''
          LIMIT 50
        )
      ),
      time_range AS (
        SELECT MIN(ts) AS start_ts FROM all_events
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur,
        ROUND((ts - (SELECT start_ts FROM time_range)) / 1e9, 2) AS time_offset_sec,
        event,
        category,
        priority
      FROM all_events
      ORDER BY ts, priority
      LIMIT 300
    save_as: timeline
    optional: true

  # ==========================================================================
  # AI 场景综合分析
  # ==========================================================================
  - id: scene_summary
    type: ai_summary
    name: "场景还原报告"
    display:
      level: summary
      layer: overview
      title: "场景还原报告"
    inputs:
      - trace_time_range
      - clean_timeline
      - screen_state_changes
      - top_app_changes
      - user_gestures
      - scroll_initiation
      - inertial_scrolls
      - idle_periods
      - app_launches
      - system_events
      - jank_events
      - device_state
      - app_state_tracking
      - operation_chain
    prompt: |
      你是一位 Android 性能分析专家，你的任务是帮助初学者理解 Trace 数据。
      请基于以下数据还原用户的完整操作场景，并用通俗易懂的语言解释。

      ## Trace 时间范围
      ${trace_time_range}

      ## 干净时间线（主要参考）
      ${clean_timeline}
      说明：这是经过质量过滤的事件时间线，请优先参考此数据构建叙述

      ## 屏幕状态变化
      ${screen_state_changes}

      ## 应用切换记录
      ${top_app_changes}

      ## 用户手势操作
      ${user_gestures}

      ## 滑动启动时刻
      ${scroll_initiation}
      说明：这里记录了每次滑动开始的精确时刻（手指按下后移动到第2个点时）

      ## 惯性滑动区间
      ${inertial_scrolls}
      说明：这里记录手指抬起（UP）后界面仍在滚动的区间，通常对应 Fling 惯性滚动

      ## 空闲区间（Idle）
      ${idle_periods}
      说明：这里记录较长时间没有明显用户交互/切换的区间

      ## App 启动事件
      ${app_launches}

      ## 系统事件
      ${system_events}

      ## 掉帧/性能事件
      ${jank_events}

      ## 设备状态
      ${device_state}
      说明：设备硬件状态快照，包括 CPU 频率范围、内存压力、温度、充电状态和前台应用

      ## App 前后台状态变化
      ${app_state_tracking}
      说明：应用的 oom_adj 变化记录，反映前台/可见/后台/缓存状态转换和进程创建事件

      ## 操作链
      ${operation_chain}
      说明：按时间顺序排列的所有用户可感知事件，用于构建完整操作时间线

      请按以下格式输出分析报告：

      ## 场景概述
      用一段自然、流畅的中文描述用户在这段 Trace 期间做了什么。描述应该像讲故事一样，让读者能够清晰地想象用户的操作过程。

      ## 操作时间线
      按时间顺序列出关键操作，格式：
      1. **0.0s** - 事件描述
      2. **1.2s** - 事件描述
      ...
      （请合并相近的同类事件，避免过于琐碎）

      ## 性能问题诊断
      如果发现掉帧或性能问题，请分析：
      - 问题发生在什么场景下
      - 可能的原因是什么
      - 对用户体验的影响

      如果没有明显性能问题，请说明"整体流畅度良好"。

      ## 使用意图推断
      基于以上分析，推断用户可能的使用意图和目的。例如：
      - 用户可能在浏览社交媒体
      - 用户可能在查找某个联系人
      - 用户可能在切换应用完成某个任务

output:
  format: layered
  default_expanded: [L1, L2]
