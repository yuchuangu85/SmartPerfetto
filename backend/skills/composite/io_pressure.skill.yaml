# =============================================================================
# IO Pressure Analysis v1.0 (System Analysis Skill) - Phase 6
# =============================================================================
# 系统级分析：分析 IO 等待和存储压力
#
# 核心表：
# - thread_state: 线程状态，blocked_function 包含 IO 相关阻塞信息
# - ftrace_event: ftrace 事件（block_rq_*, f2fs_*, ext4_* 等）
# - counter: 系统计数器（包含 IO 相关 counter）
# - sched_slice: 调度信息
#
# 分析维度：
# - IO Wait 时间统计
# - 阻塞函数分析
# - 文件系统操作分析
# - 进程 IO 分布
# =============================================================================

name: io_pressure
version: "1.0"
type: composite
category: io

meta:
  display_name: "IO 压力分析"
  description: "从系统层面分析 IO 压力和瓶颈"
  icon: "storage"
  tags: [io, pressure, disk, system]

triggers:
  keywords:
    zh: [IO等待, IO压力, 存储, 读写, 阻塞, iowait, 磁盘]
    en: [io wait, io pressure, storage, read write, blocking, iowait, disk]
  patterns:
    - ".*IO.*"
    - ".*io.*wait.*"
    - ".*存储.*"
    - ".*磁盘.*"
    - ".*读写.*"

prerequisites:
  modules:
    - sched
    - linux.threads

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"
  - name: min_duration_ms
    type: number
    required: false
    default: 1
    description: "最小 IO Wait 时长阈值（毫秒）"

steps:
  # ========== IO Wait 总览 ==========
  - id: io_wait_overview
    type: atomic
    name: "IO Wait 总览"
    display:
      level: summary
      layer: overview
      title: "IO 等待概览"
    sql: |
      WITH
      io_wait_states AS (
        SELECT
          ts.utid,
          ts.ts,
          ts.dur,
          ts.state,
          ts.blocked_function
        FROM thread_state ts
        WHERE
          ts.state IN ('D', 'DK', 'x')  -- Uninterruptible sleep states
          OR ts.blocked_function LIKE '%io%'
          OR ts.blocked_function LIKE '%read%'
          OR ts.blocked_function LIKE '%write%'
          OR ts.blocked_function LIKE '%sync%'
          OR ts.blocked_function LIKE '%f2fs%'
          OR ts.blocked_function LIKE '%ext4%'
          OR ts.blocked_function LIKE '%binder%'
      )
      SELECT
        COUNT(*) as io_wait_events,
        SUM(dur) / 1e6 as total_io_wait_ms,
        AVG(dur) / 1e6 as avg_io_wait_ms,
        MAX(dur) / 1e6 as max_io_wait_ms,
        COUNT(DISTINCT utid) as affected_threads
      FROM io_wait_states
      WHERE dur > ${min_duration_ms} * 1e6
    save_as: io_overview

  # ========== 进程 IO Wait 分布 ==========
  - id: process_io_distribution
    type: atomic
    name: "进程 IO Wait 分布"
    display:
      level: detail
      layer: list
      title: "进程 IO 等待排行"
    sql: |
      WITH
      io_by_process AS (
        SELECT
          p.name as process_name,
          p.pid,
          SUM(ts.dur) / 1e6 as io_wait_ms,
          COUNT(*) as io_events,
          AVG(ts.dur) / 1e6 as avg_wait_ms
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE
          (ts.state IN ('D', 'DK', 'x')
           OR ts.blocked_function LIKE '%io%'
           OR ts.blocked_function LIKE '%read%'
           OR ts.blocked_function LIKE '%write%'
           OR ts.blocked_function LIKE '%sync%')
          AND ts.dur > ${min_duration_ms} * 1e6
          AND ('${package}' = '' OR p.name GLOB '${package}*')
        GROUP BY p.upid
      ),
      totals AS (
        SELECT SUM(io_wait_ms) as total_io_wait_ms
        FROM io_by_process
      )
      SELECT
        process_name,
        pid,
        ROUND(io_wait_ms, 2) as io_wait_ms,
        io_events,
        ROUND(avg_wait_ms, 2) as avg_wait_ms,
        ROUND(io_wait_ms * 100.0 / NULLIF((SELECT total_io_wait_ms FROM totals), 0), 1) as pct_of_total
      FROM io_by_process
      ORDER BY io_wait_ms DESC
      LIMIT 15
    save_as: process_io

  # ========== 阻塞函数分析 ==========
  - id: blocking_functions
    type: atomic
    name: "阻塞函数热点"
    display:
      level: detail
      layer: list
      title: "IO 阻塞函数排行"
    sql: |
      SELECT
        COALESCE(blocked_function, 'unknown') as blocked_function,
        COUNT(*) as block_count,
        SUM(dur) / 1e6 as total_block_ms,
        AVG(dur) / 1e6 as avg_block_ms,
        MAX(dur) / 1e6 as max_block_ms
      FROM thread_state
      WHERE
        state IN ('D', 'DK', 'x')
        AND dur > ${min_duration_ms} * 1e6
        AND blocked_function IS NOT NULL
        AND blocked_function != ''
      GROUP BY blocked_function
      ORDER BY total_block_ms DESC
      LIMIT 20
    save_as: blocking_functions

  # ========== 线程 IO Wait 详情 ==========
  - id: thread_io_details
    type: atomic
    name: "线程 IO Wait 详情"
    display:
      level: detail
      layer: list
      title: "线程级 IO 等待"
    sql: |
      SELECT
        t.name as thread_name,
        t.tid,
        p.name as process_name,
        SUM(ts.dur) / 1e6 as io_wait_ms,
        COUNT(*) as io_events,
        MAX(ts.dur) / 1e6 as max_wait_ms,
        GROUP_CONCAT(DISTINCT ts.blocked_function) as blocked_functions
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE
        (ts.state IN ('D', 'DK', 'x')
         OR ts.blocked_function LIKE '%io%'
         OR ts.blocked_function LIKE '%read%'
         OR ts.blocked_function LIKE '%write%')
        AND ts.dur > ${min_duration_ms} * 1e6
        AND ('${package}' = '' OR p.name GLOB '${package}*')
      GROUP BY ts.utid
      ORDER BY io_wait_ms DESC
      LIMIT 20
    save_as: thread_io

  # ========== IO 时间分布（按时间段）==========
  - id: io_timeline
    type: atomic
    name: "IO Wait 时间线"
    display:
      level: detail
      layer: deep
      title: "IO 等待时间分布"
    sql: |
      WITH
      time_range AS (
        SELECT
          MIN(ts) as start_ts,
          MAX(ts + dur) as end_ts
        FROM thread_state
        WHERE state IN ('D', 'DK', 'x')
      ),
      time_buckets AS (
        SELECT
          (ts - (SELECT start_ts FROM time_range)) / 1e9 as time_sec,
          dur / 1e6 as duration_ms
        FROM thread_state
        WHERE
          state IN ('D', 'DK', 'x')
          AND dur > ${min_duration_ms} * 1e6
      )
      SELECT
        CAST(time_sec AS INT) as second,
        COUNT(*) as io_events,
        SUM(duration_ms) as total_io_ms,
        MAX(duration_ms) as max_io_ms
      FROM time_buckets
      GROUP BY CAST(time_sec AS INT)
      ORDER BY second
      LIMIT 60
    save_as: io_timeline

  # ========== 长 IO Wait 事件 ==========
  - id: long_io_events
    type: atomic
    name: "长 IO Wait 事件"
    display:
      level: detail
      layer: deep
      title: "长时间 IO 阻塞事件"
    sql: |
      SELECT
        ts.ts / 1e9 as time_sec,
        ts.dur / 1e6 as duration_ms,
        t.name as thread_name,
        p.name as process_name,
        ts.state,
        COALESCE(ts.blocked_function, 'unknown') as blocked_function
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE
        ts.state IN ('D', 'DK', 'x')
        AND ts.dur > 10 * 1e6  -- > 10ms
        AND ('${package}' = '' OR p.name GLOB '${package}*')
      ORDER BY ts.dur DESC
      LIMIT 30
    save_as: long_io_events

  # ========== 分析结论 ==========
  - id: io_conclusion
    type: atomic
    name: "IO 压力结论"
    display:
      level: summary
      layer: overview
      title: "IO 分析结论"
    sql: |
      WITH
      io_wait_states AS (
        SELECT
          ts.utid,
          ts.ts,
          ts.dur,
          ts.state,
          ts.blocked_function
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE
          (ts.state IN ('D', 'DK', 'x')
           OR ts.blocked_function LIKE '%io%'
           OR ts.blocked_function LIKE '%read%'
           OR ts.blocked_function LIKE '%write%'
           OR ts.blocked_function LIKE '%sync%'
           OR ts.blocked_function LIKE '%f2fs%'
           OR ts.blocked_function LIKE '%ext4%'
           OR ts.blocked_function LIKE '%binder%')
          AND ts.dur > ${min_duration_ms} * 1e6
          AND ('${package}' = '' OR p.name GLOB '${package}*')
      ),
      overview AS (
        SELECT
          SUM(dur) / 1e6 as total_io_wait_ms,
          COUNT(DISTINCT utid) as affected_threads
        FROM io_wait_states
      ),
      top_blocker AS (
        SELECT
          COALESCE(blocked_function, 'unknown') as blocked_function,
          SUM(dur) / 1e6 as total_block_ms
        FROM io_wait_states
        WHERE blocked_function IS NOT NULL AND blocked_function != ''
        GROUP BY blocked_function
        ORDER BY total_block_ms DESC
        LIMIT 1
      ),
      top_process AS (
        SELECT
          p.name as process_name,
          SUM(ts.dur) / 1e6 as io_wait_ms
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE
          (ts.state IN ('D', 'DK', 'x')
           OR ts.blocked_function LIKE '%io%'
           OR ts.blocked_function LIKE '%read%'
           OR ts.blocked_function LIKE '%write%'
           OR ts.blocked_function LIKE '%sync%'
           OR ts.blocked_function LIKE '%f2fs%'
           OR ts.blocked_function LIKE '%ext4%'
           OR ts.blocked_function LIKE '%binder%')
          AND ts.dur > ${min_duration_ms} * 1e6
          AND ('${package}' = '' OR p.name GLOB '${package}*')
        GROUP BY p.upid
        ORDER BY io_wait_ms DESC
        LIMIT 1
      )
      SELECT
        (SELECT total_io_wait_ms FROM overview) as total_io_wait_ms,
        (SELECT affected_threads FROM overview) as affected_threads,
        (SELECT blocked_function FROM top_blocker) as top_blocker,
        (SELECT process_name FROM top_process) as top_io_process,
        CASE
          WHEN (SELECT total_io_wait_ms FROM overview) > 5000 THEN 'critical'
          WHEN (SELECT total_io_wait_ms FROM overview) > 1000 THEN 'warning'
          WHEN (SELECT total_io_wait_ms FROM overview) > 100 THEN 'info'
          ELSE 'normal'
        END as severity,
        CASE
          WHEN (SELECT blocked_function FROM top_blocker) LIKE '%f2fs%'
               OR (SELECT blocked_function FROM top_blocker) LIKE '%ext4%'
            THEN '文件系统操作阻塞，考虑优化文件读写或使用异步 IO'
          WHEN (SELECT blocked_function FROM top_blocker) LIKE '%binder%'
            THEN 'Binder IPC 阻塞，检查跨进程调用是否过于频繁'
          WHEN (SELECT blocked_function FROM top_blocker) LIKE '%sync%'
            THEN '同步操作阻塞，考虑减少 fsync/sync 调用'
          WHEN (SELECT blocked_function FROM top_blocker) LIKE '%read%'
               OR (SELECT blocked_function FROM top_blocker) LIKE '%write%'
            THEN '读写操作阻塞，考虑使用缓存或异步读写'
          ELSE '请检查具体阻塞函数'
        END as suggestion
