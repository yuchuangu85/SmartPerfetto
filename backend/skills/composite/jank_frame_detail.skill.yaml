name: jank_frame_detail
version: "1.0"
type: composite
category: rendering

meta:
  display_name: "掉帧详情分析"
  description: "分析特定掉帧的详细原因"
  icon: "broken_image"
  tags: [jank, detail, composite]

prerequisites:
  modules:
    - android.binder
    - android.slices
    - android.monitor_contention
    - android.garbage_collection
    - android.gpu.frequency

inputs:
  # Primary timing inputs (at least one pair required)
  - name: start_ts
    type: timestamp
    required: false
    description: "帧开始时间戳(ns)，优先使用"
  - name: end_ts
    type: timestamp
    required: false
    description: "帧结束时间戳(ns)"
  # Legacy compatibility (from janky_frame_analysis)
  - name: frame_ts
    type: timestamp
    required: false
    description: "帧开始时间戳(ns)，兼容旧接口，等同于 start_ts"
  - name: frame_dur
    type: duration
    required: false
    description: "帧持续时间(ns)，兼容旧接口，用于计算 end_ts"
  # Thread-specific timing
  - name: main_start_ts
    type: timestamp
    required: false
  - name: main_end_ts
    type: timestamp
    required: false
  - name: main_dur_ms
    type: number
    required: false
  - name: render_start_ts
    type: timestamp
    required: false
  - name: render_end_ts
    type: timestamp
    required: false
  - name: render_dur_ms
    type: number
    required: false
  # Process/frame identity
  - name: package
    type: string
    required: false
  - name: pid
    type: integer
    required: false
  - name: frame_id
    type: integer
    required: false
    description: "帧 ID，可选"
  - name: frame_index
    type: integer
    required: false
  - name: jank_type
    type: string
    required: false
    description: "掉帧类型，可选，默认 'Unknown'"
  - name: dur_ms
    type: number
    required: false
    description: "帧耗时(ms)，可选，可从 start_ts/end_ts 计算"
  - name: session_id
    type: integer
    required: false
  - name: layer_name
    type: string
    required: false
  - name: token_gap
    type: integer
    required: false
    description: "display_frame_token 跳跃值 (>1 表示消费端掉帧)"
  - name: vsync_missed
    type: integer
    required: false
    description: "跳过的 VSync 数量 (token_gap - 1)"
  - name: jank_responsibility
    type: string
    required: false
    description: "掉帧责任归属: APP（BufferTX=0）或 SF（BufferTX>0）"

steps:
  # ===== 数据源检测：Monitor contention 表是否可用（可选）=====
  - id: monitor_contention_check
    type: atomic
    name: "Monitor Contention 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type = 'table' AND name = 'android_monitor_contention'
          ) THEN 1
          ELSE 0
        END as has_monitor_contention
    save_as: monitor_contention

  # ===== 数据源检测：GC 表是否可用 =====
  - id: gc_table_check
    type: atomic
    name: "GC 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type IN ('table', 'view') AND name = 'android_garbage_collection_events'
          ) THEN 1
          ELSE 0
        END as has_gc_table
    save_as: gc_availability
    optional: true

  # ===== 数据源检测：GPU 数据是否可用 =====
  - id: gpu_table_check
    type: atomic
    name: "GPU 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM slice s
            JOIN thread_track tt ON s.track_id = tt.id
            JOIN thread t ON tt.utid = t.utid
            WHERE t.name = 'RenderThread'
              AND (s.name GLOB '*Draw*' OR s.name GLOB '*eglSwap*' OR s.name GLOB '*Fence*')
            LIMIT 1
          ) THEN 1
          ELSE 0
        END as has_gpu_slices,
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type IN ('table', 'view') AND name = 'android_gpu_frequency'
          ) THEN 1
          ELSE 0
        END as has_gpu_freq
    save_as: gpu_availability
    optional: true

  # ===== 数据源检测：Binder 详细数据 =====
  - id: binder_table_check
    type: atomic
    name: "Binder 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type IN ('table', 'view') AND name = 'android_binder_txns'
          ) THEN 1
          ELSE 0
        END as has_binder_table
    save_as: binder_availability
    optional: true

  # 四象限分析：输出格式直接匹配前端展示需求
  # 前端期望: [{ quadrant, name, dur_ms, percentage }]
  - id: quadrant_analysis
    type: atomic
    name: "四象限分析"
    display:
      level: key
      layer: deep
      title: "四大象限"
      columns:
        - name: quadrant
          label: "象限"
          type: string
        - name: name
          label: "名称"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: percentage
          label: "占比"
          type: percentage
          format: percentage
    sql: |
      WITH target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name,
          CASE
            WHEN t.tid = p.pid THEN 'MainThread'
            WHEN t.name = 'RenderThread' THEN 'RenderThread'
            ELSE 'Other'
          END as thread_type,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_start_ts}, ${start_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_start_ts}, ${start_ts})
            ELSE ${start_ts}
          END as thread_start_ts,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_end_ts}, ${end_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_end_ts}, ${end_ts})
            ELSE ${end_ts}
          END as thread_end_ts
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      thread_states AS (
        SELECT
          tt.thread_type,
          ts.state,
          ts.cpu,
          ts.dur,
          CASE
            WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN 'Q1_大核运行'
            WHEN ts.state = 'Running' AND ts.cpu < 4 THEN 'Q2_小核运行'
            WHEN ts.state = 'R' THEN 'Q3_等待调度'
            WHEN ts.state IN ('S', 'D', 'I') THEN 'Q4_休眠阻塞'
            ELSE 'Other'
          END as quadrant_name
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= tt.thread_start_ts
          AND ts.ts < tt.thread_end_ts
      ),
      quadrant_sums AS (
        SELECT
          thread_type,
          quadrant_name,
          SUM(dur) as dur_ns
        FROM thread_states
        WHERE quadrant_name != 'Other'
        GROUP BY thread_type, quadrant_name
      ),
      thread_totals AS (
        SELECT
          thread_type,
          SUM(dur_ns) as total_ns
        FROM quadrant_sums
        GROUP BY thread_type
      )
      SELECT
        qs.thread_type || ' ' || qs.quadrant_name as quadrant,
        qs.thread_type || ' ' || qs.quadrant_name as name,
        ROUND(qs.dur_ns / 1e6, 2) as dur_ms,
        ROUND(100.0 * qs.dur_ns / NULLIF(tt.total_ns, 0), 1) as percentage
      FROM quadrant_sums qs
      JOIN thread_totals tt ON qs.thread_type = tt.thread_type
      WHERE qs.dur_ns > 0
      ORDER BY qs.thread_type, qs.quadrant_name
    save_as: quadrant_data
    output_schema:
      type: array
      items:
        quadrant: { type: string, description: "象限标识 (如 MainThread Q1_大核运行)" }
        name: { type: string, description: "象限名称" }
        dur_ms: { type: number, description: "持续时间(ms)" }
        percentage: { type: number, description: "百分比" }

  # Binder 调用：输出格式直接匹配前端展示需求
  # 前端期望: [{ interface, dur_ms, count }]
  - id: binder_calls
    type: atomic
    name: "Binder 调用"
    display:
      level: detail
      layer: deep
      title: "Binder 调用"
      columns:
        - name: interface
          label: "服务进程"
          type: string
        - name: count
          label: "调用次数"
          type: number
          format: compact
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: sync_count
          label: "同步调用"
          type: number
    sql: |
      SELECT
        server_process as interface,
        COUNT(*) as count,
        ROUND(SUM(client_dur) / 1e6, 2) as dur_ms,
        ROUND(MAX(client_dur) / 1e6, 2) as max_ms,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_count
      FROM android_binder_txns
      WHERE client_ts >= ${start_ts}
        AND client_ts < ${end_ts}
        AND (client_process GLOB '${package}*' OR '${package}' = '')
      GROUP BY server_process
      HAVING dur_ms > 0.5
      ORDER BY dur_ms DESC
      LIMIT 5
    save_as: binder_data
    optional: true
    output_schema:
      type: array
      items:
        interface: { type: string, description: "服务端进程名" }
        count: { type: number, description: "调用次数" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        sync_count: { type: number, description: "同步调用次数" }

  - id: cpu_freq_analysis
    type: atomic
    name: "CPU频率"
    display:
      level: detail
      layer: deep
      title: "CPU 频率"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: avg_freq_mhz
          label: "平均频率"
          type: number
        - name: max_freq_mhz
          label: "最大频率"
          type: number
        - name: min_freq_mhz
          label: "最小频率"
          type: number
    sql: |
      WITH freq_data AS (
        SELECT
          cpu,
          CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          value as freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        core_type,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz
      FROM freq_data
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: freq_data
    optional: true
    output_schema:
      type: array
      items:
        core_type: { type: string, description: "核心类型 (big/little)" }
        avg_freq_mhz: { type: number, description: "平均频率(MHz)" }
        max_freq_mhz: { type: number, description: "最大频率(MHz)" }
        min_freq_mhz: { type: number, description: "最小频率(MHz)" }

  # 主线程耗时操作：输出格式直接匹配前端展示需求
  # 前端期望: [{ name, dur_ms, ts }]
  - id: main_thread_slices
    type: atomic
    name: "主线程耗时操作"
    display:
      level: key
      layer: deep
      title: "主线程耗时操作"
      columns:
        - name: name
          label: "操作名"
          type: string
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.tid = p.pid
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as dur_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        printf('%d', MIN(s.ts)) as ts
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM main_thread)
        AND s.ts >= COALESCE(${main_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${main_end_ts}, ${end_ts})
        AND s.dur >= 1000000
      GROUP BY s.name
      HAVING dur_ms > 1
      ORDER BY dur_ms DESC
      LIMIT 10
    save_as: main_slices
    optional: true
    output_schema:
      type: array
      items:
        name: { type: string, description: "操作名称" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        count: { type: number, description: "执行次数" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        ts: { type: string, description: "首次时间戳(ns字符串)" }

  # RenderThread 耗时操作：输出格式直接匹配前端展示需求
  # 前端期望: [{ name, dur_ms, ts }]
  - id: render_thread_slices
    type: atomic
    name: "RenderThread 耗时操作"
    display:
      level: key
      layer: deep
      title: "RenderThread 耗时操作"
      columns:
        - name: name
          label: "操作名"
          type: string
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: avg_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
    sql: |
      WITH render_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.name = 'RenderThread'
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as dur_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        ROUND(AVG(s.dur) / 1e6, 2) as avg_ms,
        printf('%d', MIN(s.ts)) as ts
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM render_thread)
        AND s.ts >= COALESCE(${render_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${render_end_ts}, ${end_ts})
        AND s.dur >= 500000
      GROUP BY s.name
      HAVING dur_ms > 0.5
      ORDER BY dur_ms DESC
      LIMIT 10
    save_as: render_slices
    optional: true
    output_schema:
      type: array
      items:
        name: { type: string, description: "操作名称" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        count: { type: number, description: "执行次数" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        avg_ms: { type: number, description: "平均耗时(ms)" }
        ts: { type: string, description: "首次时间戳(ns字符串)" }

  - id: cpu_freq_timeline
    type: atomic
    name: "CPU 频率变化时间线"
    display:
      level: detail
      layer: deep
      title: "CPU 频率变化"
      columns:
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
        - name: relative_ms
          label: "相对时间"
          type: duration
          format: duration_ms
        - name: cpu
          label: "CPU"
          type: number
        - name: core_type
          label: "核心类型"
          type: string
        - name: freq_mhz
          label: "频率"
          type: number
        - name: change_direction
          label: "变化"
          type: enum
    sql: |
      WITH freq_events AS (
        SELECT
          c.ts,
          t.cpu,
          c.value as freq_khz,
          CASE WHEN t.cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        printf('%d', ts) as ts,
        ROUND((ts - ${start_ts}) / 1e6, 2) as relative_ms,
        cpu,
        core_type,
        ROUND(freq_khz / 1000, 0) as freq_mhz,
        ROUND(COALESCE(prev_freq_khz, freq_khz) / 1000, 0) as prev_freq_mhz,
        CASE 
          WHEN freq_khz > COALESCE(prev_freq_khz, freq_khz) THEN 'up'
          WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 'down'
          ELSE 'stable'
        END as change_direction
      FROM freq_events
      WHERE freq_khz != COALESCE(prev_freq_khz, 0)
      ORDER BY ts, cpu
      LIMIT 50
    save_as: freq_timeline
    optional: true

  - id: lock_contention
    type: atomic
    name: "锁竞争分析"
    display:
      level: detail
      layer: deep
      title: "锁竞争"
      columns:
        - name: blocking_method
          label: "持锁方法"
          type: string
          format: code
        - name: blocking_thread_name
          label: "持锁线程"
          type: string
        - name: blocked_method
          label: "等锁方法"
          type: string
          format: code
        - name: blocked_thread_name
          label: "等锁线程"
          type: string
        - name: main_blocked
          label: "主线程被阻"
          type: boolean
        - name: wait_ms
          label: "等待时间"
          type: duration
          format: duration_ms
        - name: waiter_count
          label: "等待数"
          type: number
    sql: |
      SELECT
        short_blocking_method as blocking_method,
        blocking_thread_name,
        short_blocked_method as blocked_method,
        blocked_thread_name,
        CASE WHEN is_blocked_thread_main THEN 1 ELSE 0 END as main_blocked,
        ROUND(dur / 1e6, 2) as wait_ms,
        waiter_count
      FROM android_monitor_contention
      WHERE ts >= ${start_ts}
        AND ts < ${end_ts}
        AND (process_name GLOB '${package}*' OR '${package}' = '')
        AND dur >= 500000
      ORDER BY dur DESC
      LIMIT 5
    save_as: lock_data
    optional: true
    condition: "monitor_contention.data[0]?.has_monitor_contention === 1"

  # ===== GC 与帧重叠分析 =====
  - id: gc_in_frame
    type: atomic
    name: "GC 影响分析"
    display:
      level: detail
      layer: deep
      title: "GC 与帧重叠"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: gc_count
          label: "GC 次数"
          type: number
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: overlap_ms
          label: "与帧重叠"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最大单次"
          type: duration
          format: duration_ms
    sql: |
      INCLUDE PERFETTO MODULE android.garbage_collection;
      WITH gc_events AS (
        SELECT
          gc.tid,
          gc.gc_type,
          gc.gc_ts as gc_ts,
          gc.gc_dur as gc_dur,
          -- Calculate overlap with frame window
          MAX(gc.gc_ts, ${start_ts}) as overlap_start,
          MIN(gc.gc_ts + gc.gc_dur, ${end_ts}) as overlap_end
        FROM android_garbage_collection_events gc
        JOIN thread t ON gc.tid = t.tid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND gc.gc_ts < ${end_ts}
          AND gc.gc_ts + gc.gc_dur > ${start_ts}
      )
      SELECT
        gc_type,
        COUNT(*) as gc_count,
        ROUND(SUM(gc_dur) / 1e6, 2) as total_dur_ms,
        ROUND(SUM(CASE WHEN overlap_end > overlap_start THEN overlap_end - overlap_start ELSE 0 END) / 1e6, 2) as overlap_ms,
        ROUND(MAX(gc_dur) / 1e6, 2) as max_dur_ms
      FROM gc_events
      GROUP BY gc_type
      HAVING overlap_ms > 0
      ORDER BY overlap_ms DESC
    save_as: gc_data
    optional: true
    condition: "gc_availability?.data?.[0]?.has_gc_table === 1"

  # ===== IO 阻塞分析（D/DK 状态）=====
  - id: io_blocking
    type: atomic
    name: "IO 阻塞分析"
    display:
      level: detail
      layer: deep
      title: "IO 阻塞"
      columns:
        - name: thread_name
          label: "线程"
          type: string
        - name: blocked_count
          label: "阻塞次数"
          type: number
        - name: total_ms
          label: "总阻塞时间"
          type: duration
          format: duration_ms
        - name: max_ms
          label: "最大单次"
          type: duration
          format: duration_ms
        - name: io_cause
          label: "等待原因"
          type: string
    sql: |
      WITH target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      io_states AS (
        SELECT
          tt.thread_name,
          ts.dur,
          ts.state,
          ts.io_wait,
          ts.blocked_function
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= ${start_ts}
          AND ts.ts < ${end_ts}
          AND ts.state IN ('D', 'DK')
          AND ts.dur > 100000
      )
      SELECT
        thread_name,
        COUNT(*) as blocked_count,
        ROUND(SUM(dur) / 1e6, 2) as total_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_ms,
        COALESCE(
          MAX(blocked_function),
          CASE WHEN MAX(io_wait) = 1 THEN 'IO wait' ELSE 'kernel wait' END
        ) as io_cause
      FROM io_states
      GROUP BY thread_name
      HAVING total_ms > 0.1
      ORDER BY total_ms DESC
    save_as: io_data
    optional: true

