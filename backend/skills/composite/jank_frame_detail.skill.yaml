  # ===== 根因分析总结：综合所有数据给出明确结论 =====
  - id: root_cause_summary
    type: atomic
    name: "根因分析"
    display:
      level: key
      layer: deep
      title: "🎯 根因分析"
      columns:
        - name: primary_cause
          label: "主要原因"
          type: string
        - name: deep_reason
          label: "为什么慢"
          type: string
        - name: optimization_hint
          label: "优化方向"
          type: string
        - name: reason_code
          label: "原因类型"
          type: enum
        - name: secondary_info
          label: "附加信息"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: cause_type
          label: "原因类型"
          type: enum
        - name: mechanism_group
          label: "机制分组"
          type: enum
        - name: supply_constraint
          label: "资源问题"
          type: enum
        - name: trigger_layer
          label: "触发层"
          type: enum
        - name: amplification_path
          label: "放大因素"
          type: enum
        - name: frame_dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
        - name: jank_type
          label: "掉帧类型"
          type: string
    sql: |
      -- 根因分析: 综合四象限、CPU频率、耗时操作等数据，输出明确的根因结论
      WITH
      -- 0. 估算当前帧窗口的 VSync 周期（缺失时回退 8.33ms）
      vsync_ticks AS (
        SELECT
          c.ts,
          c.ts - LAG(c.ts) OVER (ORDER BY c.ts) as interval_ns
        FROM counter c
        JOIN counter_track t ON c.track_id = t.id
        WHERE t.name = 'VSYNC-sf'
          AND c.ts >= ${start_ts} - 100000000
          AND c.ts < ${end_ts} + 100000000
      ),
      vsync_config AS (
        SELECT
          CAST(COALESCE(
            (
              SELECT PERCENTILE(interval_ns, 0.5)
              FROM vsync_ticks
              WHERE interval_ns > 4000000 AND interval_ns < 50000000
            ),
            8333333
          ) AS INTEGER) as vsync_period_ns
      ),
      -- 1. 获取目标线程
      target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name,
          CASE
            WHEN t.tid = p.pid THEN 'MainThread'
            WHEN t.name = 'RenderThread' THEN 'RenderThread'
            ELSE 'Other'
          END as thread_type
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      -- 2. 线程状态分析 (四象限)
      thread_states AS (
        SELECT
          tt.thread_type,
          CASE
            WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN 'Q1'
            WHEN ts.state = 'Running' AND ts.cpu < 4 THEN 'Q2'
            WHEN ts.state = 'R' THEN 'Q3'
            WHEN ts.state IN ('S', 'D', 'I') THEN 'Q4'
            ELSE 'Other'
          END as quadrant,
          SUM(ts.dur) as dur_ns
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= ${start_ts} AND ts.ts < ${end_ts}
        GROUP BY tt.thread_type, quadrant
      ),
      -- 3. 计算各线程四象限百分比
      quadrant_pct AS (
        SELECT
          thread_type,
          quadrant,
          dur_ns,
          ROUND(100.0 * dur_ns / SUM(dur_ns) OVER (PARTITION BY thread_type), 1) as pct
        FROM thread_states
        WHERE quadrant != 'Other'
      ),
      main_summary AS (
        SELECT
          COALESCE(SUM(CASE WHEN quadrant = 'Q1' THEN pct ELSE 0 END), 0) as q1,
          COALESCE(SUM(CASE WHEN quadrant = 'Q2' THEN pct ELSE 0 END), 0) as q2,
          COALESCE(SUM(CASE WHEN quadrant = 'Q3' THEN pct ELSE 0 END), 0) as q3,
          COALESCE(SUM(CASE WHEN quadrant = 'Q4' THEN pct ELSE 0 END), 0) as q4
        FROM quadrant_pct WHERE thread_type = 'MainThread'
      ),
      render_summary AS (
        SELECT
          COALESCE(SUM(CASE WHEN quadrant = 'Q1' THEN pct ELSE 0 END), 0) as q1,
          COALESCE(SUM(CASE WHEN quadrant = 'Q2' THEN pct ELSE 0 END), 0) as q2,
          COALESCE(SUM(CASE WHEN quadrant = 'Q3' THEN pct ELSE 0 END), 0) as q3,
          COALESCE(SUM(CASE WHEN quadrant = 'Q4' THEN pct ELSE 0 END), 0) as q4
        FROM quadrant_pct WHERE thread_type = 'RenderThread'
      ),
      -- 4. 获取最耗时的主线程操作
      main_thread_utid AS (
        SELECT t.utid
        FROM thread t JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '') AND t.tid = p.pid
      ),
      main_thread_tid AS (
        SELECT t.tid
        FROM thread t JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '') AND t.tid = p.pid
      ),
      top_slice AS (
        SELECT
          s.name,
          s.ts as slice_ts,
          s.dur as slice_dur_ns,
          ROUND(s.dur / 1e6, 2) as dur_ms
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        WHERE tt.utid IN (SELECT utid FROM main_thread_utid)
          AND s.ts >= COALESCE(${main_start_ts}, ${start_ts})
          AND s.ts < COALESCE(${main_end_ts}, ${end_ts})
          AND s.dur >= 1000000
        ORDER BY s.dur DESC
        LIMIT 1
      ),
      top_slice_bounds AS (
        SELECT
          slice_ts as slice_start_ns,
          slice_ts + slice_dur_ns as slice_end_ns,
          slice_dur_ns
        FROM top_slice
      ),
      top_slice_state_overlap AS (
        SELECT
          ts.state,
          ts.cpu,
          (
            CASE
              WHEN ts.ts + ts.dur < b.slice_end_ns THEN ts.ts + ts.dur
              ELSE b.slice_end_ns
            END
            -
            CASE
              WHEN ts.ts > b.slice_start_ns THEN ts.ts
              ELSE b.slice_start_ns
            END
          ) as overlap_ns
        FROM thread_state ts
        JOIN main_thread_utid mtu ON ts.utid = mtu.utid
        JOIN top_slice_bounds b
        WHERE ts.ts < b.slice_end_ns
          AND ts.ts + ts.dur > b.slice_start_ns
      ),
      top_slice_cpu_mix AS (
        SELECT
          ROUND(
            100.0 * SUM(CASE WHEN state = 'Running' AND cpu < 4 AND overlap_ns > 0 THEN overlap_ns ELSE 0 END)
            / NULLIF((SELECT slice_dur_ns FROM top_slice_bounds), 0),
            1
          ) as little_run_pct,
          ROUND(
            100.0 * SUM(CASE WHEN state = 'Running' AND cpu >= 4 AND overlap_ns > 0 THEN overlap_ns ELSE 0 END)
            / NULLIF((SELECT slice_dur_ns FROM top_slice_bounds), 0),
            1
          ) as big_run_pct,
          ROUND(
            100.0 * SUM(CASE WHEN state = 'R' AND overlap_ns > 0 THEN overlap_ns ELSE 0 END)
            / NULLIF((SELECT slice_dur_ns FROM top_slice_bounds), 0),
            1
          ) as runnable_pct,
          ROUND(
            100.0 * SUM(CASE WHEN state IN ('S', 'D', 'I', 'DK') AND overlap_ns > 0 THEN overlap_ns ELSE 0 END)
            / NULLIF((SELECT slice_dur_ns FROM top_slice_bounds), 0),
            1
          ) as blocked_pct
        FROM top_slice_state_overlap
      ),
      -- 5. 获取 CPU 频率
      freq_info AS (
        SELECT
          ROUND(AVG(CASE WHEN cpu >= 4 THEN value END) / 1000, 0) as big_avg_freq,
          ROUND(MAX(CASE WHEN cpu >= 4 THEN value END) / 1000, 0) as big_max_freq,
          ROUND(MIN(CASE WHEN cpu >= 4 THEN value END) / 1000, 0) as big_min_freq,
          ROUND(AVG(CASE WHEN cpu < 4 THEN value END) / 1000, 0) as little_avg_freq,
          ROUND(MAX(CASE WHEN cpu < 4 THEN value END) / 1000, 0) as little_max_freq,
          ROUND(MIN(CASE WHEN cpu < 4 THEN value END) / 1000, 0) as little_min_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts} AND c.ts < ${end_ts}
      ),
      top_slice_freq AS (
        SELECT
          ROUND(AVG(CASE WHEN t.cpu >= 4 THEN c.value END) / 1000, 0) as top_big_avg_freq_mhz,
          ROUND(MAX(CASE WHEN t.cpu >= 4 THEN c.value END) / 1000, 0) as top_big_max_freq_mhz,
          ROUND(MIN(CASE WHEN t.cpu >= 4 THEN c.value END) / 1000, 0) as top_big_min_freq_mhz,
          ROUND(AVG(CASE WHEN t.cpu < 4 THEN c.value END) / 1000, 0) as top_little_avg_freq_mhz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND EXISTS (SELECT 1 FROM top_slice_bounds)
          AND c.ts >= (SELECT slice_start_ns FROM top_slice_bounds)
          AND c.ts < (SELECT slice_end_ns FROM top_slice_bounds)
      ),
      big_freq_window AS (
        SELECT c.ts, c.value as freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND t.cpu >= 4
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      ),
      big_freq_stats AS (
        SELECT
          MAX(freq_khz) as peak_khz,
          MIN(freq_khz) as min_khz,
          AVG(freq_khz) as avg_khz
        FROM big_freq_window
      ),
      big_freq_ramp AS (
        SELECT
          ROUND(
            (
              COALESCE(
                MIN(
                  CASE
                    WHEN b.freq_khz >=
                      CASE
                        WHEN s.peak_khz IS NULL THEN NULL
                        WHEN s.peak_khz * 0.70 > 1800000 THEN s.peak_khz * 0.70
                        ELSE 1800000
                      END
                    THEN b.ts
                  END
                ),
                ${end_ts}
              ) - ${start_ts}
            ) / 1e6,
            2
          ) as ramp_to_high_ms,
          ROUND(
            (COALESCE(MIN(CASE WHEN b.freq_khz >= 2000000 THEN b.ts END), ${end_ts}) - ${start_ts}) / 1e6,
            2
          ) as ramp_to_2g_ms
        FROM big_freq_window b
        CROSS JOIN big_freq_stats s
      ),
      -- 6. IO 阻塞检测（主线程 D/DK 状态）
      io_block AS (
        SELECT COALESCE(ROUND(SUM(ts2.dur) / 1e6, 2), 0) as io_block_ms
        FROM thread_state ts2
        JOIN target_threads tt2 ON ts2.utid = tt2.utid
        WHERE tt2.thread_type = 'MainThread'
          AND ts2.ts >= ${start_ts} AND ts2.ts < ${end_ts}
          AND ts2.state IN ('D', 'DK')
      ),
      -- 7. 调度延迟检测（Runnable 等待）
      sched_latency AS (
        SELECT
          COALESCE(ROUND(MAX(ts3.dur) / 1e6, 2), 0) as max_sched_ms,
          COALESCE(ROUND(SUM(ts3.dur) / 1e6, 2), 0) as total_sched_ms
        FROM thread_state ts3
        JOIN target_threads tt3 ON ts3.utid = tt3.utid
        WHERE tt3.thread_type = 'MainThread'
          AND ts3.ts >= ${start_ts} AND ts3.ts < ${end_ts}
          AND ts3.state = 'R'
      ),
      -- 8. GPU Fence 检测
      gpu_fence AS (
        SELECT COALESCE(ROUND(SUM(s.dur) / 1e6, 2), 0) as fence_ms
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.name = 'RenderThread'
          AND s.ts >= ${start_ts} AND s.ts < ${end_ts}
          AND (s.name GLOB '*Fence*' OR s.name GLOB '*fence*')
      ),
      -- 9. CPU 簇负载检测
      cluster_load AS (
        SELECT
          ROUND(100.0 * SUM(CASE WHEN ts.cpu >= 4 THEN
            MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts})
          ELSE 0 END) / NULLIF((${end_ts} - ${start_ts}) * 4, 0), 1) as big_load_pct,
          ROUND(100.0 * SUM(CASE WHEN ts.cpu < 4 THEN
            MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts})
          ELSE 0 END) / NULLIF((${end_ts} - ${start_ts}) * 4, 0), 1) as little_load_pct
        FROM thread_state ts
        WHERE ts.ts < ${end_ts}
          AND ts.ts + ts.dur > ${start_ts}
          AND ts.state = 'Running'
          AND ts.cpu IS NOT NULL
      ),
      -- 10. 主线程同步 Binder 与关键 slice 重叠分析
      binder_sync_main AS (
        SELECT
          bt.client_ts,
          bt.client_dur,
          bt.server_process
        FROM android_binder_txns bt
        WHERE bt.client_tid IN (SELECT tid FROM main_thread_tid)
          AND bt.is_sync = 1
          AND bt.client_ts < ${end_ts}
          AND bt.client_ts + bt.client_dur > ${start_ts}
      ),
      binder_frame AS (
        SELECT
          ROUND(COALESCE(SUM(client_dur), 0) / 1e6, 2) as sync_total_ms,
          ROUND(COALESCE(MAX(client_dur), 0) / 1e6, 2) as sync_max_ms,
          COUNT(*) as sync_count
        FROM binder_sync_main
      ),
      binder_overlap AS (
        SELECT
          ROUND(
            COALESCE(
              SUM(
                CASE
                  WHEN b.client_ts < tsb.slice_end_ns
                    AND b.client_ts + b.client_dur > tsb.slice_start_ns
                  THEN
                    (
                      CASE
                        WHEN b.client_ts + b.client_dur < tsb.slice_end_ns THEN b.client_ts + b.client_dur
                        ELSE tsb.slice_end_ns
                      END
                      -
                      CASE
                        WHEN b.client_ts > tsb.slice_start_ns THEN b.client_ts
                        ELSE tsb.slice_start_ns
                      END
                    )
                  ELSE 0
                END
              ),
              0
            ) / 1e6,
            2
          ) as overlap_ms,
          ROUND(
            COALESCE(
              MAX(
                CASE
                  WHEN b.client_ts < tsb.slice_end_ns
                    AND b.client_ts + b.client_dur > tsb.slice_start_ns
                  THEN
                    (
                      CASE
                        WHEN b.client_ts + b.client_dur < tsb.slice_end_ns THEN b.client_ts + b.client_dur
                        ELSE tsb.slice_end_ns
                      END
                      -
                      CASE
                        WHEN b.client_ts > tsb.slice_start_ns THEN b.client_ts
                        ELSE tsb.slice_start_ns
                      END
                    )
                  ELSE 0
                END
              ),
              0
            ) / 1e6,
            2
          ) as max_overlap_ms,
          COALESCE(
            MAX(
              CASE
                WHEN b.client_ts < tsb.slice_end_ns
                  AND b.client_ts + b.client_dur > tsb.slice_start_ns
                THEN b.server_process
                ELSE NULL
              END
            ),
            ''
          ) as overlap_server
        FROM binder_sync_main b
        JOIN top_slice_bounds tsb
      ),
      -- 10. 综合根因判断
      analysis AS (
        SELECT
          (SELECT dur_ms FROM top_slice) as slice_dur,
          (SELECT name FROM top_slice) as slice_name,
          ROUND(((SELECT slice_ts FROM top_slice) - ${start_ts}) / 1e6, 2) as top_slice_offset_ms,
          (SELECT q1 FROM main_summary) as main_q1,
          (SELECT q2 FROM main_summary) as main_q2,
          (SELECT q3 FROM main_summary) as main_q3,
          (SELECT q4 FROM main_summary) as main_q4,
          (SELECT q1 FROM render_summary) as render_q1,
          (SELECT q2 FROM render_summary) as render_q2,
          (SELECT q3 FROM render_summary) as render_q3,
          (SELECT q4 FROM render_summary) as render_q4,
          (SELECT big_avg_freq FROM freq_info) as big_freq,
          (SELECT big_max_freq FROM freq_info) as big_freq_peak,
          (SELECT big_min_freq FROM freq_info) as big_freq_min,
          (SELECT little_avg_freq FROM freq_info) as little_freq,
          (SELECT little_max_freq FROM freq_info) as little_freq_peak,
          (SELECT little_min_freq FROM freq_info) as little_freq_min,
          (SELECT little_run_pct FROM top_slice_cpu_mix) as top_slice_little_pct,
          (SELECT big_run_pct FROM top_slice_cpu_mix) as top_slice_big_pct,
          (SELECT runnable_pct FROM top_slice_cpu_mix) as top_slice_runnable_pct,
          (SELECT blocked_pct FROM top_slice_cpu_mix) as top_slice_blocked_pct,
          (SELECT top_big_avg_freq_mhz FROM top_slice_freq) as top_big_avg_freq_mhz,
          (SELECT top_big_max_freq_mhz FROM top_slice_freq) as top_big_max_freq_mhz,
          (SELECT top_big_min_freq_mhz FROM top_slice_freq) as top_big_min_freq_mhz,
          (SELECT top_little_avg_freq_mhz FROM top_slice_freq) as top_little_avg_freq_mhz,
          (SELECT ramp_to_high_ms FROM big_freq_ramp) as ramp_to_high_ms,
          (SELECT ramp_to_2g_ms FROM big_freq_ramp) as ramp_to_2g_ms,
          (SELECT overlap_ms FROM binder_overlap) as binder_overlap_ms,
          (SELECT max_overlap_ms FROM binder_overlap) as binder_max_overlap_ms,
          (SELECT overlap_server FROM binder_overlap) as binder_overlap_server,
          (SELECT sync_total_ms FROM binder_frame) as binder_sync_total_ms,
          (SELECT sync_max_ms FROM binder_frame) as binder_sync_max_ms,
          (SELECT sync_count FROM binder_frame) as binder_sync_count,
          (SELECT io_block_ms FROM io_block) as io_block_ms,
          (SELECT max_sched_ms FROM sched_latency) as max_sched_ms,
          (SELECT total_sched_ms FROM sched_latency) as total_sched_ms,
          (SELECT fence_ms FROM gpu_fence) as fence_ms,
          (SELECT big_load_pct FROM cluster_load) as big_load_pct,
          (SELECT little_load_pct FROM cluster_load) as little_load_pct,
          ROUND((SELECT vsync_period_ns FROM vsync_config) / 1e6, 2) as frame_budget_ms,
          ROUND(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.50, 2) as slice_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.20, 2.0), 2) as slice_warning_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.18, 1.5), 2) as gpu_fence_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.06, 0.8), 2) as gpu_fence_warning_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.30, 3.5), 2) as sched_max_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.18, 2.0), 2) as total_sched_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.12, 1.5), 2) as io_block_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.18, 1.5), 2) as binder_overlap_critical_ms,
          ROUND(MAX(((SELECT vsync_period_ns FROM vsync_config) / 1e6) * 0.35, 2.0), 2) as freq_ramp_critical_ms
      )
      , classified AS (
        SELECT
          *,
          CASE
            WHEN slice_dur > slice_critical_ms
              AND binder_overlap_ms >= binder_overlap_critical_ms
              THEN 'binder_sync_blocking'
            WHEN slice_dur > slice_critical_ms
              AND COALESCE(top_slice_little_pct, 0) >= 45
              THEN 'small_core_placement'
            WHEN slice_dur > slice_critical_ms
              AND COALESCE(top_slice_runnable_pct, 0) >= 15
              THEN 'sched_delay_in_slice'
            WHEN slice_dur > slice_critical_ms
              AND COALESCE(top_slice_big_pct, 0) >= 40
              AND COALESCE(top_big_avg_freq_mhz, 0) > 0
              AND COALESCE(top_big_max_freq_mhz, 0) > 0
              AND top_big_avg_freq_mhz < top_big_max_freq_mhz * 0.55
              THEN 'big_core_low_freq'
            WHEN slice_dur > slice_critical_ms
              AND COALESCE(ramp_to_high_ms, 0) > freq_ramp_critical_ms
              AND COALESCE(top_slice_offset_ms, 0) <= ramp_to_high_ms
              THEN 'freq_ramp_slow'
            WHEN slice_dur > slice_critical_ms
              THEN 'workload_heavy'
            WHEN max_sched_ms > sched_max_critical_ms
              OR total_sched_ms > total_sched_critical_ms
              OR main_q3 > 20
              THEN 'scheduling_delay'
            WHEN main_q2 > 50
              THEN 'small_core_placement'
            WHEN big_freq > 0 AND big_freq_peak > 0 AND big_freq < big_freq_peak * 0.45
              THEN 'big_core_low_freq'
            WHEN big_load_pct > 90 OR (big_load_pct > 70 AND little_load_pct > 70)
              THEN 'cpu_load_high'
            WHEN io_block_ms > io_block_critical_ms OR main_q4 > 30
              THEN 'blocking_wait'
            WHEN fence_ms > gpu_fence_warning_ms
              THEN 'gpu_wait'
            ELSE 'unknown'
          END as reason_code
        FROM analysis
      )
      , base_result AS (
        SELECT
          CASE
            -- 优先级1: 主线程有明确耗时操作（相对帧预算）
            WHEN slice_dur > slice_critical_ms THEN
              '主线程耗时操作 "' || slice_name || '" 占用 ' || slice_dur || 'ms (帧预算 ' || frame_budget_ms || 'ms)'
            -- 优先级2: GPU Fence 等待（相对帧预算）
            WHEN fence_ms > gpu_fence_critical_ms THEN
              'GPU Fence 等待 ' || ROUND(fence_ms, 1) || 'ms，GPU 繁忙无法及时完成渲染'
            -- 优先级3: 严重调度延迟（相对帧预算）
            WHEN max_sched_ms > sched_max_critical_ms THEN
              '主线程调度延迟严重: 最大等待 ' || ROUND(max_sched_ms, 1) || 'ms'
            -- 优先级4: 主线程大量等待调度 (Q3 > 20%)
            WHEN main_q3 > 20 THEN
              '主线程 CPU 争抢严重 (' || main_q3 || '% 时间在等待调度)'
            -- 优先级5: 主线程 IO 阻塞（相对帧预算）
            WHEN io_block_ms > io_block_critical_ms THEN
              '主线程 IO 阻塞 ' || ROUND(io_block_ms, 1) || 'ms (D 状态)'
            -- 优先级6: 总调度延迟（相对帧预算）
            WHEN total_sched_ms > total_sched_critical_ms THEN
              '主线程 Runnable 累计等待 ' || ROUND(total_sched_ms, 1) || 'ms'
            -- 优先级7: 主线程被阻塞 (Q4 > 30%)
            WHEN main_q4 > 30 THEN
              '主线程阻塞等待 (Binder/IO/锁)，休眠占比 ' || main_q4 || '%'
            -- 优先级8: RenderThread 休眠 (Q4 > 50%)
            WHEN render_q4 > 50 THEN
              'RenderThread 长时间休眠 (' || render_q4 || '%)，等待主线程或 GPU'
            -- 优先级9: 主线程在小核运行 (Q2 > 50%)
            WHEN main_q2 > 50 THEN
              '主线程被调度到小核 (' || main_q2 || '%)，CPU 能力不足'
            -- 优先级10: CPU 频率问题
            WHEN big_freq < 1200 AND big_freq > 0 THEN
              '大核频率过低 (' || big_freq || 'MHz)，可能触发温控限频'
            -- 优先级11: 大核簇负载过高 (>90%)
            WHEN big_load_pct > 90 THEN
              '大核簇负载 ' || ROUND(big_load_pct, 0) || '%，CPU 资源严重不足'
            -- 优先级12: GPU Fence 中等延迟（相对帧预算）
            WHEN fence_ms > gpu_fence_warning_ms THEN
              'GPU Fence 等待 ' || ROUND(fence_ms, 1) || 'ms'
            -- 优先级13: CPU 整体负载高
            WHEN big_load_pct > 70 AND little_load_pct > 70 THEN
              'CPU 整体负载高 (大核 ' || ROUND(big_load_pct, 0) || '%, 小核 ' || ROUND(little_load_pct, 0) || '%)'
            -- 优先级14: 有中等耗时操作（相对帧预算）
            WHEN slice_dur > slice_warning_ms THEN
              '主线程操作 "' || slice_name || '" 耗时 ' || slice_dur || 'ms'
            -- 默认
            ELSE '帧耗时 ${dur_ms}ms 超过 VSync 周期(' || frame_budget_ms || 'ms)'
          END as primary_cause,
          CASE
            WHEN reason_code = 'binder_sync_blocking' THEN
              'Binder 同步阻塞：关键操作与同步Binder重叠 ' || binder_overlap_ms || 'ms（累计 ' ||
              binder_sync_total_ms || 'ms' ||
              CASE
                WHEN COALESCE(binder_overlap_server, '') != '' THEN '，对端 ' || binder_overlap_server || ''
                ELSE ''
              END || '）'
            WHEN reason_code = 'small_core_placement' THEN
              '线程更多跑在小核：关键操作小核运行占比 ' || COALESCE(top_slice_little_pct, 0) ||
              '%（大核占比 ' || COALESCE(top_slice_big_pct, 0) || '%）'
            WHEN reason_code = 'sched_delay_in_slice' THEN
              '调度延迟：关键操作中 Runnable 等待占比 ' || COALESCE(top_slice_runnable_pct, 0) ||
              '%，主线程最大调度等待 ' || COALESCE(max_sched_ms, 0) || 'ms'
            WHEN reason_code = 'big_core_low_freq' THEN
              '大核低频：关键操作大核运行占比 ' || COALESCE(top_slice_big_pct, 0) ||
              '%，但平均频率仅 ' || COALESCE(top_big_avg_freq_mhz, big_freq) || 'MHz（片内峰值 ' ||
              COALESCE(top_big_max_freq_mhz, big_freq_peak) || 'MHz）'
            WHEN reason_code = 'freq_ramp_slow' THEN
              '频率爬升慢：帧开始后 ' || COALESCE(ramp_to_high_ms, 0) ||
              'ms 才升到高频，关键操作起点 +' || COALESCE(top_slice_offset_ms, 0) || 'ms'
            WHEN reason_code = 'workload_heavy' THEN
              CASE
                WHEN slice_name GLOB '*RV*Prefetch*' OR slice_name GLOB '*OnBind*' OR slice_name GLOB '*Adapter*bind*' OR slice_name GLOB '*bind*'
                  THEN '业务负载重：列表预取/绑定逻辑在主线程串行执行 ' || slice_dur || 'ms'
                ELSE '业务负载重：主线程业务逻辑本身执行 ' || slice_dur || 'ms'
              END
            WHEN reason_code = 'scheduling_delay' THEN
              '调度延迟：主线程 Runnable 累计 ' || COALESCE(total_sched_ms, 0) ||
              'ms（最大 ' || COALESCE(max_sched_ms, 0) || 'ms）'
            WHEN reason_code = 'cpu_load_high' THEN
              'CPU 负载高：大核负载 ' || COALESCE(big_load_pct, 0) ||
              '%，小核负载 ' || COALESCE(little_load_pct, 0) || '%'
            WHEN reason_code = 'blocking_wait' THEN
              '阻塞等待：主线程阻塞/IO 等待 ' || COALESCE(io_block_ms, 0) || 'ms，Q4 占比 ' || COALESCE(main_q4, 0) || '%'
            WHEN reason_code = 'gpu_wait' THEN
              'GPU 等待：RenderThread/GPU Fence 累计等待 ' || COALESCE(fence_ms, 0) || 'ms'
            ELSE NULL
          END as deep_reason,
          CASE
            WHEN reason_code = 'binder_sync_blocking' THEN '优化方向：减少主线程同步 Binder（异步化/批量化/结果缓存）并压缩关键路径 IPC'
            WHEN reason_code = 'small_core_placement' THEN '优化方向：保证关键滚动路径优先使用大核，减少后台线程对主线程的抢占'
            WHEN reason_code = 'sched_delay_in_slice' OR reason_code = 'scheduling_delay' THEN '优化方向：降低同窗并发与高优线程竞争，缩短主线程 Runnable 等待'
            WHEN reason_code = 'big_core_low_freq' THEN '优化方向：在输入/滚动前预拉频，避免大核低频执行关键 UI 热路径'
            WHEN reason_code = 'freq_ramp_slow' THEN '优化方向：使用 touch/scroll boost 提前拉频，减少频率爬升滞后'
            WHEN reason_code = 'workload_heavy' THEN
              CASE
                WHEN slice_name GLOB '*RV*Prefetch*' OR slice_name GLOB '*OnBind*' OR slice_name GLOB '*Adapter*bind*' OR slice_name GLOB '*bind*'
                  THEN '优化方向：拆分 RV Prefetch/OnBind 重逻辑，预计算和缓存绑定数据，避免主线程串行重活'
                ELSE '优化方向：把关键帧内重逻辑拆分到后台并做结果复用，缩短主线程单次执行时长'
              END
            WHEN reason_code = 'cpu_load_high' THEN '优化方向：降低 CPU 总负载并限制后台并发，优先保障 UI 与 RenderThread 预算'
            WHEN reason_code = 'blocking_wait' THEN '优化方向：减少主线程同步等待（Binder/锁/IO），缩短临界区和同步链路'
            WHEN reason_code = 'gpu_wait' THEN '优化方向：降低 draw 复杂度/overdraw，减少 GPU Fence 等待'
            ELSE '优化方向：扩大同窗样本做聚类，确认该慢原因是否稳定复现'
          END as optimization_hint,
          reason_code,
          CASE
            WHEN reason_code = 'binder_sync_blocking' THEN '同步 Binder 重叠 ' || COALESCE(binder_overlap_ms, 0) || 'ms'
            WHEN reason_code = 'small_core_placement' THEN '关键操作小核占比 ' || COALESCE(top_slice_little_pct, 0) || '%'
            WHEN reason_code = 'sched_delay_in_slice' THEN '关键操作 Runnable 占比 ' || COALESCE(top_slice_runnable_pct, 0) || '%'
            WHEN reason_code = 'big_core_low_freq' THEN '关键操作大核频率 ' || COALESCE(top_big_avg_freq_mhz, big_freq) || 'MHz'
            WHEN reason_code = 'freq_ramp_slow' THEN '高频拉升耗时 ' || COALESCE(ramp_to_high_ms, 0) || 'ms'
            WHEN reason_code = 'workload_heavy' THEN '关键业务操作 ' || COALESCE(slice_name, 'unknown') || ' 执行 ' || COALESCE(slice_dur, 0) || 'ms'
            WHEN fence_ms > gpu_fence_warning_ms THEN 'GPU Fence 等待 ' || ROUND(fence_ms, 1) || 'ms'
            WHEN total_sched_ms > (total_sched_critical_ms * 0.5) THEN '调度等待累计 ' || ROUND(total_sched_ms, 1) || 'ms'
            WHEN big_load_pct > 70 THEN '大核负载 ' || ROUND(big_load_pct, 0) || '%'
            WHEN big_freq > 0 AND big_freq < 1500 THEN '大核平均频率 ' || big_freq || 'MHz'
            WHEN main_q2 > 30 THEN '小核运行占比 ' || main_q2 || '%'
            ELSE NULL
          END as secondary_info,
          CASE
            WHEN slice_dur > slice_critical_ms THEN '高'
            WHEN fence_ms > gpu_fence_critical_ms THEN '高'
            WHEN max_sched_ms > sched_max_critical_ms THEN '高'
            WHEN main_q3 > 20 THEN '高'
            WHEN io_block_ms > io_block_critical_ms THEN '高'
            WHEN total_sched_ms > total_sched_critical_ms THEN '高'
            WHEN big_load_pct > 90 THEN '高'
            WHEN main_q4 > 30 THEN '中'
            WHEN fence_ms > gpu_fence_warning_ms THEN '中'
            WHEN big_load_pct > 70 AND little_load_pct > 70 THEN '中'
            WHEN slice_dur > slice_warning_ms THEN '中'
            ELSE '低'
          END as confidence,
          CASE
            WHEN slice_dur > slice_critical_ms THEN 'slice'
            WHEN fence_ms > gpu_fence_critical_ms THEN 'gpu_fence'
            WHEN max_sched_ms > sched_max_critical_ms THEN 'sched_latency'
            WHEN main_q3 > 20 THEN 'cpu_contention'
            WHEN io_block_ms > io_block_critical_ms THEN 'io_blocking'
            WHEN total_sched_ms > total_sched_critical_ms THEN 'sched_latency'
            WHEN main_q4 > 30 THEN 'blocking'
            WHEN render_q4 > 50 THEN 'render_wait'
            WHEN main_q2 > 50 THEN 'small_core'
            WHEN big_freq < 1200 AND big_freq > 0 THEN 'freq_limit'
            WHEN big_load_pct > 90 THEN 'cpu_overload'
            WHEN fence_ms > gpu_fence_warning_ms THEN 'gpu_fence'
            WHEN big_load_pct > 70 AND little_load_pct > 70 THEN 'cpu_overload'
            ELSE 'unknown'
          END as cause_type,
          slice_name,
          slice_dur,
          frame_budget_ms,
          ${dur_ms} as frame_dur_ms,
          '${jank_type}' as jank_type,
          '${jank_responsibility}' as jank_responsibility,
          max_sched_ms,
          total_sched_ms,
          main_q2,
          main_q3,
          main_q4,
          big_freq,
          big_freq_peak,
          top_slice_little_pct,
          top_slice_big_pct,
          top_slice_runnable_pct,
          top_big_avg_freq_mhz,
          top_big_max_freq_mhz,
          ramp_to_high_ms,
          binder_overlap_ms,
          binder_sync_total_ms,
          big_load_pct,
          little_load_pct,
          io_block_ms,
          render_q4,
          fence_ms,
          sched_max_critical_ms,
          total_sched_critical_ms,
          io_block_critical_ms
        FROM classified
      )
      SELECT
        primary_cause,
        deep_reason,
        optimization_hint,
        reason_code,
        secondary_info,
        confidence,
        cause_type,
        slice_name,
        slice_dur,
        frame_budget_ms,
        main_q3 as main_q3_pct,
        main_q4 as main_q4_pct,
        render_q4 as render_q4_pct,
        max_sched_ms as main_max_sched_ms,
        io_block_ms as main_io_block_ms,
        fence_ms as gpu_fence_ms,
        frame_dur_ms,
        jank_type,
        CASE
          WHEN cause_type IN ('slice', 'blocking', 'io_blocking') THEN 'trigger'
          WHEN cause_type IN ('sched_latency', 'cpu_contention', 'small_core', 'freq_limit', 'cpu_overload') THEN 'supply'
          WHEN cause_type IN ('gpu_fence', 'render_wait') THEN 'amplification'
          ELSE 'unknown'
        END as mechanism_group,
        CASE
          WHEN reason_code IN ('binder_sync_blocking', 'blocking_wait') THEN 'blocking_wait'
          WHEN reason_code = 'small_core_placement' THEN 'core_placement'
          WHEN reason_code IN ('big_core_low_freq', 'freq_ramp_slow') THEN 'frequency_insufficient'
          WHEN reason_code IN ('sched_delay_in_slice', 'scheduling_delay') THEN 'scheduling_delay'
          WHEN reason_code = 'cpu_load_high' THEN 'load_high'
          WHEN reason_code = 'workload_heavy' THEN 'none'
          WHEN io_block_ms > io_block_critical_ms OR main_q4 > 30 THEN 'blocking_wait'
          WHEN big_freq < 1200 AND big_freq > 0 THEN 'frequency_insufficient'
          WHEN main_q2 > 50 THEN 'core_placement'
          WHEN max_sched_ms > sched_max_critical_ms OR total_sched_ms > total_sched_critical_ms OR main_q3 > 20 THEN 'scheduling_delay'
          WHEN big_load_pct > 90 OR (big_load_pct > 70 AND little_load_pct > 70) THEN 'load_high'
          WHEN cause_type = 'freq_limit' THEN 'frequency_insufficient'
          WHEN cause_type = 'small_core' THEN 'core_placement'
          WHEN cause_type IN ('sched_latency', 'cpu_contention') THEN 'scheduling_delay'
          WHEN cause_type = 'cpu_overload' THEN 'load_high'
          WHEN cause_type IN ('blocking', 'io_blocking') THEN 'blocking_wait'
          ELSE 'none'
        END as supply_constraint,
        CASE
          WHEN cause_type IN ('slice', 'blocking', 'io_blocking', 'sched_latency', 'cpu_contention', 'small_core', 'freq_limit', 'cpu_overload') THEN 'app_producer'
          WHEN cause_type IN ('gpu_fence', 'render_wait') THEN 'sf_consumer'
          ELSE 'unknown'
        END as trigger_layer,
        CASE
          WHEN cause_type = 'gpu_fence' THEN 'gpu_fence_wait'
          WHEN cause_type = 'render_wait' THEN 'render_pipeline_wait'
          WHEN jank_responsibility = 'SF' THEN 'sf_consumer_backpressure'
          WHEN jank_responsibility = 'APP' THEN 'app_deadline_miss'
          ELSE 'unknown'
        END as amplification_path
      FROM base_result
    save_as: root_cause
    optional: true

  - id: frame_diagnosis
    type: diagnostic
    name: "帧诊断"
    display:
      level: detail
      layer: deep
      title: "详细诊断"
    inputs: [quadrant_data, binder_data, freq_data, main_slices, render_slices, freq_timeline, lock_data, gc_data, io_data, root_cause, sched_data, migration_data, gpu_data, binder_blocking_data, throttling_data, cluster_load_data, page_fault_data, sf_data, gpu_freq_data, vsync_data, pipeline_data]
    rules:
      # ===== 最高优先级：根因分析总结 =====
      - condition: "root_cause?.data?.[0]?.primary_cause"
        severity: critical
        diagnosis: "${root_cause.data[0].primary_cause}"
        confidence: "${root_cause.data[0].confidence === '高' ? 'high' : root_cause.data[0].confidence === '中' ? 'medium' : 'low'}"
        suggestions:
          - "${root_cause.data[0].secondary_info || '查看下方详细数据分析具体原因'}"

      # ===== 高优先级：锁竞争 =====
      - condition: "lock_data?.data?.length > 0 && lock_data.data[0]?.wait_ms > 1"
        severity: critical
        diagnosis: "锁竞争等待 ${lock_data.data[0].wait_ms}ms (${lock_data.data[0].blocking_method})"
        confidence: high
        suggestions:
          - "检查持锁线程是否在做耗时操作"
          - "考虑减少锁粒度或使用无锁数据结构"

      - condition: "lock_data?.data?.length > 0 && lock_data.data[0]?.main_blocked === 1"
        severity: critical
        diagnosis: "主线程被锁阻塞 (等待 ${lock_data.data[0].blocking_thread_name})"
        confidence: high
        suggestions:
          - "避免在持锁时做 Binder/IO 操作"
          - "考虑使用异步锁或拆分锁"

      # ===== 高优先级：IO 阻塞 =====
      - condition: "io_data?.data?.length > 0 && io_data.data[0]?.total_ms > 3"
        severity: critical
        diagnosis: "IO 阻塞 ${io_data.data[0].total_ms}ms (${io_data.data[0].thread_name}, ${io_data.data[0].io_cause})"
        confidence: high
        suggestions:
          - "将文件/数据库 IO 移到后台线程"
          - "检查是否有不必要的同步 IO 操作"

      - condition: "io_data?.data?.length > 0 && io_data.data[0]?.total_ms > 1"
        severity: warning
        diagnosis: "${io_data.data[0].thread_name} IO 等待 ${io_data.data[0].total_ms}ms"
        confidence: high
        suggestions:
          - "检查帧期间是否有磁盘读写操作"
          - "考虑使用内存映射或预加载"

      # ===== 高优先级：GC 影响 =====
      - condition: "gc_data?.data?.length > 0 && gc_data.data.reduce((s, g) => s + (g.overlap_ms || 0), 0) > 3"
        severity: critical
        diagnosis: "GC 严重影响帧渲染：总重叠 ${gc_data.data.reduce((s, g) => s + (g.overlap_ms || 0), 0).toFixed(1)}ms"
        confidence: high
        suggestions:
          - "减少帧期间的对象分配"
          - "检查是否有大对象频繁创建"
          - "考虑对象池化或预分配"

      - condition: "gc_data?.data?.length > 0 && gc_data.data[0]?.overlap_ms > 1"
        severity: warning
        diagnosis: "GC (${gc_data.data[0].gc_type}) 与帧重叠 ${gc_data.data[0].overlap_ms}ms"
        confidence: high
        suggestions:
          - "减少短生命周期对象的分配"
          - "避免在 onDraw/onLayout 中创建对象"

      # ===== 高优先级：调度延迟 =====
      - condition: "sched_data?.data?.length > 0 && sched_data.data[0]?.max_latency_ms > 5"
        severity: critical
        diagnosis: "${sched_data.data[0].thread_name} 调度延迟严重: 最大 ${sched_data.data[0].max_latency_ms}ms"
        confidence: high
        suggestions:
          - "检查系统是否有高优先级进程抢占 CPU"
          - "考虑提高 UI 线程优先级"
          - "检查后台任务是否过于密集"

      - condition: "sched_data?.data?.length > 0 && sched_data.data[0]?.total_runnable_ms > 3"
        severity: warning
        diagnosis: "${sched_data.data[0].thread_name} Runnable 等待 ${sched_data.data[0].total_runnable_ms}ms (${sched_data.data[0].runnable_count}次)"
        confidence: high
        suggestions:
          - "系统 CPU 资源紧张"
          - "检查是否有密集计算任务"

      # ===== 高优先级：大小核迁移 =====
      - condition: "migration_data?.data?.length > 0 && migration_data.data[0]?.big_to_little > 2"
        severity: warning
        diagnosis: "${migration_data.data[0].thread_name} 从大核迁移到小核 ${migration_data.data[0].big_to_little}次"
        confidence: high
        suggestions:
          - "检查系统温控策略是否过于激进"
          - "考虑绑定 UI 线程到大核"

      - condition: "migration_data?.data?.length > 0 && migration_data.data[0]?.big_core_pct < 30"
        severity: warning
        diagnosis: "${migration_data.data[0].thread_name} 大核运行占比仅 ${migration_data.data[0].big_core_pct}%"
        confidence: high
        suggestions:
          - "UI 线程未能获得足够大核资源"
          - "检查调度器配置"

      # ===== 高优先级：GPU 操作 =====
      - condition: "gpu_data?.data?.find(g => g.operation === 'GPU Fence Wait')?.total_ms > 3"
        severity: critical
        diagnosis: "GPU Fence 等待 ${gpu_data.data.find(g => g.operation === 'GPU Fence Wait')?.total_ms}ms"
        confidence: high
        suggestions:
          - "GPU 繁忙，无法及时完成上一帧"
          - "检查是否有复杂的 GPU 着色器"
          - "减少过度绘制"

      - condition: "gpu_data?.data?.find(g => g.operation === 'EGL SwapBuffers')?.max_ms > 5"
        severity: warning
        diagnosis: "EGL SwapBuffers 耗时 ${gpu_data.data.find(g => g.operation === 'EGL SwapBuffers')?.max_ms}ms"
        confidence: high
        suggestions:
          - "帧缓冲交换延迟，可能是 GPU/SF 瓶颈"
          - "检查三缓冲是否正常"

      # ===== 高优先级：Binder 阻塞 =====
      - condition: "binder_blocking_data?.data?.length > 0 && binder_blocking_data.data[0]?.max_block_ms > 5"
        severity: critical
        diagnosis: "Binder 同步调用阻塞 ${binder_blocking_data.data[0].max_block_ms}ms (${binder_blocking_data.data[0].server_process})"
        confidence: high
        suggestions:
          - "将 Binder 调用移到后台线程"
          - "使用 oneway Binder 调用"
          - "检查服务端是否有性能问题"

      - condition: "binder_blocking_data?.data?.length > 0 && binder_blocking_data.data[0]?.total_block_ms > 2"
        severity: warning
        diagnosis: "Binder 调用总阻塞 ${binder_blocking_data.data[0].total_block_ms}ms (${binder_blocking_data.data[0].call_count}次)"
        confidence: high
        suggestions:
          - "减少帧期间的 Binder 调用次数"
          - "考虑批量处理或缓存"

      # ===== 高优先级：CPU 限频 =====
      - condition: "Boolean(throttling_data?.data?.find(t => t.core_type === 'big' && t.throttle_detected === 1 && (t.freq_drop_pct || 0) > 20 && (t.max_freq_mhz || 0) > (t.min_freq_mhz || 0)))"
        severity: critical
        diagnosis: "检测到 CPU 限频: 大核最低 ${throttling_data.data.find(t => t.core_type === 'big' && t.throttle_detected === 1)?.min_freq_mhz}MHz（峰值 ${throttling_data.data.find(t => t.core_type === 'big' && t.throttle_detected === 1)?.max_freq_mhz}MHz，降幅 ${throttling_data.data.find(t => t.core_type === 'big' && t.throttle_detected === 1)?.freq_drop_pct}%）"
        confidence: high
        suggestions:
          - "设备温度过高触发限频"
          - "减少持续高负载任务"
          - "检查散热状况"

      - condition: "Boolean(throttling_data?.data?.find(t => t.core_type === 'big' && (t.freq_drop_pct || 0) > 20))"
        severity: warning
        diagnosis: "帧期间大核降频 ${throttling_data.data.find(t => t.core_type === 'big')?.freq_drop_pct}%"
        confidence: high
        suggestions:
          - "CPU 频率不稳定影响性能"
          - "检查功耗管理策略"

      # ===== 高优先级：CPU 簇负载 =====
      - condition: "cluster_load_data?.data?.find(c => c.cluster === '大核簇')?.load_pct > 90"
        severity: critical
        diagnosis: "大核簇负载 ${cluster_load_data.data.find(c => c.cluster === '大核簇')?.load_pct}%，接近跑满"
        confidence: high
        suggestions:
          - "大核资源严重不足"
          - "检查是否有后台密集计算任务"
          - "考虑优化或推迟非关键任务"

      - condition: "cluster_load_data?.data?.find(c => c.cluster === '小核簇')?.load_pct > 95"
        severity: warning
        diagnosis: "小核簇负载 ${cluster_load_data.data.find(c => c.cluster === '小核簇')?.load_pct}%，几乎跑满"
        confidence: high
        suggestions:
          - "系统整体负载很高"
          - "后台任务可能挤占资源"

      - condition: "cluster_load_data?.data?.find(c => c.cluster === '大核簇')?.load_pct > 70 && cluster_load_data?.data?.find(c => c.cluster === '小核簇')?.load_pct > 70"
        severity: warning
        diagnosis: "CPU 整体负载高: 大核 ${cluster_load_data.data.find(c => c.cluster === '大核簇')?.load_pct}%, 小核 ${cluster_load_data.data.find(c => c.cluster === '小核簇')?.load_pct}%"
        confidence: high
        suggestions:
          - "系统 CPU 资源紧张"
          - "多任务竞争导致调度延迟"

      - condition: "cluster_load_data?.data?.find(c => c.cluster === '大核簇')?.max_single_core_pct > 95"
        severity: info
        diagnosis: "大核簇中有核心接近 100% (${cluster_load_data.data.find(c => c.cluster === '大核簇')?.max_single_core_pct}%)"
        confidence: medium
        suggestions:
          - "可能有单线程密集任务"
          - "检查是否有热点线程"

      # ===== 高优先级：页面错误 =====
      - condition: "page_fault_data?.data?.length > 0 && page_fault_data.data[0]?.total_ms > 2"
        severity: critical
        diagnosis: "${page_fault_data.data[0].thread_name} 内存操作阻塞 ${page_fault_data.data[0].total_ms}ms (${page_fault_data.data[0].fault_type})"
        confidence: high
        suggestions:
          - "触发页面错误或内存回收"
          - "预加载可能需要的数据"
          - "检查内存压力"

      - condition: "page_fault_data?.data?.find(p => p.fault_type === 'memory_reclaim')?.total_ms > 1"
        severity: warning
        diagnosis: "系统内存回收导致阻塞 ${page_fault_data.data.find(p => p.fault_type === 'memory_reclaim')?.total_ms}ms"
        confidence: high
        suggestions:
          - "系统内存紧张"
          - "检查应用内存使用"

      # ===== 中优先级：SurfaceFlinger =====
      - condition: "sf_data?.data?.find(s => s.composition_type === 'Composite')?.total_ms > 3"
        severity: warning
        diagnosis: "SurfaceFlinger 合成耗时 ${sf_data.data.find(s => s.composition_type === 'Composite')?.total_ms}ms"
        confidence: medium
        suggestions:
          - "系统合成层可能是瓶颈"
          - "检查图层数量和复杂度"

      # ===== 中优先级：GPU 频率 =====
      - condition: "gpu_freq_data?.data?.length > 0 && gpu_freq_data.data[0]?.low_freq_pct > 50"
        severity: warning
        diagnosis: "GPU 低频运行占比 ${gpu_freq_data.data[0].low_freq_pct}%"
        confidence: medium
        suggestions:
          - "GPU 未能提升频率"
          - "检查 GPU 功耗策略"

      # ===== 中优先级：VSync 对齐 =====
      - condition: "vsync_data?.data?.find(v => v.metric === '截止时间')?.value?.includes('超时')"
        severity: warning
        diagnosis: "帧未能在 VSync 前完成: ${vsync_data.data.find(v => v.metric === '截止时间')?.value}"
        confidence: high
        suggestions:
          - "帧渲染超过 VSync 周期"
          - "需要优化帧渲染时间"

      # ===== 信息级：渲染流水线分解 =====
      - condition: "pipeline_data?.data?.find(p => p.stage?.includes('主线程'))?.pct > 70"
        severity: info
        diagnosis: "主线程占用帧时间 ${pipeline_data.data.find(p => p.stage?.includes('主线程'))?.pct}%"
        confidence: high
        suggestions:
          - "主线程是主要瓶颈"
          - "检查主线程耗时操作"

      - condition: "pipeline_data?.data?.find(p => p.stage?.includes('RenderThread'))?.pct > 60"
        severity: info
        diagnosis: "RenderThread 占用帧时间 ${pipeline_data.data.find(p => p.stage?.includes('RenderThread'))?.pct}%"
        confidence: high
        suggestions:
          - "渲染是主要瓶颈"
          - "检查 GPU 操作和绘制复杂度"

      # ===== 高优先级：Binder 调用 =====
      - condition: "binder_data?.data?.length > 0 && binder_data.data[0]?.dur_ms > 2"
        severity: warning
        diagnosis: "Binder 调用耗时 ${binder_data.data[0].dur_ms}ms (${binder_data.data[0].interface})"
        confidence: high
        suggestions:
          - "检查是否可以异步调用"
          - "考虑使用缓存减少调用次数"

      # ===== 四象限分析（使用 .find() 查找特定象限）=====
      # Q3 等待调度 - 说明 CPU 繁忙
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('Q3'))?.percentage > 15"
        severity: warning
        diagnosis: "主线程 Runnable 等待 ${quadrant_data.data.find(q => q.quadrant?.includes('Q3'))?.percentage}%"
        confidence: high
        suggestions:
          - "CPU 资源争抢，检查后台任务"
          - "考虑提高线程优先级"

      # Q4 休眠阻塞 - 说明在等待 IO 或锁
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q4'))?.percentage > 40"
        severity: warning
        diagnosis: "主线程休眠/阻塞时间占比 ${quadrant_data.data.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q4'))?.percentage}%"
        confidence: high
        suggestions:
          - "检查是否有 IO 操作或锁等待"
          - "考虑使用异步 IO"

      # Q2 小核运行占比高 - 说明调度可能有问题
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q2'))?.percentage > 60"
        severity: info
        diagnosis: "主线程主要运行在小核 (${quadrant_data.data.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q2'))?.percentage}%)"
        confidence: medium
        suggestions:
          - "检查系统温控是否限制大核"
          - "考虑提高线程优先级"

      # ===== 主线程耗时操作 =====
      - condition: "main_slices?.data?.length > 0 && main_slices.data[0]?.dur_ms > 5"
        severity: warning
        diagnosis: "主线程操作 '${main_slices.data[0].name}' 耗时 ${main_slices.data[0].dur_ms}ms"
        confidence: high
        suggestions:
          - "考虑将耗时操作移到后台线程"
          - "优化该操作的执行效率"

      # ===== RenderThread 耗时操作 =====
      - condition: "render_slices?.data?.length > 0 && render_slices.data[0]?.dur_ms > 3"
        severity: warning
        diagnosis: "RenderThread 操作 '${render_slices.data[0].name}' 耗时 ${render_slices.data[0].dur_ms}ms"
        confidence: high
        suggestions:
          - "检查是否有复杂的自定义绘制"
          - "考虑减少绘制复杂度或使用硬件加速"

      # ===== CPU 频率分析 =====
      - condition: "freq_data?.data?.find(f => f.core_type === 'big')?.avg_freq_mhz < 1500"
        severity: info
        diagnosis: "大核频率偏低 (${freq_data.data?.find(f => f.core_type === 'big')?.avg_freq_mhz || 0}MHz)"
        confidence: medium
        suggestions:
          - "系统可能处于省电模式"
          - "检查温控策略"

      # ===== CPU 频率变化 =====
      - condition: "freq_timeline?.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length > 2"
        severity: info
        diagnosis: "大核频率降频 ${freq_timeline.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length || 0}次"
        confidence: medium
        suggestions:
          - "可能触发了温控降频"
          - "检查系统负载和温度"

      # ===== 严重掉帧检测：基于消费端 vsync_missed =====
      - condition: "${vsync_missed} >= 3"
        severity: critical
        diagnosis: "严重卡顿: SF 跳过 ${vsync_missed} 帧 VSync (约 ${vsync_missed} 个 VSync 周期)"
        confidence: high
        suggestions:
          - "检查此时系统是否有大量后台活动"
          - "查看主线程和 RenderThread 的阻塞原因"

      - condition: "${vsync_missed} >= 1"
        severity: warning
        diagnosis: "掉帧: SF 跳过 ${vsync_missed} 帧 VSync"
        confidence: high
        suggestions:
          - "查看上方四象限和耗时操作数据"

output:
  format: structured
