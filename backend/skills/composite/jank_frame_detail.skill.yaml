name: jank_frame_detail
version: "1.0"
type: composite
category: rendering

meta:
  display_name: "掉帧详情分析"
  description: "分析特定掉帧的详细原因"
  icon: "broken_image"
  tags: [jank, detail, composite]

prerequisites:
  modules:
    - android.binder
    - android.slices
    - android.monitor_contention

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true
  - name: main_start_ts
    type: timestamp
    required: false
  - name: main_end_ts
    type: timestamp
    required: false
  - name: main_dur_ms
    type: number
    required: false
  - name: render_start_ts
    type: timestamp
    required: false
  - name: render_end_ts
    type: timestamp
    required: false
  - name: render_dur_ms
    type: number
    required: false
  - name: package
    type: string
    required: false
  - name: pid
    type: integer
    required: false
  - name: frame_id
    type: integer
    required: true
  - name: frame_index
    type: integer
    required: false
  - name: jank_type
    type: string
    required: true
  - name: dur_ms
    type: number
    required: true
  - name: session_id
    type: integer
    required: false
  - name: layer_name
    type: string
    required: false
  - name: token_gap
    type: integer
    required: false
    description: "display_frame_token 跳跃值 (>1 表示消费端掉帧)"
  - name: vsync_missed
    type: integer
    required: false
    description: "跳过的 VSync 数量 (token_gap - 1)"
  - name: jank_responsibility
    type: string
    required: false
    description: "掉帧责任归属: APP（BufferTX=0）或 SF（BufferTX>0）"

steps:
  # ===== 数据源检测：Monitor contention 表是否可用（可选）=====
  - id: monitor_contention_check
    type: atomic
    name: "Monitor Contention 数据源检测"
    display: false
    sql: |
      SELECT
        CASE
          WHEN EXISTS (
            SELECT 1 FROM sqlite_master
            WHERE type = 'table' AND name = 'android_monitor_contention'
          ) THEN 1
          ELSE 0
        END as has_monitor_contention
    save_as: monitor_contention

  # 四象限分析：输出格式直接匹配前端展示需求
  # 前端期望: [{ quadrant, name, dur_ms, percentage }]
  - id: quadrant_analysis
    type: atomic
    name: "四象限分析"
    display:
      level: key
      layer: deep
      title: "四大象限"
      columns:
        - name: quadrant
          label: "象限"
          type: string
        - name: name
          label: "名称"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: percentage
          label: "占比"
          type: percentage
          format: percentage
    sql: |
      WITH target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name,
          CASE
            WHEN t.tid = p.pid THEN 'MainThread'
            WHEN t.name = 'RenderThread' THEN 'RenderThread'
            ELSE 'Other'
          END as thread_type,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_start_ts}, ${start_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_start_ts}, ${start_ts})
            ELSE ${start_ts}
          END as thread_start_ts,
          CASE
            WHEN t.tid = p.pid THEN COALESCE(${main_end_ts}, ${end_ts})
            WHEN t.name = 'RenderThread' THEN COALESCE(${render_end_ts}, ${end_ts})
            ELSE ${end_ts}
          END as thread_end_ts
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      thread_states AS (
        SELECT
          tt.thread_type,
          ts.state,
          ts.cpu,
          ts.dur,
          CASE
            WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN 'Q1_大核运行'
            WHEN ts.state = 'Running' AND ts.cpu < 4 THEN 'Q2_小核运行'
            WHEN ts.state = 'R' THEN 'Q3_等待调度'
            WHEN ts.state IN ('S', 'D', 'I') THEN 'Q4_休眠阻塞'
            ELSE 'Other'
          END as quadrant_name
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= tt.thread_start_ts
          AND ts.ts < tt.thread_end_ts
      ),
      quadrant_sums AS (
        SELECT
          thread_type,
          quadrant_name,
          SUM(dur) as dur_ns
        FROM thread_states
        WHERE quadrant_name != 'Other'
        GROUP BY thread_type, quadrant_name
      ),
      thread_totals AS (
        SELECT
          thread_type,
          SUM(dur_ns) as total_ns
        FROM quadrant_sums
        GROUP BY thread_type
      )
      SELECT
        qs.thread_type || ' ' || qs.quadrant_name as quadrant,
        qs.thread_type || ' ' || qs.quadrant_name as name,
        ROUND(qs.dur_ns / 1e6, 2) as dur_ms,
        ROUND(100.0 * qs.dur_ns / NULLIF(tt.total_ns, 0), 1) as percentage
      FROM quadrant_sums qs
      JOIN thread_totals tt ON qs.thread_type = tt.thread_type
      WHERE qs.dur_ns > 0
      ORDER BY qs.thread_type, qs.quadrant_name
    save_as: quadrant_data
    output_schema:
      type: array
      items:
        quadrant: { type: string, description: "象限标识 (如 MainThread Q1_大核运行)" }
        name: { type: string, description: "象限名称" }
        dur_ms: { type: number, description: "持续时间(ms)" }
        percentage: { type: number, description: "百分比" }

  # Binder 调用：输出格式直接匹配前端展示需求
  # 前端期望: [{ interface, dur_ms, count }]
  - id: binder_calls
    type: atomic
    name: "Binder 调用"
    display:
      level: detail
      layer: deep
      title: "Binder 调用"
      columns:
        - name: interface
          label: "服务进程"
          type: string
        - name: count
          label: "调用次数"
          type: number
          format: compact
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: sync_count
          label: "同步调用"
          type: number
    sql: |
      SELECT
        server_process as interface,
        COUNT(*) as count,
        ROUND(SUM(client_dur) / 1e6, 2) as dur_ms,
        ROUND(MAX(client_dur) / 1e6, 2) as max_ms,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) as sync_count
      FROM android_binder_txns
      WHERE client_ts >= ${start_ts}
        AND client_ts < ${end_ts}
        AND (client_process GLOB '${package}*' OR '${package}' = '')
      GROUP BY server_process
      HAVING dur_ms > 0.5
      ORDER BY dur_ms DESC
      LIMIT 5
    save_as: binder_data
    optional: true
    output_schema:
      type: array
      items:
        interface: { type: string, description: "服务端进程名" }
        count: { type: number, description: "调用次数" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        sync_count: { type: number, description: "同步调用次数" }

  - id: cpu_freq_analysis
    type: atomic
    name: "CPU频率"
    display:
      level: detail
      layer: deep
      title: "CPU 频率"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: avg_freq_mhz
          label: "平均频率"
          type: number
        - name: max_freq_mhz
          label: "最大频率"
          type: number
        - name: min_freq_mhz
          label: "最小频率"
          type: number
    sql: |
      WITH freq_data AS (
        SELECT
          cpu,
          CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          value as freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        core_type,
        ROUND(AVG(freq_khz) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz
      FROM freq_data
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: freq_data
    optional: true
    output_schema:
      type: array
      items:
        core_type: { type: string, description: "核心类型 (big/little)" }
        avg_freq_mhz: { type: number, description: "平均频率(MHz)" }
        max_freq_mhz: { type: number, description: "最大频率(MHz)" }
        min_freq_mhz: { type: number, description: "最小频率(MHz)" }

  # 主线程耗时操作：输出格式直接匹配前端展示需求
  # 前端期望: [{ name, dur_ms, ts }]
  - id: main_thread_slices
    type: atomic
    name: "主线程耗时操作"
    display:
      level: key
      layer: deep
      title: "主线程耗时操作"
      columns:
        - name: name
          label: "操作名"
          type: string
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.tid = p.pid
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as dur_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        printf('%d', MIN(s.ts)) as ts
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM main_thread)
        AND s.ts >= COALESCE(${main_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${main_end_ts}, ${end_ts})
        AND s.dur >= 1000000
      GROUP BY s.name
      HAVING dur_ms > 1
      ORDER BY dur_ms DESC
      LIMIT 10
    save_as: main_slices
    output_schema:
      type: array
      items:
        name: { type: string, description: "操作名称" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        count: { type: number, description: "执行次数" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        ts: { type: string, description: "首次时间戳(ns字符串)" }

  # RenderThread 耗时操作：输出格式直接匹配前端展示需求
  # 前端期望: [{ name, dur_ms, ts }]
  - id: render_thread_slices
    type: atomic
    name: "RenderThread 耗时操作"
    display:
      level: key
      layer: deep
      title: "RenderThread 耗时操作"
      columns:
        - name: name
          label: "操作名"
          type: string
        - name: dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: avg_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
    sql: |
      WITH render_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.name = 'RenderThread'
      )
      SELECT
        s.name,
        ROUND(SUM(s.dur) / 1e6, 2) as dur_ms,
        COUNT(*) as count,
        ROUND(MAX(s.dur) / 1e6, 2) as max_ms,
        ROUND(AVG(s.dur) / 1e6, 2) as avg_ms,
        printf('%d', MIN(s.ts)) as ts
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      WHERE tt.utid IN (SELECT utid FROM render_thread)
        AND s.ts >= COALESCE(${render_start_ts}, ${start_ts})
        AND s.ts < COALESCE(${render_end_ts}, ${end_ts})
        AND s.dur >= 500000
      GROUP BY s.name
      HAVING dur_ms > 0.5
      ORDER BY dur_ms DESC
      LIMIT 10
    save_as: render_slices
    optional: true
    output_schema:
      type: array
      items:
        name: { type: string, description: "操作名称" }
        dur_ms: { type: number, description: "总耗时(ms)" }
        count: { type: number, description: "执行次数" }
        max_ms: { type: number, description: "最大单次耗时(ms)" }
        avg_ms: { type: number, description: "平均耗时(ms)" }
        ts: { type: string, description: "首次时间戳(ns字符串)" }

  - id: cpu_freq_timeline
    type: atomic
    name: "CPU 频率变化时间线"
    display:
      level: detail
      layer: deep
      title: "CPU 频率变化"
      columns:
        - name: ts
          label: "时间戳"
          type: timestamp
          clickAction: navigate_timeline
        - name: relative_ms
          label: "相对时间"
          type: duration
          format: duration_ms
        - name: cpu
          label: "CPU"
          type: number
        - name: core_type
          label: "核心类型"
          type: string
        - name: freq_mhz
          label: "频率"
          type: number
        - name: change_direction
          label: "变化"
          type: enum
    sql: |
      WITH freq_events AS (
        SELECT
          c.ts,
          t.cpu,
          c.value as freq_khz,
          CASE WHEN t.cpu >= 4 THEN 'big' ELSE 'little' END as core_type,
          LAG(c.value) OVER (PARTITION BY t.cpu ORDER BY c.ts) as prev_freq_khz
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts}
          AND c.ts < ${end_ts}
      )
      SELECT
        printf('%d', ts) as ts,
        ROUND((ts - ${start_ts}) / 1e6, 2) as relative_ms,
        cpu,
        core_type,
        ROUND(freq_khz / 1000, 0) as freq_mhz,
        ROUND(COALESCE(prev_freq_khz, freq_khz) / 1000, 0) as prev_freq_mhz,
        CASE 
          WHEN freq_khz > COALESCE(prev_freq_khz, freq_khz) THEN 'up'
          WHEN freq_khz < COALESCE(prev_freq_khz, freq_khz) THEN 'down'
          ELSE 'stable'
        END as change_direction
      FROM freq_events
      WHERE freq_khz != COALESCE(prev_freq_khz, 0)
      ORDER BY ts, cpu
      LIMIT 50
    save_as: freq_timeline
    optional: true

  - id: lock_contention
    type: atomic
    name: "锁竞争分析"
    display:
      level: detail
      layer: deep
      title: "锁竞争"
      columns:
        - name: blocking_method
          label: "持锁方法"
          type: string
          format: code
        - name: blocking_thread_name
          label: "持锁线程"
          type: string
        - name: blocked_method
          label: "等锁方法"
          type: string
          format: code
        - name: blocked_thread_name
          label: "等锁线程"
          type: string
        - name: main_blocked
          label: "主线程被阻"
          type: boolean
        - name: wait_ms
          label: "等待时间"
          type: duration
          format: duration_ms
        - name: waiter_count
          label: "等待数"
          type: number
    sql: |
      SELECT
        short_blocking_method as blocking_method,
        blocking_thread_name,
        short_blocked_method as blocked_method,
        blocked_thread_name,
        CASE WHEN is_blocked_thread_main THEN 1 ELSE 0 END as main_blocked,
        ROUND(dur / 1e6, 2) as wait_ms,
        waiter_count
      FROM android_monitor_contention
      WHERE ts >= ${start_ts}
        AND ts < ${end_ts}
        AND (process_name GLOB '${package}*' OR '${package}' = '')
        AND dur >= 500000
      ORDER BY dur DESC
      LIMIT 5
    save_as: lock_data
    optional: true
    condition: "monitor_contention.data[0]?.has_monitor_contention === 1"

  # ===== 根因分析总结：综合所有数据给出明确结论 =====
  - id: root_cause_summary
    type: atomic
    name: "根因分析"
    display:
      level: key
      layer: deep
      title: "🎯 根因分析"
      columns:
        - name: primary_cause
          label: "主要原因"
          type: string
        - name: secondary_info
          label: "附加信息"
          type: string
        - name: confidence
          label: "置信度"
          type: string
        - name: cause_type
          label: "原因类型"
          type: enum
        - name: frame_dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
        - name: jank_type
          label: "掉帧类型"
          type: string
    sql: |
      -- 根因分析: 综合四象限、CPU频率、耗时操作等数据，输出明确的根因结论
      WITH
      -- 1. 获取目标线程
      target_threads AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name,
          CASE
            WHEN t.tid = p.pid THEN 'MainThread'
            WHEN t.name = 'RenderThread' THEN 'RenderThread'
            ELSE 'Other'
          END as thread_type
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND (t.tid = p.pid OR t.name = 'RenderThread')
      ),
      -- 2. 线程状态分析 (四象限)
      thread_states AS (
        SELECT
          tt.thread_type,
          CASE
            WHEN ts.state = 'Running' AND ts.cpu >= 4 THEN 'Q1'
            WHEN ts.state = 'Running' AND ts.cpu < 4 THEN 'Q2'
            WHEN ts.state = 'R' THEN 'Q3'
            WHEN ts.state IN ('S', 'D', 'I') THEN 'Q4'
            ELSE 'Other'
          END as quadrant,
          SUM(ts.dur) as dur_ns
        FROM thread_state ts
        JOIN target_threads tt ON ts.utid = tt.utid
        WHERE ts.ts >= ${start_ts} AND ts.ts < ${end_ts}
        GROUP BY tt.thread_type, quadrant
      ),
      -- 3. 计算各线程四象限百分比
      quadrant_pct AS (
        SELECT
          thread_type,
          quadrant,
          dur_ns,
          ROUND(100.0 * dur_ns / SUM(dur_ns) OVER (PARTITION BY thread_type), 1) as pct
        FROM thread_states
        WHERE quadrant != 'Other'
      ),
      main_summary AS (
        SELECT
          COALESCE(SUM(CASE WHEN quadrant = 'Q1' THEN pct ELSE 0 END), 0) as q1,
          COALESCE(SUM(CASE WHEN quadrant = 'Q2' THEN pct ELSE 0 END), 0) as q2,
          COALESCE(SUM(CASE WHEN quadrant = 'Q3' THEN pct ELSE 0 END), 0) as q3,
          COALESCE(SUM(CASE WHEN quadrant = 'Q4' THEN pct ELSE 0 END), 0) as q4
        FROM quadrant_pct WHERE thread_type = 'MainThread'
      ),
      render_summary AS (
        SELECT
          COALESCE(SUM(CASE WHEN quadrant = 'Q1' THEN pct ELSE 0 END), 0) as q1,
          COALESCE(SUM(CASE WHEN quadrant = 'Q2' THEN pct ELSE 0 END), 0) as q2,
          COALESCE(SUM(CASE WHEN quadrant = 'Q3' THEN pct ELSE 0 END), 0) as q3,
          COALESCE(SUM(CASE WHEN quadrant = 'Q4' THEN pct ELSE 0 END), 0) as q4
        FROM quadrant_pct WHERE thread_type = 'RenderThread'
      ),
      -- 4. 获取最耗时的主线程操作
      main_thread_utid AS (
        SELECT t.utid
        FROM thread t JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '') AND t.tid = p.pid
      ),
      top_slice AS (
        SELECT s.name, ROUND(s.dur / 1e6, 2) as dur_ms
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        WHERE tt.utid IN (SELECT utid FROM main_thread_utid)
          AND s.ts >= COALESCE(${main_start_ts}, ${start_ts})
          AND s.ts < COALESCE(${main_end_ts}, ${end_ts})
          AND s.dur >= 1000000
        ORDER BY s.dur DESC
        LIMIT 1
      ),
      -- 5. 获取 CPU 频率
      freq_info AS (
        SELECT
          MAX(CASE WHEN cpu >= 4 THEN ROUND(value / 1000, 0) ELSE 0 END) as big_freq,
          MAX(CASE WHEN cpu < 4 THEN ROUND(value / 1000, 0) ELSE 0 END) as little_freq
        FROM counter c
        JOIN cpu_counter_track t ON c.track_id = t.id
        WHERE t.name = 'cpufreq'
          AND c.ts >= ${start_ts} AND c.ts < ${end_ts}
      ),
      -- 6. 综合根因判断
      analysis AS (
        SELECT
          (SELECT dur_ms FROM top_slice) as slice_dur,
          (SELECT name FROM top_slice) as slice_name,
          (SELECT q1 FROM main_summary) as main_q1,
          (SELECT q2 FROM main_summary) as main_q2,
          (SELECT q3 FROM main_summary) as main_q3,
          (SELECT q4 FROM main_summary) as main_q4,
          (SELECT q1 FROM render_summary) as render_q1,
          (SELECT q2 FROM render_summary) as render_q2,
          (SELECT q3 FROM render_summary) as render_q3,
          (SELECT q4 FROM render_summary) as render_q4,
          (SELECT big_freq FROM freq_info) as big_freq,
          (SELECT little_freq FROM freq_info) as little_freq
      )
      SELECT
        CASE
          -- 优先级1: 主线程有明确耗时操作 (>8ms)
          WHEN slice_dur > 8 THEN
            '主线程耗时操作 "' || slice_name || '" 占用 ' || slice_dur || 'ms'
          -- 优先级2: 主线程大量等待调度 (Q3 > 20%)
          WHEN main_q3 > 20 THEN
            '主线程 CPU 争抢严重 (' || main_q3 || '% 时间在等待调度)'
          -- 优先级3: 主线程被阻塞 (Q4 > 30%)
          WHEN main_q4 > 30 THEN
            '主线程阻塞等待 (Binder/IO/锁)，休眠占比 ' || main_q4 || '%'
          -- 优先级4: RenderThread 休眠 (Q4 > 50%)
          WHEN render_q4 > 50 THEN
            'RenderThread 长时间休眠 (' || render_q4 || '%)，等待主线程或 GPU'
          -- 优先级5: 主线程在小核运行 (Q2 > 50%)
          WHEN main_q2 > 50 THEN
            '主线程被调度到小核 (' || main_q2 || '%)，CPU 能力不足'
          -- 优先级6: CPU 频率问题
          WHEN big_freq < 1200 AND big_freq > 0 THEN
            '大核频率过低 (' || big_freq || 'MHz)，可能触发温控限频'
          -- 优先级7: 有小额耗时操作
          WHEN slice_dur > 3 THEN
            '主线程操作 "' || slice_name || '" 耗时 ' || slice_dur || 'ms'
          -- 默认
          ELSE '帧耗时 ${dur_ms}ms 超过 VSync 周期'
        END as primary_cause,
        CASE
          WHEN big_freq > 0 AND big_freq < 1500 THEN '大核频率 ' || big_freq || 'MHz'
          WHEN main_q2 > 30 THEN '小核运行占比 ' || main_q2 || '%'
          ELSE NULL
        END as secondary_info,
        CASE
          WHEN slice_dur > 8 THEN '高'
          WHEN main_q3 > 20 THEN '高'
          WHEN main_q4 > 30 THEN '中'
          WHEN slice_dur > 3 THEN '中'
          ELSE '低'
        END as confidence,
        CASE
          WHEN slice_dur > 8 THEN 'slice'
          WHEN main_q3 > 20 THEN 'cpu_contention'
          WHEN main_q4 > 30 THEN 'blocking'
          WHEN render_q4 > 50 THEN 'render_wait'
          WHEN main_q2 > 50 THEN 'small_core'
          WHEN big_freq < 1200 AND big_freq > 0 THEN 'freq_limit'
          ELSE 'unknown'
        END as cause_type,
        ${dur_ms} as frame_dur_ms,
        '${jank_type}' as jank_type
      FROM analysis
    save_as: root_cause

  - id: frame_diagnosis
    type: diagnostic
    name: "帧诊断"
    display:
      level: detail
      layer: deep
      title: "详细诊断"
    inputs: [quadrant_data, binder_data, freq_data, main_slices, render_slices, freq_timeline, lock_data, root_cause]
    rules:
      # ===== 最高优先级：根因分析总结 =====
      - condition: "root_cause?.data?.[0]?.primary_cause"
        severity: critical
        diagnosis: "${root_cause.data[0].primary_cause}"
        confidence: "${root_cause.data[0].confidence === '高' ? 'high' : root_cause.data[0].confidence === '中' ? 'medium' : 'low'}"
        suggestions:
          - "${root_cause.data[0].secondary_info || '查看下方详细数据分析具体原因'}"

      # ===== 高优先级：锁竞争 =====
      - condition: "lock_data?.data?.length > 0 && lock_data.data[0]?.wait_ms > 1"
        severity: critical
        diagnosis: "锁竞争等待 ${lock_data.data[0].wait_ms}ms (${lock_data.data[0].blocking_method})"
        confidence: high
        suggestions:
          - "检查持锁线程是否在做耗时操作"
          - "考虑减少锁粒度或使用无锁数据结构"

      - condition: "lock_data?.data?.length > 0 && lock_data.data[0]?.main_blocked === 1"
        severity: critical
        diagnosis: "主线程被锁阻塞 (等待 ${lock_data.data[0].blocking_thread_name})"
        confidence: high
        suggestions:
          - "避免在持锁时做 Binder/IO 操作"
          - "考虑使用异步锁或拆分锁"

      # ===== 高优先级：Binder 调用 =====
      - condition: "binder_data?.data?.length > 0 && binder_data.data[0]?.dur_ms > 2"
        severity: warning
        diagnosis: "Binder 调用耗时 ${binder_data.data[0].dur_ms}ms (${binder_data.data[0].interface})"
        confidence: high
        suggestions:
          - "检查是否可以异步调用"
          - "考虑使用缓存减少调用次数"

      # ===== 四象限分析（使用 .find() 查找特定象限）=====
      # Q3 等待调度 - 说明 CPU 繁忙
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('Q3'))?.percentage > 15"
        severity: warning
        diagnosis: "主线程 Runnable 等待 ${quadrant_data.data.find(q => q.quadrant?.includes('Q3'))?.percentage}%"
        confidence: high
        suggestions:
          - "CPU 资源争抢，检查后台任务"
          - "考虑提高线程优先级"

      # Q4 休眠阻塞 - 说明在等待 IO 或锁
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q4'))?.percentage > 40"
        severity: warning
        diagnosis: "主线程休眠/阻塞时间占比 ${quadrant_data.data.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q4'))?.percentage}%"
        confidence: high
        suggestions:
          - "检查是否有 IO 操作或锁等待"
          - "考虑使用异步 IO"

      # Q2 小核运行占比高 - 说明调度可能有问题
      - condition: "quadrant_data?.data?.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q2'))?.percentage > 60"
        severity: info
        diagnosis: "主线程主要运行在小核 (${quadrant_data.data.find(q => q.quadrant?.includes('MainThread') && q.quadrant?.includes('Q2'))?.percentage}%)"
        confidence: medium
        suggestions:
          - "检查系统温控是否限制大核"
          - "考虑提高线程优先级"

      # ===== 主线程耗时操作 =====
      - condition: "main_slices?.data?.length > 0 && main_slices.data[0]?.dur_ms > 5"
        severity: warning
        diagnosis: "主线程操作 '${main_slices.data[0].name}' 耗时 ${main_slices.data[0].dur_ms}ms"
        confidence: high
        suggestions:
          - "考虑将耗时操作移到后台线程"
          - "优化该操作的执行效率"

      # ===== RenderThread 耗时操作 =====
      - condition: "render_slices?.data?.length > 0 && render_slices.data[0]?.dur_ms > 3"
        severity: warning
        diagnosis: "RenderThread 操作 '${render_slices.data[0].name}' 耗时 ${render_slices.data[0].dur_ms}ms"
        confidence: high
        suggestions:
          - "检查是否有复杂的自定义绘制"
          - "考虑减少绘制复杂度或使用硬件加速"

      # ===== CPU 频率分析 =====
      - condition: "freq_data?.data?.find(f => f.core_type === 'big')?.avg_freq_mhz < 1500"
        severity: info
        diagnosis: "大核频率偏低 (${freq_data.data?.find(f => f.core_type === 'big')?.avg_freq_mhz || 0}MHz)"
        confidence: medium
        suggestions:
          - "系统可能处于省电模式"
          - "检查温控策略"

      # ===== CPU 频率变化 =====
      - condition: "freq_timeline?.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length > 2"
        severity: info
        diagnosis: "大核频率降频 ${freq_timeline.data?.filter(f => f.change_direction === 'down' && f.core_type === 'big').length || 0}次"
        confidence: medium
        suggestions:
          - "可能触发了温控降频"
          - "检查系统负载和温度"

      # ===== 严重掉帧检测：基于消费端 vsync_missed =====
      - condition: "${vsync_missed} >= 3"
        severity: critical
        diagnosis: "严重卡顿: SF 跳过 ${vsync_missed} 帧 VSync (约 ${vsync_missed * 16.7}ms)"
        confidence: high
        suggestions:
          - "检查此时系统是否有大量后台活动"
          - "查看主线程和 RenderThread 的阻塞原因"

      - condition: "${vsync_missed} >= 1"
        severity: warning
        diagnosis: "掉帧: SF 跳过 ${vsync_missed} 帧 VSync"
        confidence: high
        suggestions:
          - "查看上方四象限和耗时操作数据"

output:
  format: structured
