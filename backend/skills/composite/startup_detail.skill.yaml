# =============================================================================
# 启动事件详细分析（组合 Skill）v2.0
# =============================================================================
# 分析单个启动事件的详细信息，包括：
# - 主线程耗时操作
# - Binder 调用
# - 主线程同步 Binder 阻塞
# - 主线程文件 IO
# - CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 分布
# - 调度延迟分析
#
# 四大象限说明：
# 1. Running on Big Core - 在大核上运行（性能最优）
# 2. Running on Little Core - 在小核上运行（可能性能不足）
# 3. Runnable - 等待 CPU 调度（CPU 资源争抢）
# 4. Sleeping/Blocked - 睡眠或阻塞（等待 IO/锁/Binder）
#
# 大小核判定（自适应）：
# - 优先按每个 CPU 的最高频率排名划分（更稳健）
# - 频率样本不足时回退到 capacity
# - 再不足时才回退到 CPU 编号阈值（低置信度）

name: startup_detail
version: "1.0"
type: composite
category: app_lifecycle

meta:
  display_name: "启动详情分析"
  description: "深入分析单个启动过程的性能瓶颈"
  icon: "search"
  tags: [startup, detail, composite]

prerequisites:
  required_tables:
    - android_startups
  modules:
    - android.startup.startups
    - android.binder
    - sched
    - linux.cpu.frequency

inputs:
  - name: startup_id
    type: integer
    required: true
    description: "启动事件 ID"
  - name: start_ts
    type: timestamp
    required: true
    description: "启动开始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "启动结束时间戳(ns)"
  - name: dur_ms
    type: number
    required: true
    description: "启动耗时(ms)"
  - name: package
    type: string
    required: true
    description: "应用包名"
  - name: startup_type
    type: string
    required: true
    description: "启动类型 (cold/warm/hot)"
  - name: ttid_ms
    type: number
    required: false
    description: "TTID (ms)"
  - name: ttfd_ms
    type: number
    required: false
    description: "TTFD (ms)"
  # Perfetto 跳转参数
  - name: perfetto_start
    type: timestamp
    required: false
    description: "Perfetto 跳转开始时间"
  - name: perfetto_end
    type: timestamp
    required: false
    description: "Perfetto 跳转结束时间"

steps:
  # ========== 启动基本信息 ==========
  - id: startup_info
    type: atomic
    name: "启动基本信息"
    display:
      level: key
      layer: deep
      title: "启动 #${startup_id} 详情"
      columns:
        - name: startup_id
          label: "启动 ID"
          type: number
        - name: package
          label: "包名"
          type: string
        - name: startup_type
          label: "启动类型"
          type: string
        - name: type_display
          label: "类型展示"
          type: string
        - name: dur_ms
          label: "启动耗时(ms)"
          type: number
        - name: ttid_ms
          label: "TTID(ms)"
          type: number
        - name: ttfd_ms
          label: "TTFD(ms)"
          type: number
        - name: start_ts
          label: "开始时间"
          type: timestamp
        - name: end_ts
          label: "结束时间"
          type: timestamp
        - name: perfetto_start
          label: "Perfetto开始"
          type: timestamp
        - name: perfetto_end
          label: "Perfetto结束"
          type: timestamp
        - name: rating
          label: "评级"
          type: string
    sql: |
      SELECT
        ${startup_id} as startup_id,
        '${package}' as package,
        '${startup_type}' as startup_type,
        CASE '${startup_type}'
          WHEN 'cold' THEN '冷启动'
          WHEN 'warm' THEN '温启动'
          WHEN 'hot' THEN '热启动'
          ELSE '${startup_type}'
        END as type_display,
        ROUND(${dur_ms}, 2) as dur_ms,
        ROUND(${ttid_ms}, 2) as ttid_ms,
        ROUND(${ttfd_ms}, 2) as ttfd_ms,
        -- 时间戳
        printf('%d', ${start_ts}) as start_ts,
        printf('%d', ${end_ts}) as end_ts,
        -- Perfetto 跳转链接参数
        printf('%d', COALESCE(${perfetto_start}, ${start_ts})) as perfetto_start,
        printf('%d', COALESCE(${perfetto_end}, ${end_ts})) as perfetto_end,
        -- 评级
        CASE
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 500 THEN '优秀'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 1000 THEN '良好'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 2000 THEN '需优化'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 200 THEN '优秀'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 500 THEN '良好'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 100 THEN '优秀'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 200 THEN '良好'
          ELSE '需优化'
        END as rating
    save_as: startup_basic

  # ========== 大小核占比分析 ==========
  - id: cpu_core_analysis
    type: atomic
    name: "大小核占比分析"
    display:
      level: key
      layer: deep
      title: "大小核占比"
      columns:
        - name: thread_type
          label: "线程类型"
          type: string
        - name: big_core_ms
          label: "大核运行(ms)"
          type: number
        - name: little_core_ms
          label: "小核运行(ms)"
          type: number
        - name: total_running_ms
          label: "总运行(ms)"
          type: number
        - name: big_core_pct
          label: "大核占比(%)"
          type: percentage
          format: percentage
        - name: little_core_pct
          label: "小核占比(%)"
          type: percentage
          format: percentage
        - name: used_cpus
          label: "使用CPU"
          type: string
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid  -- 主线程
      ),
      cpu_cap AS (
        SELECT id as cpu, capacity
        FROM cpu
      ),
      cpu_freq AS (
        SELECT
          cpu,
          MAX(freq) as max_freq_khz
        FROM cpu_frequency_counters
        GROUP BY cpu
      ),
      cpu_rank AS (
        SELECT
          c.cpu,
          c.capacity,
          f.max_freq_khz,
          ROW_NUMBER() OVER (
            ORDER BY COALESCE(f.max_freq_khz, 0) DESC, COALESCE(c.capacity, 0) DESC, c.cpu DESC
          ) as perf_rank,
          COUNT(*) OVER () as cpu_count,
          SUM(CASE WHEN f.max_freq_khz IS NOT NULL THEN 1 ELSE 0 END) OVER () as freq_known_count,
          AVG(CASE WHEN c.capacity IS NOT NULL THEN c.capacity END) OVER () as avg_capacity
        FROM cpu_cap c
        LEFT JOIN cpu_freq f ON c.cpu = f.cpu
      ),
      cpu_info AS (
        SELECT
          cpu,
          CASE
            -- 频率可用时，按性能排名划分大小核（8核取前3，6核取前2，其余取前1）
            WHEN freq_known_count >= 2 THEN
              CASE
                WHEN perf_rank <= CASE
                  WHEN cpu_count >= 8 THEN 3
                  WHEN cpu_count >= 6 THEN 2
                  ELSE 1
                END THEN 'big'
                ELSE 'little'
              END
            -- 频率不可用，回退到 capacity
            WHEN capacity IS NOT NULL AND capacity > 0 THEN
              CASE
                WHEN capacity >= COALESCE(avg_capacity, capacity) THEN 'big'
                ELSE 'little'
              END
            -- 最后回退到 CPU 编号阈值（低置信度）
            ELSE
              CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END
          END as core_type,
          CASE
            WHEN freq_known_count >= 2 THEN 'freq_rank'
            WHEN capacity IS NOT NULL AND capacity > 0 THEN 'capacity_fallback'
            ELSE 'cpu_id_fallback'
          END as classify_method
        FROM cpu_rank
      ),
      cpu_time AS (
        SELECT
          ss.utid,
          ss.cpu,
          SUM(
            MIN(ss.ts + ss.dur, ${end_ts}) - MAX(ss.ts, ${start_ts})
          ) / 1e6 as dur_ms,
          COALESCE(c.core_type, 'little') as core_type,
          COALESCE(c.classify_method, 'cpu_id_fallback') as classify_method
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        LEFT JOIN cpu_info c ON ss.cpu = c.cpu
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
        GROUP BY ss.utid, ss.cpu
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END), 2) as big_core_ms,
        ROUND(SUM(CASE WHEN core_type = 'little' THEN dur_ms ELSE 0 END), 2) as little_core_ms,
        ROUND(SUM(dur_ms), 2) as total_running_ms,
        ROUND(100.0 * SUM(CASE WHEN core_type = 'big' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as big_core_pct,
        ROUND(100.0 * SUM(CASE WHEN core_type = 'little' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as little_core_pct,
        GROUP_CONCAT(DISTINCT cpu) as used_cpus,
        GROUP_CONCAT(DISTINCT classify_method) as classify_method
      FROM cpu_time
      GROUP BY 1
    save_as: cpu_core

  # ========== CPU 频率分析 ==========
  - id: cpu_freq_analysis
    type: atomic
    name: "CPU 频率分析"
    display:
      level: detail
      layer: deep
      title: "CPU 频率"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: avg_freq_mhz
          label: "平均频率(MHz)"
          type: number
        - name: max_freq_mhz
          label: "最高频率(MHz)"
          type: number
        - name: min_freq_mhz
          label: "最低频率(MHz)"
          type: number
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      cpu_cap AS (
        SELECT id as cpu, capacity
        FROM cpu
      ),
      cpu_freq AS (
        SELECT
          cpu,
          MAX(freq) as max_freq_khz
        FROM cpu_frequency_counters
        GROUP BY cpu
      ),
      cpu_rank AS (
        SELECT
          c.cpu,
          c.capacity,
          f.max_freq_khz,
          ROW_NUMBER() OVER (
            ORDER BY COALESCE(f.max_freq_khz, 0) DESC, COALESCE(c.capacity, 0) DESC, c.cpu DESC
          ) as perf_rank,
          COUNT(*) OVER () as cpu_count,
          SUM(CASE WHEN f.max_freq_khz IS NOT NULL THEN 1 ELSE 0 END) OVER () as freq_known_count,
          AVG(CASE WHEN c.capacity IS NOT NULL THEN c.capacity END) OVER () as avg_capacity
        FROM cpu_cap c
        LEFT JOIN cpu_freq f ON c.cpu = f.cpu
      ),
      cpu_info AS (
        SELECT
          cpu,
          CASE
            WHEN freq_known_count >= 2 THEN
              CASE
                WHEN perf_rank <= CASE
                  WHEN cpu_count >= 8 THEN 3
                  WHEN cpu_count >= 6 THEN 2
                  ELSE 1
                END THEN 'big'
                ELSE 'little'
              END
            WHEN capacity IS NOT NULL AND capacity > 0 THEN
              CASE
                WHEN capacity >= COALESCE(avg_capacity, capacity) THEN 'big'
                ELSE 'little'
              END
            ELSE
              CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END
          END as core_type,
          CASE
            WHEN freq_known_count >= 2 THEN 'freq_rank'
            WHEN capacity IS NOT NULL AND capacity > 0 THEN 'capacity_fallback'
            ELSE 'cpu_id_fallback'
          END as classify_method
        FROM cpu_rank
      ),
      running_samples AS (
        SELECT
          ss.cpu,
          ss.ts,
          ss.dur,
          COALESCE(c.core_type, 'little') as core_type,
          COALESCE(c.classify_method, 'cpu_id_fallback') as classify_method
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        LEFT JOIN cpu_info c ON ss.cpu = c.cpu
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
      ),
      freq_samples AS (
        SELECT
          cf.cpu,
          cf.freq as freq_khz,
          rs.core_type,
          rs.classify_method,
          MIN(cf.ts + cf.dur, ${end_ts}) - MAX(cf.ts, rs.ts) as overlap_dur
        FROM cpu_frequency_counters cf
        JOIN running_samples rs ON cf.cpu = rs.cpu
        WHERE cf.ts < ${end_ts}
          AND cf.ts + cf.dur > rs.ts
          AND cf.ts < rs.ts + rs.dur
      )
      SELECT
        core_type,
        ROUND(SUM(freq_khz * overlap_dur) / NULLIF(SUM(overlap_dur), 0) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz,
        GROUP_CONCAT(DISTINCT classify_method) as classify_method
      FROM freq_samples
      WHERE overlap_dur > 0
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: cpu_freq

  # ========== 四大象限分析 ==========
  - id: quadrant_analysis
    type: atomic
    name: "四大象限分析"
    display:
      level: key
      layer: deep
      title: "四大象限分析"
      columns:
        - name: thread_type
          label: "线程类型"
          type: string
        - name: q1_big_running_ms
          label: "Q1大核运行(ms)"
          type: number
        - name: q2_little_running_ms
          label: "Q2小核运行(ms)"
          type: number
        - name: q3_runnable_ms
          label: "Q3可运行等待(ms)"
          type: number
        - name: q4_sleeping_ms
          label: "Q4睡眠阻塞(ms)"
          type: number
        - name: total_ms
          label: "总时长(ms)"
          type: number
        - name: q1_pct
          label: "Q1占比(%)"
          type: percentage
          format: percentage
        - name: q2_pct
          label: "Q2占比(%)"
          type: percentage
          format: percentage
        - name: q3_pct
          label: "Q3占比(%)"
          type: percentage
          format: percentage
        - name: q4_pct
          label: "Q4占比(%)"
          type: percentage
          format: percentage
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      cpu_cap AS (
        SELECT id as cpu, capacity
        FROM cpu
      ),
      cpu_freq AS (
        SELECT
          cpu,
          MAX(freq) as max_freq_khz
        FROM cpu_frequency_counters
        GROUP BY cpu
      ),
      cpu_rank AS (
        SELECT
          c.cpu,
          c.capacity,
          f.max_freq_khz,
          ROW_NUMBER() OVER (
            ORDER BY COALESCE(f.max_freq_khz, 0) DESC, COALESCE(c.capacity, 0) DESC, c.cpu DESC
          ) as perf_rank,
          COUNT(*) OVER () as cpu_count,
          SUM(CASE WHEN f.max_freq_khz IS NOT NULL THEN 1 ELSE 0 END) OVER () as freq_known_count,
          AVG(CASE WHEN c.capacity IS NOT NULL THEN c.capacity END) OVER () as avg_capacity
        FROM cpu_cap c
        LEFT JOIN cpu_freq f ON c.cpu = f.cpu
      ),
      cpu_info AS (
        SELECT
          cpu,
          CASE
            WHEN freq_known_count >= 2 THEN
              CASE
                WHEN perf_rank <= CASE
                  WHEN cpu_count >= 8 THEN 3
                  WHEN cpu_count >= 6 THEN 2
                  ELSE 1
                END THEN 'big'
                ELSE 'little'
              END
            WHEN capacity IS NOT NULL AND capacity > 0 THEN
              CASE
                WHEN capacity >= COALESCE(avg_capacity, capacity) THEN 'big'
                ELSE 'little'
              END
            ELSE
              CASE WHEN cpu >= 4 THEN 'big' ELSE 'little' END
          END as core_type,
          CASE
            WHEN freq_known_count >= 2 THEN 'freq_rank'
            WHEN capacity IS NOT NULL AND capacity > 0 THEN 'capacity_fallback'
            ELSE 'cpu_id_fallback'
          END as classify_method
        FROM cpu_rank
      ),
      thread_states AS (
        SELECT
          ts.utid,
          ts.state,
          ts.cpu,
          COALESCE(c.core_type, 'little') as core_type,
          COALESCE(c.classify_method, 'cpu_id_fallback') as classify_method,
          SUM(
            MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts})
          ) / 1e6 as dur_ms
        FROM thread_state ts
        JOIN main_thread mt ON ts.utid = mt.utid
        LEFT JOIN cpu_info c ON ts.cpu = c.cpu
        WHERE ts.ts < ${end_ts}
          AND ts.ts + ts.dur > ${start_ts}
        GROUP BY ts.utid, ts.state, ts.cpu
      ),
      quadrant_data AS (
        SELECT
          CASE
            WHEN state = 'Running' AND core_type = 'big' THEN 'Q1_big_running'
            WHEN state = 'Running' AND core_type = 'little' THEN 'Q2_little_running'
            WHEN state IN ('R', 'R+') THEN 'Q3_runnable'
            WHEN state IN ('S', 'D', 'I') THEN 'Q4_sleeping'
            ELSE 'other'
          END as quadrant,
          dur_ms,
          classify_method
        FROM thread_states
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END), 2) as q1_big_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END), 2) as q2_little_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END), 2) as q3_runnable_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END), 2) as q4_sleeping_ms,
        ROUND(SUM(dur_ms), 2) as total_ms,
        -- 百分比
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q1_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q2_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q3_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4_sleeping' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q4_pct,
        GROUP_CONCAT(DISTINCT classify_method) as classify_method
      FROM quadrant_data
      GROUP BY 1
    save_as: quadrant

  # ========== 主线程关键 Slice ==========
  - id: main_thread_slices
    type: skill
    name: "主线程耗时操作"
    skill: main_thread_slices_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
      min_dur_ns: 1000000
      top_k: 10
    display:
      level: key
      layer: deep
      title: "主线程耗时操作 Top10"
    save_as: main_slices

  # ========== 主线程文件 IO 分析 ==========
  - id: main_thread_file_io
    type: skill
    name: "主线程文件 IO"
    skill: main_thread_file_io_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
      min_dur_ns: 500000
      top_k: 10
    display:
      level: key
      layer: deep
      title: "主线程文件 IO Top10"
    save_as: main_file_io

  # ========== Binder 调用分析 ==========
  - id: binder_analysis
    type: skill
    name: "Binder 调用分析"
    skill: binder_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
    display:
      level: key
      layer: deep
      title: "Binder 调用"
    save_as: binder_calls

  # ========== 主线程同步 Binder ==========
  - id: main_thread_sync_binder
    type: skill
    name: "主线程同步 Binder"
    skill: binder_blocking_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
    display:
      level: key
      layer: deep
      title: "主线程同步 Binder Top10"
    save_as: main_sync_binder

  # ========== 调度延迟分析 ==========
  - id: sched_latency
    type: skill
    name: "调度延迟分析"
    skill: main_thread_sched_latency_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
    display:
      level: detail
      layer: deep
      title: "主线程调度延迟"
    save_as: sched_delay

  # ========== 启动诊断 ==========
  - id: startup_diagnosis
    type: diagnostic
    name: "启动诊断"
    display:
      level: key
      layer: deep
      title: "问题诊断"
    inputs: [startup_basic, cpu_core, quadrant, main_slices, main_file_io, binder_calls, main_sync_binder, sched_delay]
    rules:
      # 大核占比偏低 + Runnable 明显（仅在判定来源可信时触发）
      - condition: "cpu_core.data[0]?.big_core_pct < 20 && quadrant.data[0]?.q3_runnable_ms > 50 && !(cpu_core.data[0]?.classify_method || '').includes('cpu_id_fallback')"
        severity: warning
        diagnosis: "主线程大核占比偏低（${cpu_core.data[0].big_core_pct}%）且 Runnable 排队明显（${quadrant.data[0].q3_runnable_ms}ms），可能存在调度供给不足"
        confidence: medium
        suggestions:
          - "检查是否有其他高优先级进程抢占大核"
          - "考虑调整进程优先级或使用 setThreadPriority"

      # 核判定来源不可靠时，避免把大小核结论当根因
      - condition: "(cpu_core.data[0]?.classify_method || '').includes('cpu_id_fallback')"
        severity: info
        diagnosis: "核类型判定回退到 CPU 编号阈值，大小核相关结论置信度有限"
        confidence: medium
        suggestions:
          - "补充或检查 cpu_frequency/cpu capacity 数据后再判断大小核调度问题"

      # Runnable 等待过长（需由调度延迟指标佐证）
      - condition: "quadrant.data[0]?.q3_runnable_ms > 50 && (sched_delay.data[0]?.severe_count || 0) > 3"
        severity: warning
        diagnosis: "主线程 Runnable 等待 ${quadrant.data[0].q3_runnable_ms}ms，且存在 ${sched_delay.data[0].severe_count} 次 >8ms 调度延迟"
        confidence: high
        suggestions:
          - "CPU 资源争抢严重，检查后台线程负载"
          - "减少启动期间的并发线程数"

      # Sleeping 占比过高（需有 IO/Binder 阻塞证据）
      - condition: "quadrant.data[0]?.q4_pct > 50 && ((main_file_io.data[0]?.percent || 0) > 2 || ((main_sync_binder?.data?.find(r => r.is_main_blocked === 1)?.total_block_ms) || 0) > 20)"
        severity: warning
        diagnosis: "主线程 Sleeping 占比 ${quadrant.data[0].q4_pct}% 且存在主线程 IO/Binder 阻塞证据"
        confidence: medium
        suggestions:
          - "检查主线程是否在等待 IO 或锁"
          - "将阻塞操作移到后台线程"

      # 主线程文件 IO 偏高（需与睡眠阻塞相互印证）
      - condition: "(main_file_io.data[0]?.total_ms > 50 || main_file_io.data[0]?.percent > 5) && (quadrant.data[0]?.q4_pct || 0) > 20"
        severity: warning
        diagnosis: "主线程文件 IO '${main_file_io.data[0].io_slice}' 耗时 ${main_file_io.data[0].total_ms}ms（占比 ${main_file_io.data[0].percent}%）"
        confidence: high
        suggestions:
          - "避免在首帧前执行文件读取/写入，改为预取或延迟加载"
          - "数据库初始化改为异步，合并小 IO 为批量 IO"

      # 主线程同步 Binder 偏高（仅当确认主线程被阻塞）
      - condition: "(((main_sync_binder?.data?.find(r => r.is_main_blocked === 1)?.total_block_ms) || 0) > 80 || ((main_sync_binder?.data?.find(r => r.is_main_blocked === 1)?.max_block_ms) || 0) > 16) && ((quadrant.data[0]?.q4_pct || 0) > 15 || (quadrant.data[0]?.q3_runnable_ms || 0) > 20)"
        severity: warning
        diagnosis: "主线程同步 Binder '${main_sync_binder.data.find(r => r.is_main_blocked === 1)?.interface}' 阻塞 ${main_sync_binder.data.find(r => r.is_main_blocked === 1)?.total_block_ms}ms"
        confidence: high
        suggestions:
          - "将同步 Binder 改为异步或迁移到后台线程"
          - "减少启动首屏前的跨进程依赖调用"

      # Binder 调用耗时过长（仅当主线程同步 Binder 也偏高）
      - condition: "binder_calls.data[0]?.total_client_ms > 100 && ((main_sync_binder?.data?.find(r => r.is_main_blocked === 1)?.total_block_ms) || 0) > 20"
        severity: warning
        diagnosis: "Binder 调用 ${binder_calls.data[0].server_process} 总耗时 ${binder_calls.data[0].total_client_ms}ms，且主线程存在同步 Binder 阻塞"
        confidence: high
        suggestions:
          - "减少启动期间的 IPC 调用"
          - "使用异步 Binder 或延迟调用"

      # 严重调度延迟
      - condition: "(sched_delay.data[0]?.severe_count || 0) > 5 && (sched_delay.data[0]?.max_latency_ms || 0) > 8"
        severity: warning
        diagnosis: "存在 ${sched_delay.data[0].severe_count} 次严重调度延迟 (>8ms)，最大延迟 ${sched_delay.data[0].max_latency_ms}ms"
        confidence: medium
        suggestions:
          - "检查系统负载，减少后台进程"
          - "考虑使用 SCHED_FIFO 策略"

      # 单个 Slice 耗时过长（且区间占比高）
      - condition: "main_slices.data[0]?.max_ms > 100 && (main_slices.data[0]?.percent || 0) > 20"
        severity: warning
        diagnosis: "主线程操作 '${main_slices.data[0].slice_name}' 最长耗时 ${main_slices.data[0].max_ms}ms"
        confidence: high
        suggestions:
          - "优化该操作或移到后台线程"
          - "检查是否可以分批执行"

output:
  display:
    level: key
    format: detail
