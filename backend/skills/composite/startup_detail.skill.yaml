# =============================================================================
# 启动事件详细分析（组合 Skill）v2.0
# =============================================================================
# 分析单个启动事件的详细信息，包括：
# - 主线程耗时操作
# - Binder 调用
# - 主线程同步 Binder 阻塞
# - 主线程文件 IO
# - CPU 大小核占比
# - 四大象限分析：Running/Runnable/Sleeping 分布
# - 调度延迟分析
#
# 四大象限说明：
# 1. Running on Big Core - 在大核上运行（性能最优）
# 2. Running on Little Core - 在小核上运行（可能性能不足）
# 3. Runnable - 等待 CPU 调度（CPU 资源争抢）
# 4. Sleeping/Blocked - 睡眠或阻塞（等待 IO/锁/Binder）
#
# 大小核判定（自适应）：
# - 优先按每个 CPU 的最高频率排名划分（更稳健）
# - 频率样本不足时回退到 capacity
# - 再不足时才回退到 CPU 编号阈值（低置信度）

name: startup_detail
version: "2.0"
type: composite
category: app_lifecycle

meta:
  display_name: "启动详情分析"
  description: "深入分析单个启动过程的性能瓶颈"
  icon: "search"
  tags: [startup, detail, composite]

prerequisites:
  required_tables:
    - android_startups
  modules:
    - android.startup.startups
    - android.binder
    - sched
    - linux.cpu.frequency

inputs:
  - name: startup_id
    type: integer
    required: true
    description: "启动事件 ID"
  - name: start_ts
    type: timestamp
    required: true
    description: "启动开始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "启动结束时间戳(ns)"
  - name: dur_ms
    type: number
    required: true
    description: "启动耗时(ms)"
  - name: package
    type: string
    required: true
    description: "应用包名"
  - name: startup_type
    type: string
    required: true
    description: "启动类型 (cold/warm/hot)，已经过 bindApplication 存在性校验"
  - name: original_type
    type: string
    required: false
    description: "Perfetto 原始报告的启动类型（校验前）"
  - name: ttid_ms
    type: number
    required: false
    description: "TTID (ms)"
  - name: ttfd_ms
    type: number
    required: false
    description: "TTFD (ms)"
  # Perfetto 跳转参数
  - name: perfetto_start
    type: timestamp
    required: false
    description: "Perfetto 跳转开始时间"
  - name: perfetto_end
    type: timestamp
    required: false
    description: "Perfetto 跳转结束时间"

steps:
  # ========== 初始化 CPU 拓扑 ==========
  - id: init_cpu_topology
    type: skill
    name: "初始化 CPU 拓扑"
    skill: cpu_topology_view
    display:
      level: hidden
    optional: true

  # ========== 启动基本信息 ==========
  - id: startup_info
    type: atomic
    name: "启动基本信息"
    display:
      level: key
      layer: deep
      title: "启动 #${startup_id} 详情"
      columns:
        - name: startup_id
          label: "启动 ID"
          type: number
        - name: package
          label: "包名"
          type: string
        - name: startup_type
          label: "启动类型"
          type: string
        - name: type_display
          label: "类型展示"
          type: string
        - name: dur_ms
          label: "启动耗时(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: ttid_ms
          label: "TTID(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: ttfd_ms
          label: "TTFD(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: start_ts
          label: "开始时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
        - name: end_ts
          label: "结束时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: perfetto_start
          label: "Perfetto开始"
          type: timestamp
          unit: ns
          clickAction: navigate_range
        - name: perfetto_end
          label: "Perfetto结束"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: rating
          label: "评级"
          type: string
    sql: |
      SELECT
        ${startup_id} as startup_id,
        '${package}' as package,
        '${startup_type}' as startup_type,
        CASE '${startup_type}'
          WHEN 'cold' THEN '冷启动'
          WHEN 'warm' THEN '温启动'
          WHEN 'hot' THEN '热启动'
          ELSE '${startup_type}'
        END as type_display,
        ROUND(${dur_ms}, 2) as dur_ms,
        ROUND(${ttid_ms}, 2) as ttid_ms,
        ROUND(${ttfd_ms}, 2) as ttfd_ms,
        -- 时间戳
        printf('%d', ${start_ts}) as start_ts,
        printf('%d', ${end_ts}) as end_ts,
        -- Perfetto 跳转链接参数
        printf('%d', COALESCE(${perfetto_start}, ${start_ts})) as perfetto_start,
        printf('%d', COALESCE(${perfetto_end}, ${end_ts})) as perfetto_end,
        -- 评级
        CASE
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 500 THEN '优秀'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 1000 THEN '良好'
          WHEN '${startup_type}' = 'cold' AND ${dur_ms} < 2000 THEN '需优化'
          WHEN '${startup_type}' = 'cold' THEN '严重'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 200 THEN '优秀'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 500 THEN '良好'
          WHEN '${startup_type}' = 'warm' AND ${dur_ms} < 1000 THEN '需优化'
          WHEN '${startup_type}' = 'warm' THEN '严重'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 100 THEN '优秀'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 200 THEN '良好'
          WHEN '${startup_type}' = 'hot' AND ${dur_ms} < 500 THEN '需优化'
          WHEN '${startup_type}' = 'hot' THEN '严重'
          ELSE '需优化'
        END as rating
    save_as: startup_basic

  # ========== 大小核占比分析 ==========
  - id: cpu_core_analysis
    type: atomic
    name: "大小核占比分析"
    display:
      level: key
      layer: deep
      title: "大小核占比"
      columns:
        - name: thread_type
          label: "线程类型"
          type: string
        - name: big_core_ms
          label: "大核运行(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: little_core_ms
          label: "小核运行(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_running_ms
          label: "总运行(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: big_core_pct
          label: "大核占比(%)"
          type: percentage
          format: percentage
        - name: little_core_pct
          label: "小核占比(%)"
          type: percentage
          format: percentage
        - name: used_cpus
          label: "使用CPU"
          type: string
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid  -- 主线程
      ),
      cpu_time AS (
        SELECT
          ss.utid,
          ss.cpu,
          SUM(
            MIN(ss.ts + ss.dur, ${end_ts}) - MAX(ss.ts, ${start_ts})
          ) / 1e6 as dur_ms,
          COALESCE(ct.core_type, 'little') as core_type
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        LEFT JOIN _cpu_topology ct ON ss.cpu = ct.cpu_id
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
        GROUP BY ss.utid, ss.cpu
      )
      SELECT
        'MainThread' as thread_type,
        -- medium 核（如 Cortex-A78）性能足够，归入性能核侧
        ROUND(SUM(CASE WHEN core_type IN ('prime', 'big', 'medium') THEN dur_ms ELSE 0 END), 2) as big_core_ms,
        ROUND(SUM(CASE WHEN core_type IN ('little') THEN dur_ms ELSE 0 END), 2) as little_core_ms,
        ROUND(SUM(dur_ms), 2) as total_running_ms,
        ROUND(100.0 * SUM(CASE WHEN core_type IN ('prime', 'big', 'medium') THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as big_core_pct,
        ROUND(100.0 * SUM(CASE WHEN core_type IN ('little') THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as little_core_pct,
        GROUP_CONCAT(DISTINCT cpu) as used_cpus,
        'topology_view' as classify_method
      FROM cpu_time
      GROUP BY 1
    save_as: cpu_core

  # ========== CPU 频率分析 ==========
  - id: cpu_freq_analysis
    type: atomic
    name: "CPU 频率分析"
    display:
      level: detail
      layer: deep
      title: "CPU 频率"
      columns:
        - name: core_type
          label: "核心类型"
          type: string
        - name: avg_freq_mhz
          label: "平均频率(MHz)"
          type: number
        - name: max_freq_mhz
          label: "最高频率(MHz)"
          type: number
        - name: min_freq_mhz
          label: "最低频率(MHz)"
          type: number
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, p.pid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      running_samples AS (
        SELECT
          ss.cpu,
          ss.ts,
          ss.dur,
          COALESCE(ct.core_type, 'little') as core_type
        FROM sched_slice ss
        JOIN main_thread mt ON ss.utid = mt.utid
        LEFT JOIN _cpu_topology ct ON ss.cpu = ct.cpu_id
        WHERE ss.ts < ${end_ts}
          AND ss.ts + ss.dur > ${start_ts}
      ),
      freq_samples AS (
        SELECT
          cf.cpu,
          cf.freq as freq_khz,
          rs.core_type,
          MIN(cf.ts + cf.dur, ${end_ts}) - MAX(cf.ts, rs.ts) as overlap_dur
        FROM cpu_frequency_counters cf
        JOIN running_samples rs ON cf.cpu = rs.cpu
        WHERE cf.ts < ${end_ts}
          AND cf.ts + cf.dur > rs.ts
          AND cf.ts < rs.ts + rs.dur
      )
      SELECT
        core_type,
        ROUND(SUM(freq_khz * overlap_dur) / NULLIF(SUM(overlap_dur), 0) / 1000, 0) as avg_freq_mhz,
        ROUND(MAX(freq_khz) / 1000, 0) as max_freq_mhz,
        ROUND(MIN(freq_khz) / 1000, 0) as min_freq_mhz,
        'topology_view' as classify_method
      FROM freq_samples
      WHERE overlap_dur > 0
      GROUP BY core_type
      ORDER BY core_type DESC
    save_as: cpu_freq

  # ========== CPU 频率爬升分析 ==========
  - id: freq_rampup
    type: skill
    name: "CPU 频率爬升"
    skill: startup_freq_rampup
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    display:
      level: detail
      layer: deep
      title: "CPU 频率爬升分析"
      columns:
        - name: core_type
          label: "核类型"
          type: string
        - name: early_avg_freq_mhz
          label: "初期均频(MHz)"
          type: number
        - name: steady_avg_freq_mhz
          label: "稳态均频(MHz)"
          type: number
        - name: rampup_pct
          label: "爬升幅度"
          type: percentage
          format: percentage
        - name: assessment
          label: "评估"
          type: string
    save_as: freq_rampup
    optional: true

  # ========== 四大象限分析 ==========
  - id: quadrant_analysis
    type: atomic
    name: "四大象限分析"
    optional: true
    display:
      level: key
      layer: deep
      title: "四大象限分析"
      columns:
        - name: thread_type
          label: "线程类型"
          type: string
        - name: q1_big_running_ms
          label: "Q1大核运行(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: q2_little_running_ms
          label: "Q2小核运行(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: q3_runnable_ms
          label: "Q3可运行等待(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: q4a_io_blocked_ms
          label: "Q4a IO阻塞(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: q4b_sleeping_ms
          label: "Q4b 睡眠等待(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_ms
          label: "总时长(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: q1_pct
          label: "Q1占比(%)"
          type: percentage
          format: percentage
        - name: q2_pct
          label: "Q2占比(%)"
          type: percentage
          format: percentage
        - name: q3_pct
          label: "Q3占比(%)"
          type: percentage
          format: percentage
        - name: q4a_pct
          label: "Q4a占比(%)"
          type: percentage
          format: percentage
        - name: q4b_pct
          label: "Q4b占比(%)"
          type: percentage
          format: percentage
        - name: classify_method
          label: "核判定来源"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid, t.tid, t.name as thread_name, p.pid, p.name as process_name
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
      ),
      thread_states AS (
        SELECT
          ts.utid,
          ts.state,
          ts.cpu,
          COALESCE(ct.core_type, 'little') as core_type,
          SUM(
            MIN(ts.ts + ts.dur, ${end_ts}) - MAX(ts.ts, ${start_ts})
          ) / 1e6 as dur_ms
        FROM thread_state ts
        JOIN main_thread mt ON ts.utid = mt.utid
        LEFT JOIN _cpu_topology ct ON ts.cpu = ct.cpu_id
        WHERE ts.ts < ${end_ts}
          AND ts.ts + ts.dur > ${start_ts}
        GROUP BY ts.utid, ts.state, ts.cpu
      ),
      quadrant_data AS (
        SELECT
          CASE
            WHEN state = 'Running' AND core_type IN ('prime', 'big', 'medium') THEN 'Q1_big_running'
            WHEN state = 'Running' AND core_type IN ('little') THEN 'Q2_little_running'
            WHEN state IN ('R', 'R+') THEN 'Q3_runnable'
            WHEN state IN ('D', 'DK') THEN 'Q4a_io_blocked'
            WHEN state IN ('S', 'I') THEN 'Q4b_sleeping'
            ELSE 'other'
          END as quadrant,
          dur_ms
        FROM thread_states
      )
      SELECT
        'MainThread' as thread_type,
        ROUND(SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END), 2) as q1_big_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END), 2) as q2_little_running_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END), 2) as q3_runnable_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q4a_io_blocked' THEN dur_ms ELSE 0 END), 2) as q4a_io_blocked_ms,
        ROUND(SUM(CASE WHEN quadrant = 'Q4b_sleeping' THEN dur_ms ELSE 0 END), 2) as q4b_sleeping_ms,
        ROUND(SUM(dur_ms), 2) as total_ms,
        -- 百分比
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q1_big_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q1_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q2_little_running' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q2_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q3_runnable' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q3_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4a_io_blocked' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q4a_pct,
        ROUND(100.0 * SUM(CASE WHEN quadrant = 'Q4b_sleeping' THEN dur_ms ELSE 0 END) /
              NULLIF(SUM(dur_ms), 0), 1) as q4b_pct,
        'topology_view' as classify_method
      FROM quadrant_data
      GROUP BY 1
    save_as: quadrant

  # ========== 主线程摆核时序（按时间桶分析核类型变化） ==========
  - id: cpu_placement_timeline
    type: skill
    name: "摆核时序分析"
    skill: startup_cpu_placement_timeline
    params:
      package: "${package}"
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      bucket_ms: 50
    display:
      level: detail
      layer: deep
      title: "主线程摆核时序（50ms 桶）"
      columns:
        - name: bucket_offset_ms
          label: "偏移(ms)"
          type: number
        - name: big_core_ms
          label: "大核(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: little_core_ms
          label: "小核(ms)"
          type: duration
          format: duration_ms
          unit: ms
        - name: big_core_pct
          label: "大核占比"
          type: percentage
          format: percentage
        - name: used_cpus
          label: "CPU"
          type: string
    save_as: cpu_placement
    optional: true

  # ========== 主线程关键 Slice ==========
  - id: main_thread_slices
    type: skill
    name: "主线程耗时操作"
    skill: main_thread_slices_in_range
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
      package: "${package}"
      min_dur_ns: 1000000
      top_k: 10
    display:
      level: key
      layer: deep
      show: false
      title: "主线程耗时操作 Top10"
      columns:
        - name: slice_name
          label: "切片名"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: avg_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: percent
          label: "区间占比"
          type: percentage
          format: percentage
    save_as: main_slices

  # ========== 主线程可操作热点（剔除框架包裹切片，含 exclusive time） ==========
  - id: actionable_main_thread_slices
    type: atomic
    name: "主线程可操作热点"
    display:
      level: detail
      layer: deep
      title: "主线程可操作热点 Top5"
      columns:
        - name: slice_name
          label: "切片名"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_ms
          label: "总耗时(wall)"
          type: duration
          format: duration_ms
          unit: ms
        - name: self_ms
          label: "自身耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: percent
          label: "区间占比(wall)"
          type: percentage
          format: percentage
        - name: self_percent
          label: "区间占比(self)"
          type: percentage
          format: percentage
        - name: is_framework_wrapper
          label: "框架包裹切片"
          type: boolean
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE (p.name GLOB '${package}*' OR '${package}' = '')
          AND t.tid = p.pid
      ),
      slice_with_self AS (
        SELECT
          s.id,
          s.name as slice_name,
          MIN(s.ts + s.dur, ${end_ts}) - MAX(s.ts, ${start_ts}) as clipped_dur,
          (MIN(s.ts + s.dur, ${end_ts}) - MAX(s.ts, ${start_ts}))
            - COALESCE((
                SELECT SUM(
                  MIN(c.ts + c.dur, MIN(s.ts + s.dur, ${end_ts}))
                  - MAX(c.ts, MAX(s.ts, ${start_ts}))
                )
                FROM slice c
                WHERE c.parent_id = s.id
                  AND c.ts < ${end_ts}
                  AND c.ts + c.dur > ${start_ts}
              ), 0) as self_dur
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN main_thread mt ON tt.utid = mt.utid
        WHERE s.ts < ${end_ts}
          AND s.ts + s.dur > ${start_ts}
      ),
      agg AS (
        SELECT
          slice_name,
          COUNT(*) as count,
          ROUND(SUM(clipped_dur) / 1e6, 2) as total_ms,
          ROUND(SUM(self_dur) / 1e6, 2) as self_ms,
          ROUND(AVG(clipped_dur) / 1e6, 2) as avg_ms,
          ROUND(MAX(clipped_dur) / 1e6, 2) as max_ms,
          ROUND(100.0 * SUM(clipped_dur) / NULLIF(${end_ts} - ${start_ts}, 0), 1) as percent,
          ROUND(100.0 * SUM(self_dur) / NULLIF(${end_ts} - ${start_ts}, 0), 1) as self_percent,
          CASE
            WHEN lower(slice_name) IN ('clienttransactionexecuted', 'activitystart', 'bindapplication') THEN 1
            WHEN lower(slice_name) GLOB 'performcreate:*' THEN 1
            WHEN lower(slice_name) GLOB 'performresume*' THEN 1
            WHEN lower(slice_name) GLOB 'activitythreadmain*' THEN 1
            ELSE 0
          END as is_framework_wrapper
        FROM slice_with_self
        WHERE clipped_dur >= 1000000
        GROUP BY slice_name
      )
      SELECT
        slice_name,
        count,
        total_ms,
        self_ms,
        avg_ms,
        max_ms,
        percent,
        self_percent,
        is_framework_wrapper
      FROM agg
      ORDER BY is_framework_wrapper ASC, self_ms DESC
      LIMIT 5
    save_as: actionable_main_slices

