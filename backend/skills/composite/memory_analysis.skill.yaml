# =============================================================================
# 内存分析 v2.1（组合 Skill）- 基于 Perfetto stdlib 优化版
# =============================================================================
# 使用多表 JOIN 进行深度内存分析
# 充分利用多表关联获取深度分析数据
#
# 核心分析：
# - GC 事件分析：类型、频率、耗时
# - GC 与帧的关联：GC 导致的掉帧分析
# - GC 期间主线程状态：分析 GC 对主线程的影响
# - 内存计数器分析：heap size, rss 等
#
# 关键 JOIN：
# - slice (GC) + android_frames: 分析 GC 导致的掉帧
# - slice (GC) + thread_state: 分析 GC 期间线程状态
# - slice (GC) + android_binder_txns: 分析 GC 期间的 Binder 调用

name: memory_analysis
version: "2.1"
type: composite
category: memory

meta:
  display_name: "内存性能分析"
  description: "分析应用内存使用、GC 行为和潜在内存问题"
  icon: "memory"
  tags: [memory, heap, gc, oom, composite]

triggers:
  keywords:
    zh: [内存, 堆内存, 内存泄漏, OOM, GC, 内存占用, 内存溢出]
    en: [memory, heap, oom, gc, memory leak, allocation, rss]
  patterns:
    - ".*内存.*"
    - ".*memory.*"
    - ".*GC.*"
    - ".*heap.*"

prerequisites:
  modules: []

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"
  - name: gc_count_critical
    type: number
    required: false
    default: 100
    description: "GC 次数严重阈值"
  - name: gc_count_warning
    type: number
    required: false
    default: 50
    description: "GC 次数警告阈值"
  - name: gc_total_time_critical_ms
    type: number
    required: false
    default: 2000
    description: "GC 总耗时严重阈值（ms）"
  - name: main_thread_gc_critical
    type: number
    required: false
    default: 10
    description: "主线程 GC 次数严重阈值"
  - name: single_gc_warning_ms
    type: number
    required: false
    default: 50
    description: "单次 GC 告警阈值（ms）"

steps:
  # ========== 获取目标进程 ==========
  - id: get_process
    type: atomic
    name: "获取目标进程"
    display:
      level: summary
      layer: overview
      title: "目标进程"
      columns:
        - name: upid
          label: "UPID"
          type: number
        - name: pid
          label: "PID"
          type: number
        - name: process_name
          label: "进程名"
          type: string
    sql: |
      SELECT
        upid,
        pid,
        name as process_name
      FROM process
      WHERE name GLOB '${package}*' OR '${package}' = ''
      ORDER BY
        CASE WHEN name GLOB '${package}*' THEN 0 ELSE 1 END,
        pid DESC
      LIMIT 1
    save_as: target_process
    on_empty: "未找到目标进程"

  # ========== 初始化 GC 事件视图（供后续步骤 JOIN）==========
  - id: init_gc_view
    type: atomic
    name: "初始化 GC 事件视图"
    display:
      level: hidden
    optional: true
    sql: |
      CREATE VIEW IF NOT EXISTS _gc_events AS
      SELECT
        s.ts,
        s.dur,
        s.name as gc_name,
        t.name as thread_name,
        t.tid,
        p.pid,
        p.name as process_name,
        CASE WHEN t.tid = p.pid THEN 1 ELSE 0 END as is_main_thread,
        CASE
          WHEN s.name GLOB '*ConcurrentCopying*' THEN 'ConcurrentCopying'
          WHEN s.name GLOB '*MarkSweep*' THEN 'MarkSweep'
          WHEN s.name GLOB '*Explicit*' THEN 'Explicit'
          WHEN s.name GLOB '*Alloc*' THEN 'Alloc'
          WHEN s.name GLOB '*Background*' THEN 'Background'
          WHEN s.name GLOB '*young*' OR s.name GLOB '*Young*' THEN 'Young'
          WHEN s.name GLOB '*full*' OR s.name GLOB '*Full*' THEN 'Full'
          ELSE 'Other'
        END as gc_type
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
        AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR s.ts < ${end_ts})
    condition: target_process.data.length > 0

  # ========== 获取 VSync 周期（供帧关联分析使用）==========
  - id: get_vsync_period
    type: skill
    name: "检测 VSync 周期"
    skill: vsync_period_detection
    params:
      start_ts: "${start_ts}"
      end_ts: "${end_ts}"
    save_as: vsync_info
    display:
      level: hidden
    optional: true

  # ========== GC 总体概览 ==========
  - id: gc_overview
    type: atomic
    name: "GC 概览"
    synthesize:
      role: overview
      fields:
        - key: total_gc_count
          label: GC 次数
        - key: total_gc_time_ms
          label: GC 总耗时
          format: "{{value}} ms"
        - key: main_thread_gc_count
          label: 主线程 GC
        - key: gc_frequency_rating
          label: 频率评级
      insights:
        - condition: "total_gc_count > 100"
          template: "GC 频繁 ({{total_gc_count}} 次)，可能存在内存抖动"
        - condition: "main_thread_gc_time_ms > 500"
          template: "主线程 GC 耗时 {{main_thread_gc_time_ms}}ms，影响流畅度"
    display:
      level: key
      layer: overview
      title: "GC 总体情况"
      columns:
        - name: total_gc_count
          label: "GC 次数"
          type: number
          format: compact
        - name: total_gc_time_ms
          label: "GC 总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_gc_time_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_gc_time_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: min_gc_time_ms
          label: "最小耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: main_thread_gc_count
          label: "主线程 GC"
          type: number
          format: compact
        - name: main_thread_gc_time_ms
          label: "主线程 GC 耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: gc_per_second
          label: "GC 频率"
          type: number
        - name: gc_frequency_rating
          label: "频率评级"
          type: string
        - name: gc_time_rating
          label: "耗时评级"
          type: string
    sql: |
      SELECT
        COUNT(*) as total_gc_count,
        SUM(dur) / 1e6 as total_gc_time_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_gc_time_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_gc_time_ms,
        ROUND(MIN(dur) / 1e6, 2) as min_gc_time_ms,
        -- 主线程 GC 统计
        SUM(CASE WHEN is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_gc_count,
        SUM(CASE WHEN is_main_thread = 1 THEN dur ELSE 0 END) / 1e6 as main_thread_gc_time_ms,
        -- GC 频率（每秒）
        ROUND(COUNT(*) * 1e9 / (MAX(ts + dur) - MIN(ts)), 2) as gc_per_second,
        -- 评级
        CASE
          WHEN COUNT(*) > ${gc_count_critical|100} THEN '频繁'
          WHEN COUNT(*) > ${gc_count_warning|50} THEN '较多'
          WHEN COUNT(*) > 10 THEN '正常'
          ELSE '良好'
        END as gc_frequency_rating,
        CASE
          WHEN SUM(dur) / 1e6 > ${gc_total_time_critical_ms|2000} THEN '严重'
          WHEN SUM(dur) / 1e6 > 500 THEN '需优化'
          WHEN SUM(dur) / 1e6 > 100 THEN '良好'
          ELSE '优秀'
        END as gc_time_rating
      FROM _gc_events
    save_as: gc_overview
    condition: target_process.data.length > 0

  # ========== GC 类型分布 ==========
  - id: gc_stats
    type: atomic
    name: "GC 事件统计"
    synthesize:
      role: list
      groupBy:
        - field: gc_type
          title: 按 GC 类型分布
      fields:
        - key: gc_type
          label: GC 类型
        - key: count
          label: 次数
        - key: total_dur_ms
          label: 总耗时
          format: "{{value}} ms"
    display:
      level: key
      layer: overview
      title: "GC 类型分布"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: main_thread_count
          label: "主线程 GC"
          type: number
          format: compact
    sql: |
      SELECT
        CASE gc_type
          WHEN 'ConcurrentCopying' THEN 'ConcurrentCopying (并发GC)'
          WHEN 'MarkSweep' THEN 'MarkSweep (标记清除)'
          WHEN 'Explicit' THEN 'Explicit (显式GC)'
          WHEN 'Alloc' THEN 'Alloc (分配触发)'
          WHEN 'Background' THEN 'Background (后台GC)'
          WHEN 'Young' THEN 'Young Gen (新生代)'
          WHEN 'Full' THEN 'Full GC (全局)'
          ELSE 'Other'
        END as gc_type,
        COUNT(*) as count,
        SUM(dur) / 1e6 as total_dur_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_dur_ms,
        SUM(CASE WHEN is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_count
      FROM _gc_events
      GROUP BY gc_type
      ORDER BY total_dur_ms DESC
    save_as: gc_stats
    condition: target_process.data.length > 0

  # ========== GC 与帧关联分析（深度 JOIN）==========
  - id: gc_frame_impact
    type: atomic
    name: "GC 与帧关联"
    synthesize:
      role: list
      groupBy:
        - field: impact
          title: 按影响类型分布
      fields:
        - key: gc_name
          label: GC 类型
        - key: gc_dur_ms
          label: GC 耗时
          format: "{{value}} ms"
        - key: impact
          label: 影响
    optional: true
    display:
      level: key
      layer: list
      title: "GC 导致的掉帧分析"
      columns:
        - name: gc_name
          label: "GC 类型"
          type: string
        - name: gc_dur_ms
          label: "GC 耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: jank_type
          label: "掉帧类型"
          type: string
        - name: frame_dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: impact
          label: "影响"
          type: string
    sql: |
      SELECT
        gc.gc_name,
        gc.dur / 1e6 as gc_dur_ms,
        af.jank_type,
        af.dur / 1e6 as frame_dur_ms,
        CASE
          WHEN af.jank_type != 'None' THEN 'GC导致掉帧'
          WHEN af.dur > ${vsync_info.data[0].vsync_period_ns|8333333} THEN '帧超时'
          ELSE '正常'
        END as impact
      FROM _gc_events gc
      LEFT JOIN actual_frame_timeline_slice af ON (
        gc.ts >= af.ts AND gc.ts < af.ts + af.dur
      )
      LEFT JOIN process p ON af.upid = p.upid
      WHERE gc.is_main_thread = 1
        AND p.name GLOB '${package}*'
      ORDER BY gc.dur DESC
      LIMIT 30
    save_as: gc_frame_impact
    condition: target_process.data.length > 0

  # ========== 主线程 GC 详情 ==========
  - id: main_thread_gc
    type: atomic
    name: "主线程 GC"
    display:
      level: key
      layer: list
      title: "主线程 GC (可能导致掉帧)"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: ts_str
          label: "时间"
          type: timestamp
          clickAction: navigate_range
          durationColumn: dur_str
        - name: dur_str
          label: "持续时间(ns)"
          type: duration
          format: duration_ms
          unit: ns
          hidden: true
        - name: severity
          label: "严重程度"
          type: enum
        - name: dropped_frames
          label: "掉帧数"
          type: number
    sql: |
      SELECT
        gc_name as gc_type,
        dur / 1e6 as dur_ms,
        ts / 1e6 as ts_ms,
        printf('%d', ts) as ts_str,
        printf('%d', dur) as dur_str,
        CASE
          WHEN dur / 1e6 > ${single_gc_warning_ms|50} THEN 'critical'
          WHEN dur / 1e6 > 16 THEN 'warning'
          WHEN dur / 1e6 > 8 THEN 'notice'
          ELSE 'normal'
        END as severity,
        -- 掉帧数估算（使用动态 VSync 周期）
        CAST(dur / ${vsync_info.data[0].vsync_period_ns|8333333} AS INTEGER) as dropped_frames
      FROM _gc_events
      WHERE is_main_thread = 1
        AND dur > 1000000  -- > 1ms
      ORDER BY dur DESC
      LIMIT 20
    save_as: main_thread_gc
    condition: target_process.data.length > 0

  # ========== GC 期间主线程状态（深度 JOIN）==========
  - id: gc_thread_state
    type: atomic
    name: "GC 期间主线程状态"
    optional: true
    display:
      level: detail
      layer: list
      title: "GC 期间主线程状态分析"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: gc_dur_ms
          label: "GC 耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: state
          label: "线程状态"
          type: string
        - name: state_dur_ms
          label: "状态耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: blocked_function
          label: "阻塞函数"
          type: string
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*' AND t.tid = p.pid
        LIMIT 1
      ),
      top_gc AS (
        SELECT ts, dur, gc_name
        FROM _gc_events
        WHERE is_main_thread = 1
          AND dur > 5000000  -- > 5ms
        ORDER BY dur DESC
        LIMIT 10
      )
      SELECT
        gc.gc_name as gc_type,
        gc.dur / 1e6 as gc_dur_ms,
        ts.state,
        SUM(
          CASE
            WHEN ts.ts + ts.dur <= gc.ts THEN 0
            WHEN ts.ts >= gc.ts + gc.dur THEN 0
            ELSE MIN(ts.ts + ts.dur, gc.ts + gc.dur) - MAX(ts.ts, gc.ts)
          END
        ) / 1e6 as state_dur_ms,
        ts.blocked_function
      FROM top_gc gc
      JOIN thread_state ts ON ts.utid = (SELECT utid FROM main_thread)
      WHERE ts.ts + ts.dur > gc.ts
        AND ts.ts < gc.ts + gc.dur
      GROUP BY gc.ts, ts.state, ts.blocked_function
      ORDER BY gc.dur DESC, state_dur_ms DESC
      LIMIT 30
    save_as: gc_thread_state
    condition: target_process.data.length > 0

  # ========== GC 间隔分析（内存抖动检测）==========
  - id: gc_interval_analysis
    type: atomic
    name: "GC 间隔分析"
    display:
      level: detail
      layer: list
      title: "GC 间隔分析（内存抖动检测）"
      columns:
        - name: interval_bucket
          label: "间隔分段"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: avg_interval_ms
          label: "平均间隔"
          type: duration
          format: duration_ms
          unit: ms
        - name: min_interval_ms
          label: "最小间隔"
          type: duration
          format: duration_ms
          unit: ms
    sql: |
      WITH gc_with_lag AS (
        SELECT
          ts,
          dur,
          LAG(ts + dur) OVER (ORDER BY ts) as prev_end
        FROM _gc_events
      )
      SELECT
        CASE
          WHEN (ts - prev_end) / 1e6 < 100 THEN '<100ms (频繁)'
          WHEN (ts - prev_end) / 1e6 < 500 THEN '100-500ms'
          WHEN (ts - prev_end) / 1e6 < 1000 THEN '500ms-1s'
          WHEN (ts - prev_end) / 1e6 < 5000 THEN '1-5s'
          ELSE '>5s'
        END as interval_bucket,
        COUNT(*) as count,
        ROUND(AVG(ts - prev_end) / 1e6, 2) as avg_interval_ms,
        ROUND(MIN(ts - prev_end) / 1e6, 2) as min_interval_ms
      FROM gc_with_lag
      WHERE prev_end IS NOT NULL
      GROUP BY interval_bucket
      ORDER BY
        CASE interval_bucket
          WHEN '<100ms (频繁)' THEN 1
          WHEN '100-500ms' THEN 2
          WHEN '500ms-1s' THEN 3
          WHEN '1-5s' THEN 4
          ELSE 5
        END
    save_as: gc_intervals
    condition: target_process.data.length > 0

  # ========== 长时间 GC 事件 ==========
  - id: long_gc_events
    type: atomic
    name: "长时间 GC"
    display:
      level: key
      layer: list
      title: "耗时最长的 GC 事件"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
          unit: ms
        - name: thread_name
          label: "线程"
          type: string
        - name: ts_str
          label: "时间"
          type: timestamp
          clickAction: navigate_range
          durationColumn: dur_str
        - name: dur_str
          label: "持续时间(ns)"
          type: duration
          format: duration_ms
          unit: ns
          hidden: true
        - name: is_main_thread
          label: "主线程"
          type: string
    sql: |
      SELECT
        gc_name as gc_type,
        dur / 1e6 as dur_ms,
        ts / 1e6 as ts_ms,
        thread_name,
        printf('%d', ts) as ts_str,
        printf('%d', dur) as dur_str,
        CASE WHEN is_main_thread = 1 THEN '是' ELSE '否' END as is_main_thread
      FROM _gc_events
      ORDER BY dur DESC
      LIMIT 15
    save_as: long_gc
    condition: target_process.data.length > 0

  # ========== 内存诊断 ==========
  - id: memory_diagnosis
    type: diagnostic
    name: "内存诊断"
    synthesize:
      role: conclusion
      fields:
        - key: diagnosis
          label: 诊断结论
        - key: severity
          label: 严重程度
        - key: confidence
          label: 置信度
      insights:
        - template: "内存诊断：{{diagnosis}}"
    display:
      level: key
      layer: overview
      title: "问题诊断"
    inputs: [gc_overview, gc_stats, main_thread_gc, long_gc, gc_intervals]
    rules:
      # GC 频率过高
      - condition: "gc_overview.data[0]?.total_gc_count > (inputs?.gc_count_critical ?? 100)"
        severity: critical
        diagnosis: "GC 频率过高 (${gc_overview.data[0].total_gc_count} 次)"
        confidence: high
        suggestions:
          - "检查是否有频繁的对象创建和销毁"
          - "使用对象池重用对象"
          - "避免在循环中创建对象"

      - condition: "gc_overview.data[0]?.total_gc_count > (inputs?.gc_count_warning ?? 50)"
        severity: warning
        diagnosis: "GC 频率较高 (${gc_overview.data[0].total_gc_count} 次)"
        confidence: medium
        suggestions:
          - "检查内存分配热点"
          - "优化临时对象使用"

      # GC 总耗时过长
      - condition: "gc_overview.data[0]?.total_gc_time_ms > (inputs?.gc_total_time_critical_ms ?? 2000)"
        severity: critical
        diagnosis: "GC 总耗时过长 (${gc_overview.data[0].total_gc_time_ms}ms)"
        confidence: high
        suggestions:
          - "减少内存分配频率"
          - "检查大对象分配"
          - "考虑调整堆大小"

      # 主线程 GC 导致掉帧
      - condition: "gc_overview.data[0]?.main_thread_gc_count > (inputs?.main_thread_gc_critical ?? 10)"
        severity: critical
        diagnosis: "主线程发生 ${gc_overview.data[0].main_thread_gc_count} 次 GC"
        confidence: high
        suggestions:
          - "将内存密集型操作移到后台线程"
          - "避免在 UI 线程分配大量内存"

      # 单次 GC 暂停过长
      - condition: "long_gc.data[0]?.dur_ms > (inputs?.single_gc_warning_ms ?? 50)"
        severity: warning
        diagnosis: "单次 GC 暂停过长 (${long_gc.data[0].dur_ms}ms)"
        confidence: medium
        suggestions:
          - "检查大对象分配"
          - "考虑调整堆大小"

      # 内存抖动
      - condition: "gc_intervals.data.find(i => i.interval_bucket === '<100ms (频繁)')?.count > 10"
        severity: critical
        diagnosis: "检测到内存抖动（GC 间隔 <100ms）"
        confidence: high
        suggestions:
          - "检查是否有频繁的对象创建销毁"
          - "使用 Memory Profiler 分析分配热点"
          - "考虑使用对象池"

output:
  format: structured
