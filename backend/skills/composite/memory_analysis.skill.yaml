# =============================================================================
# 内存分析 v2.1（组合 Skill）- 基于 Perfetto stdlib 优化版
# =============================================================================
# 使用多表 JOIN 进行深度内存分析
# 充分利用多表关联获取深度分析数据
#
# 核心分析：
# - GC 事件分析：类型、频率、耗时
# - GC 与帧的关联：GC 导致的掉帧分析
# - GC 期间主线程状态：分析 GC 对主线程的影响
# - 内存计数器分析：heap size, rss 等
#
# 关键 JOIN：
# - slice (GC) + android_frames: 分析 GC 导致的掉帧
# - slice (GC) + thread_state: 分析 GC 期间线程状态
# - slice (GC) + android_binder_txns: 分析 GC 期间的 Binder 调用

name: memory_analysis
version: "2.1"
type: composite

meta:
  display_name: "内存性能分析"
  description: "分析应用内存使用、GC 行为和潜在内存问题"
  icon: "memory"
  tags: [memory, heap, gc, oom, composite]

triggers:
  keywords:
    zh: [内存, 堆内存, 内存泄漏, OOM, GC, 内存占用, 内存溢出]
    en: [memory, heap, oom, gc, memory leak, allocation, rss]
  patterns:
    - ".*内存.*"
    - ".*memory.*"
    - ".*GC.*"
    - ".*heap.*"

prerequisites:
  modules: []

inputs:
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"

steps:
  # ========== 获取目标进程 ==========
  - id: get_process
    type: atomic
    name: "获取目标进程"
    display:
      level: summary
      title: "目标进程"
    sql: |
      SELECT
        upid,
        pid,
        name as process_name
      FROM process
      WHERE name GLOB '${package}*' OR '${package}' = ''
      ORDER BY
        CASE WHEN name GLOB '${package}*' THEN 0 ELSE 1 END,
        pid DESC
      LIMIT 1
    save_as: target_process
    on_empty: "未找到目标进程"

  # ========== GC 总体概览 ==========
  - id: gc_overview
    type: atomic
    name: "GC 概览"
    display:
      level: key
      title: "GC 总体情况"
    sql: |
      WITH gc_events AS (
        SELECT
          s.ts,
          s.dur,
          s.name,
          t.name as thread_name,
          CASE WHEN t.tid = p.pid THEN 1 ELSE 0 END as is_main_thread
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
      )
      SELECT
        COUNT(*) as total_gc_count,
        SUM(dur) / 1e6 as total_gc_time_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_gc_time_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_gc_time_ms,
        ROUND(MIN(dur) / 1e6, 2) as min_gc_time_ms,
        -- 主线程 GC 统计
        SUM(CASE WHEN is_main_thread = 1 THEN 1 ELSE 0 END) as main_thread_gc_count,
        SUM(CASE WHEN is_main_thread = 1 THEN dur ELSE 0 END) / 1e6 as main_thread_gc_time_ms,
        -- GC 频率（每秒）
        ROUND(COUNT(*) * 1e9 / (MAX(ts + dur) - MIN(ts)), 2) as gc_per_second,
        -- 评级
        CASE
          WHEN COUNT(*) > 100 THEN '频繁'
          WHEN COUNT(*) > 50 THEN '较多'
          WHEN COUNT(*) > 10 THEN '正常'
          ELSE '良好'
        END as gc_frequency_rating,
        CASE
          WHEN SUM(dur) / 1e6 > 2000 THEN '严重'
          WHEN SUM(dur) / 1e6 > 500 THEN '需优化'
          WHEN SUM(dur) / 1e6 > 100 THEN '良好'
          ELSE '优秀'
        END as gc_time_rating
      FROM gc_events
    save_as: gc_overview
    condition: target_process.data.length > 0

  # ========== GC 类型分布 ==========
  - id: gc_stats
    type: atomic
    name: "GC 事件统计"
    display:
      level: key
      title: "GC 类型分布"
    sql: |
      SELECT
        CASE
          WHEN name GLOB '*ConcurrentCopying*' THEN 'ConcurrentCopying (并发GC)'
          WHEN name GLOB '*MarkSweep*' THEN 'MarkSweep (标记清除)'
          WHEN name GLOB '*Explicit*' THEN 'Explicit (显式GC)'
          WHEN name GLOB '*Alloc*' THEN 'Alloc (分配触发)'
          WHEN name GLOB '*Background*' THEN 'Background (后台GC)'
          WHEN name GLOB '*young*' OR name GLOB '*Young*' THEN 'Young Gen (新生代)'
          WHEN name GLOB '*full*' OR name GLOB '*Full*' THEN 'Full GC (全局)'
          ELSE 'Other'
        END as gc_type,
        COUNT(*) as count,
        SUM(dur) / 1e6 as total_dur_ms,
        ROUND(AVG(dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(dur) / 1e6, 2) as max_dur_ms,
        -- 主线程 GC 数量
        SUM(CASE WHEN t.tid = p.pid THEN 1 ELSE 0 END) as main_thread_count
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
      GROUP BY gc_type
      ORDER BY total_dur_ms DESC
    save_as: gc_stats
    condition: target_process.data.length > 0

  # ========== GC 与帧关联分析（深度 JOIN）==========
  - id: gc_frame_impact
    type: atomic
    name: "GC 与帧关联"
    display:
      level: key
      title: "GC 导致的掉帧分析"
    sql: |
      WITH gc_events AS (
        SELECT
          s.ts as gc_ts,
          s.dur as gc_dur,
          s.name as gc_name,
          t.tid,
          p.pid
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
          AND t.tid = p.pid  -- 主线程 GC
      )
      SELECT
        gc.gc_name,
        gc.gc_dur / 1e6 as gc_dur_ms,
        af.jank_type,
        af.dur / 1e6 as frame_dur_ms,
        CASE
          WHEN af.jank_type != 'None' THEN 'GC导致掉帧'
          WHEN af.dur > 16666666 THEN '帧超时'
          ELSE '正常'
        END as impact
      FROM gc_events gc
      LEFT JOIN actual_frame_timeline_slice af ON (
        gc.gc_ts >= af.ts AND gc.gc_ts < af.ts + af.dur
      )
      LEFT JOIN process p ON af.upid = p.upid
      WHERE p.name GLOB '${package}*'
      ORDER BY gc.gc_dur DESC
      LIMIT 30
    save_as: gc_frame_impact
    condition: target_process.data.length > 0

  # ========== 主线程 GC 详情 ==========
  - id: main_thread_gc
    type: atomic
    name: "主线程 GC"
    display:
      level: key
      title: "主线程 GC (可能导致掉帧)"
    sql: |
      SELECT
        s.name as gc_type,
        s.dur / 1e6 as dur_ms,
        s.ts / 1e6 as ts_ms,
        printf('%d', s.ts) as ts_str,
        printf('%d', s.dur) as dur_str,
        CASE
          WHEN s.dur / 1e6 > 50 THEN 'critical'
          WHEN s.dur / 1e6 > 16 THEN 'warning'
          WHEN s.dur / 1e6 > 8 THEN 'notice'
          ELSE 'normal'
        END as severity,
        -- 掉帧数估算
        CAST(s.dur / 16666666.0 AS INTEGER) as dropped_frames
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND t.tid = p.pid  -- Main thread
        AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
        AND s.dur > 1000000  -- > 1ms
      ORDER BY s.dur DESC
      LIMIT 20
    save_as: main_thread_gc
    condition: target_process.data.length > 0

  # ========== GC 期间主线程状态（深度 JOIN）==========
  - id: gc_thread_state
    type: atomic
    name: "GC 期间主线程状态"
    display:
      level: detail
      title: "GC 期间主线程状态分析"
    sql: |
      WITH main_thread AS (
        SELECT t.utid
        FROM thread t
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*' AND t.tid = p.pid
        LIMIT 1
      ),
      gc_events AS (
        SELECT s.ts, s.dur, s.name
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND t.tid = p.pid
          AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*')
          AND s.dur > 5000000  -- > 5ms
        ORDER BY s.dur DESC
        LIMIT 10
      )
      SELECT
        gc.name as gc_type,
        gc.dur / 1e6 as gc_dur_ms,
        ts.state,
        SUM(
          CASE
            WHEN ts.ts + ts.dur <= gc.ts THEN 0
            WHEN ts.ts >= gc.ts + gc.dur THEN 0
            ELSE MIN(ts.ts + ts.dur, gc.ts + gc.dur) - MAX(ts.ts, gc.ts)
          END
        ) / 1e6 as state_dur_ms,
        ts.blocked_function
      FROM gc_events gc
      JOIN thread_state ts ON ts.utid = (SELECT utid FROM main_thread)
      WHERE ts.ts + ts.dur > gc.ts
        AND ts.ts < gc.ts + gc.dur
      GROUP BY gc.ts, ts.state, ts.blocked_function
      ORDER BY gc.dur DESC, state_dur_ms DESC
      LIMIT 30
    save_as: gc_thread_state
    condition: target_process.data.length > 0

  # ========== GC 间隔分析（内存抖动检测）==========
  - id: gc_interval_analysis
    type: atomic
    name: "GC 间隔分析"
    display:
      level: detail
      title: "GC 间隔分析（内存抖动检测）"
    sql: |
      WITH gc_events AS (
        SELECT
          s.ts,
          s.dur,
          s.name,
          LAG(s.ts + s.dur) OVER (ORDER BY s.ts) as prev_end
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE p.name GLOB '${package}*'
          AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
      )
      SELECT
        CASE
          WHEN (ts - prev_end) / 1e6 < 100 THEN '<100ms (频繁)'
          WHEN (ts - prev_end) / 1e6 < 500 THEN '100-500ms'
          WHEN (ts - prev_end) / 1e6 < 1000 THEN '500ms-1s'
          WHEN (ts - prev_end) / 1e6 < 5000 THEN '1-5s'
          ELSE '>5s'
        END as interval_bucket,
        COUNT(*) as count,
        ROUND(AVG(ts - prev_end) / 1e6, 2) as avg_interval_ms,
        ROUND(MIN(ts - prev_end) / 1e6, 2) as min_interval_ms
      FROM gc_events
      WHERE prev_end IS NOT NULL
      GROUP BY interval_bucket
      ORDER BY
        CASE interval_bucket
          WHEN '<100ms (频繁)' THEN 1
          WHEN '100-500ms' THEN 2
          WHEN '500ms-1s' THEN 3
          WHEN '1-5s' THEN 4
          ELSE 5
        END
    save_as: gc_intervals
    condition: target_process.data.length > 0

  # ========== 长时间 GC 事件 ==========
  - id: long_gc_events
    type: atomic
    name: "长时间 GC"
    display:
      level: key
      title: "耗时最长的 GC 事件"
    sql: |
      SELECT
        s.name as gc_type,
        s.dur / 1e6 as dur_ms,
        s.ts / 1e6 as ts_ms,
        t.name as thread_name,
        printf('%d', s.ts) as ts_str,
        printf('%d', s.dur) as dur_str,
        CASE WHEN t.tid = p.pid THEN '是' ELSE '否' END as is_main_thread
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name GLOB '${package}*'
        AND (s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*')
      ORDER BY s.dur DESC
      LIMIT 15
    save_as: long_gc
    condition: target_process.data.length > 0

  # ========== 内存诊断 ==========
  - id: memory_diagnosis
    type: diagnostic
    name: "内存诊断"
    display:
      level: key
      title: "问题诊断"
    inputs: [gc_overview, gc_stats, main_thread_gc, long_gc, gc_intervals]
    rules:
      # GC 频率过高
      - condition: "gc_overview.data[0]?.total_gc_count > 100"
        severity: critical
        diagnosis: "GC 频率过高 (${gc_overview.data[0].total_gc_count} 次)"
        confidence: high
        suggestions:
          - "检查是否有频繁的对象创建和销毁"
          - "使用对象池重用对象"
          - "避免在循环中创建对象"

      - condition: "gc_overview.data[0]?.total_gc_count > 50"
        severity: warning
        diagnosis: "GC 频率较高 (${gc_overview.data[0].total_gc_count} 次)"
        confidence: medium
        suggestions:
          - "检查内存分配热点"
          - "优化临时对象使用"

      # GC 总耗时过长
      - condition: "gc_overview.data[0]?.total_gc_time_ms > 2000"
        severity: critical
        diagnosis: "GC 总耗时过长 (${gc_overview.data[0].total_gc_time_ms}ms)"
        confidence: high
        suggestions:
          - "减少内存分配频率"
          - "检查大对象分配"
          - "考虑调整堆大小"

      # 主线程 GC 导致掉帧
      - condition: "gc_overview.data[0]?.main_thread_gc_count > 10"
        severity: critical
        diagnosis: "主线程发生 ${gc_overview.data[0].main_thread_gc_count} 次 GC"
        confidence: high
        suggestions:
          - "将内存密集型操作移到后台线程"
          - "避免在 UI 线程分配大量内存"

      # 单次 GC 暂停过长
      - condition: "long_gc.data[0]?.dur_ms > 50"
        severity: warning
        diagnosis: "单次 GC 暂停过长 (${long_gc.data[0].dur_ms}ms)"
        confidence: medium
        suggestions:
          - "检查大对象分配"
          - "考虑调整堆大小"

      # 内存抖动
      - condition: "gc_intervals.data.find(i => i.interval_bucket === '<100ms (频繁)')?.count > 10"
        severity: critical
        diagnosis: "检测到内存抖动（GC 间隔 <100ms）"
        confidence: high
        suggestions:
          - "检查是否有频繁的对象创建销毁"
          - "使用 Memory Profiler 分析分配热点"
          - "考虑使用对象池"

  # ========== AI 总结 ==========
  - id: global_summary
    type: ai_summary
    name: "分析总结"
    display:
      level: key
      title: "内存分析总结"
    inputs: [target_process, gc_overview, gc_stats, main_thread_gc, gc_intervals, memory_diagnosis]
    prompt: |
      请基于以下内存分析结果，生成专业的性能评估总结。

      ## 目标进程
          target_process

      ## GC 概览
          gc_overview

      ## GC 类型分布
          gc_stats

      ## 主线程 GC
          main_thread_gc

      ## GC 间隔分布
          gc_intervals

      ## 诊断结果
          memory_diagnosis

      ## 专业分析要求

      如果目标进程为空或无 GC 数据，请输出：
      "未检测到 GC 事件。

      可能原因：
      - 进程包名不匹配
      - Trace 中未包含 GC 事件
      - 应用内存使用正常

      建议：如需分析内存问题，请确保 Trace 包含内存相关事件。"

      如果有 GC 数据，请分析并输出：
      1. **整体评价**：
         - GC 次数：<10次优秀，10-50次良好，50-100次需关注，>100次严重
         - GC 总耗时：<100ms优秀，100-500ms良好，500-2000ms需优化，>2000ms严重
         - 主线程 GC：<5次良好，5-10次需关注，>10次严重
      2. **GC 类型分析**：各类型 GC 的分布和影响
      3. **内存抖动检测**：GC 间隔是否过短
      4. **主线程影响**：主线程 GC 对流畅度的影响
      5. **优化建议**：基于实际问题给出1-3条具体建议

      ## 严格要求
      - 只基于提供的实际数据分析
      - 重点关注主线程 GC 和内存抖动
      - 格式清晰，不超过300字

output:
  display:
    level: key
    format: summary
