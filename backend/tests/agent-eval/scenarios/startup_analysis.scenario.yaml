# Startup Analysis Test Scenarios
# ================================
# These scenarios test the agent's ability to analyze app startup performance
# from Android trace files.

scenarios:
  # ============================================================================
  # Cold Start Analysis
  # ============================================================================

  - id: startup_cold_basic
    description: "Basic cold start analysis - agent should identify startup phases and duration"
    category: startup
    priority: critical

    input:
      traceFile: api34_startup_cold.perfetto-trace
      query: "分析这个应用的冷启动性能"
      mode: agent
      maxIterations: 5

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.7
        maxExecutionTimeMs: 120000
        minFindings: 1

      model:
        shouldMention:
          - "冷启动"
          - "启动时间"
          - "TTID"
        answerCriteria:
          technical: true
          includeRecommendations: true
          citeData: true

    tags:
      - startup
      - cold-start
      - basic

  - id: startup_phase_breakdown
    description: "Agent should break down startup into phases"
    category: startup
    priority: high

    input:
      traceFile: api34_startup_cold.perfetto-trace
      query: "启动各阶段耗时是多少？哪个阶段最慢？"
      mode: agent
      maxIterations: 5

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.6
        requiredLayers:
          - L1

      model:
        shouldMention:
          - "阶段"
          - "耗时"
        rubric:
          - criterion: phase_identification
            description: "Agent identifies startup phases correctly"
            weight: 0.5
            scoringGuide:
              excellent: "All phases identified with durations"
              good: "Major phases identified"
              fair: "Some phases mentioned"
              poor: "No phase breakdown"

          - criterion: bottleneck_identification
            description: "Agent identifies the slowest phase"
            weight: 0.5
            scoringGuide:
              excellent: "Correct bottleneck with timing evidence"
              good: "Bottleneck identified with some data"
              fair: "Vague bottleneck mention"
              poor: "No bottleneck identified"

    tags:
      - startup
      - phases
      - detailed

  # ============================================================================
  # Warm Start Analysis
  # ============================================================================

  - id: startup_warm_analysis
    description: "Warm start analysis with comparison to cold start expectations"
    category: startup
    priority: medium

    input:
      traceFile: api34_startup_warm.perfetto-trace
      query: "这是热启动还是冷启动？分析启动性能"
      mode: agent
      maxIterations: 4

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.5

      model:
        shouldMention:
          - "热启动"
        shouldNotMention:
          - "冷启动"

    tags:
      - startup
      - warm-start

  # ============================================================================
  # Skill Mode
  # ============================================================================

  - id: skill_startup_quick
    description: "Skill mode startup analysis should be fast and structured"
    category: startup
    priority: medium

    input:
      traceFile: api34_startup_cold.perfetto-trace
      query: "startup_analysis"
      mode: skill

    expectations:
      code:
        shouldSucceed: true
        maxExecutionTimeMs: 30000
        requiredLayers:
          - L1

    tags:
      - startup
      - skill-mode
      - fast
