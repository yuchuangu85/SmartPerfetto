# Scrolling Analysis Test Scenarios
# ==================================
# These scenarios test the agent's ability to analyze scrolling performance
# from Android trace files.
#
# Evaluation uses both Code-based (deterministic) and Model-based (LLM) graders.

scenarios:
  # ============================================================================
  # Basic Scrolling Analysis
  # ============================================================================

  - id: scrolling_basic_analysis
    description: "Basic scrolling performance analysis - agent should identify jank and provide recommendations"
    category: scrolling
    priority: critical

    input:
      traceFile: app_aosp_scrolling_heavy_jank.pftrace
      query: "分析这个 trace 的滑动性能"
      mode: agent
      maxIterations: 5

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.7
        maxExecutionTimeMs: 120000
        requiredLayers:
          - L1
          - L2
        minFindings: 1
        expectedCategories:
          - jank

      model:
        shouldMention:
          - "掉帧"
          - "帧率"
          - "jank"
        answerCriteria:
          technical: true
          includeRecommendations: true
          citeData: true

    tags:
      - scrolling
      - basic
      - smoke

  # ============================================================================
  # Scrolling Session Detection
  # ============================================================================

  - id: scrolling_session_detection
    description: "Agent should correctly identify scroll sessions and their characteristics"
    category: scrolling
    priority: high

    input:
      traceFile: app_aosp_scrolling_heavy_jank.pftrace
      query: "这个 trace 中有多少次滑动？每次滑动的表现如何？"
      mode: agent
      maxIterations: 5

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.6
        requiredLayers:
          - L2
        requiredFields:
          - layers.list.scroll_sessions

      model:
        shouldMention:
          - "滑动次数"
          - "帧率"
          - "掉帧"
        rubric:
          - criterion: session_count_accuracy
            description: "Agent correctly identifies the number of scroll sessions"
            weight: 0.4
            scoringGuide:
              excellent: "Exact session count mentioned with timestamps"
              good: "Approximate session count mentioned"
              fair: "Sessions mentioned but count unclear"
              poor: "No session count information"

          - criterion: per_session_analysis
            description: "Agent provides per-session analysis"
            weight: 0.3
            scoringGuide:
              excellent: "Detailed analysis for each session with fps, jank rate"
              good: "Basic metrics for sessions"
              fair: "Vague session analysis"
              poor: "No per-session breakdown"

          - criterion: comparison
            description: "Agent compares sessions if multiple exist"
            weight: 0.3
            scoringGuide:
              excellent: "Clear comparison identifying worst performing session"
              good: "Some comparison between sessions"
              fair: "Sessions listed but not compared"
              poor: "No comparison"

    tags:
      - scrolling
      - sessions
      - detailed

  # ============================================================================
  # Jank Root Cause Analysis
  # ============================================================================

  - id: scrolling_jank_root_cause
    description: "Agent should analyze jank root causes and provide actionable recommendations"
    category: scrolling
    priority: high

    input:
      traceFile: app_aosp_scrolling_heavy_jank.pftrace
      query: "为什么这个 trace 会掉帧？请分析根本原因并给出优化建议"
      mode: agent
      maxIterations: 7

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.65
        maxExecutionTimeMs: 180000
        minFindings: 2

      model:
        shouldMention:
          - "掉帧原因"
          - "App"
          - "主线程"
        shouldNotMention:
          - "无法分析"
          - "没有数据"
        answerCriteria:
          technical: true
          includeRecommendations: true
          citeData: true
        rubric:
          - criterion: root_cause_identification
            description: "Agent identifies the actual root cause of jank"
            weight: 0.4
            scoringGuide:
              excellent: "Correct root cause with evidence from trace data"
              good: "Likely root cause identified"
              fair: "Generic causes mentioned without evidence"
              poor: "Wrong or no root cause identified"

          - criterion: recommendation_quality
            description: "Quality and actionability of recommendations"
            weight: 0.35
            scoringGuide:
              excellent: "Specific, actionable recommendations with code-level suggestions"
              good: "Reasonable recommendations for the identified issues"
              fair: "Generic optimization suggestions"
              poor: "No recommendations or irrelevant advice"

          - criterion: data_citation
            description: "Agent cites specific data to support analysis"
            weight: 0.25
            scoringGuide:
              excellent: "Cites specific timestamps, durations, and metrics"
              good: "References data but not always specific"
              fair: "Vague references to data"
              poor: "No data citation"

    tags:
      - scrolling
      - root-cause
      - recommendations

  # ============================================================================
  # Skill Mode - Quick Analysis
  # ============================================================================

  - id: skill_scrolling_quick
    description: "Skill mode should provide fast, structured analysis"
    category: scrolling
    priority: medium

    input:
      traceFile: app_aosp_scrolling_heavy_jank.pftrace
      query: "scrolling_analysis"
      mode: skill

    expectations:
      code:
        shouldSucceed: true
        maxExecutionTimeMs: 30000
        requiredLayers:
          - L1
          - L2
        requiredFields:
          - layers.overview.vsync_config
          - layers.overview.performance_summary
          - layers.list.scroll_sessions

      model:
        answerCriteria:
          technical: true
          citeData: true

    tags:
      - scrolling
      - skill-mode
      - fast

  # ============================================================================
  # Edge Cases
  # ============================================================================

  - id: scrolling_no_jank_trace
    description: "Agent should correctly identify when there is minimal or no jank"
    category: scrolling
    priority: medium

    input:
      traceFile: app_aosp_scrolling_light.pftrace
      query: "分析滑动性能，有掉帧吗？"
      mode: agent
      maxIterations: 3

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.5

      model:
        shouldMention:
          - "流畅"
        shouldNotMention:
          - "严重"
          - "大量掉帧"

    tags:
      - scrolling
      - edge-case
      - no-jank

  - id: scrolling_invalid_query
    description: "Agent should handle queries about non-existent data gracefully"
    category: scrolling
    priority: low

    input:
      traceFile: api34_startup_cold.perfetto-trace
      query: "分析滑动性能"
      mode: agent
      maxIterations: 3

    expectations:
      code:
        shouldSucceed: true
        minConfidence: 0.3

      model:
        shouldMention:
          - "没有滑动数据"
        shouldNotMention:
          - "掉帧"
          - "jank 率"

    tags:
      - scrolling
      - edge-case
      - no-data
